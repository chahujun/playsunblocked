    for (var cn in T) {
      if (result.indexOf(cn) !== -1) {
        result = result.split(cn).join(T[cn]);
      }
    }
    return result;
  }

  var origFillText = CanvasRenderingContext2D.prototype.fillText;
  CanvasRenderingContext2D.prototype.fillText = function(text, x, y, maxWidth) {
    if (typeof text === 'string') text = tr(text);
    if (maxWidth !== undefined) return origFillText.call(this, text, x, y, maxWidth);
    return origFillText.call(this, text, x, y);
  };
  var origStrokeText = CanvasRenderingContext2D.prototype.strokeText;
  CanvasRenderingContext2D.prototype.strokeText = function(text, x, y, maxWidth) {
    if (typeof text === 'string') text = tr(text);
    if (maxWidth !== undefined) return origStrokeText.call(this, text, x, y, maxWidth);
    return origStrokeText.call(this, text, x, y);

    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);

      var translated = tr(node.nodeValue);
      if (translated !== node.nodeValue) node.nodeValue = translated;
    }
    var els = root.querySelectorAll('[title],[alt],[placeholder]');

      });

  }

<style id="auto-fit">
html,body{margin:0!important;padding:0!important;overflow:hidden!important;width:100vw!important;height:100vh!important;}
</style>
<script id="auto-fit-script">
(function(){
  function fitGame(){
    var stage=document.querySelector('.stage')||document.querySelector('.game-wrap')||document.body;
    if(!stage)return;
    var sw=stage.scrollWidth,sh=stage.scrollHeight;
    if(!sw||!sh)return;
    var vw=window.innerWidth,vh=window.innerHeight;
    var scale=Math.min(vw/sw,vh/sh);
    stage.style.transformOrigin='top left';
    stage.style.transform='scale('+scale+')';
    stage.style.position='absolute';
    stage.style.left=((vw-sw*scale)/2)+'px';
    stage.style.top=((vh-sh*scale)/2)+'px';
  }
  if(document.readyState==='complete')fitGame();
  else window.addEventListener('load',fitGame);
  window.addEventListener('resize',fitGame);
  setTimeout(fitGame,100);
  setTimeout(fitGame,500);
  setTimeout(fitGame,1500);
})();
</script>

      90deg, transparent 0, transparent 28px,
      rgba(0,0,0,0.4) 28px, rgba(0,0,0,0.4) 29px
    );
    pointer-events: none;
  }
  #hpText {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'JetBrains Mono', monospace;
    color: #fff; font-size: 11px; font-weight: 800;
    text-shadow: 0 1px 2px rgba(0,0,0,0.95);
    letter-spacing: 1px; z-index: 2;
  }
  /* 生存状态条：内嵌于 statusPanel，2x2 网格布局 */
  #survivalPanel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .surv-row {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: #9aa0a6;
    letter-spacing: 0.3px;
  }
  .surv-row .lbl { width: 32px; color: #6a7076; font-size: 9px; text-transform: uppercase; }
  .surv-bar {
    flex: 1; height: 7px;
    background: #0a0c0e;
    border: 1px solid #1a1e22;
    position: relative; overflow: hidden;
  }
  .surv-bar .fill {
    height: 100%; transition: width 0.3s;
  }
  .surv-row .val { width: 30px; color: #9aa0a6; font-size: 9px; text-align: right; }
  /* 武器信息行 */
  #weaponInfo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #9aa0a6;
    letter-spacing: 0.5px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 4px 10px;
    padding-top: 6px;
    border-top: 1px solid #1a1e22;
  }
  #weaponInfo .wname {
    color: #e8b04a; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1.2px;
  }
  #weaponInfo .ammo { color: #88a8c8; }
  #weaponInfo .mines { color: #c8a888; margin-left: auto; }
  #weaponInfo .reload-indicator {
    color: #e8b04a; font-weight: 700; letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(232,176,74,0.6);
    animation: zcBlink 0.7s steps(2) infinite;
  }
  @keyframes zcBlink { 50% { opacity: 0.35; } }

  /* 武器槽位：右下角9个卡片 */
  #weaponSlots {
    position: fixed; right: 16px; bottom: 16px;
    display: flex; gap: 3px;
    font-family: 'JetBrains Mono', monospace;
    z-index: 10;
  }
  .slot {
    width: 48px; padding: 4px 2px 3px;
    background: rgba(13,16,19,0.88);
    border: 1px solid #2a3036;
    border-top: 2px solid #2a3036;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
    backdrop-filter: blur(2px);
    position: relative;
  }
  .slot.owned { border-top-color: #5a6268; }
  .slot.pending {
    border-top-color: #e8b04a;
    background: rgba(28,24,18,0.88);
  }
  .slot.active {
    border-top-color: #e8b04a;
    background: rgba(28,24,18,0.95);
  }
  .slot .key-num {
    font-size: 8px; color: #5a6268;
    letter-spacing: 1px; display: block; margin-bottom: 1px;
  }
  .slot.active .key-num { color: #e8b04a; }
  .slot .slot-name {
    font-size: 8px; font-weight: 800;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    display: block;
  }
  .slot.locked .slot-name { color: #3a4046; }
  .slot.owned .slot-name { color: #9aa0a6; }
  .slot .slot-att {
    font-size: 9px; font-weight: bold;
    display: block; margin-top: 1px;
    text-shadow: 0 0 4px currentColor;
  }

  /* 操作提示：底部中央，独立一行 */
  #controlsHint {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: #5a6268;
    letter-spacing: 0.8px;
    display: flex; gap: 6px; align-items: center;
    background: rgba(13,16,19,0.7);
    border: 1px solid #1a1e22;
    padding: 4px 10px;
    z-index: 10;
    white-space: nowrap;
  }
  #controlsHint .key {
    background: #1a1e22; padding: 1px 4px;
    border: 1px solid #2a3036;
    color: #9aa0a6;
    margin-right: 2px;
    font-size: 8px;
  }

  /* 波次信息：顶部中央，简洁 */
  #waveInfo {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }
  #waveText {
    display: block;
    font-family: 'Oswald', sans-serif;
    font-size: 24px; font-weight: 700;
    letter-spacing: 4px;
    color: #e8e4d8;
  }
  #countdownText {
    display: block; margin-top: 3px;
    font-size: 13px; letter-spacing: 2px; font-weight: 700;
    color: #e8b04a;
    text-transform: uppercase;
  }
  @keyframes flash-red {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* 红闪：更猛烈、更短 */
  #redFlash {
    position: fixed; inset: 0; z-index: 80;
    pointer-events: none;
    background: rgba(180,30,20,0.35);
    opacity: 0;
    transition: opacity 0.04s;
  }
  #redFlash.active { opacity: 1; }

  /* 受伤暗角 */
  #vignette {
    position: fixed; inset: 0; z-index: 40;
    pointer-events: none;
    box-shadow: inset 0 0 200px rgba(80,10,10,0.5);
    opacity: 0;
    transition: opacity 0.4s;
  }
  #vignette.active { opacity: 1; }

  /* CRT 扫描线：减弱，避免蒙雾感 */
  #scanlines {
    position: fixed; inset: 0; z-index: 45;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.06) 3px
    );
    opacity: 0.15;
  }
  /* 屏幕边缘暗角：减弱 */
  #screenVignette {
    position: fixed; inset: 0; z-index: 44;
    pointer-events: none;
    box-shadow: inset 0 0 140px rgba(0,0,0,0.4);
  }
  /* 低血量警告脉动 */
  #lowHpWarning {
    position: fixed; inset: 0; z-index: 46;
    pointer-events: none;
    box-shadow: inset 0 0 120px rgba(180,20,20,0.6);
    opacity: 0;
    animation: lowHpPulse 1s ease-in-out infinite;
  }
  #lowHpWarning.active { display: block; }
  #lowHpWarning:not(.active) { display: none; }
  @keyframes lowHpPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }
</style>
</head>

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playShot() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const w = WEAPONS[player.weapon];
  const wType = w.type || 'normal';

  // 根据武器类型调整音效参数
  let noiseGain = 0.25, noiseDur = 0.06, hpFreq = 800;
  let oscFreq = 800, oscEndFreq = 50, oscGain = 0.12, oscType = 'square';

  if (wType === 'flame') {
    // 火焰枪：低沉的呼啸声
    noiseGain = 0.15; noiseDur = 0.12; hpFreq = 400;
    oscFreq = 200; oscEndFreq = 80; oscGain = 0.08; oscType = 'sawtooth';
  } else if (wType === 'rocket') {
    // 火箭筒：低沉的发射轰鸣
    noiseGain = 0.35; noiseDur = 0.15; hpFreq = 300;
    oscFreq = 150; oscEndFreq = 40; oscGain = 0.2; oscType = 'square';
  } else if (player.weapon === 'hmg') {
    // 重机枪：更尖锐快速
    noiseGain = 0.18; noiseDur = 0.04; hpFreq = 1000;
    oscFreq = 600; oscEndFreq = 80; oscGain = 0.08;
  } else if (player.weapon === 'shotgun') {
    // 霰弹枪：更厚重
    noiseGain = 0.3; noiseDur = 0.08; hpFreq = 600;
    oscFreq = 400; oscEndFreq = 30; oscGain = 0.15;
  }

  // White noise burst through highpass filter
  const bufSize = Math.floor(audioCtx.sampleRate * noiseDur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const hpFilter = audioCtx.createBiquadFilter();
  hpFilter.type = 'highpass';
  hpFilter.frequency.value = hpFreq;
  const nGain = audioCtx.createGain();
  nGain.gain.setValueAtTime(noiseGain, now);
  nGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDur);
  noise.connect(hpFilter); hpFilter.connect(nGain); nGain.connect(audioCtx.destination);
  noise.start(now); noise.stop(now + noiseDur);

  // Frequency sweep
  const osc = audioCtx.createOscillator();
  osc.type = oscType;
  osc.frequency.setValueAtTime(oscFreq, now);
  osc.frequency.exponentialRampToValueAtTime(oscEndFreq, now + noiseDur);
  const oGain = audioCtx.createGain();
  oGain.gain.setValueAtTime(oscGain, now);
  oGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDur);
  osc.connect(oGain); oGain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + noiseDur);
}

function playExplosion() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Low sine sweep 300Hz -> 10Hz, 0.5s fade
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300, now);
  osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.5, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.5);

  // Noise burst for impact
  const bufSize = Math.floor(audioCtx.sampleRate * 0.35);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const lpFilter = audioCtx.createBiquadFilter();
  lpFilter.type = 'lowpass';
  lpFilter.frequency.value = 400;
  const nGain = audioCtx.createGain();
  nGain.gain.setValueAtTime(0.35, now);
  nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
  noise.connect(lpFilter); lpFilter.connect(nGain); nGain.connect(audioCtx.destination);
  noise.start(now);
}

function playHurt() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(400, now);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.3, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.15);
}

function playPickup() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, now);
  osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.15);
}

function playReload() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Two click sounds
  for (let i = 0; i < 2; i++) {
    const t0 = now + i * 0.12;
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(200, t0);
    osc.frequency.exponentialRampToValueAtTime(80, t0 + 0.04);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.12, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.05);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + 0.05);
  }
}

function playDash() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const bufSize = Math.floor(audioCtx.sampleRate * 0.2);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize) * 0.5;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const bpFilter = audioCtx.createBiquadFilter();
  bpFilter.type = 'bandpass';
  bpFilter.frequency.value = 1500;
  bpFilter.Q.value = 2;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.2, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  noise.connect(bpFilter); bpFilter.connect(gain); gain.connect(audioCtx.destination);
  noise.start(now);
}

function playCombo(level) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const baseFreq = 600 + Math.min(level, 10) * 60;
  const osc = audioCtx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(baseFreq, now);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, now + 0.08);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.08, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.12);
}

function playWaveStart() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Low rumble
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, now);
  osc.frequency.exponentialRampToValueAtTime(40, now + 0.6);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.25, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
  const lpFilter = audioCtx.createBiquadFilter();
  lpFilter.type = 'lowpass';
  lpFilter.frequency.value = 300;
  osc.connect(lpFilter); lpFilter.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.6);
}

function playZombieDeath() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.25);
}

// Pixel art helpers - snap to 2px grid for chunky pixel look
function PX(x) { return Math.round(x); }
function pxRect(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(Math.round(x), Math.round(y), Math.max(1, Math.round(w)), Math.max(1, Math.round(h))); }
function pxCircle(cx, cy, r, color) {
  ctx.fillStyle = color;
  cx = PX(cx); cy = PX(cy); r = Math.max(1, Math.ceil(r));
  // Draw circle as pixel blocks
  for (var dy = -r; dy <= r; dy += 1) {
    var dx = Math.floor(Math.sqrt(r * r - dy * dy));
    ctx.fillRect(cx - dx, cy + dy, dx * 2, 1);
  }
}

// 保存原始武器数据（用于配件应用时重算，避免叠加）
// 手动复制以保留不可序列化的属性（数值字段），apply函数在ATTACHMENTS中单独保存
const WEAPONS_ORIGINAL = {};
for (const wId in WEAPONS) {
  WEAPONS_ORIGINAL[wId] = {};
  for (const key in WEAPONS[wId]) {
    WEAPONS_ORIGINAL[wId][key] = WEAPONS[wId][key];
  }
}

// 获取武器当前配件
function getAttachment(weaponId) {
  const attId = player.attachments[weaponId];
  return attId ? ATTACHMENTS[attId] : null;
}

// 重置武器到原始状态并应用所有已装备配件
function refreshWeaponStats() {
  for (const wId in WEAPONS_ORIGINAL) {
    // 手动复制原始数据
    WEAPONS[wId] = {};
    for (const key in WEAPONS_ORIGINAL[wId]) {
      WEAPONS[wId][key] = WEAPONS_ORIGINAL[wId][key];
    }
    const attId = player.attachments[wId];
    if (attId && ATTACHMENTS[attId]) {
      const att = ATTACHMENTS[attId];
      if (att.weaponOnly && !att.weaponOnly.includes(wId)) {
        // 配件不适用于该武器，移除
        delete player.attachments[wId];
      } else {
        att.apply(WEAPONS[wId]);
      }
    }
  }
}

// 拾取配件：装备到指定武器
function equipAttachment(weaponId, attId) {
  const att = ATTACHMENTS[attId];
  if (!att) return false;
  if (att.weaponOnly && !att.weaponOnly.includes(weaponId)) return false;
  player.attachments[weaponId] = attId;
  refreshWeaponStats();
  return true;
}

// 获取配件可用的武器列表（用于掉落时随机选择）
function getAttachableWeapons() {
  return WEAPON_KEYS.filter(w => w !== 'pistol' && player.ownedWeapons.includes(w));
}

const camera = { x: 0, y: 0 };

function updateCamera() {
  const targetX = player.x - VIEW_W / 2;
  const targetY = player.y - VIEW_H / 2;
  camera.x += (targetX - camera.x) * 0.12;
  camera.y += (targetY - camera.y) * 0.12;
  camera.x = Math.max(0, Math.min(WORLD_W - VIEW_W, camera.x));
  camera.y = Math.max(0, Math.min(WORLD_H - VIEW_H, camera.y));
}

const keys = {};
let mouseX = 0, mouseY = 0;
let mouseDown = false;

document.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  if (e.code === 'Space') { e.preventDefault(); placeMine(); }
  // 武器切换 1-9，按已拥有武器的顺序切换
  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    const ownedWeapons = WEAPON_KEYS.filter(wId => player.ownedWeapons.includes(wId));
    const w = ownedWeapons[idx];
    if (w) switchWeapon(w);
  }
  // Q 切换到上一个武器
  if (e.key.toLowerCase() === 'q') {
    const ownedWeapons = WEAPON_KEYS.filter(wId => player.ownedWeapons.includes(wId));
    const curIdx = ownedWeapons.indexOf(player.weapon);
    if (curIdx > 0) switchWeapon(ownedWeapons[curIdx - 1]);
    else if (ownedWeapons.length > 1) switchWeapon(ownedWeapons[ownedWeapons.length - 1]);
  }
  // E 切换到下一个武器
  if (e.key.toLowerCase() === 'e') {
    const ownedWeapons = WEAPON_KEYS.filter(wId => player.ownedWeapons.includes(wId));
    const curIdx = ownedWeapons.indexOf(player.weapon);
    if (curIdx >= 0 && curIdx < ownedWeapons.length - 1) switchWeapon(ownedWeapons[curIdx + 1]);
    else if (ownedWeapons.length > 1) switchWeapon(ownedWeapons[0]);
  }
  if (e.key === 'Shift' || e.key.toLowerCase() === 'shift') tryDash();
  if (e.key.toLowerCase() === 'r') tryReload();
});
document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.round((e.clientX - rect.left) / PIXEL_SCALE);
  mouseY = Math.round((e.clientY - rect.top) / PIXEL_SCALE);
});
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0) { mouseDown = true; tryShoot(); }
});
canvas.addEventListener('mouseup', (e) => {
  if (e.button === 0) {
    mouseDown = false;
    // 停止火焰枪火柱
    if (player.flameStream) player.flameStream.active = false;
  }
});
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// 鼠标滚轮切换武器
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (state !== GameState.PLAYING) return;
  const ownedWeapons = WEAPON_KEYS.filter(wId => player.ownedWeapons.includes(wId));
  if (ownedWeapons.length <= 1) return;
  const curIdx = ownedWeapons.indexOf(player.weapon);
  let newIdx;
  if (e.deltaY > 0) {
    newIdx = (curIdx + 1) % ownedWeapons.length;
  } else {
    newIdx = (curIdx - 1 + ownedWeapons.length) % ownedWeapons.length;
  }
  switchWeapon(ownedWeapons[newIdx]);
}, { passive: false });

function switchWeapon(w) {
  if (state !== GameState.PLAYING) return;
  // 仅允许切换到已拥有的武器；若未拥有，自动加入并填满弹药（拾取逻辑由 pickup 处理）
  if (!player.ownedWeapons.includes(w)) return;
  player.weapon = w;
  player.reloading = false;
  player.reloadTimer = 0;
  // 切换武器时停止火柱
  if (player.flameStream) player.flameStream.active = false;
  updateHUD();
}

// Q 丢弃当前武器（手枪不可丢弃）
function dropCurrentWeapon() {
  if (state !== GameState.PLAYING) return;
  if (player.weapon === 'pistol') return;
  if (!player.ownedWeapons.includes(player.weapon)) return;
  // 在玩家位置生成武器掉落物
  pickups.push({ x: player.x, y: player.y, type: 'weapon_' + player.weapon, radius: 14, life: 1200, bob: 0 });
  // 从拥有列表中移除
  const idx = player.ownedWeapons.indexOf(player.weapon);
  player.ownedWeapons.splice(idx, 1);
  // 切回手枪
  player.weapon = 'pistol';
  player.reloading = false;
  player.reloadTimer = 0;
  updateHUD();
}

function tryDash() {
  if (state !== GameState.PLAYING) return;
  if (player.dashCooldown > 0) return;
  if (player.dashTime > 0) return;
  // 体力不足时无法冲刺（侦察兵除外，体力消耗减半）
  const staminaCost = player.class === 'scout' ? 15 : 25;
  if (survival.stamina < staminaCost) return;
  survival.stamina = Math.max(0, survival.stamina - staminaCost);
  // Need movement input
  let ax = 0, ay = 0;
  if (keys['w'] || keys['arrowup']) ay -= 1;
  if (keys['s'] || keys['arrowdown']) ay += 1;
  if (keys['a'] || keys['arrowleft']) ax -= 1;
  if (keys['d'] || keys['arrowright']) ax += 1;
  if (ax === 0 && ay === 0) {
    // Dash toward aim direction if no movement
    ax = Math.cos(player.angle);
    ay = Math.sin(player.angle);
  } else {
    const len = Math.sqrt(ax * ax + ay * ay);
    ax /= len; ay /= len;
  }
  player.dashTime = player.dashDuration;
  // 职业影响冲刺CD与速度
  const cls = player.class ? CLASSES[player.class] : null;
  player.dashCooldown = player.dashMaxCooldown * (cls ? cls.dashCooldownMult : 1.0);
  const dashSpdMult = cls && cls.dashSpeedMult ? cls.dashSpeedMult : 1.0;
  player.dashDirX = ax;
  player.dashDirY = ay;
  player.dashSpeed = 12 * dashSpdMult;
  player.invuln = Math.max(player.invuln, player.dashDuration + 4);
  playDash();
  // Clear trail
  player.dashTrail = [];
}

function tryReload() {
  if (state !== GameState.PLAYING) return;
  if (player.reloading) return;
  const w = WEAPONS[player.weapon];
  const wAmmo = ammo[player.weapon];
  if (wAmmo === Infinity) return;
  // 满弹检查
  const ammoCap = SECONDARY_AMMO[player.weapon] || w.maxAmmo;
  if (wAmmo >= ammoCap) return;
  // 备弹检查：没有备弹就不能装弹
  if (spareAmmo[player.weapon] !== Infinity && spareAmmo[player.weapon] <= 0) return;
  player.reloading = true;
  // 装弹时长受职业 reloadMult + 升级 reloadBonus 影响
  const reloadMult = (player.class ? CLASSES[player.class].reloadMult : 1.0) * (1 - player.upgrades.reloadBonus);
  player.reloadTimer = Math.max(15, w.reload * reloadMult);
  player.reloadDuration = player.reloadTimer; // 记录总时长，用于进度条
  playReload();
}

const MAX_AMMO = { pistol: Infinity, hmg: 100, shotgun: 24, flamethrower: 100, rocket: 8 };

// =====================================================================
// WEAPONS
// =====================================================================
function tryShoot() {
  if (state !== GameState.PLAYING) return;
  const now = performance.now();
  const w = WEAPONS[player.weapon];
  if (now - player.lastShot < w.fireRate * (player.buffs.frenzy > 0 ? 0.5 : 1)) return;

  // 副武器弹药检查
  const wAmmo = ammo[player.weapon];
  if (wAmmo !== Infinity && wAmmo <= 0) { tryReload(); return; }

  player.lastShot = now;

  // 副武器弹药消耗
  if (wAmmo !== Infinity) {
    ammo[player.weapon]--;
  }

  const worldMX = mouseX * PIXEL_SCALE + camera.x;
  const worldMY = mouseY * PIXEL_SCALE + camera.y;
  const baseAngle = Math.atan2(worldMY - player.y, worldMX - player.x);
  player.angle = baseAngle;

  const spreads = [];
  for (let i = 0; i < w.pellets; i++) {
    let angle = baseAngle;
    if (w.pellets > 1) {
      angle = baseAngle - w.spread + (w.spread * 2 / (w.pellets - 1)) * i;
    }
    if (w.jitter > 0) {
      angle += (Math.random() - 0.5) * w.jitter * 2;
    }
    spreads.push(angle);
  }

  // Knockback for shotgun (3px)
  if (player.weapon === 'shotgun') {
    player.vx -= Math.cos(baseAngle) * 3;
    player.vy -= Math.sin(baseAngle) * 3;
  }
  // 火箭筒/榴弹：更大后坐力
  if (player.weapon === 'rocket' || player.weapon === 'grenade') {
    player.vx -= Math.cos(baseAngle) * 5;
    player.vy -= Math.sin(baseAngle) * 5;
    addShake(3);
  }
  // 微型火箭：小幅后坐力
  if (player.weapon === 'micro_rocket') {
    player.vx -= Math.cos(baseAngle) * 1.5;
    player.vy -= Math.sin(baseAngle) * 1.5;
  }

  // Visual FX: recoil + shake
  triggerShootFX();

  // Apply rage buff (damage * 1.8) and frenzy buff (+50% damage)
  const rageMult = player.buffs.rage > 0 ? 1.8 : 1;
  const frenzyDmgMult = player.buffs.frenzy > 0 ? 1.5 : 1;

  // Muzzle flash particle
  const muzzleX = player.x + Math.cos(baseAngle) * (player.radius + 14);
  const muzzleY = player.y + Math.sin(baseAngle) * (player.radius + 14);
  const flashCount = w.type === 'flame' ? 14 : (w.type === 'rocket' || w.type === 'grenade' ? 8 : (w.type === 'laser' ? 6 : (w.type === 'micro_rocket' ? 5 : 3)));
  for (let i = 0; i < flashCount; i++) {
    // 火焰枪：枪口闪光呈锥形扩散
    const spreadAng = w.type === 'flame' ? baseAngle + (Math.random() - 0.5) * 0.8 : baseAngle;
    const speed = w.type === 'flame' ? (1.5 + Math.random() * 4) : (2 + Math.random() * 3);
    particles.push({
      x: muzzleX, y: muzzleY,
      vx: Math.cos(spreadAng) * speed + (Math.random() - 0.5) * 2,
      vy: Math.sin(spreadAng) * speed + (Math.random() - 0.5) * 2,
      life: 10 + Math.random() * 8,
      maxLife: 18,
      size: w.type === 'flame' ? (4 + Math.random() * 4) : (3 + Math.random() * 2),
      color: w.type === 'flame' ? (Math.random() < 0.3 ? '#ff4400' : (Math.random() < 0.5 ? '#ff8833' : '#ffcc55')) :
             (w.type === 'rocket' || w.type === 'grenade' ? (Math.random() < 0.5 ? '#ff6622' : '#ffdd44') :
             (w.type === 'laser' ? (Math.random() < 0.5 ? '#44ddff' : '#aaffff') :
             (w.type === 'homing' ? (Math.random() < 0.5 ? '#ff66dd' : '#ffaadd') :
             (w.type === 'micro_rocket' ? (Math.random() < 0.5 ? '#ff9944' : '#ffcc66') :
             (w.type === 'tesla' ? (Math.random() < 0.5 ? '#aa66ff' : '#cc99ff') :
             (w.type === 'acid' ? (Math.random() < 0.5 ? '#66ff44' : '#aaff88') :
             (w.type === 'railgun' ? '#ffffaa' :
             (player.buffs.rage > 0 ? '#ff4422' : '#ffdd66'))))))))
    });
  }

  // Create bullets with crit flag
  for (const spread of spreads) {
    const isCrit = Math.random() < player.critChance;
    const classDmgMod = getClassDamageMod();
    const dmg = w.damage * player.damageMult * rageMult * frenzyDmgMult * classDmgMod * (isCrit ? player.critMult : 1);

    // 根据武器类型设置子弹属性
    const isFlame = w.type === 'flame';
    const isLaser = w.type === 'laser';
    const isHoming = w.type === 'homing';
    const isGrenade = w.type === 'grenade';
    const isMicroRocket = w.type === 'micro_rocket';
    const isTesla = w.type === 'tesla';
    const isAcid = w.type === 'acid';
    const isRailgun = w.type === 'railgun';
    const isSniper = w.type === 'sniper';
    const isChain = isTesla || isLaser; // 穿透型武器共用 hitTargets 机制
    // 子弹大小
    const sizeMap = { rocket: 6, flame: 16, laser: 5, homing: 7, grenade: 8, micro_rocket: 4, tesla: 4, acid: 6, railgun: 8, sniper: 7, plasma: 8, cryo: 5, flak: 4 };
    const bulletSize = sizeMap[w.type] || 3;
    // 子弹生命
    const lifeMap = { rocket: 120, flame: 40, laser: 50, homing: 200, grenade: 100, tesla: 60, acid: 100, railgun: 30, sniper: 25, plasma: 100, cryo: 60, flak: 50 };
    const bulletLife = lifeMap[w.type] || 80;
    bullets.push({
      x: muzzleX,
      y: muzzleY,
      vx: Math.cos(spread) * w.bulletSpeed,
      vy: Math.sin(spread) * w.bulletSpeed,
      damage: dmg,
      radius: bulletSize,
      color: isCrit ? '#ffdd44' : w.color,
      life: bulletLife,
      isCrit: isCrit,
      from: 'player',
      weaponType: w.type || 'normal',
      // 爆炸参数（火箭筒/榴弹/微型火箭）
      explodeRadius: (w.explodeRadius || 0) * (player.class === 'engineer' ? (CLASSES.engineer.explosionMult || 1) : 1),
      explodeDamage: (w.explodeDamage || 0) * player.damageMult * rageMult * frenzyDmgMult * classDmgMod,
      fragments: w.fragments || 0,
      fragmentDamage: (w.fragmentDamage || 0) * player.damageMult * rageMult * frenzyDmgMult * classDmgMod,
      // 火焰枪/激光枪/电磁枪/轨道炮：穿透型参数（狙击枪不穿透）
      pierce: (isFlame || isLaser || isTesla || isRailgun) ? (w.pierce || 0) + (isFlame ? player.upgrades.pierceBonus : 0) : 0,
      hitTargets: (isFlame || isLaser || isTesla || isRailgun) ? [] : null,
      distTraveled: 0,
      // 吸血：子弹携带吸血标记
      lifesteal: player.upgrades.lifesteal,
      flameRange: w.flameRange || 0,
      flameFadeStart: w.flameFadeStart || 0,
      laserRange: w.laserRange || (isTesla ? w.laserRange || 0 : 0) || (isRailgun ? w.railRange || 0 : 0),
      laserFadeStart: w.laserFadeStart || (isTesla ? w.laserFadeStart || 0 : 0) || (isRailgun ? w.railFadeStart || 0 : 0),
      burnDuration: w.burnDuration || 0,
      burnDps: w.burnDps || 0,
      firePoolRadius: w.firePoolRadius || 0,
      firePoolLife: w.firePoolLife || 0,
      firePoolDps: w.firePoolDps || 0,
      // 追踪弹参数
      homingTurn: w.homingTurn || 0,
      homingRange: w.homingRange || 0,
      homingTimer: 0,
      // 电磁枪链式参数
      chainRange: w.chainRange || 0,
      chainDamage: w.chainDamage || 0,
      chainCount: 0,
      // 酸液枪参数
      acidRadius: w.acidRadius || 0,
      acidLife: w.acidLife || 0,
      acidDps: w.acidDps || 0,
      slowMult: w.slowMult || 0,
      slowDuration: w.slowDuration || 0,
      // 轨道炮参数
      railWidth: w.railWidth || 0,
      railRange: w.railRange || 0,
      railFadeStart: w.railFadeStart || 0,
      // 狙击枪参数
      sniperRange: w.sniperRange || 0,
      sniperFadeStart: w.sniperFadeStart || 0,
      eliteMult: w.eliteMult || 0,
      bossMult: w.bossMult || 0,
      // 配件附加参数
      chainLightning: w.chainLightning || 0,
      volatileMix: w.volatileMix || false
    });
  }

  playShot();
  updateHUD();
}

function placeMine() {
  if (state !== GameState.PLAYING) return;
  if (player.mines <= 0) return;
  if (player.abilityCD > 0) return;
  const cls = player.class ? CLASSES[player.class] : null;
  const abilityType = cls ? (cls.spaceAbility || 'mine') : 'mine';

  if (abilityType === 'grenade') {
    // 突击兵：投掷手雷（向前方投掷，落点爆炸）
    player.mines--;
    player.abilityCD = 300;
    const ang = player.angle;
    grenades.push({
      x: player.x, y: player.y,
      vx: Math.cos(ang) * 12, vy: Math.sin(ang) * 12,
      life: 60, explodeRadius: 130, damage: 150 * player.damageMult
    });
  } else if (abilityType === 'medkit') {
    // 医护兵：医疗包（瞬间回血35HP）
    player.mines--;
    player.abilityCD = 300;
    player.hp = Math.min(player.maxHp, player.hp + 35);
    spawnBloodParticles(player.x, player.y, 12, '#44ff44');
  } else if (abilityType === 'turret') {
    // 工程兵：放置临时炮台（15秒后消失）
    player.mines--;
    player.abilityCD = 300;
    placeTurret('mg', player.x + Math.cos(player.angle) * 30, player.y + Math.sin(player.angle) * 30);
    const t = turrets[turrets.length - 1];
    t.lifetime = 900; // 15秒
  } else if (abilityType === 'cloak') {
    // 侦察兵：隐身3秒（僵尸丢失目标）
    player.mines--;
    player.abilityCD = 300;
    player.buffs.cloak = 180; // 3秒
  } else if (abilityType === 'barricade') {
    // 重装机兵：放置路障（阻挡僵尸，有HP）
    player.mines--;
    player.abilityCD = 300;
    barricades.push({ x: player.x + Math.cos(player.angle) * 35, y: player.y + Math.sin(player.angle) * 35, hp: 200, maxHp: 200, angle: player.angle });
  } else if (abilityType === 'airstrike') {
    // 狙击手：空中打击（呼叫5波集束轰炸，覆盖玩家周围大范围区域）
    player.mines--;
    player.abilityCD = 300;
    const baseDmg = 120 * player.damageMult;
    for (let wave = 0; wave < 5; wave++) {
      for (let k = 0; k < 3; k++) {
        const ang = Math.random() * Math.PI * 2;
        const r = 40 + Math.random() * 250;
        const tx = player.x + Math.cos(ang) * r;
        const ty = player.y + Math.sin(ang) * r;
        airstrikes.push({
          x: tx, y: ty,
          delay: wave * 25 + k * 8,
          radius: 70,
          damage: baseDmg,
          detonated: false
        });
      }
    }
    addShake(8);
  } else if (abilityType === 'pulse') {
    // 狙击手：脉冲波（前方直线秒杀普通僵尸，对精英和BOSS造成大量伤害）
    player.mines--;
    player.abilityCD = 300;
    const ang = player.angle;
    pulseWaves.push({ x: player.x, y: player.y, angle: ang, range: 500, width: 40, life: 20 });
    // 立即判定伤害
    for (let i = zombies.length - 1; i >= 0; i--) {
      const z = zombies[i];
      const dx = z.x - player.x, dy = z.y - player.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 500) continue;
      const angleToZ = Math.atan2(dy, dx);
      let angleDiff = Math.abs(angleToZ - ang);
      while (angleDiff > Math.PI) angleDiff = Math.abs(angleDiff - Math.PI * 2);
      if (angleDiff < 0.3) {
        if (z.isElite || z.type === 'brute' || z.type === 'tank') {
          z.hp -= 300 * player.damageMult;
          addDamageNumber(z.x, z.y - z.radius, 300, '#44ddff', false);
        } else {
          z.hp = 0;
          addDamageNumber(z.x, z.y - z.radius, 'KILL', '#44ddff', true);
        }
      }
    }
    if (boss) {
      const dx = boss.x - player.x, dy = boss.y - player.y;
      const angleToB = Math.atan2(dy, dx);
      let angleDiff = Math.abs(angleToB - ang);
      while (angleDiff > Math.PI) angleDiff = Math.abs(angleDiff - Math.PI * 2);
      if (Math.hypot(dx, dy) < 500 && angleDiff < 0.3) {
        boss.hp -= 500 * player.damageMult;
        addDamageNumber(boss.x, boss.y - boss.radius, 500, '#44ddff', true);
      }
    }
    addShake(6);
  } else if (abilityType === 'frenzy') {
    // 狂战士：狂暴模式（8秒，攻速+100%，移速+30%，吸血+15%）
    player.mines--;
    player.abilityCD = 300;
    player.buffs.frenzy = 480; // 8秒
  } else {
    // 默认：地雷
    player.mines--;
    player.abilityCD = 300;
    const explosionMult = cls && cls.explosionMult ? cls.explosionMult : 1.0;
    mines.push({
      x: player.x, y: player.y, radius: 14, triggerRadius: 28,
      explodeRadius: 110 * explosionMult, armed: true, triggered: false,
      triggerTimer: 0, explodeDamage: 120 * player.damageMult
    });
  }
  updateHUD();
}

  },

    hp: 180, range: 400, fireRate: 600, damage: 45, color: '#44ddff',
    bulletSpeed: 24, bulletColor: '#44ddff', bulletRadius: 4, pierce: 3
  }
};

function placeTurret(type, x, y) {
  const def = TURRETTYPES[type];
  if (!def) return;
  turrets.push({
    type, def,
    x, y,
    hp: def.hp, maxHp: def.hp,
    angle: 0,
    fireTimer: 0,
    hurtFlash: 0,
    target: null
  });
}

function updateTurrets(dt) {
  for (let i = turrets.length - 1; i >= 0; i--) {
    const t = turrets[i];
    if (t.hurtFlash > 0) t.hurtFlash -= dt;

    // 寻找最近僵尸
    let nearest = null, nearestDist = t.def.range;
    for (const z of zombies) {
      const d = Math.hypot(z.x - t.x, z.y - t.y);
      if (d < nearestDist) { nearestDist = d; nearest = z; }
    }
    if (!nearest && boss) {
      const d = Math.hypot(boss.x - t.x, boss.y - t.y);
      if (d < nearestDist) { nearestDist = d; nearest = boss; }
    }
    t.target = nearest;

    if (nearest) {
      t.angle = Math.atan2(nearest.y - t.y, nearest.x - t.x);
      t.fireTimer -= dt;
      if (t.fireTimer <= 0) {
        t.fireTimer = t.def.fireRate;
        fireTurretBullet(t, nearest);
      }
    }

    // 炮台死亡
    if (t.hp <= 0) {
      explodeAt(t.x, t.y, 50, 30, true);
      spawnBloodParticles(t.x, t.y, 15, t.def.color);
      addShake(4);
      turrets.splice(i, 1);
      continue;
    }
    // 临时炮台生命周期（工程兵技能）
    if (t.lifetime !== undefined) {
      t.lifetime -= dt;
      if (t.lifetime <= 0) {
        spawnBloodParticles(t.x, t.y, 8, t.def.color);
        turrets.splice(i, 1);
        continue;
      }
    }
  }
}

function fireTurretBullet(turret, target) {
  const def = turret.def;
  const ang = Math.atan2(target.y - turret.y, target.x - turret.x);
  const isRocket = turret.type === 'rocket';
  bullets.push({
    x: turret.x + Math.cos(ang) * 18,
    y: turret.y + Math.sin(ang) * 18,
    vx: Math.cos(ang) * def.bulletSpeed,
    vy: Math.sin(ang) * def.bulletSpeed,
    damage: def.damage,
    radius: def.bulletRadius,
    color: def.bulletColor,
    life: 100,
    isCrit: false,
    from: 'turret',
    weaponType: isRocket ? 'rocket' : 'normal',
    explodeRadius: def.explodeRadius || 0,
    explodeDamage: def.explodeDamage || 0,
    fragments: 0, fragmentDamage: 0,
    pierce: def.pierce || 0,
    hitTargets: def.pierce ? [] : null,
    distTraveled: 0, lifesteal: 0,
    flameRange: 0, flameFadeStart: 0, laserRange: 0, laserFadeStart: 0,
    burnDuration: 0, burnDps: 0, firePoolRadius: 0, firePoolLife: 0, firePoolDps: 0,
    homingTurn: 0, homingRange: 0, homingTimer: 0,
    chainRange: 0, chainDamage: 0, chainCount: 0,
    acidRadius: 0, acidLife: 0, acidDps: 0, slowMult: 0,
    railWidth: 0, railRange: 0, railFadeStart: 0,
    chainLightning: 0, volatileMix: false
  });
}

function drawTurrets() {
  for (const t of turrets) {
    ctx.save();
    ctx.translate(t.x, t.y);
    // 底座
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.stroke();
    // 炮管（旋转）
    ctx.rotate(t.angle);
    ctx.fillStyle = t.hurtFlash > 0 ? '#ffffff' : t.def.color;
    ctx.fillRect(0, -4, 20, 8);
    // 核心
    ctx.fillStyle = t.def.color;
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // 血条
    const hpPct = Math.max(0, t.hp / t.maxHp);
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(t.x - 16, t.y - 24, 32, 4);
    ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : (hpPct > 0.25 ? '#ffaa44' : '#ff4444');
    ctx.fillRect(t.x - 16, t.y - 24, 32 * hpPct, 4);
    // 射程指示（有目标时）
    if (t.target) {
      ctx.strokeStyle = `rgba(${t.def.color === '#ffcc00' ? '255,204,0' : (t.def.color === '#cc3322' ? '204,51,34' : '68,221,255')},0.15)`;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 8]);
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.def.range, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

function spawnCrates() {
  crates = [];
  const count = 5 + Math.floor(Math.random() * 4); // 5-8
  for (let i = 0; i < count; i++) {
    let cx, cy, valid;
    let attempts = 0;
    do {
      cx = 200 + Math.random() * (WORLD_W - 400);
      cy = 200 + Math.random() * (WORLD_H - 400);
      valid = true;
      // Don't spawn too close to player
      if (Math.hypot(cx - player.x, cy - player.y) < 150) valid = false;
      // Don't overlap other crates
      for (const c of crates) {
        if (Math.abs(cx - c.x) < 80 && Math.abs(cy - c.y) < 80) { valid = false; break; }
      }
      attempts++;
    } while (!valid && attempts < 50);
    if (valid) {
      crates.push({
        x: cx, y: cy, w: 44, h: 44, vx: 0, vy: 0, hp: 4, maxHp: 4,
        friction: 0.85, rot: 0
      });
    }
  }
  // Generate 3-5 explosive barrels
  const barrelCount = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < barrelCount; i++) {
    let bx, by, valid;
    let attempts = 0;
    do {
      bx = 200 + Math.random() * (WORLD_W - 400);
      by = 200 + Math.random() * (WORLD_H - 400);
      valid = true;
      if (Math.hypot(bx - player.x, by - player.y) < 200) valid = false;
      for (const c of crates) {
        if (Math.abs(bx - c.x) < 80 && Math.abs(by - c.y) < 80) { valid = false; break; }
      }
      for (const b of barrels) {
        if (Math.hypot(bx - b.x, by - b.y) < 100) { valid = false; break; }
      }
      attempts++;
    } while (!valid && attempts < 50);
    if (valid) {
      barrels.push({
        x: bx, y: by, radius: 16, hp: 1, explodeRadius: 110, damage: 60,
        triggered: false, triggerTimer: 0
      });
    }
  }
  // Generate terrain features (grass patches and water puddles)
  terrainFeatures = [];
  // Grass patches (8-12)
  const grassCount = 8 + Math.floor(Math.random() * 5);
  for (let i = 0; i < grassCount; i++) {
    terrainFeatures.push({
      type: 'grass',
      x: 100 + Math.random() * (WORLD_W - 200),
      y: 100 + Math.random() * (WORLD_H - 200),
      radius: 35 + Math.random() * 25,
      blades: []
    });
    // Generate grass blade offsets
    const g = terrainFeatures[terrainFeatures.length - 1];
    for (let b = 0; b < 15; b++) {
      g.blades.push({
        x: (Math.random() - 0.5) * g.radius * 1.5,
        y: (Math.random() - 0.5) * g.radius * 1.5,
        h: 4 + Math.random() * 4,
        phase: Math.random() * Math.PI * 2
      });
    }
  }
  // Water puddles (4-6)
  const waterCount = 4 + Math.floor(Math.random() * 3);
  for (let i = 0; i < waterCount; i++) {
    terrainFeatures.push({
      type: 'water',
      x: 100 + Math.random() * (WORLD_W - 200),
      y: 100 + Math.random() * (WORLD_H - 200),
      radius: 30 + Math.random() * 20
    });
  }
}

function spawnZombie(type) {

  else { x = 20; y = Math.random() * WORLD_H; }

  // Scale HP, damage, and speed with wave

  zombies.push({

    hp: def.hp * hpScale,
    maxHp: def.hp * hpScale,
    speed: def.speed * speedScale,

    color: def.color,

    hurtFlash: 0,
    walkPhase: Math.random() * Math.PI * 2,
    isElite: def.isElite || false,
    damageReduction: def.damageReduction || 0,
    summons: def.summons || false,
    summonTimer: def.summonInterval || 0,
    isCrawler: def.isCrawler || false,
    isExploder: def.isExploder || false,
    isHealer: def.isHealer || false,
    explodeRadius: def.explodeRadius || 0,
    explodeDamage: def.explodeDamage || 0,
    healRange: def.healRange || 0,
    healInterval: def.healInterval || 0,

function getWaveComposition(w) {
  const comp = { normal: 0, runner: 0, brute: 0, spitter: 0, tank: 0, screamer: 0 };
  comp.normal = 5 + Math.floor(w * 2);
  if (w >= 2) comp.runner = Math.floor(w * 1.0);
  if (w >= 4) comp.brute = Math.floor((w - 3) * 0.8);
  // Elite zombies from wave 3
  if (w >= 3) comp.spitter = Math.floor((w - 2) * 0.4);
  if (w >= 5) comp.tank = Math.floor((w - 4) * 0.35);
  if (w >= 4) comp.screamer = Math.floor((w - 3) * 0.25);
  comp.crawler = 0; comp.exploder = 0; comp.healer = 0;
  if (w >= 3) comp.crawler = Math.floor((w - 2) * 0.5);
  if (w >= 5) comp.exploder = Math.floor((w - 4) * 0.3);
  if (w >= 6) comp.healer = Math.floor((w - 5) * 0.2);
  return comp;
}

function startWave(w) {
  wave = w;
  waveActive = true;
  waveActiveTimer = 0;

  // 清理上一波可能残留的所有实体
  spawnTelegraphs = [];
  poisonPools = [];
  poisonProjectiles = [];
  firePools = [];
  damageNumbers = [];
  lightningEffects = [];

  // Determine wave type: every 4th wave is boss, every 3rd is horde, every 7th is silent
  if (w % 7 === 0) waveType = 'silent';
  else if (w % 4 === 0) waveType = 'boss';
  else if (w % 3 === 0) waveType = 'horde';
  else waveType = 'normal';

  const comp = getWaveComposition(w);

  // Modify based on wave type
  if (waveType === 'horde') {
    // 2x normal zombies, faster spawn
    comp.normal *= 2;
    comp.runner = Math.floor(comp.runner * 1.5);
    comp.crawler = Math.floor(comp.crawler * 1.5);
  } else if (waveType === 'boss') {
    // Mostly elites, fewer normal
    comp.normal = Math.floor(comp.normal * 0.3);
    comp.tank += 2;
    comp.spitter += 2;
    comp.screamer += 1;
    comp.brute += 1;
    comp.exploder += 1;
    comp.healer += 1;
    // 生成BOSS（每4波一个，随机选择）
    const bossKeys = Object.keys(BOSS_TYPES);
    // 前几次BOSS战用基础BOSS，后续随机全部BOSS
    const bossCount = Math.floor(w / 4);
    let bossIdx;
    if (bossCount <= 2) {
      // 前两个BOSS用前两种
      bossIdx = (bossCount - 1) % 3;
    } else {
      // 之后随机选择
      bossIdx = Math.floor(Math.random() * bossKeys.length);
    }
    spawnBoss(bossKeys[bossIdx]);
  } else if (waveType === 'silent') {
    // No telegraphs, normal composition but spawns silently
  }

  zombiesToSpawn = comp.normal + comp.runner + comp.brute + comp.spitter + comp.tank + comp.screamer + comp.crawler + comp.exploder + comp.healer;
  spawnQueue = [];
  for (let i = 0; i < comp.normal; i++) spawnQueue.push('normal');
  for (let i = 0; i < comp.runner; i++) spawnQueue.push('runner');
  for (let i = 0; i < comp.brute; i++) spawnQueue.push('brute');
  for (let i = 0; i < comp.spitter; i++) spawnQueue.push('spitter');
  for (let i = 0; i < comp.tank; i++) spawnQueue.push('tank');
  for (let i = 0; i < comp.screamer; i++) spawnQueue.push('screamer');
  for (let i = 0; i < comp.crawler; i++) spawnQueue.push('crawler');
  for (let i = 0; i < comp.exploder; i++) spawnQueue.push('exploder');
  for (let i = 0; i < comp.healer; i++) spawnQueue.push('healer');
  // Shuffle
  for (let i = spawnQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
  }
  spawnTimer = 0;

  // Wave banner
  waveBannerTime = 150;
  if (waveType === 'horde') {
    waveBannerText = t('hordeWave') + ' ' + w;
  } else if (waveType === 'boss') {
    waveBannerText = t('bossWave') + ' ' + w;
  } else if (waveType === 'silent') {
    waveBannerText = t('silentWave') + ' ' + w;
  } else {
    waveBannerText = t('waveBanner') + w;
  }

  // 第4波BOSS战解锁第二副武器
  if (w === 4 && !player.secondWeaponUnlocked && player.class) {
    const cls = CLASSES[player.class];
    if (cls.secondWeapon && !player.ownedWeapons.includes(cls.secondWeapon)) {
      player.secondWeaponUnlocked = true;
      player.ownedWeapons.push(cls.secondWeapon);
      ammo[cls.secondWeapon] = SECONDARY_AMMO[cls.secondWeapon] || 30;
      spareAmmo[cls.secondWeapon] = TOTAL_SPARE_AMMO[cls.secondWeapon] || 0;
      // 显示解锁横幅
      waveBannerTime = 200;
      const swName = lang === 'zh' ? WEAPONS[cls.secondWeapon].nameZh : WEAPONS[cls.secondWeapon].name;
      waveBannerText = (lang === 'zh' ? '解锁副武器：' : 'UNLOCKED: ') + swName;
    }
  }

  playWaveStart();
  updateHUD();
}

function addBloodStain(x, y, radius) {
  bloodCtx.save();

  const r = radius || (4 + Math.random() * 6);
  bloodCtx.arc(x, y, r, 0, Math.PI * 2);
  bloodCtx.fill();
  // Splatter dots
  for (let i = 0; i < 3; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = r + Math.random() * r * 2;
    bloodCtx.beginPath();
    bloodCtx.arc(x + Math.cos(a) * d, y + Math.sin(a) * d, 1 + Math.random() * 2, 0, Math.PI * 2);
    bloodCtx.fill();
  }
  bloodCtx.restore();
  bloodStainCount++;
  if (bloodStainCount >= MAX_BLOOD_STAINS) {
    // Fade old stains
    bloodCtx.save();
    bloodCtx.globalCompositeOperation = 'destination-out';
    bloodCtx.fillStyle = 'rgba(0,0,0,0.15)';
    bloodCtx.fillRect(0, 0, WORLD_W, WORLD_H);
    bloodCtx.restore();
    bloodStainCount = Math.floor(MAX_BLOOD_STAINS * 0.6);
  }
}

// =====================================================================
// COLLISION HELPERS
// =====================================================================
function distSq(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return dx * dx + dy * dy;
}

function circleCollide(a, b) {
  const r = a.radius + b.radius;
  return distSq(a, b) < r * r;
}

// Circle vs AABB (crate)
function circleRectCollide(cx, cy, cr, rx, ry, rw, rh) {
  const closestX = Math.max(rx - rw / 2, Math.min(cx, rx + rw / 2));
  const closestY = Math.max(ry - rh / 2, Math.min(cy, ry + rh / 2));
  const dx = cx - closestX, dy = cy - closestY;
  return dx * dx + dy * dy < cr * cr;
}

  updateWeather(dt);

  // 生存系统更新
  updateSurvival(dt);

  // 职业被动更新
  updateClassPassives(dt);

  // Day-night cycle
  if (state === GameState.PLAYING) {
    dayNightTime += DAY_NIGHT_SPEED * dt;
    if (dayNightTime >= 1) dayNightTime -= 1;
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) {
      combo = 0;
    }
  }

  // Wave banner timer
  if (waveBannerTime > 0) waveBannerTime -= dt;

  if (redFlashFrames > 0) {
    redFlashFrames--;
    if (redFlashFrames === 0) document.getElementById('redFlash').classList.remove('active');
  }

  if (player.hurtFlash > 0) player.hurtFlash--;
  if (player.invuln > 0) player.invuln--;
  if (player.recoilOffset > 0) player.recoilOffset *= 0.82;

  // Player walk phase (for leg animation)
  const pSpeed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  if (pSpeed > 0.3) {
    player.walkPhase += pSpeed * 0.15 * dt;
  }

  // Screen shake decay
  if (shakeAmount > 0.1) {
    shakeX = (Math.random() - 0.5) * shakeAmount;
    shakeY = (Math.random() - 0.5) * shakeAmount;
    shakeAmount *= 0.85;
  } else {
    shakeX = 0; shakeY = 0; shakeAmount = 0;
  }

  // Real-time HUD update (countdown, zombie count, mine regen)
  updateHUD();
}

    playCombo(combo);

  // 连击里程碑奖励：每 15 连击触发空投补给

    const roll = Math.random();
    if (roll < 0.4) {
      pickups.push({ x: dx, y: dy, type: 'ammo', radius: 12, life: 600, bob: 0 });
    } else if (roll < 0.7) {
      pickups.push({ x: dx, y: dy, type: 'health', radius: 12, life: 600, bob: 0 });
    } else {
      const buffs = ['rage', 'shield', 'haste'];
      pickups.push({ x: dx, y: dy, type: 'buff_' + buffs[Math.floor(Math.random() * 3)], radius: 12, life: 600, bob: 0 });
    }
    waveBannerTime = 60;

}

function getComboMult() {

}

function updatePlayer(dt) {
  // Buff decay
  if (player.buffs.rage > 0) player.buffs.rage -= dt;
  if (player.buffs.haste > 0) player.buffs.haste -= dt;
  if (player.buffs.cloak > 0) player.buffs.cloak -= dt;
  if (player.buffs.frenzy > 0) player.buffs.frenzy -= dt;

  // Dash timer
  if (player.dashTime > 0) {
    player.dashTime -= dt;
    // Dash movement (override normal movement)
    player.vx = player.dashDirX * player.dashSpeed;
    player.vy = player.dashDirY * player.dashSpeed;
    // Add trail point
    if (player.dashTrail.length < 8) {
      player.dashTrail.push({ x: player.x, y: player.y, life: 15 });
    } else {
      player.dashTrail.shift();
      player.dashTrail.push({ x: player.x, y: player.y, life: 15 });
    }
    // Spawn dash particles
    if (Math.random() < 0.7) {
      particles.push({
        x: player.x + (Math.random() - 0.5) * 10,
        y: player.y + (Math.random() - 0.5) * 10,
        vx: -player.dashDirX * 1 + (Math.random() - 0.5) * 1,
        vy: -player.dashDirY * 1 + (Math.random() - 0.5) * 1,
        life: 15, maxLife: 15,
        size: 3, color: '#00ffaa'
      });
    }
  } else {
    // Normal input → acceleration
    let ax = 0, ay = 0;
    if (keys['w'] || keys['arrowup']) ay -= 1;
    if (keys['s'] || keys['arrowdown']) ay += 1;
    if (keys['a'] || keys['arrowleft']) ax -= 1;
    if (keys['d'] || keys['arrowright']) ax += 1;
    if (ax !== 0 || ay !== 0) {
      const len = Math.sqrt(ax * ax + ay * ay);
      ax /= len; ay /= len;
      const accel = player.speed * player.speedMult * dt;
      player.vx += ax * accel;
      player.vy += ay * accel;
    }

    // Clamp max speed
    const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
    const hasteMult = player.buffs.haste > 0 ? 1.5 : 1;
    const frenzyMult = player.buffs.frenzy > 0 ? 1.3 : 1;
    // 重武器移速惩罚
    const wDef = WEAPONS[player.weapon];
    const heavyMult = wDef.weaponClass === 'heavy' ? HEAVY_SPEED_PENALTY : 1.0;
    // 天气移速惩罚
    const weatherMult = WEATHER_TYPES[weather.type].speedMod;
    // 生存状态惩罚（饥饿/口渴/力竭）
    let survivalMult = 1.0;
    if (survival.hunger < 30) survivalMult *= 0.9;
    if (survival.thirst < 30) survivalMult *= 0.85;
    if (survival.stamina < 20) survivalMult *= 0.8;
    // 雨天减速叠加
    const maxSpd = player.maxSpeed * player.speedMult * hasteMult * frenzyMult * heavyMult * weatherMult * survivalMult;
    if (speed > maxSpd) {
      player.vx = (player.vx / speed) * maxSpd;
      player.vy = (player.vy / speed) * maxSpd;
    }

    // Apply friction
    player.vx *= Math.pow(FRICTION, dt);
    player.vy *= Math.pow(FRICTION, dt);
  }

  // Reload timer
  if (player.reloading) {
    player.reloadTimer -= dt;
    if (player.reloadTimer <= 0) {
      player.reloading = false;
      player.reloadTimer = 0;
      const w = WEAPONS[player.weapon];
      if (ammo[player.weapon] !== Infinity) {
        // 从备弹中取子弹填入弹匣
        const cap = SECONDARY_AMMO[player.weapon] || w.maxAmmo;
        const needed = cap - ammo[player.weapon];
        const taken = Math.min(needed, spareAmmo[player.weapon]);
        ammo[player.weapon] += taken;
        if (spareAmmo[player.weapon] !== Infinity) spareAmmo[player.weapon] -= taken;
      }
      updateHUD();
    }
  }

  // Survival low-stat hints (首次提示，恢复后重置以便再次提示)
  if (survival.hunger < 30 && !survivalHints.hunger) {
    survivalHints.hunger = true;
    spawnHint(player.x, player.y - 34, lang === 'zh' ? '饥饿影响移速！寻找食物' : 'Starving! Find food', '#d4a04a');
  } else if (survival.hunger > 60) {
    survivalHints.hunger = false;
  }
  if (survival.thirst < 30 && !survivalHints.thirst) {
    survivalHints.thirst = true;
    spawnHint(player.x, player.y - 34, lang === 'zh' ? '口渴影响移速！寻找水' : 'Dehydrated! Find water', '#4a8ad4');
  } else if (survival.thirst > 60) {
    survivalHints.thirst = false;
  }
  if (survival.stamina < 20 && !survivalHints.stamina) {
    survivalHints.stamina = true;
    spawnHint(player.x, player.y - 34, lang === 'zh' ? '体力不足！减少冲刺' : 'Exhausted! Stop dashing', '#88d48a');
  } else if (survival.stamina > 50) {
    survivalHints.stamina = false;
  }

  // Dash cooldown
  if (player.dashCooldown > 0) player.dashCooldown -= dt;

  // Update dash trail
  for (let i = player.dashTrail.length - 1; i >= 0; i--) {
    player.dashTrail[i].life -= dt;
    if (player.dashTrail[i].life <= 0) player.dashTrail.splice(i, 1);
  }

  // Move
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // World bounds
  player.x = Math.max(player.radius, Math.min(WORLD_W - player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(WORLD_H - player.radius, player.y));

  // Terrain effects
  player.inGrass = false;
  player.inWater = false;
  for (const f of terrainFeatures) {
    const d = Math.hypot(player.x - f.x, player.y - f.y);
    if (d < f.radius) {
      if (f.type === 'grass') {
        player.inGrass = true;
      } else if (f.type === 'water') {
        player.inWater = true;
      }
    }
  }
  // Apply water slow effect
  if (player.inWater && player.dashTime <= 0) {
    player.vx *= 0.92;
    player.vy *= 0.92;
  }

  // Aim angle
  const worldMX = mouseX * PIXEL_SCALE + camera.x;
  const worldMY = mouseY * PIXEL_SCALE + camera.y;
  player.angle = Math.atan2(worldMY - player.y, worldMX - player.x);

  // Auto-fire for SMG
  if (mouseDown && WEAPONS[player.weapon].auto) {
    tryShoot();
  }

  // Mine regeneration (1 mine per 15 seconds)
  if (player.mines < player.mineMax) {
    player.mineRegenTimer += dt;
    if (player.mineRegenTimer >= 900) { // 15s at 60fps
      player.mineRegenTimer = 0;
      player.mines++;
    }
  }

  // Ability cooldown
  if (player.abilityCD > 0) player.abilityCD -= dt;

  // Crate collision (push crates)
  for (const crate of crates) {
    if (circleRectCollide(player.x, player.y, player.radius, crate.x, crate.y, crate.w, crate.h)) {
      const closestX = Math.max(crate.x - crate.w / 2, Math.min(player.x, crate.x + crate.w / 2));
      const closestY = Math.max(crate.y - crate.h / 2, Math.min(player.y, crate.y + crate.h / 2));
      let dx = player.x - closestX, dy = player.y - closestY;
      let d = Math.sqrt(dx * dx + dy * dy);
      if (d < 0.01) { d = 0.01; dx = 0.01; }
      const overlap = player.radius - d;
      const nx = dx / d, ny = dy / d;
      // Push crate
      crate.x -= nx * overlap * 0.6;
      crate.y -= ny * overlap * 0.6;
      crate.vx -= nx * Math.abs(player.vx) * 0.4;
      crate.vy -= ny * Math.abs(player.vy) * 0.4;
      // Push player
      player.x += nx * overlap * 0.4;
      player.y += ny * overlap * 0.4;
    }
  }
}

function updateCrates(dt) {
  for (let i = crates.length - 1; i >= 0; i--) {
    const c = crates[i];
    c.vx *= Math.pow(c.friction, dt);
    c.vy *= Math.pow(c.friction, dt);
    c.x += c.vx * dt;
    c.y += c.vy * dt;
    // World bounds
    c.x = Math.max(c.w / 2, Math.min(WORLD_W - c.w / 2, c.x));
    c.y = Math.max(c.h / 2, Math.min(WORLD_H - c.h / 2, c.y));
    // Crate-crate collision
    for (let j = i - 1; j >= 0; j--) {
      const c2 = crates[j];
      const dx = c.x - c2.x, dy = c.y - c2.y;
      const minDist = (c.w + c2.w) / 2;
      if (Math.abs(dx) < minDist && Math.abs(dy) < minDist) {
        const overlapX = minDist - Math.abs(dx);
        const overlapY = minDist - Math.abs(dy);
        if (overlapX < overlapY) {
          const push = dx > 0 ? overlapX / 2 : -overlapX / 2;
          c.x += push; c2.x -= push;
        } else {
          const push = dy > 0 ? overlapY / 2 : -overlapY / 2;
          c.y += push; c2.y -= push;
        }
      }
    }
    if (c.hp <= 0) {
      // Break crate, spawn pickup
      spawnBloodParticles(c.x, c.y, 8, '#8b5a2b');
      const roll = Math.random();
      if (roll < 0.35) {
        pickups.push({ x: c.x, y: c.y, type: 'health', radius: 12, life: 600, bob: 0 });
      } else if (roll < 0.78) {
        pickups.push({ x: c.x, y: c.y, type: 'food', radius: 12, life: 600, bob: 0 });
      } else if (roll < 0.88) {
        pickups.push({ x: c.x, y: c.y, type: 'water', radius: 12, life: 600, bob: 0 });
      } else if (roll < 0.95) {
        // 弹药补给
        pickups.push({ x: c.x, y: c.y, type: 'ammo', radius: 12, life: 600, bob: 0 });
      }
      crates.splice(i, 1);
    }
  }
}

function updateZombies(dt) {
  // Repulsion vectors (prevent overlap)
  for (let i = 0; i < zombies.length; i++) {
    const z = zombies[i];
    let repX = 0, repY = 0;
    for (let j = 0; j < zombies.length; j++) {
      if (i === j) continue;
      const z2 = zombies[j];
      const dx = z.x - z2.x, dy = z.y - z2.y;
      const minDist = z.radius + z2.radius;
      const distSq = dx * dx + dy * dy;
      if (distSq < minDist * minDist && distSq > 0.01) {
        const d = Math.sqrt(distSq);
        const force = (minDist - d) / minDist;
        repX += (dx / d) * force * 0.8;
        repY += (dy / d) * force * 0.8;
      }
    }
    // Move toward player（按类型不同AI行为）
    const dx = player.x - z.x, dy = player.y - z.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    // Grass stealth: if player in grass and far away, zombie wanders
    let speedMod = 1;
    if (player.inGrass && dist > 120) {
      speedMod = 0.3; // Reduced detection
    }
    // 隐身效果：僵尸大幅降低追踪能力
    if (player.buffs.cloak > 0) {
      speedMod *= 0.15;
    }
    // 酸液减速效果
    if (z.slowTimer > 0) {
      z.slowTimer -= dt;
      speedMod *= (z.slowMult || 0.5);
    }

    // 按类型不同的AI行为
    let moveX, moveY;
    const nx = dx / dist, ny = dy / dist; // 朝玩家的单位向量

    if (z.type === 'runner') {
      // 跑者：包抄行为，距离玩家较远时斜向接近
      if (dist > 150 && !z.flankDir) {
        z.flankDir = Math.random() < 0.5 ? 1 : -1; // 随机左右包抄
      }
      if (dist > 80) {
        // 包抄：朝玩家方向 + 垂直偏移
        const perpX = -ny * z.flankDir, perpY = nx * z.flankDir;
        moveX = (nx * 0.7 + perpX * 0.6) * z.speed * speedMod + repX;
        moveY = (ny * 0.7 + perpY * 0.6) * z.speed * speedMod + repY;
      } else {
        // 近距离直线冲
        moveX = nx * z.speed * speedMod + repX;
        moveY = ny * z.speed * speedMod + repY;
      }
    } else if (z.type === 'brute') {
      // 蛮兵：距离中等时周期性冲刺
      z.sprintTimer = (z.sprintTimer || 0) - dt;
      if (z.sprintTimer <= 0 && dist > 100 && dist < 350) {
        z.sprinting = 60; // 冲刺60帧
        z.sprintTimer = 240; // 4秒冷却
      }
      if (z.sprinting > 0) {
        z.sprinting -= dt;
        const sprintMult = 2.2;
        moveX = nx * z.speed * sprintMult * speedMod + repX;
        moveY = ny * z.speed * sprintMult * speedMod + repY;
      } else {
        moveX = nx * z.speed * speedMod + repX;
        moveY = ny * z.speed * speedMod + repY;
      }
    } else if (z.type === 'spitter') {
      // 喷吐者：保持距离150-250，太近则后退，太远则接近
      if (dist < 150) {
        moveX = -nx * z.speed * 0.8 * speedMod + repX; // 后退
        moveY = -ny * z.speed * 0.8 * speedMod + repY;
      } else if (dist > 250) {
        moveX = nx * z.speed * 0.6 * speedMod + repX; // 接近
        moveY = ny * z.speed * 0.6 * speedMod + repY;
      } else {
        // 中距离横向移动（绕圈）
        const perpX = -ny, perpY = nx;
        const dir = z.orbitDir || (z.orbitDir = Math.random() < 0.5 ? 1 : -1);
        moveX = perpX * z.speed * 0.5 * dir * speedMod + repX;
        moveY = perpY * z.speed * 0.5 * dir * speedMod + repY;
      }
    } else if (z.type === 'tank') {
      // 坦克：正面朝玩家缓行，受损超过50%时进入狂暴（移速+50%）
      const rageMult = z.hp < z.maxHp * 0.5 ? 1.5 : 1.0;
      moveX = nx * z.speed * rageMult * speedMod + repX;
      moveY = ny * z.speed * rageMult * speedMod + repY;
    } else {
      // 普通僵尸：直线追击
      moveX = nx * z.speed * speedMod + repX;
      moveY = ny * z.speed * speedMod + repY;
    }

    // crawler：蛇形移动
    if (z.isCrawler) {
      const perpAng = Math.atan2(dy, dx) + Math.PI / 2;
      moveX += Math.cos(perpAng) * Math.sin(z.walkPhase * 3) * z.speed * 0.5;
      moveY += Math.sin(perpAng) * Math.sin(z.walkPhase * 3) * z.speed * 0.5;
    }

    z.x += moveX * dt;
    z.y += moveY * dt;

    // Update walk phase
    z.walkPhase += z.speed * 0.18 * dt;

    // Crate collision
    for (const crate of crates) {
      if (circleRectCollide(z.x, z.y, z.radius, crate.x, crate.y, crate.w, crate.h)) {
        // Damage crate
        if (z.attackCooldown <= 0) {
          crate.hp -= 1;
          z.attackCooldown = 40;
          spawnBloodParticles(z.x, z.y, 3, '#8b5a2b');
        }
        // Push zombie back
        const closestX = Math.max(crate.x - crate.w / 2, Math.min(z.x, crate.x + crate.w / 2));
        const closestY = Math.max(crate.y - crate.h / 2, Math.min(z.y, crate.y + crate.h / 2));
        let ddx = z.x - closestX, ddy = z.y - closestY;
        let dd = Math.sqrt(ddx * ddx + ddy * ddy);
        if (dd < 0.01) { dd = 0.01; ddx = 0.01; }
        z.x = closestX + (ddx / dd) * (z.radius + 1);
        z.y = closestY + (ddy / dd) * (z.radius + 1);
      }
    }
    if (z.attackCooldown > 0) z.attackCooldown -= dt;
    if (z.hurtFlash > 0) z.hurtFlash -= dt;
    // 燃烧DOT（火焰枪）
    if (z.burnTime > 0) {
      z.burnTime -= dt;
      const burnDmg = z.burnDps * dt / 60; // dt是帧，burnDps是每秒，60帧=1秒
      z.hp -= burnDmg;
      // 燃烧粒子
      if (Math.random() < 0.3) {
        particles.push({
          x: z.x + (Math.random() - 0.5) * z.radius,
          y: z.y + (Math.random() - 0.5) * z.radius,
          vx: (Math.random() - 0.5) * 1,
          vy: -1 - Math.random() * 1.5,
          life: 15 + Math.random() * 10,
          maxLife: 25,
          size: 2 + Math.random() * 2,
          color: Math.random() < 0.5 ? '#ff4422' : '#ffaa33'
        });
      }
      if (z.hp <= 0) {
        onZombieKilled(z);
        addCombo();
        const mult = getComboMult();
        const gained = Math.round(z.score * mult);
        score += gained;
        zombiesKilled++;
        spawnBloodParticles(z.x, z.y, 8, '#aa1122');
        addBloodStain(z.x, z.y, z.radius);
        addDamageNumber(z.x, z.y - z.radius - 10, '+' + gained, '#00ff88');
        playZombieDeath();
        // 掉落逻辑（后期波次大幅增加弹药掉落率）
        const ammoBonus = Math.min(0.35, wave * 0.025); // 每波+2.5%，上限+35%
        const roll = Math.random();
        if (roll < 0.06) pickups.push({ x: z.x, y: z.y, type: 'health', radius: 12, life: 600, bob: 0 });
        else if (roll < 0.14) {
          const buffs = ['rage', 'shield', 'haste'];
          pickups.push({ x: z.x, y: z.y, type: 'buff_' + buffs[Math.floor(Math.random() * 3)], radius: 12, life: 600, bob: 0 });
        }
        else if (roll < 0.19) pickups.push({ x: z.x, y: z.y, type: 'food', radius: 12, life: 600, bob: 0 });
        else if (roll < 0.24) pickups.push({ x: z.x, y: z.y, type: 'water', radius: 12, life: 600, bob: 0 });
        else if (roll < 0.38 + ammoBonus) {
          // 精英僵尸掉落更多弹药
          const ammoType = z.isElite ? 'ammo' : 'ammo';
          pickups.push({ x: z.x, y: z.y, type: ammoType, radius: 12, life: 600, bob: 0 });
          // 后期波次精英僵尸额外掉落弹药包
          if (z.isElite && wave >= 5 && Math.random() < 0.3) {
            pickups.push({ x: z.x + 15, y: z.y, type: 'ammo', radius: 12, life: 600, bob: 0 });
          }
        }
        // 精英僵尸在后期波次有概率掉落新武器
        if (z.isElite && wave >= 6 && Math.random() < 0.08) {
          const newWeapons = ['tesla', 'acid', 'railgun'];
          const nw = newWeapons[Math.floor(Math.random() * newWeapons.length)];
          pickups.push({ x: z.x, y: z.y, type: 'weapon_' + nw, radius: 14, life: 900, bob: 0 });
        }
        zombies.splice(i, 1);
        updateHUD();
        continue;
      }
    }

    // exploder：接近玩家时自爆
    if (z.isExploder && dist < z.radius + player.radius + 20) {
      explodeAt(z.x, z.y, z.explodeRadius, z.explodeDamage, false);
      spawnBloodParticles(z.x, z.y, 20, '#ff4400');
      z.hp = 0;
    }

    // healer：定期治疗附近僵尸
    if (z.isHealer) {
      z.healTimer -= dt;
      if (z.healTimer <= 0) {
        z.healTimer = z.healInterval;
        for (const z2 of zombies) {
          if (z2 !== z && Math.hypot(z2.x - z.x, z2.y - z.y) < z.healRange) {
            z2.hp = Math.min(z2.maxHp, z2.hp + 20);
            // 治疗粒子
            particles.push({ x: z2.x, y: z2.y - z2.radius, vx: 0, vy: -1, life: 20, maxLife: 20, size: 3, color: '#44ff44' });
          }
        }
      }
    }

    // Attack player
    if (circleCollide(z, player) && player.invuln <= 0) {
      damagePlayer(z.damage, z);
      player.invuln = 30;
      // Knockback player slightly
      const kx = (player.x - z.x), ky = (player.y - z.y);
      const kd = Math.sqrt(kx * kx + ky * ky) || 1;
      player.vx += (kx / kd) * 2;
      player.vy += (ky / kd) * 2;
    }

    // 攻击炮台
    if (z.attackCooldown <= 0) {
      for (const t of turrets) {
        if (circleCollide(z, { x: t.x, y: t.y, radius: 16 })) {
          t.hp -= z.damage * 0.5;
          t.hurtFlash = 8;
          z.attackCooldown = 40;
          spawnBloodParticles(t.x, t.y, 3, t.def.color);
          break;
        }
      }
      // 攻击路障
      for (const b of barricades) {
        if (circleCollide(z, { x: b.x, y: b.y, radius: 18 })) {
          b.hp -= z.damage;
          z.attackCooldown = 40;
          spawnBloodParticles(b.x, b.y, 3, '#888888');
          break;
        }
      }
    }

    // Brute/Spitter throws poison
    if (z.throwsPoison) {
      z.poisonTimer -= dt;
      if (z.poisonTimer <= 0) {
        z.poisonTimer = z.type === 'spitter' ? 150 : 300;
        throwPoison(z.x, z.y);
      }
    }

    // Screamer summons minions
    if (z.summons) {
      z.summonTimer -= dt;
      if (z.summonTimer <= 0 && zombies.length < MAX_ZOMBIES - 5) {
        z.summonTimer = 400;
        // Summon 2-3 normal zombies around screamer
        const count = 2 + Math.floor(Math.random() * 2);
        for (let s = 0; s < count; s++) {
          const a = (s / count) * Math.PI * 2;
          const sx = z.x + Math.cos(a) * 40;
          const sy = z.y + Math.sin(a) * 40;
          // Spawn telegraph then zombie
          spawnTelegraphs.push({ x: sx, y: sy, type: 'normal', life: 20, maxLife: 20 });
          // Spawn particles for visual
          for (let p = 0; p < 6; p++) {
            particles.push({
              x: sx, y: sy,
              vx: (Math.random() - 0.5) * 3,
              vy: (Math.random() - 0.5) * 3,
              life: 20, maxLife: 20,
              size: 3, color: '#c8a83a'
            });
          }
        }
      }
    }

    // World bounds
    z.x = Math.max(z.radius, Math.min(WORLD_W - z.radius, z.x));
    z.y = Math.max(z.radius, Math.min(WORLD_H - z.radius, z.y));

    // 卡死检测：如果僵尸离玩家太远且长时间没移动，传送靠近玩家
    z._lastDist = z._lastDist || 0;
    z._stuckTimer = z._stuckTimer || 0;
    const curDist = Math.abs(z.x - player.x) + Math.abs(z.y - player.y);
    if (curDist > 600) {
      // 距离太远，开始计时
      z._stuckTimer += dt;
      if (z._stuckTimer > 300) {
        // 5秒没靠近，传送到玩家附近边缘
        const ang = Math.random() * Math.PI * 2;
        const r = 250 + Math.random() * 100;
        z.x = Math.max(z.radius, Math.min(WORLD_W - z.radius, player.x + Math.cos(ang) * r));
        z.y = Math.max(z.radius, Math.min(WORLD_H - z.radius, player.y + Math.sin(ang) * r));
        z._stuckTimer = 0;
        spawnBloodParticles(z.x, z.y, 5, z.color);
      }
    } else {
      z._stuckTimer = 0;
    }
  }
}

function throwPoison(x, y) {
  const angle = Math.atan2(player.y - y, player.x - x);
  poisonProjectiles.push({
    x, y,
    vx: Math.cos(angle) * 6,
    vy: Math.sin(angle) * 6,
    life: 100,
    radius: 10
  });
}

function updatePoisonProjectiles(dt) {
  for (let i = poisonProjectiles.length - 1; i >= 0; i--) {
    const p = poisonProjectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    // 直接命中玩家造成伤害（穿透无敌帧，毒伤不受无敌保护）
    const distToPlayer = Math.sqrt(distSq(p, player));
    if (distToPlayer < player.radius + p.radius) {
      // 毒弹直接伤害，不检查invuln
      const pdmg = 8;
      player.hp -= pdmg;
      player.hurtFlash = 12;
      redFlashFrames = 3;
      document.getElementById('redFlash').classList.add('active');
      document.getElementById('vignette').classList.add('active');
      setTimeout(() => document.getElementById('vignette').classList.remove('active'), 600);
      playHurt();
      updateHUD();
      if (player.hp <= 0) { player.hp = 0; gameOver(); }
      // 命中时也生成毒液池
      poisonPools.push({ x: p.x, y: p.y, radius: 35, life: 150, damage: 3, tickTimer: 0 });
      poisonProjectiles.splice(i, 1);
      continue;
    }
    // Land when close to player position or life expires
    if (distToPlayer < 30 || p.life <= 0) {
      // Create poison pool
      poisonPools.push({ x: p.x, y: p.y, radius: 40, life: 180, damage: 3, tickTimer: 0 });
      poisonProjectiles.splice(i, 1);
    }
  }
}

function updatePoisonPools(dt) {
  for (let i = poisonPools.length - 1; i >= 0; i--) {
    const pool = poisonPools[i];
    pool.life -= dt;
    pool.tickTimer -= dt;
    if (pool.tickTimer <= 0) {
      pool.tickTimer = 30;
      if (Math.sqrt(distSq(pool, player)) < pool.radius + player.radius) {
        // 毒气是DOT伤害，穿透无敌帧，但有自己的内置CD避免每帧都扣
        const dmg = pool.damage || pool.dps || 3;
        player.hp -= dmg;
        player.hurtFlash = 8;
        redFlashFrames = 2;
        document.getElementById('redFlash').classList.add('active');
        playHurt();
        updateHUD();
        if (player.hp <= 0) { player.hp = 0; gameOver(); }
      }
    }
    if (pool.life <= 0) poisonPools.splice(i, 1);
  }
}

// 火焰枪地面残留火焰：对僵尸持续伤害 + 点燃
function updateFirePools(dt) {
  for (let i = firePools.length - 1; i >= 0; i--) {
    const f = firePools[i];
    f.life -= dt;
    f.tickTimer -= dt;
    // 火焰粒子
    if (Math.random() < 0.4) {
      particles.push({
        x: f.x + (Math.random() - 0.5) * f.radius * 0.8,
        y: f.y + (Math.random() - 0.5) * f.radius * 0.8,
        vx: (Math.random() - 0.5) * 1,
        vy: -1 - Math.random() * 1.5,
        life: 12 + Math.random() * 8,
        maxLife: 20,
        size: 2 + Math.random() * 2,
        color: Math.random() < 0.5 ? '#ff4422' : '#ffaa33'
      });
    }
    // 每30帧（0.5秒）对范围内僵尸造成伤害并点燃
    if (f.tickTimer <= 0) {
      f.tickTimer = 30;
      for (const z of zombies) {
        if (Math.sqrt(distSq(f, z)) < f.radius + z.radius) {
          z.hp -= f.dps * 0.5; // 半秒伤害
          z.burnTime = 30;     // 持续点燃
          z.burnDps = f.dps;
          z.hurtFlash = 4;
          if (z.hp <= 0 && !z._fireKilled) {
            z._fireKilled = true;
            onZombieKilled(z);
            addCombo();
            const mult = getComboMult();
            const gained = Math.round(z.score * mult);
            score += gained;
            zombiesKilled++;
            spawnBloodParticles(z.x, z.y, 10, '#aa1122');
            addDamageNumber(z.x, z.y - z.radius, '+' + gained, '#00ff88');
            playZombieDeath();
          }
        }
      }
      // 玩家也会被烧（鼓励走位）
      if (Math.sqrt(distSq(f, player)) < f.radius + player.radius) {
        if (player.invuln <= 0) {
          damagePlayer(Math.ceil(f.dps * 0.5));
          player.invuln = 15;
        }
      }
    }
    if (f.life <= 0) firePools.splice(i, 1);
  }
  // 清理被火焰烧死的僵尸
  for (let j = zombies.length - 1; j >= 0; j--) {
    if (zombies[j]._fireKilled) zombies.splice(j, 1);
  }
}

// 火焰枪火柱：持续喷射，穿透敌人，持续伤害
function updateFlameStream(dt) {
  if (!player.flameStream || !player.flameStream.active) return;
  const fs = player.flameStream;

  // 更新火柱角度（跟随鼠标）
  const worldMX = mouseX * PIXEL_SCALE + camera.x;
  const worldMY = mouseY * PIXEL_SCALE + camera.y;
  fs.angle = Math.atan2(worldMY - player.y, worldMX - player.x);

  // 持续伤害tick（每5帧一次，约12次/秒）
  fs.tickTimer -= dt;
  if (fs.tickTimer <= 0) {
    fs.tickTimer = 5;
    const muzzleX = player.x + Math.cos(fs.angle) * (player.radius + 6);
    const muzzleY = player.y + Math.sin(fs.angle) * (player.radius + 6);
    const endX = muzzleX + Math.cos(fs.angle) * fs.range;
    const endY = muzzleY + Math.sin(fs.angle) * fs.range;
    const tickDmg = fs.dps * 5 / 60; // 5帧的伤害

    // 检测火柱路径上的僵尸（线段-圆碰撞）
    for (let j = zombies.length - 1; j >= 0; j--) {
      const z = zombies[j];
      if (lineCircleCollide(muzzleX, muzzleY, endX, endY, z.x, z.y, z.radius + fs.width / 2)) {
        const actualDmg = tickDmg * (1 - (z.damageReduction || 0));
        z.hp -= actualDmg;
        z.hurtFlash = 4;
        z.burnTime = fs.burnDuration;
        z.burnDps = fs.burnDps;
        if (Math.random() < 0.3) {
          spawnBloodParticles(z.x, z.y, 2, '#ff6622');
        }
        if (z.hp <= 0) {
          onZombieKilled(z);
          addCombo();
          const mult = getComboMult();
          const gained = Math.round(z.score * mult);
          score += gained;
          zombiesKilled++;
          spawnBloodParticles(z.x, z.y, 10, '#aa1122');
          addBloodStain(z.x, z.y, z.radius);
          addDamageNumber(z.x, z.y - z.radius - 10, '+' + gained, '#00ff88');
          playZombieDeath();
          if (waveType === 'boss' && z.isElite) {
            const sideW = CLASSES[player.class].startWeapon || 'shotgun';
            pickups.push({ x: z.x, y: z.y, type: 'weapon_' + sideW, radius: 14, life: 900, bob: 0 });
          } else {
            const roll = Math.random();
            if (roll < 0.06) pickups.push({ x: z.x, y: z.y, type: 'health', radius: 12, life: 600, bob: 0 });
            else if (roll < 0.14) {
              const buffs = ['rage', 'shield', 'haste'];
              pickups.push({ x: z.x, y: z.y, type: 'buff_' + buffs[Math.floor(Math.random() * 3)], radius: 12, life: 600, bob: 0 });
            } else if (roll < 0.19) pickups.push({ x: z.x, y: z.y, type: 'food', radius: 12, life: 600, bob: 0 });
            else if (roll < 0.24) pickups.push({ x: z.x, y: z.y, type: 'water', radius: 12, life: 600, bob: 0 });
            else if (roll < 0.42) pickups.push({ x: z.x, y: z.y, type: 'ammo', radius: 12, life: 600, bob: 0 });
          }
          zombies.splice(j, 1);
          updateHUD();
        }
      }
    }

    // 检测火柱路径上的箱子
    for (let c of crates) {
      // 简化：检测火柱端点附近
      if (lineRectCollide(muzzleX, muzzleY, endX, endY, c.x, c.y, c.w, c.h)) {
        c.hp -= 0.5;
      }
    }
  }

  // 火柱末端散发粒子
  const muzzleX = player.x + Math.cos(fs.angle) * (player.radius + 6);
  const muzzleY = player.y + Math.sin(fs.angle) * (player.radius + 6);
  if (Math.random() < 0.6) {
    const t = Math.random();
    const px = muzzleX + Math.cos(fs.angle) * fs.range * t + (Math.random() - 0.5) * fs.width;
    const py = muzzleY + Math.sin(fs.angle) * fs.range * t + (Math.random() - 0.5) * fs.width;
    particles.push({
      x: px, y: py,
      vx: Math.cos(fs.angle) * (1 + Math.random()) + (Math.random() - 0.5) * 2,
      vy: Math.sin(fs.angle) * (1 + Math.random()) + (Math.random() - 0.5) * 2 - 0.5,
      life: 8 + Math.random() * 6,
      maxLife: 14,
      size: 2 + Math.random() * 3,
      color: Math.random() < 0.5 ? '#ff4422' : '#ffaa33'
    });
  }
}

// 线段-圆碰撞检测
function lineCircleCollide(x1, y1, x2, y2, cx, cy, r) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) {
    const ddx = cx - x1, ddy = cy - y1;
    return ddx * ddx + ddy * ddy <= r * r;
  }
  let t = ((cx - x1) * dx + (cy - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  const px = x1 + t * dx, py = y1 + t * dy;
  const ddx = cx - px, ddy = cy - py;
  return ddx * ddx + ddy * ddy <= r * r;
}

// 线段-矩形碰撞检测
function lineRectCollide(x1, y1, x2, y2, rx, ry, rw, rh) {
  // 检测线段是否与矩形相交（简化：检测端点是否在矩形内 + 4条边相交）
  if (x1 >= rx && x1 <= rx + rw && y1 >= ry && y1 <= ry + rh) return true;
  if (x2 >= rx && x2 <= rx + rw && y2 >= ry && y2 <= ry + rh) return true;
  // 检测4条边
  return lineLineCollide(x1, y1, x2, y2, rx, ry, rx + rw, ry) ||
         lineLineCollide(x1, y1, x2, y2, rx + rw, ry, rx + rw, ry + rh) ||
         lineLineCollide(x1, y1, x2, y2, rx + rw, ry + rh, rx, ry + rh) ||
         lineLineCollide(x1, y1, x2, y2, rx, ry + rh, rx, ry);
}

function lineLineCollide(x1, y1, x2, y2, x3, y3, x4, y4) {
  const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
  if (denom === 0) return false;
  const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
  const u = -((x1 - x2) * (y1 - y3) - (y1 - y2) * (x1 - x3)) / denom;
  return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

// BOSS更新逻辑
function updateBoss(dt) {
  if (!boss) return;
  const dx = player.x - boss.x, dy = player.y - boss.y;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;
  const nx = dx / dist, ny = dy / dist;

  // 阶段切换
  if (boss.phase === 1 && boss.hp < boss.maxHp * boss.phase2Threshold) {
    boss.phase = 2;
    boss.speed *= 1.3;
    boss.skillCooldown = Math.max(150, boss.skillCooldown * 0.7);
    addShake(8);
    spawnBloodParticles(boss.x, boss.y, 30, '#ff4422');
  }

  // 燃烧DOT
  if (boss.burnTime > 0) {
    boss.burnTime -= dt;
    boss.hp -= boss.burnDps * dt / 60;
  }
  // 加速buff到期恢复
  if (boss.boosted > 0) {
    boss.boosted -= dt;
    if (boss.boosted <= 0) {
      boss.speed = boss.def.speed * (boss.phase === 2 ? 1.3 : 1.0);
    }
  }

  // 移动逻辑
  if (boss.charging > 0) {
    // 冲刺中
    boss.charging -= dt;
    boss.x += boss.chargeDir.x * boss.speed * 4 * dt;
    boss.y += boss.chargeDir.y * boss.speed * 4 * dt;
  } else if (boss.teleporting > 0) {
    // 传送中（消失）
    boss.teleporting -= dt;
    if (boss.teleporting <= 0) {
      // 传送到玩家附近
      const ang = Math.random() * Math.PI * 2;
      boss.x = player.x + Math.cos(ang) * 200;
      boss.y = player.y + Math.sin(ang) * 200;
      spawnBloodParticles(boss.x, boss.y, 20, '#8e4a6b');
    }
  } else {
    // 正常移动朝玩家
    boss.x += nx * boss.speed * dt;
    boss.y += ny * boss.speed * dt;
  }

  // 边界
  boss.x = Math.max(boss.radius, Math.min(WORLD_W - boss.radius, boss.x));
  boss.y = Math.max(boss.radius, Math.min(WORLD_H - boss.radius, boss.y));
  boss.walkPhase += boss.speed * 0.1 * dt;
  if (boss.hurtFlash > 0) boss.hurtFlash -= dt;

  // 技能释放
  boss.skillTimer -= dt;
  if (boss.skillTimer <= 0 && boss.charging <= 0 && boss.teleporting <= 0) {
    bossSkill(boss);
    boss.skillTimer = boss.skillCooldown;
  }

  // 攻击玩家
  if (boss.charging <= 0 && boss.teleporting <= 0 && dist < boss.radius + player.radius && player.invuln <= 0) {
    damagePlayer(boss.damage, boss);
    player.invuln = 45;
    const kx = player.x - boss.x, ky = player.y - boss.y;
