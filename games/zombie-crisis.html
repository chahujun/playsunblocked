// 火焰枪火柱渲染：从枪口延伸的粗火焰柱
function drawFlameStream(fs) {
  const muzzleX = player.x + Math.cos(fs.angle) * (player.radius + 6);
  const muzzleY = player.y + Math.sin(fs.angle) * (player.radius + 6);
  const endX = muzzleX + Math.cos(fs.angle) * fs.range;
  const endY = muzzleY + Math.sin(fs.angle) * fs.range;
  const time = performance.now() * 0.02;
  const flicker = 0.85 + Math.sin(time) * 0.15;

  ctx.save();
  // 火柱主体：多层渐变
  // 外层（最宽，最暗）
  ctx.lineCap = 'round';
  ctx.strokeStyle = `rgba(200,40,20,0.4)`;
  ctx.lineWidth = fs.width * 1.8 * flicker;
  ctx.beginPath();
  ctx.moveTo(muzzleX, muzzleY);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  // 中层（橙红）
  ctx.strokeStyle = `rgba(255,80,30,0.7)`;
  ctx.lineWidth = fs.width * 1.3 * flicker;
  ctx.beginPath();
  ctx.moveTo(muzzleX, muzzleY);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  // 内层（亮黄）
  ctx.strokeStyle = `rgba(255,180,60,0.85)`;
  ctx.lineWidth = fs.width * 0.8 * flicker;
  ctx.beginPath();
  ctx.moveTo(muzzleX, muzzleY);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  // 核心（白热）
  ctx.strokeStyle = `rgba(255,240,180,0.9)`;
  ctx.lineWidth = fs.width * 0.35 * flicker;
  ctx.beginPath();
  ctx.moveTo(muzzleX, muzzleY);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  // 末端扩散火球
  const endRadius = fs.width * 1.2 * flicker;
  ctx.fillStyle = `rgba(255,100,40,0.6)`;
  ctx.beginPath();
  ctx.arc(endX, endY, endRadius, 0, Math.PI * 2);
  ctx.fill();

  // 枪口闪光
  const muzzleRadius = fs.width * 0.9 * flicker;
  ctx.fillStyle = `rgba(255,120,40,0.6)`;
  ctx.beginPath();
  ctx.arc(muzzleX, muzzleY, muzzleRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBullet(b) {
  // 火焰枪：锥形扩散火舌，多个分叉，带拖尾，飞行中渐变消散
  if (b.weaponType === 'flame') {
    if (!isFinite(b.x) || !isFinite(b.y) || !b.radius) return;
    const flicker = 0.85 + Math.sin(performance.now() * 0.03 + b.x * 0.1) * 0.15;
    // 渐变消散：根据飞行距离计算透明度（越远越淡）和尺寸（越远越大越散）
    let fade = 1;
    let expand = 1;
    if (b.flameRange > 0 && b.distTraveled > b.flameFadeStart) {
      const t = (b.distTraveled - b.flameFadeStart) / (b.flameRange - b.flameFadeStart);
      fade = Math.max(0, 1 - t);
      expand = 1 + t * 1.0; // 扩散到2倍
    }
    const r = b.radius * flicker * expand;
    const angle = Math.atan2(b.vy, b.vx);
    const time = performance.now() * 0.008;

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);

    // 1. 火焰拖尾（从火球向后延伸，渐变消散）
    const trailLen = r * 2.5;
    ctx.fillStyle = `rgba(255,180,60,${0.7 * fade})`;
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.7);
    ctx.lineTo(-trailLen, -r * 0.2);
    ctx.lineTo(-trailLen, r * 0.2);
    ctx.lineTo(0, r * 0.7);
    ctx.closePath();
    ctx.fill();

    // 2. 分叉火舌（3个偏移的椭圆形火舌，模拟不规则火焰）
    const tongues = [
      { ox: r * 0.3, oy: -r * 0.4, rx: r * 1.4, ry: r * 0.7, phase: 0 },
      { ox: r * 0.5, oy: 0,        rx: r * 1.6, ry: r * 0.9, phase: 1.5 },
      { ox: r * 0.3, oy: r * 0.4,  rx: r * 1.4, ry: r * 0.7, phase: 3.0 }
    ];
    for (const t of tongues) {
      const wobble = Math.sin(time + t.phase) * r * 0.15;
      const ox = t.ox + wobble;
      const oy = t.oy + Math.cos(time + t.phase) * r * 0.1;
      // 外层（暗红）
      ctx.fillStyle = `rgba(255,80,30,${0.5 * fade})`;
      ctx.beginPath();
      ctx.ellipse(ox, oy, t.rx, t.ry, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // 3. 主火球外层光晕（暗红，最大）
    ctx.fillStyle = `rgba(220,50,20,${0.3 * fade})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 3, r * 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // 4. 主火球中层（橙红）
    ctx.fillStyle = `rgba(255,100,40,${0.6 * fade})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 1.8, r * 1.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // 5. 火焰核心（白热，沿运动方向拉长）
    ctx.fillStyle = `rgba(255,245,190,${0.9 * fade})`;
    ctx.beginPath();
    ctx.ellipse(r * 0.2, 0, r * 1.0, r * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();

    // 6. 前端火舌尖端（最亮，向前突出）
    const tipX = r * 1.2 + Math.sin(time * 2) * r * 0.2;
    ctx.fillStyle = `rgba(255,250,200,${0.7 * fade})`;
    ctx.beginPath();
    ctx.ellipse(tipX, 0, r * 0.5, r * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // 7. 飞行中散发火星粒子（每帧约40%几率）
    if (Math.random() < 0.4 && fade > 0.2) {
      for (let k = 0; k < 2; k++) {
        particles.push({
          x: b.x + (Math.random() - 0.5) * r * 2,
          y: b.y + (Math.random() - 0.5) * r * 2,
          vx: -b.vx * 0.15 + (Math.random() - 0.5) * 2,
          vy: -b.vy * 0.15 + (Math.random() - 0.5) * 2 - 0.4,
          life: 8 + Math.random() * 10,
          maxLife: 18,
          size: 1.5 + Math.random() * 2.5,
          color: Math.random() < 0.4 ? '#ff4400' : (Math.random() < 0.6 ? '#ff8833' : '#ffcc55')
        });
      }
    }
    return;
  }

  // 脉冲炮：明亮的能量脉冲球，带光环和粒子尾迹
  if (b.weaponType === 'laser') {
    if (!isFinite(b.x) || !isFinite(b.y) || !b.radius) return;
    const angle = Math.atan2(b.vy, b.vx);
    let fade = 1;
    if (b.laserRange > 0 && b.distTraveled > b.laserFadeStart) {
      const t = (b.distTraveled - b.laserFadeStart) / (b.laserRange - b.laserFadeStart);
      fade = Math.max(0, 1 - t);
    }
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);
    // 外层大光环（蓝紫色脉冲）
    ctx.fillStyle = `rgba(60,120,255,${0.18 * fade})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, b.radius * 5, b.radius * 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // 中层能量场
    ctx.fillStyle = `rgba(100,200,255,${0.4 * fade})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, b.radius * 2.8, b.radius * 1.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // 核心亮光
    ctx.fillStyle = `rgba(180,240,255,${0.95 * fade})`;
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 1.5, 0, Math.PI * 2);
    ctx.fill();
    // 白色中心
    ctx.fillStyle = `rgba(255,255,255,${fade})`;
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 0.7, 0, Math.PI * 2);
    ctx.fill();
    // 粒子拖尾（随机散落）
    if (Math.random() < 0.6) {
      particles.push({
        x: b.x - Math.cos(angle) * b.radius * 2 + (Math.random() - 0.5) * 6,
        y: b.y - Math.sin(angle) * b.radius * 2 + (Math.random() - 0.5) * 6,
        vx: -Math.cos(angle) * 0.5 + (Math.random() - 0.5) * 1.5,
        vy: -Math.sin(angle) * 0.5 + (Math.random() - 0.5) * 1.5,
        life: 8 + Math.random() * 8,
        maxLife: 16,
        size: 1 + Math.random() * 2.5,
        color: Math.random() < 0.5 ? '#44ddff' : '#aaffff'
      });
    }
    ctx.restore();
    return;
  }

  // 追踪弹：粉色弹丸，带螺旋拖尾 + 目标锁定指示
  if (b.weaponType === 'homing') {
    if (!isFinite(b.x) || !isFinite(b.y) || !b.radius) return;
    // 目标锁定指示线（虚线连接到目标）
    if (b.target) {
      ctx.strokeStyle = 'rgba(255,102,221,0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 6]);
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.target.x, b.target.y);
      ctx.stroke();
      ctx.setLineDash([]);
      // 目标上的锁定标记（旋转方框）
      const pulse = (Math.sin(performance.now() * 0.012) + 1) * 0.5;
      ctx.save();
      ctx.translate(b.target.x, b.target.y);
      ctx.rotate(performance.now() * 0.003);
      ctx.strokeStyle = `rgba(255,102,221,${0.4 + pulse * 0.3})`;
      ctx.lineWidth = 1.5;
      const ms = b.target.radius + 4;
      ctx.beginPath();
      ctx.moveTo(-ms, -ms * 0.5); ctx.lineTo(-ms, -ms); ctx.lineTo(-ms * 0.5, -ms);
      ctx.moveTo(ms, -ms * 0.5); ctx.lineTo(ms, -ms); ctx.lineTo(ms * 0.5, -ms);
      ctx.moveTo(-ms, ms * 0.5); ctx.lineTo(-ms, ms); ctx.lineTo(-ms * 0.5, ms);
      ctx.moveTo(ms, ms * 0.5); ctx.lineTo(ms, ms); ctx.lineTo(ms * 0.5, ms);
      ctx.stroke();
      ctx.restore();
    }
    const angle = Math.atan2(b.vy, b.vx);
    const time = performance.now() * 0.02;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);
    // 外层光晕
    ctx.fillStyle = 'rgba(255,80,180,0.3)';
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 3, 0, Math.PI * 2);
    ctx.fill();
    // 螺旋拖尾（2条交错）
    for (let s = 0; s < 2; s++) {
      const phase = s * Math.PI;
      ctx.strokeStyle = `rgba(255,150,221,${0.6 - s * 0.2})`;
      ctx.lineWidth = b.radius * 0.6;
      ctx.beginPath();
      for (let i = 0; i < 12; i++) {
        const tx = -i * 2;
        const ty = Math.sin(time + i * 0.5 + phase) * b.radius * 0.8;
        if (i === 0) ctx.moveTo(tx, ty);
        else ctx.lineTo(tx, ty);
      }
      ctx.stroke();
    }
    // 核心
    ctx.fillStyle = '#ffaadd';
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }

  // 榴弹：绿色大型弹丸，带旋转感
  if (b.weaponType === 'grenade') {
    if (!isFinite(b.x) || !isFinite(b.y) || !b.radius) return;
    const time = performance.now() * 0.03;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(time);
    // 外层光晕
    ctx.fillStyle = 'rgba(136,221,68,0.7)';
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 2.5, 0, Math.PI * 2);
    ctx.fill();
    // 主体（六边形）
    ctx.fillStyle = '#88dd44';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 / 6) * i;
      const px = Math.cos(a) * b.radius;
      const py = Math.sin(a) * b.radius;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#448822';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // 核心
    ctx.fillStyle = '#aaff66';
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // 拖尾
    const angle = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);
    ctx.fillStyle = 'rgba(136,221,68,0.5)';
    ctx.beginPath();
    ctx.moveTo(0, -b.radius * 0.5);
    ctx.lineTo(-b.radius * 3, 0);
    ctx.lineTo(0, b.radius * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    return;
  }

  // 微型火箭：橙色小型火箭弹，带火焰拖尾
  if (b.weaponType === 'micro_rocket') {
    if (!isFinite(b.x) || !isFinite(b.y) || !b.radius) return;
    const angle = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);
    // 火焰拖尾
    ctx.fillStyle = 'rgba(255,153,68,0.8)';
    ctx.beginPath();
    ctx.moveTo(0, -b.radius * 0.6);
    ctx.lineTo(-b.radius * 4, -b.radius * 0.2);
    ctx.lineTo(-b.radius * 4, b.radius * 0.2);
    ctx.lineTo(0, b.radius * 0.6);
    ctx.closePath();
    ctx.fill();
    // 火箭主体（椭圆）
    ctx.fillStyle = '#ff9944';
    ctx.beginPath();
    ctx.ellipse(0, 0, b.radius * 1.2, b.radius * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    // 核心
    ctx.fillStyle = '#ffcc66';
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }

  // 破片（fragment）：黄色小三角
  if (b.weaponType === 'fragment') {
    if (!isFinite(b.x) || !isFinite(b.y)) return;
    const angle = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.moveTo(b.radius * 1.5, 0);
    ctx.lineTo(-b.radius, -b.radius * 0.8);
    ctx.lineTo(-b.radius, b.radius * 0.8);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    return;
  }

  // 电磁枪：紫色电弧弹 + 射程限制
  if (b.weaponType === 'tesla') {
    if (!isFinite(b.x) || !isFinite(b.y)) return;
    const fade = b.laserRange > 0 ? Math.max(0, 1 - b.distTraveled / b.laserRange) : 1;
    // 电弧拖尾
    ctx.strokeStyle = `rgba(170,102,255,${fade * 0.5})`;
    ctx.lineWidth = b.radius;
    ctx.beginPath();
    const trailLen = Math.min(b.distTraveled, 30);
    const ta = Math.atan2(b.vy, b.vx);
    ctx.moveTo(b.x - Math.cos(ta) * trailLen, b.y - Math.sin(ta) * trailLen);
    for (let s = 0; s < 4; s++) {
      const t = s / 4;
      ctx.lineTo(b.x - Math.cos(ta) * trailLen * (1-t) + (Math.random()-0.5)*4, b.y - Math.sin(ta) * trailLen * (1-t) + (Math.random()-0.5)*4);
    }
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    // 核心
    ctx.fillStyle = `rgba(200,150,255,${fade * 0.9})`;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius * 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,255,255,${fade})`;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // 酸液枪：绿色腐蚀弹
  if (b.weaponType === 'acid') {
    if (!isFinite(b.x) || !isFinite(b.y)) return;
    const angle = Math.atan2(b.vy, b.vx);
    const time = performance.now() * 0.008;
    ctx.save();
    ctx.translate(b.x, b.y);
    // 光晕
    ctx.fillStyle = 'rgba(102,255,68,0.2)';
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 2.5, 0, Math.PI * 2);
    ctx.fill();
    // 拖尾
    ctx.strokeStyle = 'rgba(102,255,68,0.4)';
    ctx.lineWidth = b.radius * 0.8;
    ctx.beginPath();
    ctx.moveTo(-b.vx * 2, -b.vy * 2);
    for (let i = 0; i < 5; i++) {
      ctx.lineTo(-b.vx * 2 * (1 - i/5) + (Math.random()-0.5)*3, -b.vy * 2 * (1 - i/5) + (Math.random()-0.5)*3);
    }
    ctx.stroke();
    // 核心（不规则形状模拟液滴）
    ctx.fillStyle = '#66ff44';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const r = b.radius * (0.8 + Math.sin(time + i) * 0.2);
      if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    // 高光
    ctx.fillStyle = 'rgba(200,255,180,0.6)';
    ctx.beginPath();
    ctx.arc(-1, -1, b.radius * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }

  // 轨道炮：超亮金色射线
  if (b.weaponType === 'railgun') {
    if (!isFinite(b.x) || !isFinite(b.y)) return;
    const fade = b.railRange > 0 ? Math.max(0, 1 - b.distTraveled / b.railRange) : 1;
    const angle = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);
    // 外层超宽光晕
    ctx.fillStyle = `rgba(255,238,170,${fade * 0.15})`;
    ctx.fillRect(-30, -b.radius * 4, 40, b.radius * 8);
    // 中层光束
    ctx.fillStyle = `rgba(255,255,200,${fade * 0.5})`;
    ctx.fillRect(-20, -b.radius * 2, 30, b.radius * 4);
    // 核心白热
    ctx.fillStyle = `rgba(255,255,255,${fade})`;
    ctx.fillRect(-15, -b.radius, 25, b.radius * 2);
    // 头部亮点
    ctx.fillStyle = `rgba(255,255,255,${fade})`;
    ctx.beginPath();
    ctx.arc(0, 0, b.radius * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }

  // 大口径狙击枪：金色穿甲弹道，带冲击波光环
  if (b.weaponType === 'sniper') {
    if (!isFinite(b.x) || !isFinite(b.y)) return;
    const fade = b.sniperRange > 0 ? Math.max(0, 1 - b.distTraveled / b.sniperRange) : 1;
    const angle = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);
    // 外层金色冲击光环
    ctx.fillStyle = `rgba(255,200,60,${fade * 0.2})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, b.radius * 4, b.radius * 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // 中层金色弹道
    ctx.fillStyle = `rgba(255,220,80,${fade * 0.6})`;
    ctx.fillRect(-b.radius * 3, -b.radius * 1.2, b.radius * 5, b.radius * 2.4);
    // 核心白热穿甲线
    ctx.fillStyle = `rgba(255,255,220,${fade})`;
    ctx.fillRect(-b.radius * 2, -b.radius * 0.5, b.radius * 4, b.radius);
    // 头部尖锐亮点
    ctx.fillStyle = `rgba(255,255,255,${fade})`;
    ctx.beginPath();
    ctx.moveTo(b.radius * 2, 0);
    ctx.lineTo(0, -b.radius);
    ctx.lineTo(-b.radius, 0);
    ctx.lineTo(0, b.radius);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    return;
  }

  // Trail
  if (!isFinite(b.x) || !isFinite(b.y) || !isFinite(b.vx) || !isFinite(b.vy)) return;
  ctx.strokeStyle = b.color;
  ctx.lineWidth = b.radius * 1.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(b.x, b.y);
  ctx.lineTo(b.x - b.vx * 2, b.y - b.vy * 2);
  ctx.stroke();

  // Glow
  ctx.fillStyle = b.color + '88';
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.radius * 3, 0, Math.PI * 2);
  ctx.fill();

  // Core
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.radius * 0.8, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticle(p) {
  const alpha = p.life / p.maxLife;
  ctx.globalAlpha = alpha;
  // Glow
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size * 2 * alpha, 0, Math.PI * 2);
  ctx.fill();
  // Core
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawLightingOverlay() {
  // Calculate darkness based on day-night cycle
  // 0 = noon (bright), 0.5 = midnight (dark), 1 = noon again
  const t = dayNightTime;
  // darkness: 0 at noon/midnight endpoints of bright phase, peaks at 0.5
  let darkness = 0;
  if (t < 0.25) darkness = 0; // morning
  else if (t < 0.5) darkness = (t - 0.25) / 0.25; // evening getting dark
  else if (t < 0.75) darkness = 1; // night
  else darkness = 1 - (t - 0.75) / 0.25; // morning getting bright
  // Clamp and scale
  darkness = Math.min(1, Math.max(0, darkness)) * 0.6;

  // Vignette around player — pixel style flat rings (no gradient)
  const cx = player.x;
  const cy = player.y;
  const radius = 400 - darkness * 200;
  ctx.fillStyle = `rgba(0,0,0,${0.4 + darkness * 0.35})`;
  ctx.fillRect(camera.x - 50, camera.y - 50, VIEW_W + 100, VIEW_H + 100);
  // Carve vision circle with lighter overlay (no gradient — flat alpha rings)
  const ringStep = 40;
  for (let r = radius; r > 0; r -= ringStep) {
    var a = (1 - r / radius) * (0.35 + darkness * 0.3);
    ctx.fillStyle = `rgba(0,0,0,0)`;
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  // Blue tint at night
  if (darkness > 0.2) {
    ctx.fillStyle = `rgba(10,20,50,${darkness * 0.25})`;
    ctx.fillRect(camera.x - 50, camera.y - 50, VIEW_W + 100, VIEW_H + 100);
  }

  // Player flashlight cone at night — pixel style flat triangle (no gradient)
  if (darkness > 0.3) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    // Flat cone — no gradient, just semi-transparent triangle
    ctx.fillStyle = `rgba(255,240,200,${darkness * 0.15})`;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, 350, -0.5, 0.5);
    ctx.closePath();
    ctx.fill();
    // Brighter inner cone
    ctx.fillStyle = `rgba(255,240,200,${darkness * 0.1})`;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, 200, -0.5, 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);

  // Shadow - pixel rect (relative coords, context translated to player)
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(PX(-player.radius), PX(5), player.radius * 2, player.radius * 0.5);

  // Walk bob
  const walkBob = Math.sin(player.walkPhase) * 1.5;
  const legSwing = Math.sin(player.walkPhase) * 3;

  // Legs - pixel fillRect
  pxRect(-5, player.radius * 0.4, 4, 8 + legSwing * 0.4, '#1a3a28');
  pxRect(1, player.radius * 0.4, 4, 8 - legSwing * 0.4, '#1a3a28');

  ctx.translate(0, walkBob);

  // Pixel body - flat color, no gradient (context already translated by walkBob)
  var pr = player.radius;
  var bodyColor = (player.hurtFlash > 0 && Math.floor(player.hurtFlash / 3) % 2 === 0) ? '#ff4444' : '#00cc88';

  // 隐身效果（侦察兵）
  if (player.buffs.cloak > 0) {
    ctx.globalAlpha = 0.35;
  }

  // 狂暴光环（红色脉冲）
  if (player.buffs.rage > 0) {
    const pulse = (Math.sin(performance.now() * 0.01) + 1) * 0.5;
    ctx.fillStyle = `rgba(255, 68, 34, ${0.15 + pulse * 0.15})`;
    ctx.beginPath();
    ctx.arc(0, 0, pr + 8 + pulse * 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // 狂战士狂暴模式（紫色光环）
  if (player.buffs.frenzy > 0) {
    const pulse = (Math.sin(performance.now() * 0.015) + 1) * 0.5;
    ctx.fillStyle = `rgba(255, 50, 50, ${0.12 + pulse * 0.18})`;
    ctx.beginPath();
    ctx.arc(0, 0, pr + 6 + pulse * 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 护盾光环（蓝色环）
  if (player.buffs.shield > 0) {
    ctx.strokeStyle = `rgba(68, 170, 255, 0.8)`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, pr + 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = `rgba(68, 170, 255, 0.1)`;
    ctx.beginPath();
    ctx.arc(0, 0, pr + 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 急速效果（黄色速度线）
  if (player.buffs.haste > 0) {
    const pSpeed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
    if (pSpeed > 0.3) {
      ctx.strokeStyle = `rgba(255, 221, 68, 0.5)`;
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const ang = Math.atan2(-player.vy, -player.vx) + (Math.random() - 0.5) * 0.4;
        const len = 6 + Math.random() * 8;
        const offX = Math.cos(ang) * len;
        const offY = Math.sin(ang) * len;
        ctx.beginPath();
        ctx.moveTo(offX, offY);
        ctx.lineTo(offX * 1.5, offY * 1.5);
        ctx.stroke();
      }
    }
  }

  pxCircle(0, 0, pr, bodyColor);

  // Armor plates - pixel rect blocks
  pxRect(-pr * 0.6, -2, pr * 0.5, 4, 'rgba(0,80,50,0.6)');
  pxRect(pr * 0.1, -2, pr * 0.5, 4, 'rgba(0,80,50,0.6)');
  pxRect(-pr * 0.6, pr * 0.4, pr * 0.5, 4, 'rgba(0,80,50,0.6)');
  pxRect(pr * 0.1, pr * 0.4, pr * 0.5, 4, 'rgba(0,80,50,0.6)');

  // Outline - pixel edge blocks
  pxRect(-pr, -2, 2, 2, '#005533');
  pxRect(pr - 2, -2, 2, 2, '#005533');
  pxRect(-pr, pr - 2, 2, 2, '#005533');
  pxRect(pr - 2, pr - 2, 2, 2, '#005533');

  // Inner highlight - lighter pixel blocks
  pxRect(-pr * 0.5, -pr + 2, 2, 2, '#44ffbb');
  pxRect(pr * 0.3, -pr + 2, 2, 2, '#44ffbb');
  pxRect(-pr * 0.3, -pr + 4, 2, 2, '#44ffbb');

  // Rotate for weapon
  ctx.rotate(player.angle);
  // Recoil offset
  ctx.translate(-player.recoilOffset, 0);

  // Weapon based on current weapon
  drawWeapon();

  ctx.restore();
  ctx.globalAlpha = 1;

  // Space ability indicator (above player)
  if (player.mines > 0) {
    const cls = player.class ? CLASSES[player.class] : null;
    const abilityNames = {
      grenade: lang === 'zh' ? '手雷' : 'NADE',
      medkit: lang === 'zh' ? '医疗包' : 'MED',
      turret: lang === 'zh' ? '炮台' : 'TURR',
      cloak: lang === 'zh' ? '隐身' : 'CLOAK',
      barricade: lang === 'zh' ? '路障' : 'WALL',
      pulse: lang === 'zh' ? '脉冲' : 'PULSE',
      airstrike: lang === 'zh' ? '空袭' : 'STRIKE',
      frenzy: lang === 'zh' ? '狂热' : 'FREN',
      mine: lang === 'zh' ? '地雷' : 'MINE'
    };
    const abilName = abilityNames[cls && cls.spaceAbility ? cls.spaceAbility : 'mine'] || (lang === 'zh' ? '地雷' : 'MINE');
    const pulse2 = (Math.sin(performance.now() * 0.005) + 1) * 0.5;
    ctx.fillStyle = player.abilityCD > 0 ? 'rgba(255,80,80,0.8)' : `rgba(255,170,68,${0.7 + pulse2 * 0.3})`;
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    const cdText = player.abilityCD > 0 ? ' (' + Math.ceil(player.abilityCD / 60) + 's)' : '';
    ctx.fillText('[SPACE] ' + abilName + ' ' + player.mines + '/' + player.mineMax + cdText, player.x, player.y - player.radius - 12);
  }
}

function drawWeapon() {
  const r = player.radius;
  if (player.weapon === 'pistol') {
    // Pistol
    ctx.fillStyle = '#222';
    ctx.fillRect(r - 2, -3, 12, 6);
    ctx.fillStyle = '#444';
    ctx.fillRect(r - 2, -3, 12, 2);
    ctx.fillStyle = '#111';
    ctx.fillRect(r - 2, 1, 12, 2);
    // Grip
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, 1, 4, 6);
    // Muzzle
    ctx.fillStyle = '#555';
    ctx.fillRect(r + 10, -2, 2, 4);
  } else if (player.weapon === 'shotgun') {
    // Shotgun (longer, wider)
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, -4, 22, 8);
    ctx.fillStyle = '#553';
    ctx.fillRect(r - 2, -4, 22, 2);
    ctx.fillStyle = '#221';
    ctx.fillRect(r - 2, 2, 22, 2);
    // Pump
    ctx.fillStyle = '#444';
    ctx.fillRect(r + 2, 3, 6, 3);
    // Muzzle
    ctx.fillStyle = '#666';
    ctx.fillRect(r + 20, -3, 3, 6);
  } else if (player.weapon === 'hmg') {
    // 重机枪：大枪身+弹链
    ctx.fillStyle = '#222';
    ctx.fillRect(r - 2, -4, 22, 8);
    ctx.fillStyle = '#444';
    ctx.fillRect(r - 2, -4, 22, 2);
    ctx.fillStyle = '#111';
    ctx.fillRect(r - 2, 2, 22, 2);
    // 弹链
    ctx.fillStyle = '#aa8822';
    ctx.fillRect(r + 2, -5, 14, 1);
    ctx.fillRect(r + 4, 5, 10, 1);
    // 把手
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, 2, 5, 6);
    // 枪口
    ctx.fillStyle = '#666';
    ctx.fillRect(r + 20, -3, 3, 6);
  } else if (player.weapon === 'flamethrower') {
    // 火焰枪：喷嘴+罐体
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, -3, 16, 6);
    ctx.fillStyle = '#553';
    ctx.fillRect(r - 2, -3, 16, 2);
    // 喷嘴（粗）
    ctx.fillStyle = '#444';
    ctx.fillRect(r + 14, -2, 5, 4);
    // 罐体
    ctx.fillStyle = '#883322';
    ctx.fillRect(r - 4, 2, 7, 6);
    ctx.fillStyle = '#aa4433';
    ctx.fillRect(r - 4, 2, 7, 1);
    // 火焰小点（枪口）
    ctx.fillStyle = '#ff6622';
    ctx.fillRect(r + 19, -1, 2, 2);
  } else if (player.weapon === 'rocket') {
    // 火箭筒：粗管+火箭弹头
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, -5, 24, 10);
    ctx.fillStyle = '#553';
    ctx.fillRect(r - 2, -5, 24, 2);
    ctx.fillStyle = '#221';
    ctx.fillRect(r - 2, 3, 24, 2);
    // 弹头（黄色尖头）
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(r + 22, -3, 4, 6);
    ctx.fillStyle = '#ff8833';
    ctx.fillRect(r + 26, -2, 2, 4);
    // 把手
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, 3, 5, 5);
    // 瞄准镜
    ctx.fillStyle = '#444';
    ctx.fillRect(r + 8, -7, 6, 2);
  } else if (player.weapon === 'laser') {
    // 激光枪：银色枪身+蓝色能量管
    ctx.fillStyle = '#222';
    ctx.fillRect(r - 2, -3, 18, 6);
    ctx.fillStyle = '#444';
    ctx.fillRect(r - 2, -3, 18, 2);
    // 蓝色能量管（顶部发光）
    ctx.fillStyle = '#44ddff';
    ctx.fillRect(r + 2, -4, 12, 2);
    ctx.fillStyle = '#88eeff';
    ctx.fillRect(r + 2, -4, 12, 1);
    // 把手
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, 1, 4, 6);
    // 枪口（蓝色发射器）
    ctx.fillStyle = '#666';
    ctx.fillRect(r + 16, -2, 3, 4);
    ctx.fillStyle = '#44ddff';
    ctx.fillRect(r + 18, -1, 1, 2);
  } else if (player.weapon === 'homing') {
    // 追踪弹：粉色导弹发射器
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, -4, 20, 8);
    ctx.fillStyle = '#553';
    ctx.fillRect(r - 2, -4, 20, 2);
    // 粉色导弹指示器
    ctx.fillStyle = '#ff66dd';
    ctx.fillRect(r + 16, -2, 3, 4);
    ctx.fillStyle = '#ffaadd';
    ctx.fillRect(r + 17, -1, 2, 2);
    // 把手
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, 2, 4, 6);
    // 雷达天线
    ctx.fillStyle = '#666';
    ctx.fillRect(r + 8, -7, 1, 3);
    ctx.fillStyle = '#ff66dd';
    ctx.fillRect(r + 7, -8, 3, 1);
  } else if (player.weapon === 'grenade') {
    // 超级榴弹：绿色粗管榴弹发射器
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, -5, 22, 10);
    ctx.fillStyle = '#553';
    ctx.fillRect(r - 2, -5, 22, 2);
    ctx.fillStyle = '#221';
    ctx.fillRect(r - 2, 3, 22, 2);
    // 绿色榴弹（可见弹头）
    ctx.fillStyle = '#88dd44';
    ctx.fillRect(r + 18, -3, 4, 6);
    ctx.fillStyle = '#aaff66';
    ctx.fillRect(r + 19, -2, 2, 4);
    // 把手
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, 3, 5, 5);
    // 旋转弹仓
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(r + 8, 5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#666';
    ctx.fillRect(r + 6, 4, 4, 1);
  } else if (player.weapon === 'micro_rocket') {
    // 微型火箭：橙色速射发射器
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, -3, 18, 6);
    ctx.fillStyle = '#553';
    ctx.fillRect(r - 2, -3, 18, 2);
    // 多管发射器（3个小管）
    ctx.fillStyle = '#666';
    ctx.fillRect(r + 16, -3, 3, 2);
    ctx.fillRect(r + 16, -1, 3, 2);
    ctx.fillRect(r + 16, 1, 3, 2);
    // 橙色指示灯
    ctx.fillStyle = '#ff9944';
    ctx.fillRect(r + 4, -4, 2, 1);
    // 把手
    ctx.fillStyle = '#332';
    ctx.fillRect(r - 2, 1, 4, 6);
  }
}

// Trigger screen shake and recoil on shoot
function triggerShootFX() {
  player.recoilOffset = player.weapon === 'shotgun' ? 4 : 2;
  if (player.weapon === 'shotgun') addShake(2);
}

function drawDashTrail() {
  for (const t of player.dashTrail) {
    const alpha = t.life / 15;
    ctx.fillStyle = `rgba(0,255,170,${alpha * 0.35})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, player.radius * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSpawnTelegraph(s) {
  const progress = 1 - s.life / s.maxLife;
  const pulse = (Math.sin(performance.now() * 0.02) + 1) * 0.5;
  const def = ZOMBIE_TYPES[s.type];

  // Outer warning ring
  ctx.strokeStyle = `rgba(255,60,60,${0.5 + pulse * 0.5})`;
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.arc(s.x, s.y, 30 + pulse * 5, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Inner fill (growing) — flat color, no gradient
  ctx.fillStyle = `rgba(255,40,40,${0.3 * progress})`;
  ctx.beginPath();
  ctx.arc(s.x, s.y, 25, 0, Math.PI * 2);
  ctx.fill();

  // Progress ring
  ctx.strokeStyle = def.color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(s.x, s.y, 20, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
  ctx.stroke();

  // Warning icon (skull-like dot)
  ctx.fillStyle = `rgba(255,80,80,${0.7 + pulse * 0.3})`;
  ctx.beginPath();
  ctx.arc(s.x, s.y, 4, 0, Math.PI * 2);
  ctx.fill();
}

function drawDamageNumber(d) {
  const alpha = Math.min(1, d.life / 20);
  ctx.globalAlpha = alpha;
  const fontSize = d.isCrit ? 22 : 15;
  ctx.font = '800 ' + fontSize + 'px "Oswald", sans-serif';
  ctx.textAlign = 'center';
  const text = d.isCrit ? d.value + '!' : d.value;
  ctx.strokeStyle = 'rgba(0,0,0,0.95)';
  ctx.lineWidth = 3;
  ctx.strokeText(text, d.x, d.y);
  ctx.fillStyle = d.color;
  ctx.fillText(text, d.x, d.y);
  ctx.globalAlpha = 1;
}

function drawMinimap() {
  const size = 110;
  const pad = 14;
  const x = canvas.width - size - pad;
  const y = pad + 34;

  // Background
  ctx.fillStyle = '#0d1014';
  ctx.fillRect(x, y, size, size);
  ctx.strokeStyle = '#2a3036';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, size - 1, size - 1);

  // Top accent bar (subtle)
  ctx.fillStyle = '#3a3036';
  ctx.fillRect(x, y, size, 2);

  // Grid
  ctx.strokeStyle = 'rgba(120,130,140,0.08)';
  ctx.lineWidth = 0.5;
  for (let i = 1; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(x + (size / 4) * i, y);
    ctx.lineTo(x + (size / 4) * i, y + size);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y + (size / 4) * i);
    ctx.lineTo(x + size, y + (size / 4) * i);
    ctx.stroke();
  }

  const sx = size / WORLD_W;
  const sy = size / WORLD_H;

  // Viewport rectangle
  ctx.strokeStyle = 'rgba(200,200,200,0.25)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + camera.x * sx, y + camera.y * sy, VIEW_W * sx, VIEW_H * sy);

  // Crates
  ctx.fillStyle = '#8b5a2b';
  for (const c of crates) {
    ctx.fillRect(x + c.x * sx - 1, y + c.y * sy - 1, 2, 2);
  }

  // Terrain features
  for (const f of terrainFeatures) {
    if (f.type === 'grass') ctx.fillStyle = 'rgba(80,140,60,0.5)';
    else ctx.fillStyle = 'rgba(60,100,160,0.5)';
    ctx.fillRect(x + f.x * sx - 2, y + f.y * sy - 2, 4, 4);
  }

  // Barrels (red, larger)
  ctx.fillStyle = '#cc3311';
  for (const b of barrels) {
    ctx.fillRect(x + b.x * sx - 1, y + b.y * sy - 1, 3, 3);
  }

  // Pickups
  for (const p of pickups) {
    ctx.fillStyle = p.type === 'health' ? '#c44a3a' : '#e8b04a';
    ctx.fillRect(x + p.x * sx - 1, y + p.y * sy - 1, 2, 2);
  }

  // Zombies
  for (const z of zombies) {
    if (z.type === 'brute') ctx.fillStyle = '#5a7028';
    else if (z.type === 'runner') ctx.fillStyle = '#9ec85a';
    else if (z.type === 'spitter') ctx.fillStyle = '#8e4a6b';
    else if (z.type === 'tank') ctx.fillStyle = '#3a4a8e';
    else if (z.type === 'screamer') ctx.fillStyle = '#c8a83a';
    else ctx.fillStyle = '#7a9e4e';
    ctx.fillRect(x + z.x * sx - 1, y + z.y * sy - 1, z.isElite ? 3 : 2, z.isElite ? 3 : 2);
  }

  // Spawn telegraphs
  for (const s of spawnTelegraphs) {
    ctx.fillStyle = '#c44a3a';
    ctx.fillRect(x + s.x * sx - 1, y + s.y * sy - 1, 3, 3);
  }

  // Player
  ctx.fillStyle = '#e8e4d8';
  ctx.beginPath();
  ctx.arc(x + player.x * sx, y + player.y * sy, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#c44a3a';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Corner label
  ctx.fillStyle = '#5a6268';
  ctx.font = '9px "JetBrains Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(lang === 'zh' ? '战术地图' : 'TAC-MAP', x + 4, y + 14);
  // Coords
  ctx.textAlign = 'right';
  ctx.fillText(Math.round(player.x) + ',' + Math.round(player.y), x + size - 4, y + 14);

  // Day-night indicator below minimap
  const dnY = y + size + 6;
  const dnW = size;
  const dnH = 16;
  ctx.fillStyle = '#0d1014';
  ctx.fillRect(x, dnY, dnW, dnH);
  ctx.strokeStyle = '#2a3036';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, dnY + 0.5, dnW - 1, dnH - 1);
  // Progress bar
  const phase = dayNightTime;
  let phaseColor, phaseLabel;
  if (phase < 0.25) { phaseColor = '#e8b04a'; phaseLabel = t('day'); }
  else if (phase < 0.5) { phaseColor = '#c46a3a'; phaseLabel = t('dawn'); }
  else if (phase < 0.75) { phaseColor = '#3a4a8e'; phaseLabel = t('night'); }
  else { phaseColor = '#8a6a8e'; phaseLabel = t('dusk'); }
  ctx.fillStyle = phaseColor;
  ctx.fillRect(x + 1, dnY + 1, (dnW - 2) * phase, dnH - 2);
  // Marker dot
  ctx.fillStyle = '#e8e4d8';
  ctx.beginPath();
  ctx.arc(x + 1 + (dnW - 2) * phase, dnY + dnH / 2, 3, 0, Math.PI * 2);
  ctx.fill();
  // Label
  ctx.fillStyle = '#e8e4d8';
  ctx.font = '700 10px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(phaseLabel, x + dnW / 2, dnY + dnH / 2 + 1);

  // 天气指示条（位于昼夜指示下方）
  const wY = dnY + dnH + 2;
  const wH = 14;
  ctx.fillStyle = '#0d1014';
  ctx.fillRect(x, wY, dnW, wH);
  ctx.strokeStyle = '#2a3036';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, wY + 0.5, dnW - 1, wH - 1);
  // 天气颜色
  let wColor, wLabel;
  if (weather.type === 'clear') { wColor = '#3a4a5a'; wLabel = t('weatherClear'); }
  else if (weather.type === 'rain') { wColor = '#4a6a8a'; wLabel = t('weatherRain'); }
  else if (weather.type === 'fog') { wColor = '#6a7076'; wLabel = t('weatherFog'); }
  else { wColor = '#6a3a8a'; wLabel = t('weatherStorm'); }
  ctx.fillStyle = wColor;
  ctx.fillRect(x + 1, wY + 1, dnW - 2, wH - 2);
  // 雷暴时闪烁
  if (weather.type === 'storm' && weather.lightningFlash > 0) {
    ctx.fillStyle = `rgba(255,255,240,${(weather.lightningFlash / 8) * 0.5})`;
    ctx.fillRect(x + 1, wY + 1, dnW - 2, wH - 2);
  }
  ctx.fillStyle = '#e8e4d8';
  ctx.font = '700 10px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(wLabel, x + dnW / 2, wY + wH / 2 + 1);
}

function drawWaveBanner() {
  if (waveBannerTime <= 0) return;
  const alpha = waveBannerTime > 75 ? 1 : waveBannerTime / 75;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(canvas.width / 2, canvas.height / 2 - 80);

  // Top/bottom decorative bars (color depends on wave type)
  const barColor = waveType === 'boss' ? '#8e4a6b' : waveType === 'horde' ? '#c44a3a' : waveType === 'silent' ? '#3a4a8e' : '#c44a3a';
  ctx.fillStyle = barColor;
  ctx.fillRect(-200, -32, 400, 2);
  ctx.fillRect(-200, 30, 400, 2);

  // Side brackets
  ctx.fillRect(-200, -32, 2, 12);
  ctx.fillRect(-200, 20, 2, 12);
  ctx.fillRect(198, -32, 2, 12);
  ctx.fillRect(198, 20, 2, 12);

  // Main text
  ctx.font = '700 34px "Oswald", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8e4d8';
  ctx.fillText(waveBannerText, 0, -4);

  // Subtitle (wave type description)
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.fillStyle = barColor;
  let subtitle = '[ ' + t('incoming') + ' ]';
  if (waveType === 'horde') subtitle = t('hordeDesc');
  else if (waveType === 'boss') subtitle = t('bossDesc');
  else if (waveType === 'silent') subtitle = t('silentDesc');
  ctx.fillText(subtitle, 0, 18);

  // 策略提示（第二行）
  let strategy = '';
  if (waveType === 'horde') strategy = lang === 'zh' ? '尸潮来袭！保持距离' : 'Horde incoming! Keep distance';
  else if (waveType === 'boss') strategy = lang === 'zh' ? 'Boss出现！优先击杀召唤者' : 'Boss detected! Kill summoners first';
  else if (waveType === 'silent') strategy = lang === 'zh' ? '无预警袭击！保持警惕' : 'Silent wave! Stay alert';
  if (strategy) {
    ctx.font = '700 11px "JetBrains Mono", monospace';
    ctx.fillStyle = '#e8e4d8';
    ctx.fillText(strategy, 0, 36);
  }

  ctx.restore();
}

function drawComboIndicator() {
  if (combo < 2) return;
  const alpha = comboTimer > 60 ? 1 : comboTimer / 60;
  const mult = getComboMult();

  ctx.save();
  ctx.globalAlpha = alpha;

  // Position: left-center, below wave info
  const cx = 16;
  const cy = 56;
  const cw = 92;
  const ch = 28;

  // Background pill
  ctx.fillStyle = 'rgba(13,16,19,0.85)';
  ctx.fillRect(cx, cy, cw, ch);
  ctx.strokeStyle = mult >= 3 ? '#c44a3a' : mult >= 2 ? '#e8b04a' : '#3a3036';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx + 0.5, cy + 0.5, cw - 1, ch - 1);
  // Left accent
  ctx.fillStyle = mult >= 3 ? '#c44a3a' : '#e8b04a';
  ctx.fillRect(cx, cy, 2, ch);

  // Combo number (compact)
  ctx.font = '700 16px "Oswald", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8e4d8';
  ctx.fillText(combo, cx + 8, cy + ch / 2);

  // Multiplier badge
  ctx.font = '700 10px "JetBrains Mono", monospace';
  ctx.fillStyle = mult >= 3 ? '#c44a3a' : mult >= 2 ? '#e8b04a' : '#9aa0a6';
  ctx.fillText('x' + mult + ' ' + t('combo'), cx + 28, cy + ch / 2);

  // Combo timer bar (inline)
  const barW = cw - 36;
  const barH = 2;
  ctx.fillStyle = '#1a1e22';
  ctx.fillRect(cx + 28, cy + ch - 5, barW, barH);
  ctx.fillStyle = mult >= 3 ? '#c44a3a' : '#e8b04a';
  ctx.fillRect(cx + 28, cy + ch - 5, barW * (comboTimer / COMBO_TIMEOUT), barH);

  ctx.restore();
}

function drawDashCooldown() {
  const x = 18;
  const y = canvas.height - 155;
  const w = 56;
  const h = 22;

  ctx.save();
  // Background
  ctx.fillStyle = '#0d1014';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#2a3036';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

  // Cooldown fill
  if (player.dashCooldown > 0) {
    const ratio = player.dashCooldown / player.dashMaxCooldown;
    ctx.fillStyle = '#1a1e22';
    ctx.fillRect(x + 1, y + 1, (w - 2) * ratio, h - 2);
  } else {
    ctx.fillStyle = 'rgba(196,74,58,0.25)';
    ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
    ctx.fillStyle = '#c44a3a';
    ctx.fillRect(x, y, 2, h);
  }

  // Label
  ctx.font = '700 9px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = player.dashCooldown > 0 ? '#5a6268' : '#e8e4d8';
  ctx.fillText('[SHIFT] ' + t('dashReady'), x + w / 2, y + h / 2);

  ctx.restore();

  // Buff indicators (right of dash)
  drawBuffs(x + w + 8, y);
}

function drawBuffs(x, y) {
  const buffs = [
    { key: 'rage', color: '#ff4422', icon: '\uD83D\uDD25' },
    { key: 'shield', color: '#44aaff', icon: '\uD83D\uDEE1' },
    { key: 'haste', color: '#ffdd44', icon: '\u26A1' },
    { key: 'cloak', color: '#88ddaa', icon: '\uD83D\uDC73' },
    { key: 'frenzy', color: '#ff3366', icon: '\uD83E\uDDDB' }
  ];
  let offsetX = 0;
  for (const b of buffs) {
    const time = player.buffs[b.key];
    if (time <= 0) continue;
    const w = 56, h = 22;
    const bx = x + offsetX;
    // Background
    ctx.fillStyle = '#0d1014';
    ctx.fillRect(bx, y, w, h);
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(bx + 0.5, y + 0.5, w - 1, h - 1);
    // Left accent
    ctx.fillStyle = b.color;
    ctx.fillRect(bx, y, 2, h);
    // Time fill (decreasing)
    const ratio = time / 480;
    ctx.fillStyle = b.color + '33';
    ctx.fillRect(bx + 2, y + 1, (w - 3) * ratio, h - 2);
    // Label
    ctx.font = '700 9px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#e8e4d8';
    ctx.fillText(b.icon + ' ' + t(b.key), bx + w / 2, y + h / 2);
    // Time remaining
    ctx.textAlign = 'right';
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.fillStyle = b.color;
    ctx.fillText(Math.ceil(time / 60) + 's', bx + w - 3, y + 8);
    offsetX += w + 4;
  }
}

// 装弹进度条（屏幕空间，绘制于左下角冲刺栏上方）
function drawReloadBar() {
  if (state !== GameState.PLAYING) return;
  if (!player.reloading) return;
  const x = 18;
  const w = 56;
  const y = canvas.height - 185; // 位于冲刺栏上方
  const h = 6;
  const total = player.reloadDuration > 0 ? player.reloadDuration : 1;
  const ratio = Math.max(0, Math.min(1, 1 - (player.reloadTimer / total)));
  ctx.save();
  // 背景
  ctx.fillStyle = '#0d1014';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#2a3036';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  // 进度填充
  ctx.fillStyle = '#e8b04a';
  ctx.fillRect(x + 1, y + 1, (w - 2) * ratio, h - 2);
  // 标签
  ctx.font = '700 8px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8b04a';
  ctx.fillText('[R] ' + t('reloading'), x + w / 2, y - 7);
  ctx.restore();
}

// =====================================================================
// HUD UPDATE
// =====================================================================
function updateHUD() {
  const hpBar = document.getElementById('hpBar');
  const hpText = document.getElementById('hpText');
  const hpRatio = player.hp / player.maxHp;
  hpBar.style.width = (hpRatio * 100) + '%';
  hpText.textContent = Math.ceil(player.hp) + ' / ' + player.maxHp;

  // Low HP warning
  const lowHpEl = document.getElementById('lowHpWarning');
  if (hpRatio < 0.3 && state === GameState.PLAYING) {
    if (!lowHpEl.classList.contains('active')) {
      lowHpEl.classList.add('active');
      startHeartbeat();
    }
  } else {
    if (lowHpEl.classList.contains('active')) {
      lowHpEl.classList.remove('active');
      stopHeartbeat();
    }
  }

  // 职业徽章
  if (player.class) {
    const cls = CLASSES[player.class];
    document.getElementById('classBadgeText').textContent = cls.icon + ' ' + (lang === 'zh' ? cls.nameZh : cls.name.toUpperCase());
    const shieldEl = document.getElementById('shieldVal');
    if (player.classShield > 0) {
      shieldEl.textContent = '+' + Math.floor(player.classShield);
    } else {
      shieldEl.textContent = '';
    }
  }

  const w = WEAPONS[player.weapon];
  const wName = lang === 'zh' ? w.nameZh : w.name;
  const classTag = w.weaponClass === 'heavy' ? (lang === 'zh' ? ' [重]' : ' [HVY]') : '';
  document.getElementById('weaponName').textContent = wName + classTag;

  const ammoVal = ammo[player.weapon];
  const spareVal = spareAmmo[player.weapon];
  const ammoStr = ammoVal === Infinity ? t('ammo') + t('ammoInfinite') : t('ammo') + ammoVal + ' / ' + spareVal;
  document.getElementById('ammoText').textContent = ammoStr;
  // 装弹状态指示
  const reloadEl = document.getElementById('reloadIndicator');
  if (reloadEl) {
    reloadEl.textContent = player.reloading ? '! ' + t('reloading') + ' !' : '';
  }
  document.getElementById('minesText').textContent = t('mines') + player.mines + '/' + player.mineMax;

  document.getElementById('waveText').textContent = t('wave') + wave;

  // 武器槽位（右下角9个卡片）
  const slotsEl = document.getElementById('weaponSlots');
  let slotsHtml = '';
  // 只显示已拥有的武器，键位1-9对应已拥有武器的顺序
  const ownedWeaponKeys = WEAPON_KEYS.filter(wId => player.ownedWeapons.includes(wId));
  for (let i = 0; i < ownedWeaponKeys.length; i++) {
    const wId = ownedWeaponKeys[i];
    const isCurrent = wId === player.weapon;
    const wDef = WEAPONS[wId];
    const wLabel = lang === 'zh' ? wDef.nameZh : wDef.name;
    // 配件指示
    const att = getAttachment(wId);
    const attIcon = att ? att.icon : '';
    const attColor = att ? att.color : '';
    let cls = 'slot';
    if (isCurrent) cls += ' active';
    else cls += ' owned';
    const color = isCurrent ? wDef.color : '#9aa0a6';
    // 弹药显示（副武器显示剩余弹药）
    let ammoLabel = '';
    if (ammo[wId] !== Infinity) {
      ammoLabel = `<span class="slot-ammo" style="color:${ammo[wId] > 0 ? '#88a8c8' : '#ff4444'};font-size:9px">${ammo[wId]}</span>`;
    }
    const keyDisplay = i < 9 ? (i + 1) : '';
    slotsHtml += `<div class="${cls}"><span class="key-num">${keyDisplay}</span><span class="slot-name" style="color:${color}">${wLabel}</span>${att ? `<span class="slot-att" style="color:${attColor}">${attIcon}</span>` : ''}${ammoLabel}</div>`;
  }
  slotsEl.innerHTML = slotsHtml;

  // 生存状态条（简化版：仅在异常时显示警告，避免干扰）
  const survEl = document.getElementById('survivalPanel');
  const warnings = [];
  if (survival.hunger < 25) warnings.push({ label: t('hunger'), color: '#d4a04a', pct: survival.hunger });
  if (survival.thirst < 25) warnings.push({ label: t('thirst'), color: '#4a8ad4', pct: survival.thirst });
  if (survival.temp < 33 || survival.temp > 40) warnings.push({ label: t('temp'), color: '#d44a4a', pct: 30 });
  if (warnings.length > 0) {
    survEl.innerHTML = warnings.map(w => `<div class="surv-row"><span class="lbl">${w.label}</span><div class="surv-bar"><div class="fill" style="width:${w.pct}%;background:${w.color};"></div></div></div>`).join('');
  } else {
    survEl.innerHTML = '';  // 正常时不显示，避免干扰
  }

  // 操作提示（底部中央）
  const hintEl = document.getElementById('controlsHint');
  const moveKey = lang === 'zh' ? '移动' : 'MOVE';
  const shootKey = lang === 'zh' ? '射击' : 'FIRE';
  const dashKey = lang === 'zh' ? '冲刺' : 'DASH';
  const mineKey = lang === 'zh' ? '地雷' : 'MINE';
  hintEl.innerHTML = `<span><span class="key">WASD</span>${moveKey}</span><span><span class="key">MOUSE</span>${shootKey}</span><span><span class="key">R</span>${lang === 'zh' ? '装弹' : 'RELOAD'}</span><span><span class="key">SHIFT</span>${dashKey}</span><span><span class="key">SPACE</span>${lang === 'zh' ? '地雷' : 'MINE'}</span><span><span class="key">1-9/Q/E/滚轮</span>${lang === 'zh' ? '武器' : 'WPN'}</span>`;

  // Countdown text
  const cdEl = document.getElementById('countdownText');
  if (!waveActive && state === GameState.PLAYING) {
    const secs = Math.ceil(waveCountdown);
    cdEl.textContent = t('nextWave') + secs + 's';
    // Flash red when countdown ≤ 3s
    if (secs <= 3) {
      cdEl.style.color = '#ff4444';
      cdEl.style.animation = 'flash-red 0.5s infinite';
    } else {
      cdEl.style.color = '';
      cdEl.style.animation = '';
    }
  } else if (waveActive) {
    const remaining = zombies.length + spawnQueue.length + spawnTelegraphs.length;
    cdEl.textContent = remaining + t('zombiesLeft');
    cdEl.style.color = '';
    cdEl.style.animation = '';
  } else {
    cdEl.textContent = '';
    cdEl.style.color = '';
    cdEl.style.animation = '';
  }
}

// =====================================================================
// TUTORIAL OVERLAY - 首次游戏教程
// =====================================================================
let tutorialTimer = 0;
let tutorialActive = false;

function showTutorial() {
  if (localStorage.getItem('zc_tutorial_done')) return;
  const body = document.getElementById('tutorialBody');
  const foot = document.getElementById('tutorialFoot');
  const title = document.getElementById('tutorialTitle');
  if (lang === 'zh') {
    title.textContent = '操作指南';
    body.innerHTML =
      '<span class="k">WASD</span> 移动 &nbsp; <span class="k">鼠标</span> 瞄准 &nbsp; <span class="k">左键</span> 射击<br>' +
      '<span class="k">R</span> 装弹 &nbsp; <span class="k">Shift</span> 冲刺 &nbsp; <span class="k">空格</span> 地雷<br>' +
      '<span class="k">1-9/Q/E/滚轮</span> 切换武器<br>' +
      '注意：饥饿/口渴/体温/体力持续下降，击杀僵尸掉落补给';
    foot.textContent = '5 秒后消失，或按任意键继续';
  } else {
    title.textContent = 'CONTROLS';
    body.innerHTML =
      '<span class="k">WASD</span> Move &nbsp; <span class="k">Mouse</span> Aim &nbsp; <span class="k">LMB</span> Fire<br>' +
      '<span class="k">R</span> Reload &nbsp; <span class="k">Shift</span> Dash &nbsp; <span class="k">Space</span> Mine<br>' +
      '<span class="k">1-9/Q/E/Wheel</span> Switch Weapon<br>' +
      'Note: Hunger/Thirst/Temp/Stamina drain over time. Kill zombies for supplies.';
    foot.textContent = 'Disappears in 5s, or press any key to continue';
  }
  document.getElementById('tutorialOverlay').classList.remove('hidden');
  tutorialTimer = 300; // 5 秒（60fps）
  tutorialActive = true;
}

function hideTutorial() {
  if (!tutorialActive) return;
  document.getElementById('tutorialOverlay').classList.add('hidden');
  tutorialActive = false;
  tutorialTimer = 0;
  localStorage.setItem('zc_tutorial_done', '1');
}

// 任意按键关闭教程（捕获阶段，避免按键同时触发游戏动作）
document.addEventListener('keydown', function(e) {
  if (tutorialActive) {
    hideTutorial();
    e.preventDefault();
    e.stopPropagation();
  }
}, true);

// =====================================================================
// GAME FLOW
// =====================================================================
function startGame() {
  // Reset player
  player.x = WORLD_W / 2;
  player.y = WORLD_H / 2;
  player.vx = 0; player.vy = 0;
  player.hp = 100; player.maxHp = 100;
  player.damageMult = 1.0;
  player.speedMult = 1.0;
  player.mineMax = 3;
  player.mines = 3;
  player.mineRegenTimer = 0;
  player.abilityCD = 0;
  player.weapon = 'pistol';
  player.ownedWeapons = ['pistol'];
  player.invuln = 0;
  player.hurtFlash = 0;
  player.lastShot = 0;
  player.dashCooldown = 0;
  player.dashTime = 0;
  player.reloading = false;
  player.reloadTimer = 0;
  player.recoilOffset = 0;
  player.dashTrail = [];
  player.classShield = 0;
  player.medicRegenTimer = 0;
  player.shieldUpTimer = 0;
  player.critChance = 0.15;
  player.critMult = 2;
  player.lastLifesteal = 0;
  player.movingTime = 0;
  player.stillTime = 0;
  player.lastX = player.x;
  player.lastY = player.y;
  // 重置升级系统
  player.upgrades = { hpBonus: 0, damageBonus: 0, speedBonus: 0, critBonus: 0, reloadBonus: 0,
                      lifesteal: 0, pierceBonus: 0, shieldRegen: 0, thorns: 0, ammoBonus: 0 };
  player.upgradeLevel = 0;
  for (const k in upgradeStacks) delete upgradeStacks[k];

  // 重置配件系统
  player.attachments = {};
  player.secondWeaponUnlocked = false;
  refreshWeaponStats();

  // 重置任务系统
  currentMission = null;

  ammo.pistol = Infinity;
  ammo.hmg = 0;
  ammo.shotgun = 0;
  ammo.flamethrower = 0;
  ammo.rocket = 0;
  ammo.laser = 0;
  ammo.homing = 0;
  ammo.grenade = 0;
  ammo.micro_rocket = 0;
  ammo.tesla = 0;
  ammo.acid = 0;
  ammo.railgun = 0;
  ammo.sniper = 0;
  ammo.plasma = 0;
  ammo.cryo = 0;
  ammo.flak = 0;
  // 重置备弹
  spareAmmo.pistol = Infinity;
  for (const wk of WEAPON_KEYS) { if (wk !== 'pistol') spareAmmo[wk] = 0; }

  zombies = [];
  bullets = [];
  mines = [];
  particles = [];
  pickups = [];
  poisonPools = [];
  shockwaves = [];
  poisonProjectiles = [];
  firePools = [];
  lightningEffects = [];
  turrets = [];
  spawnQueue = [];
  spawnTelegraphs = [];
  waveActiveTimer = 0;
  grenades = [];
  barricades = [];
  pulseWaves = [];
  airstrikes = [];
  damageNumbers = [];
  barrels = [];
  terrainFeatures = [];
  dayNightTime = 0;
  waveType = 'normal';
  floatingHints = [];
  survivalHints.hunger = false;
  survivalHints.thirst = false;
  survivalHints.stamina = false;

  // 重置天气系统
  weather.type = 'clear';
  weather.timer = 2400;
  weather.transition = 1;
  weather.rainDrops = [];
  weather.lightningFlash = 0;
  weather.lightningCooldown = 0;

  // 重置生存系统
  survival.hunger = 100;
  survival.thirst = 100;
  survival.temp = 37;
  survival.stamina = 100;
  survival.warning = '';

  score = 0;
  zombiesKilled = 0;
  wave = 0;
  waveActive = false;
  waveCountdown = 0;
  combo = 0;
  comboTimer = 0;
  maxCombo = 0;
  waveBannerTime = 0;
  shakeAmount = 0;
  shakeX = 0; shakeY = 0;

  // Clear blood stains
  bloodCtx.clearRect(0, 0, WORLD_W, WORLD_H);
  bloodStainCount = 0;

  spawnCrates();

  // 应用职业属性（在 startGame 末尾，确保覆盖默认值）
  if (player.class) applyClass(player.class);

  state = GameState.PLAYING;
  document.getElementById('menuOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');

  // 首次游戏教程
  showTutorial();

  startWave(1);
  updateHUD();
}

function gameOver() {
  state = GameState.GAMEOVER;
  stopHeartbeat();
  document.getElementById('lowHpWarning').classList.remove('active');
  // Save best score
  const best = parseInt(localStorage.getItem('zombie_crisis_best') || '0');
  if (score > best) {
    localStorage.setItem('zombie_crisis_best', score);
  }
  const newBest = parseInt(localStorage.getItem('zombie_crisis_best') || '0');
  document.getElementById('goTitle').textContent = t('gameOver');
  document.getElementById('goStats').innerHTML =
    '<div class="row">' + t('survivedWaves') + '<span class="num">' + wave + '</span></div>' +
    '<div class="row">' + t('zombiesKilled') + '<span class="num">' + zombiesKilled + '</span></div>' +
    '<div class="row">' + t('maxCombo') + '<span class="num">' + maxCombo + '</span></div>' +
    '<div class="row">' + t('bestScore') + '<span class="num">' + newBest + '</span></div>' +
    '<div class="row">' + t('finalScore') + '<span class="num">' + score + '</span></div>';
  document.getElementById('gameOverOverlay').classList.remove('hidden');
  document.getElementById('hud').classList.add('hidden');
}

// =====================================================================
// UI SETUP
// =====================================================================
function updateUILanguage() {
  document.getElementById('menuTitle').textContent = t('title');
  document.getElementById('menuSubtitle').textContent = t('subtitle');
  document.getElementById('audioTitle').textContent = t('title');
  document.getElementById('audioSubtitle').textContent = t('subtitle');
  document.getElementById('audioDesc').innerHTML = t('audioDesc');
  document.getElementById('menuDesc').innerHTML = t('menuDesc').replace(/\n/g, '<br>');
  document.getElementById('startBtn').textContent = t('start');
  document.getElementById('restartBtn').textContent = t('restart');
  document.getElementById('langBtn').textContent = lang === 'en' ? 'EN' : '中';
  // Show best score on menu
  const best = parseInt(localStorage.getItem('zombie_crisis_best') || '0');
  if (best > 0) {
    const bestLine = lang === 'en' ? 'BEST: ' + best : '最佳战绩: ' + best;
    const menuDescEl = document.getElementById('menuDesc');
    if (!menuDescEl.innerHTML.includes(bestLine)) {
      menuDescEl.innerHTML += '<br><span style="color:#e8b04a;font-weight:700">' + bestLine + '</span>';
    }
  }
  if (state === GameState.PLAYING || state === GameState.CLASS_SELECT) updateHUD();
}

document.getElementById('langBtn').addEventListener('click', () => {
  lang = lang === 'en' ? 'zh' : 'en';
  updateUILanguage();
});

document.getElementById('audioStart').addEventListener('click', () => {
  try { initAudio(); } catch(e) { console.warn('Audio init failed:', e); }
  document.getElementById('audioOverlay').classList.add('hidden');
  document.getElementById('menuOverlay').classList.remove('hidden');
});

document.getElementById('startBtn').addEventListener('click', () => {
  // 进入职业选择界面
  document.getElementById('menuOverlay').classList.add('hidden');
  showClassSelect();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  // 重新开始时回到职业选择
  player.class = null;
  document.getElementById('gameOverOverlay').classList.add('hidden');
  showClassSelect();
});

// =====================================================================
// GAME LOOP
// =====================================================================
let lastTime = performance.now();
const targetFrameTime = 1000 / 60;

function gameLoop(timestamp) {
  const rawDt = timestamp - lastTime;
  lastTime = timestamp;
  const dt = Math.min(2.5, rawDt / targetFrameTime);

  if (state === GameState.PLAYING) {
    try {
      update(dt);
    } catch(e) {
      console.error('Update error:', e);
      // 防止单帧错误导致游戏完全卡死
    }
  }

  // 教程倒计时
  if (tutorialActive) {
    tutorialTimer -= dt;
    if (tutorialTimer <= 0) hideTutorial();
  }

  try {
    render();
  } catch(e) {
    console.error('Render error:', e);
  }
  requestAnimationFrame(gameLoop);
}

// Initialize
updateUILanguage();
requestAnimationFrame(gameLoop);
