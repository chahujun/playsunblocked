    const kd = Math.sqrt(kx * kx + ky * ky) || 1;
    player.vx += (kx / kd) * 5;
    player.vy += (ky / kd) * 5;
  }
  // BOSS攻击炮台
  if (boss.charging <= 0 && boss.teleporting <= 0) {
    for (const t of turrets) {
      const td = Math.hypot(t.x - boss.x, t.y - boss.y);
      if (td < boss.radius + 18) {
        t.hp -= boss.damage * 0.3;
        t.hurtFlash = 8;
        spawnBloodParticles(t.x, t.y, 5, t.def.color);
      }
    }
  }

  // BOSS死亡
  if (boss.hp <= 0) {
    score += boss.score;
    zombiesKilled++;
    spawnBloodParticles(boss.x, boss.y, 40, '#aa1122');
    addBloodStain(boss.x, boss.y, boss.radius);
    addDamageNumber(boss.x, boss.y - boss.radius - 10, '+' + boss.score, '#00ff88');
    addShake(10);
    playZombieDeath();
    // BOSS掉落：100%掉副武器 + 50%掉新武器 + 100%掉配件 + 生命+弹药+食物
    const sideW = CLASSES[player.class].startWeapon || 'shotgun';
    pickups.push({ x: boss.x, y: boss.y, type: 'weapon_' + sideW, radius: 14, life: 1200, bob: 0 });
    // BOSS额外掉落新武器（随机一把）
    const newWeapons = ['tesla', 'acid', 'railgun'];
    const newW = newWeapons[Math.floor(Math.random() * newWeapons.length)];
    pickups.push({ x: boss.x + 30, y: boss.y, type: 'weapon_' + newW, radius: 14, life: 1200, bob: 0 });
    // BOSS 100%掉落配件（随机给已拥有的武器）
    const attachableW = getAttachableWeapons();
    if (attachableW.length > 0) {
      const targetW = attachableW[Math.floor(Math.random() * attachableW.length)];
      const attKeys = Object.keys(ATTACHMENTS).filter(aId => {
        const att = ATTACHMENTS[aId];
        return !att.weaponOnly || att.weaponOnly.includes(targetW);
      });
      if (attKeys.length > 0) {
        const attId = attKeys[Math.floor(Math.random() * attKeys.length)];
        pickups.push({ x: boss.x + 40, y: boss.y, type: 'attachment_' + targetW + '_' + attId, radius: 14, life: 1200, bob: 0 });
      }
    }
    pickups.push({ x: boss.x + 30, y: boss.y, type: 'health', radius: 12, life: 600, bob: 0 });
    pickups.push({ x: boss.x - 30, y: boss.y, type: 'buff_rage', radius: 12, life: 600, bob: 0 });
    pickups.push({ x: boss.x, y: boss.y + 30, type: 'food', radius: 12, life: 600, bob: 0 });
    pickups.push({ x: boss.x, y: boss.y - 30, type: 'ammo', radius: 12, life: 600, bob: 0 });
    pickups.push({ x: boss.x, y: boss.y - 30, type: 'water', radius: 12, life: 600, bob: 0 });
    // BOSS掉落炮台（随机一种，放在玩家附近）
    const turretTypes = ['mg', 'rocket', 'ap'];
    const tType = turretTypes[Math.floor(Math.random() * turretTypes.length)];
    const tAng = Math.random() * Math.PI * 2;
    const tR = 50 + Math.random() * 30;
    const tx = Math.max(40, Math.min(WORLD_W - 40, player.x + Math.cos(tAng) * tR));
    const ty = Math.max(40, Math.min(WORLD_H - 40, player.y + Math.sin(tAng) * tR));
    placeTurret(tType, tx, ty);
    waveBannerTime = 120;
    const tName = lang === 'zh' ? TURRETTYPES[tType].nameZh : TURRETTYPES[tType].nameEn;
    waveBannerText = (lang === 'zh' ? '炮台部署：' : 'TURRET DEPLOYED: ') + tName;
    boss = null;
    updateHUD();
  }
}

// BOSS技能
function bossSkill(b) {
  const skills = b.def.skills;
  const skill = skills[Math.floor(Math.random() * skills.length)];
  const dx = player.x - b.x, dy = player.y - b.y;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;

  switch (skill) {
    case 'charge': // 冲刺
      b.charging = 45;
      b.chargeDir = { x: dx / dist, y: dy / dist };
      spawnBloodParticles(b.x, b.y, 10, '#ff4422');
      break;
    case 'summon': // 召唤
      for (let i = 0; i < 3; i++) {
        const ang = Math.random() * Math.PI * 2;
        const sx = b.x + Math.cos(ang) * 60, sy = b.y + Math.sin(ang) * 60;
        zombies.push({
          x: sx, y: sy, vx: 0, vy: 0,
          type: 'normal', hp: 50, maxHp: 50, speed: 1.3, damage: 8, radius: 15,
          color: '#6b8e3e', score: 10, attackCooldown: 0, hurtFlash: 0,
          walkPhase: Math.random() * Math.PI * 2, burnTime: 0, burnDps: 0
        });
      }
      break;
    case 'poison_burst': // 毒爆
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * Math.PI * 2;
        poisonProjectiles.push({
          x: b.x, y: b.y,
          vx: Math.cos(ang) * 4, vy: Math.sin(ang) * 4,
          life: 60, radius: 6
        });
      }
      break;
    case 'poison_rain': // 毒雨
      for (let i = 0; i < 6; i++) {
        const px = player.x + (Math.random() - 0.5) * 300;
        const py = player.y + (Math.random() - 0.5) * 300;
        poisonPools.push({ x: px, y: py, radius: 35, life: 180, maxLife: 180, damage: 3, tickTimer: 0 });
      }
      break;
    case 'teleport': // 传送
      b.teleporting = 30;
      spawnBloodParticles(b.x, b.y, 15, '#8e4a6b');
      break;
    case 'shield': // 护盾
      b.shielded = 180;
      break;
    case 'stomp': // 踩踏（范围伤害+震动）
      addShake(6);
      if (dist < 150) {
        damagePlayer(b.damage * 0.5, b);
      }
      spawnBloodParticles(b.x, b.y, 20, '#1e3a5a');
      break;
    case 'summon_swarm': // 虫群召唤：大量小型僵尸
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * Math.PI * 2;
        const sx = b.x + Math.cos(ang) * 50, sy = b.y + Math.sin(ang) * 50;
        zombies.push({
          x: sx, y: sy, vx: 0, vy: 0,
          type: 'runner', hp: 20, maxHp: 20, speed: 3.5, damage: 5, radius: 8,
          color: '#5a8a3a', score: 5, attackCooldown: 0, hurtFlash: 0,
          walkPhase: Math.random() * Math.PI * 2, burnTime: 0, burnDps: 0
        });
      }
      spawnBloodParticles(b.x, b.y, 15, '#2a5a2a');
      break;
    case 'speed_boost': // 加速buff
      b.boosted = 240; // 4秒加速
      b.speed *= 1.8;
      spawnBloodParticles(b.x, b.y, 12, '#ffaa44');
      break;
    case 'fire_nova': // 火焰新星：环形火焰扩散
      for (let i = 0; i < 12; i++) {
        const ang = (i / 12) * Math.PI * 2;
        const fx = b.x + Math.cos(ang) * 80, fy = b.y + Math.sin(ang) * 80;
        firePools.push({ x: fx, y: fy, radius: 40, life: 180, maxLife: 180, dps: 0.5, tickTimer: 0 });
      }
      addShake(4);
      spawnBloodParticles(b.x, b.y, 20, '#ff4400');
      if (dist < 200) damagePlayer(b.damage * 0.4, b);
      break;
    case 'shadow_dash': // 暗影突袭：快速冲刺并留下毒迹
      b.charging = 30;
      b.chargeDir = { x: dx / dist, y: dy / dist };
      // 留下毒迹路径
      for (let i = 0; i < 5; i++) {
        poisonPools.push({
          x: b.x - (dx / dist) * i * 30, y: b.y - (dy / dist) * i * 30,
          radius: 25, life: 120, damage: 2, tickTimer: 0
        });
      }
      spawnBloodParticles(b.x, b.y, 15, '#6a0a6a');
      break;
    case 'ice_nova': // 冰霜新星：环形冰冻扩散
      for (let i = 0; i < 16; i++) {
        const ang = (i / 16) * Math.PI * 2;
        const fx = b.x + Math.cos(ang) * 100, fy = b.y + Math.sin(ang) * 100;
        firePools.push({ x: fx, y: fy, radius: 35, life: 120, maxLife: 120, dps: 0.3, tickTimer: 0 });
      }
      addShake(5);
      spawnBloodParticles(b.x, b.y, 25, '#44aaff');
      if (dist < 200) {
        damagePlayer(b.damage * 0.4, b);
        player.buffs.haste = 0; // 临时减速效果（取消加速）
      }
      break;
    case 'freeze_breath': // 冰霜吐息：前方扇形冰冻
      for (let i = 0; i < 8; i++) {
        const spread = (Math.random() - 0.5) * 0.6;
        const ba = Math.atan2(dy, dx) + spread;
        const dist2 = 50 + Math.random() * 120;
        const fx = b.x + Math.cos(ba) * dist2, fy = b.y + Math.sin(ba) * dist2;
        firePools.push({ x: fx, y: fy, radius: 30, life: 90, maxLife: 90, dps: 0.4, tickTimer: 0 });
      }
      spawnBloodParticles(b.x, b.y, 15, '#44ddff');
      if (dist < 180) damagePlayer(b.damage * 0.3, b);
      break;
    case 'raise_dead': // 亡者复活：大量召唤
      for (let i = 0; i < 6; i++) {
        const ang = Math.random() * Math.PI * 2;
        const sx = b.x + Math.cos(ang) * 70, sy = b.y + Math.sin(ang) * 70;
        const types = ['normal', 'runner', 'crawler'];
        const st = types[Math.floor(Math.random() * types.length)];
        const sdef = ZOMBIE_TYPES[st];
        zombies.push({
          x: sx, y: sy, vx: 0, vy: 0,
          type: st, hp: sdef.hp, maxHp: sdef.hp, speed: sdef.speed, damage: sdef.damage, radius: sdef.radius,
          color: sdef.color, score: sdef.score, attackCooldown: 0, hurtFlash: 0,
          walkPhase: Math.random() * Math.PI * 2, burnTime: 0, burnDps: 0,
          isCrawler: sdef.isCrawler || false,
          damageReduction: sdef.damageReduction || 0
        });
      }
      spawnBloodParticles(b.x, b.y, 20, '#6a0a8a');
      break;
  }
}

// BOSS渲染
function drawBoss() {
  if (!boss) return;
  const sx = boss.x, sy = boss.y;
  ctx.save();

  // 护盾光环
  if (boss.shielded > 0) {
    ctx.strokeStyle = `rgba(100,180,255,${0.3 + Math.sin(performance.now() * 0.01) * 0.2})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(sx, sy, boss.radius + 8, 0, Math.PI * 2);
    ctx.stroke();
  }

  // 传送中半透明
  ctx.globalAlpha = boss.teleporting > 0 ? 0.3 : 1;

  // 主体
  ctx.fillStyle = boss.hurtFlash > 0 ? '#ffffff' : boss.color;
  ctx.beginPath();
  ctx.arc(sx, sy, boss.radius, 0, Math.PI * 2);
  ctx.fill();

  // 边缘
  ctx.strokeStyle = boss.phase === 2 ? '#ff4422' : '#5a2a1e';
  ctx.lineWidth = 3;
  ctx.stroke();

  // 眼睛（红色发光）
  ctx.fillStyle = '#ff2200';
  ctx.beginPath();
  ctx.arc(sx - boss.radius * 0.3, sy - boss.radius * 0.2, 4, 0, Math.PI * 2);
  ctx.arc(sx + boss.radius * 0.3, sy - boss.radius * 0.2, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();

  // BOSS血条（屏幕顶部）
  const barW = 400, barH = 16;
  const barX = (VIEW_W - barW) / 2;
  const barY = 20;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
  ctx.fillStyle = '#2a0a0a';
  ctx.fillRect(barX, barY, barW, barH);
  const hpPct = Math.max(0, boss.hp / boss.maxHp);
  ctx.fillStyle = '#8e1e1e';
  ctx.fillRect(barX, barY, barW * hpPct, barH);
  // 阶段2标记线
  ctx.strokeStyle = '#ffdd44';
  ctx.lineWidth = 2;
  const phase2X = barX + barW * boss.phase2Threshold;
  ctx.beginPath();
  ctx.moveTo(phase2X, barY);
  ctx.lineTo(phase2X, barY + barH);
  ctx.stroke();
  // 名字
  ctx.fillStyle = '#e8e4d8';
  ctx.font = 'bold 14px Oswald, sans-serif';
  ctx.textAlign = 'center';
  const name = lang === 'zh' ? boss.def.nameZh : boss.def.nameEn;
  ctx.fillText(name + ' · ' + Math.ceil(boss.hp) + '/' + Math.ceil(boss.maxHp), barX + barW / 2, barY + barH + 16);
  ctx.textAlign = 'left';
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    // 追踪弹：每2帧寻找最近僵尸并调整方向（更快反应）
    if (b.weaponType === 'homing' && b.homingTurn > 0) {
      b.homingTimer = (b.homingTimer || 0) + dt;
      if (b.homingTimer >= 2) {
        b.homingTimer = 0;
        let nearest = null, nearestDist = b.homingRange;
        for (const z of zombies) {
          const d = Math.hypot(z.x - b.x, z.y - b.y);
          if (d < nearestDist) { nearestDist = d; nearest = z; }
        }
        if (!nearest && boss) {
          const d = Math.hypot(boss.x - b.x, boss.y - b.y);
          if (d < nearestDist) { nearestDist = d; nearest = boss; }
        }
        if (nearest) {
          b.target = nearest; // 记录目标用于绘制锁定指示
          const targetAng = Math.atan2(nearest.y - b.y, nearest.x - b.x);
          const curAng = Math.atan2(b.vy, b.vx);
          let diff = targetAng - curAng;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          // 转向速率随距离动态调整：近距离更灵活
          const turnRate = b.homingTurn * (nearestDist < 100 ? 1.8 : 1.0);
          const newAng = curAng + Math.sign(diff) * Math.min(Math.abs(diff), turnRate);
          const speed = Math.hypot(b.vx, b.vy);
          // 追踪时略微加速，更有追逐感
          const accel = nearestDist < 150 ? 1.02 : 1.0;
          b.vx = Math.cos(newAng) * speed * accel;
          b.vy = Math.sin(newAng) * speed * accel;
        } else {
          b.target = null;
        }
      }
    }
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    // 火焰枪/激光枪：追踪飞行距离，超过射程消失
    if (b.flameRange > 0 || b.laserRange > 0) {
      b.distTraveled += Math.hypot(b.vx, b.vy) * dt;
      const maxRange = b.flameRange > 0 ? b.flameRange : b.laserRange;
      if (b.distTraveled > maxRange) {
        bullets.splice(i, 1);
        continue;
      }
    }

    // World bounds
    if (b.x < 0 || b.x > WORLD_W || b.y < 0 || b.y > WORLD_H || b.life <= 0) {
      bullets.splice(i, 1);
      continue;
    }

    // Crate collision
    let hit = false;
    for (const crate of crates) {
      if (circleRectCollide(b.x, b.y, b.radius, crate.x, crate.y, crate.w, crate.h)) {
        crate.hp -= 1;
        spawnBloodParticles(b.x, b.y, 3, '#8b5a2b');
        hit = true;
        break;
      }
    }
    if (hit) {
      // 爆炸型武器命中木箱也爆炸
      if (b.weaponType === 'rocket' || b.weaponType === 'grenade' || b.weaponType === 'micro_rocket' || b.weaponType === 'plasma' || b.weaponType === 'flak') {
        explodeAt(b.x, b.y, b.explodeRadius, b.explodeDamage, true);
        // 榴弹：爆炸后散播破片
        if (b.weaponType === 'grenade' && b.fragments > 0) {
          for (let f = 0; f < b.fragments; f++) {
            const fAng = (Math.PI * 2 / b.fragments) * f;
            bullets.push({
              x: b.x, y: b.y, vx: Math.cos(fAng) * 8, vy: Math.sin(fAng) * 8,
              damage: b.fragmentDamage, radius: 2, color: '#ffcc44', life: 20,
              from: 'player', weaponType: 'fragment', isCrit: false,
              explodeRadius: 0, explodeDamage: 0, fragments: 0, fragmentDamage: 0,
              pierce: 0, hitTargets: null, distTraveled: 0, lifesteal: 0,
              flameRange: 0, flameFadeStart: 0, laserRange: 0, laserFadeStart: 0,
              burnDuration: 0, burnDps: 0, firePoolRadius: 0, firePoolLife: 0, firePoolDps: 0,
              homingTurn: 0, homingRange: 0, homingTimer: 0
            });
          }
        }
      }
      // 火焰枪命中木箱残留小火焰
      if (b.weaponType === 'flame' && b.firePoolRadius > 0) {
        firePools.push({ x: b.x, y: b.y, radius: b.firePoolRadius * 0.4, life: b.firePoolLife, maxLife: b.firePoolLife, dps: b.firePoolDps, tickTimer: 0 });
      }
      bullets.splice(i, 1); continue;
    }

    // Barrel collision (trigger explosion)
    for (const barrel of barrels) {
      if (circleCollide(b, barrel) && !barrel.triggered) {
        barrel.triggered = true;
        barrel.triggerTimer = 18; // 0.3s delay
        spawnBloodParticles(b.x, b.y, 4, '#ffaa33');
        // 爆炸型武器命中油桶也爆炸
        if (b.weaponType === 'rocket' || b.weaponType === 'grenade' || b.weaponType === 'micro_rocket' || b.weaponType === 'plasma' || b.weaponType === 'flak') {
          explodeAt(b.x, b.y, b.explodeRadius, b.explodeDamage, true);
        }
        bullets.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) continue;

    // Zombie collision
    for (let j = zombies.length - 1; j >= 0; j--) {
      const z = zombies[j];
      if (!circleCollide(b, z)) continue;
      // 穿透型武器（火焰枪/激光枪/电磁枪/轨道炮）：已命中的目标跳过，避免重复伤害
      if ((b.weaponType === 'flame' || b.weaponType === 'laser' || b.weaponType === 'tesla' || b.weaponType === 'railgun') && b.hitTargets && b.hitTargets.includes(z)) continue;

      // 狙击枪：对精英/BOSS额外伤害加成
      let sniperBonus = 1;
      if (b.weaponType === 'sniper') {
        if (z.isElite) sniperBonus = b.eliteMult || 2.0;
      }

      // Apply damage reduction (tank)
      const actualDmg = b.damage * sniperBonus * (1 - (z.damageReduction || 0));
      z.hp -= actualDmg;
      z.hurtFlash = 8;
      // 吸血：概率回复HP（每层5%概率，回1HP，有0.8秒内置CD）
        if (b.lifesteal > 0 && Math.random() < b.lifesteal * 0.05 && (performance.now() - (player.lastLifesteal || 0) > 800)) {
          player.hp = Math.min(player.maxHp, player.hp + 1);
          player.lastLifesteal = performance.now();
        }
      spawnBloodParticles(b.x, b.y, 5, (b.weaponType === 'flame' || b.weaponType === 'laser') ? (b.weaponType === 'flame' ? '#ff6622' : '#66ddff') : (b.weaponType === 'tesla' ? '#aa66ff' : (b.weaponType === 'acid' ? '#66ff44' : (b.weaponType === 'railgun' ? '#ffeeaa' : (b.weaponType === 'sniper' ? '#ffcc44' : '#cc1122')))));
      addBloodStain(z.x, z.y, z.radius * 0.5);
      addDamageNumber(z.x, z.y - z.radius, Math.round(actualDmg), b.isCrit ? '#ff4422' : (b.weaponType === 'flame' ? '#ff8833' : (b.weaponType === 'laser' ? '#44ddff' : (b.weaponType === 'tesla' ? '#aa66ff' : (b.weaponType === 'acid' ? '#66ff44' : (b.weaponType === 'railgun' ? '#ffeeaa' : (b.weaponType === 'sniper' ? '#ffcc44' : '#ffdd44')))))), b.isCrit);
      // 火焰枪：附加燃烧DOT + 命中点残留小火焰
      if (b.weaponType === 'flame' && b.burnDuration > 0) {
        z.burnTime = b.burnDuration;
        z.burnDps = b.burnDps;
        if (b.firePoolRadius > 0) {
          firePools.push({ x: b.x, y: b.y, radius: b.firePoolRadius * 0.4, life: b.firePoolLife, maxLife: b.firePoolLife, dps: b.firePoolDps, tickTimer: 0 });
        }
      }
      // 电磁枪：链式闪电跳跃到附近僵尸
      if (b.weaponType === 'tesla' && b.chainRange > 0 && b.chainCount < 3) {
        for (const z2 of zombies) {
          if (z2 === z || (b.hitTargets && b.hitTargets.includes(z2))) continue;
          const cd = Math.hypot(z2.x - z.x, z2.y - z.y);
          if (cd < b.chainRange) {
            z2.hp -= b.damage * b.chainDamage;
            z2.hurtFlash = 6;
            spawnBloodParticles(z2.x, z2.y, 4, '#aa66ff');
            addDamageNumber(z2.x, z2.y - z2.radius, Math.round(b.damage * b.chainDamage), '#aa66ff');
            // 链式闪电视觉：从命中点到链目标画一条临时线
            spawnLightningEffect(z.x, z.y, z2.x, z2.y);
            b.chainCount++;
            break;
          }
        }
      }
      // 酸液枪：命中创建酸液池
      if (b.weaponType === 'acid' && b.acidRadius > 0) {
        poisonPools.push({ x: z.x, y: z.y, radius: b.acidRadius, life: b.acidLife, damage: b.acidDps, tickTimer: 0 });
        // 酸液减速效果
        z.slowTimer = 120;
        z.slowMult = b.slowMult;
      }
      // 冰冻枪：命中减速
      if (b.weaponType === 'cryo' && b.slowMult > 0) {
        z.slowTimer = b.slowDuration || 120;
        z.slowMult = b.slowMult;
      }
      // 轨道炮：超高穿透，命中不消失
      // 爆炸型武器（火箭筒/榴弹/微型火箭/追踪弹/等离子/高射炮）：命中爆炸
      if (b.weaponType === 'rocket' || b.weaponType === 'grenade' || b.weaponType === 'micro_rocket' || b.weaponType === 'homing' || b.weaponType === 'plasma' || b.weaponType === 'flak') {
        explodeAt(b.x, b.y, b.explodeRadius, b.explodeDamage, true);
        // 榴弹：爆炸后散播破片
        if (b.weaponType === 'grenade' && b.fragments > 0) {
          for (let f = 0; f < b.fragments; f++) {
            const fAng = (Math.PI * 2 / b.fragments) * f;
            bullets.push({
              x: b.x, y: b.y, vx: Math.cos(fAng) * 8, vy: Math.sin(fAng) * 8,
              damage: b.fragmentDamage, radius: 2, color: '#ffcc44', life: 20,
              from: 'player', weaponType: 'fragment', isCrit: false,
              explodeRadius: 0, explodeDamage: 0, fragments: 0, fragmentDamage: 0,
              pierce: 0, hitTargets: null, distTraveled: 0, lifesteal: 0,
              flameRange: 0, flameFadeStart: 0, laserRange: 0, laserFadeStart: 0,
              burnDuration: 0, burnDps: 0, firePoolRadius: 0, firePoolLife: 0, firePoolDps: 0,
              homingTurn: 0, homingRange: 0, homingTimer: 0,
              chainRange: 0, chainDamage: 0, chainCount: 0,
              acidRadius: 0, acidLife: 0, acidDps: 0, slowMult: 0,
              railWidth: 0, railRange: 0, railFadeStart: 0,
              chainLightning: 0, volatileMix: false
            });
          }
        }
      }

      // 穿透型武器（火焰枪/激光枪/电磁枪/轨道炮）：记录命中，消耗穿透次数；狙击枪命中即消失
      let bulletDestroyed = false;
      if (b.weaponType === 'flame' || b.weaponType === 'laser' || b.weaponType === 'tesla' || b.weaponType === 'railgun') {
        if (b.hitTargets) b.hitTargets.push(z);
        b.pierce--;
        if (b.pierce < 0) { bullets.splice(i, 1); bulletDestroyed = true; }
      } else {
        bullets.splice(i, 1); bulletDestroyed = true;
      }

      if (z.hp <= 0) {
        onZombieKilled(z);
        addCombo();
        const mult = getComboMult();
        const gained = Math.round(z.score * mult);
        score += gained;
        zombiesKilled++;
        spawnBloodParticles(z.x, z.y, 12, '#aa1122');
        addBloodStain(z.x, z.y, z.radius);
        addDamageNumber(z.x, z.y - z.radius - 10, '+' + gained, '#00ff88');
        playZombieDeath();

        // 武器特殊击杀效果
        if (b.weaponType === 'flame') {
          // 火焰枪击杀：僵尸爆裂出火焰粒子
          spawnBloodParticles(z.x, z.y, 10, '#ff6622');
          spawnBloodParticles(z.x, z.y, 6, '#ffaa44');
        } else if (b.weaponType === 'laser') {
          // 激光击杀：蓝色电火花
          spawnBloodParticles(z.x, z.y, 8, '#44ddff');
          spawnBloodParticles(z.x, z.y, 4, '#ffffff');
        } else if (b.weaponType === 'shotgun') {
          // 霰弹击杀：大力击退周围僵尸
          for (const z2 of zombies) {
            const d2 = Math.hypot(z2.x - z.x, z2.y - z.y);
            if (d2 < 60 && d2 > 0) {
              z2.vx += (z2.x - z.x) / d2 * 3;
              z2.vy += (z2.y - z.y) / d2 * 3;
            }
          }
          addShake(1);
        } else if (b.weaponType === 'homing') {
          // 追踪弹击杀：粉色冲击波
          for (let p = 0; p < 8; p++) {
            const a = (p / 8) * Math.PI * 2;
            spawnBloodParticles(z.x + Math.cos(a) * 10, z.y + Math.sin(a) * 10, 3, '#ff66dd');
          }
        } else if (b.weaponType === 'hmg') {
          // 重机枪击杀：穿透到下一个僵尸
          if (zombies.length > 0) {
            const idx = zombies.indexOf(z);
            if (idx >= 0 && idx + 1 < zombies.length) {
              const next = zombies[idx + 1];
              if (Math.hypot(next.x - z.x, next.y - z.y) < 80) {
                next.hp -= b.damage * 0.3;
                next.hurtFlash = 6;
                spawnBloodParticles(next.x, next.y, 4, '#ffcc00');
              }
            }
          }
        }
        // BOSS波次精英僵尸100%掉落武器
        if (waveType === 'boss' && z.isElite) {
          const sideW = player.sideWeapon || CLASSES[player.class].startWeapon || 'shotgun';
          pickups.push({ x: z.x, y: z.y, type: 'weapon_' + sideW, radius: 14, life: 900, bob: 0 });
        }
        // 精英僵尸30%几率掉落配件（非BOSS波）
        if (z.isElite && Math.random() < 0.3) {
          const attachableW = getAttachableWeapons();
          if (attachableW.length > 0) {
            const targetW = attachableW[Math.floor(Math.random() * attachableW.length)];
            const attKeys = Object.keys(ATTACHMENTS).filter(aId => {
              const att = ATTACHMENTS[aId];
              return !att.weaponOnly || att.weaponOnly.includes(targetW);
            });
            if (attKeys.length > 0) {
              const attId = attKeys[Math.floor(Math.random() * attKeys.length)];
              pickups.push({ x: z.x + 20, y: z.y, type: 'attachment_' + targetW + '_' + attId, radius: 12, life: 900, bob: 0 });
            }
          }
        }
        if (!(waveType === 'boss' && z.isElite)) {
          const roll = Math.random();
          if (roll < 0.06) {
            pickups.push({ x: z.x, y: z.y, type: 'health', radius: 12, life: 600, bob: 0 });
          } else if (roll < 0.14) {
            const buffs = ['rage', 'shield', 'haste'];
            const buffType = buffs[Math.floor(Math.random() * 3)];
            pickups.push({ x: z.x, y: z.y, type: 'buff_' + buffType, radius: 12, life: 600, bob: 0 });
          } else if (roll < 0.19) {
            pickups.push({ x: z.x, y: z.y, type: 'food', radius: 12, life: 600, bob: 0 });
          } else if (roll < 0.24) {
            pickups.push({ x: z.x, y: z.y, type: 'water', radius: 12, life: 600, bob: 0 });
          }
        }
        zombies.splice(j, 1);
        updateHUD();
      }
      // 非穿透武器或穿透次数用完：结束本子弹的碰撞检测
      if (bulletDestroyed) { hit = true; break; }
      // 火焰枪仍有穿透次数：继续检测下一个僵尸（穿透）
    }
    if (hit) continue;

    // BOSS碰撞
    if (boss && boss.teleporting <= 0) {
      const bd = Math.hypot(b.x - boss.x, b.y - boss.y);
      if (bd < boss.radius + b.radius) {
        // 护盾期间减伤
        const shieldMult = boss.shielded > 0 ? 0.3 : 1.0;
        // 狙击枪：对BOSS额外伤害加成
        const bossSniperBonus = b.weaponType === 'sniper' ? (b.bossMult || 2.0) : 1;
        const actualDmg = b.damage * bossSniperBonus * shieldMult * (1 - boss.damageReduction);
        boss.hp -= actualDmg;
        boss.hurtFlash = 6;
        // 吸血：对BOSS也走概率+CD
        if (b.lifesteal > 0 && Math.random() < b.lifesteal * 0.05 && (performance.now() - (player.lastLifesteal || 0) > 800)) {
          player.hp = Math.min(player.maxHp, player.hp + 1);
          player.lastLifesteal = performance.now();
        }
        spawnBloodParticles(b.x, b.y, 6, '#ff4422');
        addDamageNumber(boss.x, boss.y - boss.radius, Math.round(actualDmg), b.isCrit ? '#ff4422' : (b.weaponType === 'laser' ? '#44ddff' : '#ff8833'), b.isCrit);
        // 火焰枪：附加燃烧DOT
        if (b.weaponType === 'flame' && b.burnDuration > 0) {
          boss.burnTime = b.burnDuration;
          boss.burnDps = b.burnDps;
        }
        // 爆炸型武器（火箭筒/榴弹/微型火箭/追踪弹/等离子/高射炮）：命中爆炸
        if (b.weaponType === 'rocket' || b.weaponType === 'grenade' || b.weaponType === 'micro_rocket' || b.weaponType === 'homing' || b.weaponType === 'plasma' || b.weaponType === 'flak') {
          explodeAt(b.x, b.y, b.explodeRadius, b.explodeDamage, true);
          // 榴弹：爆炸后散播破片
          if (b.weaponType === 'grenade' && b.fragments > 0) {
            for (let f = 0; f < b.fragments; f++) {
              const fAng = (Math.PI * 2 / b.fragments) * f;
              bullets.push({
                x: b.x, y: b.y, vx: Math.cos(fAng) * 8, vy: Math.sin(fAng) * 8,
                damage: b.fragmentDamage, radius: 2, color: '#ffcc44', life: 20,
                from: 'player', weaponType: 'fragment', isCrit: false,
                explodeRadius: 0, explodeDamage: 0, fragments: 0, fragmentDamage: 0,
                pierce: 0, hitTargets: null, distTraveled: 0, lifesteal: 0,
                flameRange: 0, flameFadeStart: 0, laserRange: 0, laserFadeStart: 0,
                burnDuration: 0, burnDps: 0, firePoolRadius: 0, firePoolLife: 0, firePoolDps: 0,
                homingTurn: 0, homingRange: 0, homingTimer: 0
              });
            }
          }
        }
        // 非穿透武器命中BOSS消失，穿透武器继续（火焰枪/激光枪）
        if (b.weaponType !== 'flame' && b.weaponType !== 'laser') {
          bullets.splice(i, 1);
          hit = true;
        } else {
          if (b.hitTargets) b.hitTargets.push(boss);
          b.pierce--;
          if (b.pierce < 0) {
            bullets.splice(i, 1);
            hit = true;
          }
        }
        continue;
      }
    }
  }
}

function updateMines(dt) {
  for (let i = mines.length - 1; i >= 0; i--) {
    const m = mines[i];
    if (!m.triggered) {
      // Check if zombie touches
      for (const z of zombies) {
        if (Math.sqrt(distSq(m, z)) < m.triggerRadius + z.radius) {
          m.triggered = true;
          m.triggerTimer = 18; // 0.3s at 60fps
          break;
        }
      }
    } else {
      m.triggerTimer -= dt;
      if (m.triggerTimer <= 0) {
        // Explode
        explodeMine(m);
        mines.splice(i, 1);
      }
    }
  }
}

// =====================================================================
// GRENADES - 手雷系统（突击兵专属）
// =====================================================================
function updateGrenades(dt) {
  for (let i = grenades.length - 1; i >= 0; i--) {
    const g = grenades[i];
    g.x += g.vx * dt;
    g.y += g.vy * dt;
    g.vx *= 0.96;
    g.vy *= 0.96;
    g.life -= dt;
    if (g.life <= 0) {
      explodeAt(g.x, g.y, g.explodeRadius, g.damage, true);
      grenades.splice(i, 1);
    }
  }
}

// =====================================================================
// BARRICADES - 路障系统（重装机兵专属）
// =====================================================================
function updateBarricades(dt) {
  for (let i = barricades.length - 1; i >= 0; i--) {
    const b = barricades[i];
    if (b.hp <= 0) {
      spawnBloodParticles(b.x, b.y, 8, '#888888');
      barricades.splice(i, 1);
      continue;
    }
    // 僵尸碰撞减速
    for (const z of zombies) {
      if (Math.sqrt(distSq(b, z)) < 20 + z.radius) {
        const ang = Math.atan2(z.y - b.y, z.x - b.x);
        z.x = b.x + Math.cos(ang) * (22 + z.radius);
        z.y = b.y + Math.sin(ang) * (22 + z.radius);
      }
    }
  }
}

// =====================================================================
// PULSE WAVES - 脉冲波系统（狙击手专属）
// =====================================================================
function updatePulseWaves(dt) {
  for (let i = pulseWaves.length - 1; i >= 0; i--) {
    const p = pulseWaves[i];
    p.life -= dt;
    if (p.life <= 0) pulseWaves.splice(i, 1);
  }
}

// =====================================================================
// AIRSTRIKES - 空中打击系统（狙击手专属）
// =====================================================================
function updateAirstrikes(dt) {
  for (let i = airstrikes.length - 1; i >= 0; i--) {
    const a = airstrikes[i];
    a.delay -= dt;
    if (a.delay <= 0 && !a.detonated) {
      a.detonated = true;
      // 爆炸效果
      explodeAt(a.x, a.y, a.radius, a.damage, true);
      // 额外火花粒子
      for (let k = 0; k < 8; k++) {
        const ang = Math.random() * Math.PI * 2;
        const spd = 3 + Math.random() * 5;
        particles.push({
          x: a.x, y: a.y,
          vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
          life: 15 + Math.random() * 10, maxLife: 25,
          size: 2 + Math.random() * 3,
          color: Math.random() < 0.5 ? '#ffaa44' : '#ffdd66'
        });
      }
      airstrikes.splice(i, 1);
    }
  }
}

// =====================================================================
// EXPLODE AT - 通用爆炸函数（火箭筒/地雷共用）
// =====================================================================
function explodeAt(x, y, radius, damage, isPlayerWeapon) {
  playExplosion();
  addShake(10);
  // 爆炸粒子（火+烟）
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 25 + Math.random() * 20,
      maxLife: 45,
      size: 4 + Math.random() * 4,
      color: i % 3 === 0 ? '#ffdd66' : i % 3 === 1 ? '#ff8833' : '#aa3322'
    });
  }
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 1.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.5,
      life: 40 + Math.random() * 30,
      maxLife: 70,
      size: 6 + Math.random() * 5,
      color: '#444444'
    });
  }
  // 范围伤害僵尸
  for (let j = zombies.length - 1; j >= 0; j--) {
    const z = zombies[j];
    if (Math.hypot(z.x - x, z.y - y) < radius + z.radius) {
      const actualDmg = damage * (1 - (z.damageReduction || 0));
      z.hp -= actualDmg;
      z.hurtFlash = 8;
      spawnBloodParticles(z.x, z.y, 8, '#cc1122');
      addDamageNumber(z.x, z.y - z.radius, Math.round(actualDmg), '#ff8833');
      if (z.hp <= 0) {
        onZombieKilled(z);
        addCombo();
        const mult = getComboMult();
        const gained = Math.round(z.score * mult);
        score += gained;
        zombiesKilled++;
        spawnBloodParticles(z.x, z.y, 10, '#aa1122');
        addBloodStain(z.x, z.y, z.radius);
        addDamageNumber(z.x, z.y - z.radius - 10, '+' + gained, '#00ff88');
        zombies.splice(j, 1);
      }
    }
  }
  // 冲击波推开僵尸
  shockwaves.push({ x, y, radius: 0, maxRadius: radius * 1.5, life: 30, maxLife: 30 });
  for (const z of zombies) {
    const d = Math.hypot(z.x - x, z.y - y);
    if (d < radius * 1.5 && d > 0.1) {
      const force = (1 - d / (radius * 1.5)) * 8;
      z.x += ((z.x - x) / d) * force;
      z.y += ((z.y - y) / d) * force;
    }
  }
  // 推开玩家（友军伤害更小）
  const pd = Math.hypot(player.x - x, player.y - y);
  if (pd < radius * 1.5 && pd > 0.1) {
    const force = (1 - pd / (radius * 1.5)) * 5;
    player.vx += ((player.x - x) / pd) * force;
    player.vy += ((player.y - y) / pd) * force;
  }
  // 损坏木箱
  for (const c of crates) {
    if (Math.hypot(c.x - x, c.y - y) < radius) c.hp -= 4;
  }
  // 触发附近油桶链反应
  for (const barrel of barrels) {
    if (!barrel.triggered && Math.hypot(barrel.x - x, barrel.y - y) < radius) {
      barrel.triggered = true;
      barrel.triggerTimer = 12;
    }
  }
  addBloodStain(x, y, 18);
  updateHUD();
}

function explodeMine(m) {
  playExplosion();
  addShake(12);

  // Explosion particles (fire + smoke)
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    particles.push({
      x: m.x, y: m.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 25 + Math.random() * 20,
      maxLife: 45,
      size: 4 + Math.random() * 4,
      color: i % 3 === 0 ? '#ffdd66' : i % 3 === 1 ? '#ff8833' : '#aa3322'
    });
  }
  // Smoke
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 1.5;
    particles.push({
      x: m.x, y: m.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.5,
      life: 40 + Math.random() * 30,
      maxLife: 70,
      size: 6 + Math.random() * 5,
      color: '#444444'
    });
  }

  // Damage zombies in radius
  for (let j = zombies.length - 1; j >= 0; j--) {
    const z = zombies[j];
    if (Math.sqrt(distSq(m, z)) < m.explodeRadius + z.radius) {
      z.hp -= m.explodeDamage;
      z.hurtFlash = 8;
      spawnBloodParticles(z.x, z.y, 8, '#cc1122');
      addDamageNumber(z.x, z.y - z.radius, m.explodeDamage, '#ff8833');
      if (z.hp <= 0) {
        onZombieKilled(z);
        addCombo();
        const mult = getComboMult();
        const gained = Math.round(z.score * mult);
        score += gained;
        zombiesKilled++;
        spawnBloodParticles(z.x, z.y, 10, '#aa1122');
        addBloodStain(z.x, z.y, z.radius);
        zombies.splice(j, 1);
      }
    }
  }
  // Shockwave: push entities away
  shockwaves.push({ x: m.x, y: m.y, radius: 0, maxRadius: m.explodeRadius * 1.5, life: 30, maxLife: 30 });
  for (const z of zombies) {
    const d = Math.sqrt(distSq(m, z));
    if (d < m.explodeRadius * 1.5 && d > 0.1) {
      const force = (1 - d / (m.explodeRadius * 1.5)) * 8;
      z.x += ((z.x - m.x) / d) * force;
      z.y += ((z.y - m.y) / d) * force;
    }
  }
  // Push player
  const pd = Math.sqrt(distSq(m, player));
  if (pd < m.explodeRadius * 1.5 && pd > 0.1) {
    const force = (1 - pd / (m.explodeRadius * 1.5)) * 5;
    player.vx += ((player.x - m.x) / pd) * force;
    player.vy += ((player.y - m.y) / pd) * force;
  }
  // Damage crates in radius
  for (const c of crates) {
    if (Math.sqrt(distSq(m, c)) < m.explodeRadius) {
      c.hp -= 4;
    }
  }
  // Blood stain
  addBloodStain(m.x, m.y, 20);
  updateHUD();
}

function updateShockwaves(dt) {
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.life -= dt;
    s.radius = s.maxRadius * (1 - s.life / s.maxLife);
    if (s.life <= 0) shockwaves.splice(i, 1);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= Math.pow(0.92, dt);
    p.vy *= Math.pow(0.92, dt);
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateBarrels(dt) {
  for (let i = barrels.length - 1; i >= 0; i--) {
    const b = barrels[i];
    if (b.triggered) {
      b.triggerTimer -= dt;
      if (b.triggerTimer <= 0) {
        explodeBarrel(b);
        barrels.splice(i, 1);
      }
    }
  }
}

function explodeBarrel(b) {
  playExplosion();
  addShake(15);
  // Explosion particles
  for (let i = 0; i < 25; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 7;
    particles.push({
      x: b.x, y: b.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 25 + Math.random() * 25,
      maxLife: 50,
      size: 4 + Math.random() * 5,
      color: i % 3 === 0 ? '#ffdd66' : i % 3 === 1 ? '#ff5522' : '#aa2211'
    });
  }
  // Smoke
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 2;
    particles.push({
      x: b.x, y: b.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.5,
      life: 40 + Math.random() * 30,
      maxLife: 70,
      size: 7 + Math.random() * 6,
      color: '#555555'
    });
  }
  // Damage zombies
  for (let j = zombies.length - 1; j >= 0; j--) {
    const z = zombies[j];
    if (Math.sqrt(distSq(b, z)) < b.explodeRadius + z.radius) {
      z.hp -= b.damage;
      z.hurtFlash = 8;
      addDamageNumber(z.x, z.y - z.radius, b.damage, '#ff8833');
      if (z.hp <= 0) {
        onZombieKilled(z);
        addCombo();
        const mult = getComboMult();
        const gained = Math.round(z.score * mult);
        score += gained;
        zombiesKilled++;
        spawnBloodParticles(z.x, z.y, 12, '#aa1122');
        addBloodStain(z.x, z.y, z.radius);
        zombies.splice(j, 1);
      }
    }
  }
  // Shockwave
  shockwaves.push({ x: b.x, y: b.y, radius: 0, maxRadius: b.explodeRadius * 1.5, life: 30, maxLife: 30 });
  // Push entities
  for (const z of zombies) {
    const d = Math.sqrt(distSq(b, z));
    if (d < b.explodeRadius * 1.5 && d > 0.1) {
      const force = (1 - d / (b.explodeRadius * 1.5)) * 10;
      z.x += ((z.x - b.x) / d) * force;
      z.y += ((z.y - b.y) / d) * force;
    }
  }
  // Damage player if close
  const pd = Math.sqrt(distSq(b, player));
  if (pd < b.explodeRadius && pd > 0.1) {
    if (player.buffs.shield <= 0 && player.invuln <= 0) {
      damagePlayer(20);
    }
  }
  // Chain reaction: trigger nearby barrels
  for (const other of barrels) {
    if (other === b || other.triggered) continue;
    if (Math.sqrt(distSq(b, other)) < b.explodeRadius) {
      other.triggered = true;
      other.triggerTimer = 12;
    }
  }
  // Damage crates
  for (const c of crates) {
    if (Math.sqrt(distSq(b, c)) < b.explodeRadius) {
      c.hp -= 4;
    }
  }
  addBloodStain(b.x, b.y, 25);
  updateHUD();
}

function drawBarrel(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(3, 5, b.radius * 1.1, b.radius * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();
  // Body (red barrel)
  if (b.triggered) {
    const blink = Math.sin(performance.now() * 0.04) > 0;
    ctx.fillStyle = blink ? '#ff6644' : '#aa2211';
  } else {
    ctx.fillStyle = '#882211';
  }
  ctx.beginPath();
  ctx.arc(0, 0, b.radius, 0, Math.PI * 2);
  ctx.fill();
  // Outline
  ctx.strokeStyle = '#441108';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Metal bands
  ctx.strokeStyle = '#553322';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-b.radius, -4); ctx.lineTo(b.radius, -4);
  ctx.moveTo(-b.radius, 4); ctx.lineTo(b.radius, 4);
  ctx.stroke();
  // Hazard symbol
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u26A0', 0, 0);
  // Triggered warning
  if (b.triggered) {
    const pulse = (Math.sin(performance.now() * 0.04) + 1) * 0.5;
    ctx.strokeStyle = `rgba(255,80,40,${0.6 + pulse * 0.4})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(0, 0, b.radius + 6 + pulse * 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.bob += dt * 0.08;
    p.life -= dt;
    if (p.life <= 0) { pickups.splice(i, 1); continue; }
    if (Math.sqrt(distSq(p, player)) < p.radius + player.radius) {
      if (p.type === 'health') {
        player.hp = Math.min(player.maxHp, player.hp + 25);
        playPickup();
      } else if (p.type === 'ammo') {
        // 给所有已拥有的副武器补充备弹
        if (player.ownedWeapons.includes('hmg')) spareAmmo.hmg = Math.min(TOTAL_SPARE_AMMO.hmg, spareAmmo.hmg + 30);
        if (player.ownedWeapons.includes('shotgun')) spareAmmo.shotgun = Math.min(TOTAL_SPARE_AMMO.shotgun, spareAmmo.shotgun + 8);
        if (player.ownedWeapons.includes('flamethrower')) spareAmmo.flamethrower = Math.min(TOTAL_SPARE_AMMO.flamethrower, spareAmmo.flamethrower + 20);
        if (player.ownedWeapons.includes('rocket')) spareAmmo.rocket = Math.min(TOTAL_SPARE_AMMO.rocket, spareAmmo.rocket + 2);
        if (player.ownedWeapons.includes('laser')) spareAmmo.laser = Math.min(TOTAL_SPARE_AMMO.laser, spareAmmo.laser + 15);
        if (player.ownedWeapons.includes('homing')) spareAmmo.homing = Math.min(TOTAL_SPARE_AMMO.homing, spareAmmo.homing + 6);
        if (player.ownedWeapons.includes('grenade')) spareAmmo.grenade = Math.min(TOTAL_SPARE_AMMO.grenade, spareAmmo.grenade + 2);
        if (player.ownedWeapons.includes('micro_rocket')) spareAmmo.micro_rocket = Math.min(TOTAL_SPARE_AMMO.micro_rocket, spareAmmo.micro_rocket + 8);
        if (player.ownedWeapons.includes('tesla')) spareAmmo.tesla = Math.min(TOTAL_SPARE_AMMO.tesla, spareAmmo.tesla + 15);
        if (player.ownedWeapons.includes('acid')) spareAmmo.acid = Math.min(TOTAL_SPARE_AMMO.acid, spareAmmo.acid + 15);
        if (player.ownedWeapons.includes('railgun')) spareAmmo.railgun = Math.min(TOTAL_SPARE_AMMO.railgun, spareAmmo.railgun + 2);
        if (player.ownedWeapons.includes('sniper')) spareAmmo.sniper = Math.min(TOTAL_SPARE_AMMO.sniper, spareAmmo.sniper + 3);
        if (player.ownedWeapons.includes('plasma')) spareAmmo.plasma = Math.min(TOTAL_SPARE_AMMO.plasma, spareAmmo.plasma + 3);
        if (player.ownedWeapons.includes('cryo')) spareAmmo.cryo = Math.min(TOTAL_SPARE_AMMO.cryo, spareAmmo.cryo + 15);
        if (player.ownedWeapons.includes('flak')) spareAmmo.flak = Math.min(TOTAL_SPARE_AMMO.flak, spareAmmo.flak + 10);
        playPickup();
      } else if (p.type.startsWith('buff_')) {
        const buffType = p.type.slice(5);
        player.buffs[buffType] = 480; // 8 seconds
        playBuff();
      } else if (p.type === 'food') {
        // 食物：回复饥饿+少量HP（提升恢复量）
        survival.hunger = Math.min(100, survival.hunger + 45);
        player.hp = Math.min(player.maxHp, player.hp + 10);
        playPickup();
      } else if (p.type === 'water') {
        // 水：回复口渴+调节体温（提升恢复量）
        survival.thirst = Math.min(100, survival.thirst + 50);
        survival.temp = Math.max(34, survival.temp - 1);
        playPickup();
      } else if (p.type.startsWith('weapon_')) {
        const wId = p.type.slice(7);
        if (WEAPONS[wId] && !player.ownedWeapons.includes(wId)) {
          // 拾取新武器：填满弹匣+给满备弹
          player.ownedWeapons.push(wId);
          ammo[wId] = SECONDARY_AMMO[wId] || Infinity;
          spareAmmo[wId] = TOTAL_SPARE_AMMO[wId] || 0;
          player.weapon = wId;
          player.reloading = false;
          player.reloadTimer = 0;
          playBuff();
        } else if (WEAPONS[wId] && player.ownedWeapons.includes(wId)) {
          // 已拥有：补充备弹
          if (TOTAL_SPARE_AMMO[wId]) spareAmmo[wId] = Math.min(TOTAL_SPARE_AMMO[wId], spareAmmo[wId] + Math.ceil(TOTAL_SPARE_AMMO[wId] * 0.5));
          playPickup();
        }
      } else if (p.type.startsWith('attachment_')) {
        // 配件拾取：格式 attachment_weaponId_attId
        const parts = p.type.slice(11).split('_');
        const wId = parts[0];
        const attId = parts.slice(1).join('_');
        if (WEAPONS[wId] && player.ownedWeapons.includes(wId) && ATTACHMENTS[attId]) {
          const att = ATTACHMENTS[attId];
          // 检查武器限制
          if (!att.weaponOnly || att.weaponOnly.includes(wId)) {
            const oldAtt = player.attachments[wId];
            if (oldAtt !== attId) {
              equipAttachment(wId, attId);
              playBuff();
              // 显示配件拾取提示
              const attName = lang === 'zh' ? att.nameZh : att.nameEn;
              const wName = lang === 'zh' ? WEAPONS[wId].nameZh : WEAPONS[wId].name;
              waveBannerTime = 120;
              waveBannerText = (lang === 'zh' ? '配件：' : 'ATTACHMENT: ') + wName + ' + ' + attName;
            } else {
              // 相同配件
              playPickup();
            }
          }
        }
      }
      pickups.splice(i, 1);
      updateHUD();
    }
  }
  // Decay buffs
  for (const key in player.buffs) {
    if (player.buffs[key] > 0) {
      player.buffs[key] -= dt;
      if (player.buffs[key] < 0) player.buffs[key] = 0;
    }
  }
}

// =====================================================================
// WEATHER SYSTEM - 天气系统更新
// =====================================================================
function updateWeather(dt) {
  if (state !== GameState.PLAYING) return;
  weather.timer -= dt;
  if (weather.timer <= 0) {
    // 切换天气
    const types = ['clear', 'rain', 'fog', 'storm'];
    let next;
    do { next = types[Math.floor(Math.random() * types.length)]; } while (next === weather.type);
    weather.type = next;
    weather.timer = WEATHER_DURATION_MIN + Math.random() * (WEATHER_DURATION_MAX - WEATHER_DURATION_MIN);
    weather.transition = 0;
    weather.rainDrops = [];
    // 初始化雨滴/雪花
    if (next === 'rain' || next === 'storm') {
      for (let i = 0; i < 200; i++) {
        weather.rainDrops.push({
          x: player.x + (Math.random() - 0.5) * 1600,
          y: player.y + (Math.random() - 0.5) * 1200,
          vx: -2, vy: 18 + Math.random() * 4,
          len: 12 + Math.random() * 8
        });
      }
    }
    // 雷暴：闪电间隔
    weather.lightningCooldown = 180 + Math.random() * 180;
  }
  // 雨滴更新
  if (weather.type === 'rain' || weather.type === 'storm') {
    for (const d of weather.rainDrops) {
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      // 重生在玩家视野上方
      if (d.y > player.y + 600) {
        d.y = player.y - 600 - Math.random() * 100;
        d.x = player.x + (Math.random() - 0.5) * 1600;
      }
      if (d.x < player.x - 800) d.x = player.x + 800;
    }
  }
  // 雷暴闪电
  if (weather.type === 'storm') {
    weather.lightningCooldown -= dt;
    if (weather.lightningCooldown <= 0) {
      weather.lightningFlash = 8; // 8帧白闪
      weather.lightningCooldown = 240 + Math.random() * 360;
      addShake(4);
    }
  }
  if (weather.lightningFlash > 0) weather.lightningFlash -= dt;
  // 过渡强度
  weather.transition = Math.min(1, weather.transition + dt * 0.02);
}

// =====================================================================
// SURVIVAL SYSTEM - 生存系统更新
// =====================================================================
function updateSurvival(dt) {
  if (state !== GameState.PLAYING) return;
  // 饥饿/口渴衰减
  survival.hunger = Math.max(0, survival.hunger - SURVIVAL_DECAY.hunger * dt);
  survival.thirst = Math.max(0, survival.thirst - SURVIVAL_DECAY.thirst * dt);
  // 体力回复（非冲刺时）
  if (player.dashTime <= 0) {
    survival.stamina = Math.min(100, survival.stamina + SURVIVAL_DECAY.staminaRegen * dt);
  }
  // 体温：受天气与昼夜影响（温和化）
  const isNight = dayNightTime > 0.4 && dayNightTime < 0.8;
  let targetTemp = 37;
  if (weather.type === 'rain') targetTemp = 36;
  else if (weather.type === 'storm') targetTemp = 35;
  else if (weather.type === 'fog') targetTemp = 36.5;
  if (isNight) targetTemp -= 0.5;
  if (player.inWater) targetTemp -= 1;
  // 缓慢趋向目标温度（更慢，给玩家反应时间）
  survival.temp += (targetTemp - survival.temp) * 0.0006 * dt;

  // 极端状态扣 HP（降低扣除速率，给玩家生存空间）
  let dmg = 0;
  if (survival.hunger <= 0) dmg += 0.02 * dt;
  if (survival.thirst <= 0) dmg += 0.03 * dt;
  if (survival.temp < 32) dmg += 0.025 * dt;
  if (survival.temp > 41) dmg += 0.025 * dt;
  if (dmg > 0 && player.invuln <= 0) {
    player.hp -= dmg;
    if (player.hp <= 0) {
      player.hp = 0;
      gameOver();
    }
  }
  // 警告文字（提前预警，阈值从20提升到25）
  survival.warning = '';
  if (survival.hunger < 25) survival.warning = 'starving';
  else if (survival.thirst < 25) survival.warning = 'dehydrated';
  else if (survival.temp < 33) survival.warning = 'freezing';
  else if (survival.temp > 40) survival.warning = 'overheating';
  else if (survival.stamina < 15) survival.warning = 'exhausted';
}

// =====================================================================
// CLASS SYSTEM - 职业被动更新
// =====================================================================
function updateClassPassives(dt) {
  if (state !== GameState.PLAYING) return;
  if (!player.class) return;

  // 侦察兵：移动/静止状态追踪（用于伤害被动）
  const moved = Math.hypot(player.x - player.lastX, player.y - player.lastY);
  if (moved > 0.5) {
    player.movingTime += dt;
    player.stillTime = 0;
  } else {
    player.stillTime += dt;
    player.movingTime = 0;
  }
  player.lastX = player.x;
  player.lastY = player.y;

  // 医护兵：每秒回血（低血量时回复更快）
  if (player.class === 'medic') {
    player.medicRegenTimer += dt;
    if (player.medicRegenTimer >= 60) { // ~1秒
      player.medicRegenTimer = 0;
      const regen = player.hp < player.maxHp * 0.3 ? 1.5 : 0.5;
      player.hp = Math.min(player.maxHp, player.hp + regen);
    }
  }

  // 职业护盾再生（工程兵和重装机兵，8秒/点）
  const clsData = player.class ? CLASSES[player.class] : null;
  if (clsData && clsData.startShield && player.classShield < clsData.startShield) {
    player.medicRegenTimer += dt;
    if (player.medicRegenTimer >= 480) { // ~8秒
      player.medicRegenTimer = 0;
      player.classShield = Math.min(clsData.startShield, player.classShield + 1);
    }
  }

  // 升级：护盾再生（每秒回复护盾）
  if (player.upgrades.shieldRegen > 0) {
    player.shieldUpTimer = (player.shieldUpTimer || 0) + dt;
    if (player.shieldUpTimer >= 60) { // ~1秒
      player.shieldUpTimer = 0;
      const maxShield = (clsData && clsData.startShield ? clsData.startShield : 0) + player.upgrades.shieldRegen * 10;
      player.classShield = Math.min(maxShield, player.classShield + player.upgrades.shieldRegen);
    }
  }
}

// =====================================================================
// APPLY CLASS - 应用职业属性
// =====================================================================
function applyClass(classId) {
  const cls = CLASSES[classId];
  if (!cls) return;
  player.class = classId;
  player.classPassive = cls.passive;
  // 应用职业基础属性
  player.maxHp = cls.hp;
  player.hp = cls.hp;
  player.speedMult = cls.speedMult;
  player.damageMult = cls.damageMult;
  player.mineMax = cls.mineMax;
  player.mines = cls.mineMax;
  // 开局拥有手枪 + 专属副武器
  player.ownedWeapons = ['pistol'];
  if (cls.startWeapon !== 'pistol') player.ownedWeapons.push(cls.startWeapon);
  player.weapon = cls.startWeapon;
  // 副武器初始弹药：填满弹匣+给满备弹
  if (cls.startWeapon && cls.startWeapon !== 'pistol') {
    ammo[cls.startWeapon] = SECONDARY_AMMO[cls.startWeapon] || 30;
    spareAmmo[cls.startWeapon] = TOTAL_SPARE_AMMO[cls.startWeapon] || 0;
  }
  // 解锁副武器初始无弹药，第5波解锁时补充
  if (cls.secondWeapon) { ammo[cls.secondWeapon] = 0; spareAmmo[cls.secondWeapon] = 0; }
  // 职业护盾（工程兵和重装机兵）
  if (cls.startShield) {
    player.classShield = cls.startShield;
  } else {
    player.classShield = 0;
  }
  // 狙击手：暴击属性
  if (classId === 'sniper') {
    player.critChance = (player.critChance || 0) + 0.25;
    player.critMult = 2.5;
  }
  player.medicRegenTimer = 0;
  player.shieldUpTimer = 0;
}

// =====================================================================
// GET CLASS DAMAGE MODIFIER - 获取职业伤害动态加成
// =====================================================================
function getClassDamageMod() {
  if (!player.class) return 1;
  const cls = CLASSES[player.class];
  let mod = 1;
  if (player.class === 'assault') {
    // 每5次连击 +5% 伤害，最高 +25%
    const bonus = Math.min(5, Math.floor(combo / 5)) * 0.05;
    mod += bonus;
  } else if (player.class === 'scout') {
    // 静止时 +10% 伤害，移动时 -10% 伤害
    if (player.stillTime > 30) mod += 0.1;
    else if (player.movingTime > 30) mod -= 0.1;
  } else if (player.class === 'sniper') {
    // 静止时 +15% 伤害
    if (player.stillTime > 30) mod += 0.15;
  } else if (player.class === 'berserker') {
    // 狂战士：血量越低伤害越高，最高+60%
    const hpPct = player.hp / player.maxHp;
    if (hpPct < 0.8) {
      const bonus = (0.8 - hpPct) / 0.8 * 0.60;
      mod += bonus;
    }
  }
  // 生存状态影响
  if (survival.hunger < 30) mod *= 0.9;
  if (survival.temp < 34 || survival.temp > 39) mod *= 0.9;
  return mod;
}

// =====================================================================
// DRAW WEATHER - 天气渲染（雨/雾/闪电）
// =====================================================================
function drawWeather() {
  if (state !== GameState.PLAYING) return;
  const w = weather;
  // 雨滴
  if ((w.type === 'rain' || w.type === 'storm') && w.rainDrops.length > 0) {
    ctx.strokeStyle = w.type === 'storm' ? 'rgba(180,200,220,0.55)' : 'rgba(150,180,200,0.45)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (const d of w.rainDrops) {
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.vx * 1.5, d.y - d.len);
    }
    ctx.stroke();
  }
  // 雾/雷暴 视野遮罩
  if (w.type === 'fog' || w.type === 'storm' || w.type === 'rain') {
    const visionMod = WEATHER_TYPES[w.type].visionMod;
    const opacity = (1 - visionMod) * 0.6 * w.transition;
    if (opacity > 0.01) {
      const cx = player.x, cy = player.y;
      const radius = w.type === 'fog' ? 280 : 380;
      ctx.fillStyle = `rgba(180,190,200,${opacity})`;
      ctx.fillRect(camera.x - 100, camera.y - 100, VIEW_W + 200, VIEW_H + 200);
    }
  }
  // 雷暴闪电全屏白闪
  if (w.lightningFlash > 0) {
    ctx.fillStyle = `rgba(255,255,240,${(w.lightningFlash / 8) * 0.5})`;
    ctx.fillRect(camera.x - 100, camera.y - 100, VIEW_W + 200, VIEW_H + 200);
  }
}

function drawSurvivalHUD() {
  if (state !== GameState.PLAYING) return;

  if (survival.warning) {
    const pulse = (Math.sin(performance.now() * 0.008) + 1) * 0.5;
    ctx.save();
    ctx.font = '700 14px "Oswald", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const warnText = '! ' + t(survival.warning) + ' !';
    const warnY = 90;
    // 背景
    const tw = ctx.measureText(warnText).width;
    ctx.fillStyle = `rgba(196,74,58,${0.5 + pulse * 0.3})`;
    ctx.fillRect(canvas.width / 2 - tw / 2 - 12, warnY - 12, tw + 24, 24);

    ctx.restore();
  }
}

let heartbeatInterval = null;
function startHeartbeat() {
  if (heartbeatInterval) return;
  function beat() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    // Double-thump heartbeat
    for (let i = 0; i < 2; i++) {
      const t0 = now + i * 0.18;
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80, t0);
      osc.frequency.exponentialRampToValueAtTime(40, t0 + 0.1);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.25, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.15);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t0); osc.stop(t0 + 0.15);
    }
  }
  beat();
  heartbeatInterval = setInterval(beat, 1000);
}
function stopHeartbeat() {
  if (heartbeatInterval) {
    clearInterval(heartbeatInterval);
    heartbeatInterval = null;
  }
}

function damagePlayer(dmg, attacker) {
  // Shield buff: absorb all damage and ignore
  if (player.buffs.shield > 0) {
    player.buffs.shield = 0; // Shield breaks after one hit
    playShieldBreak();
    return;
  }
  if (player.invuln > 0) return;
  // 重装机兵：减伤20%
  if (player.class === 'heavy') dmg *= 0.8;
  // 职业护盾：吸收50%伤害（工程兵和重装机兵）
  if (player.classShield > 0) {
    const absorbed = Math.ceil(dmg * 0.5);
    if (player.classShield >= absorbed) {
      player.classShield -= absorbed;
      dmg -= absorbed;
    } else {
      dmg -= player.classShield;
      player.classShield = 0;
    }
  }
  // 侦察兵：移动时减伤 10%
  if (player.class === 'scout' && player.movingTime > 30) dmg *= 0.9;
  if (dmg <= 0) return;
  player.hp -= dmg;
  player.hurtFlash = 15;
  redFlashFrames = 3;
  document.getElementById('redFlash').classList.add('active');
  document.getElementById('vignette').classList.add('active');
  setTimeout(() => document.getElementById('vignette').classList.remove('active'), 800);
  playHurt();
  // 反伤：对攻击者反弹伤害
  if (attacker && player.upgrades.thorns > 0) {
    attacker.hp -= player.upgrades.thorns;
    attacker.hurtFlash = 6;
    spawnBloodParticles(attacker.x, attacker.y, 3, '#ff4422');
  }
  updateHUD();
  if (player.hp <= 0) {
    player.hp = 0;
    gameOver();
  }
}

function playShieldBreak() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const bufSize = Math.floor(audioCtx.sampleRate * 0.3);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.3)) * 0.5;
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const hpFilter = audioCtx.createBiquadFilter();
  hpFilter.type = 'highpass';
  hpFilter.frequency.value = 2000;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.3, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  noise.connect(hpFilter); hpFilter.connect(gain); gain.connect(audioCtx.destination);
  noise.start(now);
  // Tonal glass ping
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(2400, now);
  osc.frequency.exponentialRampToValueAtTime(1800, now + 0.2);
  const gain2 = audioCtx.createGain();
  gain2.gain.setValueAtTime(0.1, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  osc.connect(gain2); gain2.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.2);
}

// =====================================================================
// WAVE SYSTEM
// =====================================================================
function updateWaveSystem(dt) {
  if (!waveActive) {
    // Countdown to next wave
    waveCountdown -= dt / 60;
    if (waveCountdown <= 0) {
      startWave(wave + 1);
    }
    return;
  }

  // Spawn zombies from queue (with telegraph)
  if (spawnQueue.length > 0) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      const type = spawnQueue.shift();
      // Spawn at world edge
      const side = Math.floor(Math.random() * 4);
      let x, y;
      if (side === 0) { x = Math.random() * WORLD_W; y = 20; }
      else if (side === 1) { x = WORLD_W - 20; y = Math.random() * WORLD_H; }
      else if (side === 2) { x = Math.random() * WORLD_W; y = WORLD_H - 20; }
      else { x = 20; y = Math.random() * WORLD_H; }
      if (waveType === 'silent') {
        // No telegraph - spawn directly
        spawnZombieAt(type, x, y);
      } else {
        spawnTelegraphs.push({ x, y, type, life: waveType === 'horde' ? 15 : 30, maxLife: waveType === 'horde' ? 15 : 30 });
      }
      // Spawn interval based on wave type
      if (waveType === 'horde') spawnTimer = 15 + Math.random() * 10;
      else spawnTimer = 30 + Math.random() * 20;
    }
  }

  // Check wave clear（BOSS波需BOSS死亡，且需所有telegraph完成）
  if (spawnQueue.length === 0 && zombies.length === 0 && spawnTelegraphs.length === 0 && !boss) {
    waveActive = false;
    // 清理波次间残留的毒液池和毒液弹
    poisonPools = [];
    poisonProjectiles = [];
    firePools = [];
    lightningEffects = [];
    // 触发波间升级（第1波后开始）
    if (wave >= 1 && state === GameState.PLAYING) {
      showUpgradeSelect();
    } else {
      waveCountdown = 5;
    }
  }

  // 安全兜底：如果波次激活超过 2 分钟且只剩少量僵尸，强制传送到玩家附近
  if (waveActive) {
    waveActiveTimer = (waveActiveTimer || 0) + dt;
    if (waveActiveTimer > 7200 && zombies.length > 0 && zombies.length <= 3 && spawnQueue.length === 0) {
      // 强制传送所有残留僵尸到玩家附近
      for (const z of zombies) {
        const ang = Math.random() * Math.PI * 2;
        const r = 200 + Math.random() * 100;
        z.x = Math.max(z.radius, Math.min(WORLD_W - z.radius, player.x + Math.cos(ang) * r));
        z.y = Math.max(z.radius, Math.min(WORLD_H - z.radius, player.y + Math.sin(ang) * r));
        spawnBloodParticles(z.x, z.y, 8, z.color);
      }
      waveActiveTimer = 0;
    }
  } else {
    waveActiveTimer = 0;
  }
}

function showUpgradeSelect() {
  state = GameState.UPGRADE;
  const overlay = document.getElementById('upgradeOverlay');
  const titleEl = document.getElementById('upgradeTitle');
  const descEl = document.getElementById('upgradeDescText');
  const list = document.getElementById('upgradeList');

  titleEl.textContent = t('upgradeTitle');
  descEl.textContent = lang === 'zh' ? `选择一项强化 · 第 ${wave} 波结算` : `Choose an upgrade · Wave ${wave} cleared`;
  list.innerHTML = '';

  // 过滤可选升级：未达最大叠加次数，且职业限制匹配
  const available = UPGRADE_POOL.filter(u => {
    const stacks = upgradeStacks[u.id] || 0;
    if (stacks >= u.maxStacks) return false;
    if (u.classOnly && player.class !== u.classOnly) return false;
    return true;
  });

  // 随机抽3个（不足则全选）
  const choices = [];
  const pool = [...available];
  while (choices.length < 3 && pool.length > 0) {
    const idx = Math.floor(Math.random() * pool.length);
    choices.push(pool.splice(idx, 1)[0]);
  }

  choices.forEach((u, i) => {
    const stacks = upgradeStacks[u.id] || 0;
    const item = document.createElement('div');
    item.className = 'class-item';
    const name = lang === 'zh' ? u.nameZh : u.nameEn;
    const desc = lang === 'zh' ? u.descZh : u.descEn;
    const stackText = stacks > 0 ? ` (${stacks}/${u.maxStacks})` : '';
    item.innerHTML =
      `<div class="idx mono">0${i + 1}</div>` +
      `<div class="icon-box">${u.icon}</div>` +
      `<div class="text-wrap">` +
        `<div class="desc">${name}<span style="font-size:12px;color:#5a6268;float:right">${stackText}</span></div>` +
        `<div class="sub">${desc}</div>` +
      `</div>` +
      `<div class="arrow">›</div>`;
    item.onclick = () => applyUpgrade(u);
    list.appendChild(item);
  });

  overlay.classList.remove('hidden');
}

function applyUpgrade(u) {
  u.apply(player);
  upgradeStacks[u.id] = (upgradeStacks[u.id] || 0) + 1;
  player.upgradeLevel++;

  document.getElementById('upgradeOverlay').classList.add('hidden');
  state = GameState.PLAYING;
  waveCountdown = 3; // 选完3秒后开始下一波
    // 每4波额外给一个随机掉落物（弹药或生命）
  if (wave > 0 && wave % 4 === 0) {
    const ang = Math.random() * Math.PI * 2;
    const r = 60 + Math.random() * 40;
    const px = Math.max(40, Math.min(WORLD_W - 40, player.x + Math.cos(ang) * r));
    const py = Math.max(40, Math.min(WORLD_H - 40, player.y + Math.sin(ang) * r));
    const roll = Math.random();
    if (roll < 0.5) {
      pickups.push({ x: px, y: py, type: 'ammo', radius: 12, life: 600, bob: 0 });
    } else {
      pickups.push({ x: px, y: py, type: 'health', radius: 12, life: 600, bob: 0 });
    }
  }
  updateHUD();
}
