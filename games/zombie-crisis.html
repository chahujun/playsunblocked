// 任务类型定义
const MISSION_TYPES = [
  {
    id: 'extract', nameZh: '撤离任务', nameEn: 'EXTRACT',
    descZh: '到达地图指定撤离点并坚持10秒', descEn: 'Reach the extract point and hold for 10s',
    init: () => {
      // 随机选地图角落作为撤离点
      const corners = [[150, 150], [WORLD_W - 150, 150], [150, WORLD_H - 150], [WORLD_W - 150, WORLD_H - 150]];
      const c = corners[Math.floor(Math.random() * 4)];
      return { extractX: c[0], extractY: c[1], holdTime: 600, maxHoldTime: 600, inZone: false };
    },
    update: (m, dt) => {
      const d = Math.hypot(player.x - m.extractX, player.y - m.extractY);
      m.inZone = d < 80;
      if (m.inZone) {
        m.holdTime -= dt;
        if (m.holdTime <= 0) return 'success';
      } else {
        m.holdTime = Math.min(m.maxHoldTime, m.holdTime + dt * 0.5); // 离开缓慢恢复
      }
      return null;
    },
    reward: 'buff'
  },
  {
    id: 'defend', nameZh: '据点防守', nameEn: 'DEFEND',
    descZh: '在据点范围内击杀15个僵尸', descEn: 'Kill 15 zombies within the zone',
    init: () => {
      return { zoneX: WORLD_W / 2, zoneY: WORLD_H / 2, zoneRadius: 150, killCount: 0, target: 15 };
    },
    update: (m, dt) => {
      if (m.killCount >= m.target) return 'success';
      return null;
    },
    onKill: (m) => {
      const d = Math.hypot(player.x - m.zoneX, player.y - m.zoneY);
      if (d < m.zoneRadius) m.killCount++;
    },
    reward: 'health'
  },
  {
    id: 'hunt', nameZh: '狩猎任务', nameEn: 'HUNT',
    descZh: '击杀5个精英僵尸', descEn: 'Kill 5 elite zombies',
    init: () => {
      return { killCount: 0, target: 5 };
    },
    update: (m, dt) => {
      if (m.killCount >= m.target) return 'success';
      return null;
    },
    onKill: (m, zombie) => {
      if (zombie.isElite) m.killCount++;
    },
    reward: 'buff'
  },
  {
    id: 'survive', nameZh: '生存挑战', nameEn: 'SURVIVE',
    descZh: '在毒气区中存活30秒', descEn: 'Survive in the poison zone for 30s',
    init: () => {
      const cx = WORLD_W / 2 + (Math.random() - 0.5) * 400;
      const cy = WORLD_H / 2 + (Math.random() - 0.5) * 400;
      // 在区域周围生成毒池
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2;
        poisonPools.push({ x: cx + Math.cos(a) * 100, y: cy + Math.sin(a) * 100, radius: 50, life: 1800, damage: 4, tickTimer: 0 });
      }
      return { zoneX: cx, zoneY: cy, zoneRadius: 120, timer: 0, target: 1800 };
    },
    update: (m, dt) => {
      if (!waveActive) return null;
      m.timer += dt;
      if (m.timer >= m.target) return 'success';
      return null;
    },
    reward: 'ammo'
  },
  {
    id: 'frenzy', nameZh: '狂热击杀', nameEn: 'FRENZY',
    descZh: '15秒内连续击杀20个僵尸（不断连击）', descEn: 'Kill 20 zombies in 15s without breaking combo',
    init: () => {
      return { killCount: 0, target: 20, timeLeft: 900, started: false };
    },
    update: (m, dt) => {
      // 只在波次激活时计时，波间不消耗时间
      if (!waveActive) return null;
      if (!m.started) { m.started = true; } // 首次波次激活时开始计时
      m.timeLeft -= dt;
      if (m.timeLeft <= 0) return 'fail';
      if (m.killCount >= m.target) return 'success';
      return null;
    },
    onKill: (m) => {
      m.killCount++;
    },
    reward: 'upgrade'
  }
];

function startMission() {
  const mt = MISSION_TYPES[Math.floor(Math.random() * MISSION_TYPES.length)];
  currentMission = {
    type: mt.id,
    def: mt,
    data: mt.init(),
    bannerTime: 150
  };
  waveBannerTime = 150;
  waveBannerText = (lang === 'zh' ? '任务：' : 'MISSION: ') + (lang === 'zh' ? mt.nameZh : mt.nameEn);
}

function updateMission(dt) {
  if (!currentMission) return;
  if (currentMission.bannerTime > 0) currentMission.bannerTime -= dt;
  const result = currentMission.def.update(currentMission.data, dt);
  if (result === 'success') {
    completeMission();
  } else if (result === 'fail') {
    waveBannerTime = 120;
    waveBannerText = lang === 'zh' ? '任务失败！' : 'MISSION FAILED!';
    currentMission = null;
    updateHUD();
  }
}

function onZombieKilled(zombie) {
  if (!currentMission || !currentMission.def.onKill) return;
  currentMission.def.onKill(currentMission.data, zombie);
}

function completeMission() {
  const reward = currentMission.def.reward;
  // 给予奖励
  if (reward === 'health') {
    player.hp = player.maxHp;
    waveBannerText = lang === 'zh' ? '任务完成！生命回满' : 'MISSION COMPLETE! Full heal';
  } else if (reward === 'buff') {
    player.buffs.rage = 480;
    player.buffs.haste = 480;
    player.buffs.shield = 1;
    waveBannerText = lang === 'zh' ? '任务完成！获得增益' : 'MISSION COMPLETE! Buffs granted';
  } else if (reward === 'ammo') {
    // 补满所有副武器备弹
    for (const wk of WEAPON_KEYS) {
      if (wk !== 'pistol' && player.ownedWeapons.includes(wk)) {
        ammo[wk] = SECONDARY_AMMO[wk] || 0;
        spareAmmo[wk] = TOTAL_SPARE_AMMO[wk] || 0;
      }
    }
    waveBannerText = lang === 'zh' ? '任务完成！弹药补满' : 'MISSION COMPLETE! Ammo refilled';
  } else if (reward === 'upgrade') {
    // 随机一个免费升级
    const available = UPGRADE_POOL.filter(u => {
      const stacks = player.upgrades._stacks || {};
      return !(stacks[u.id] >= u.maxStacks);
    });
    if (available.length > 0) {
      const up = available[Math.floor(Math.random() * available.length)];
      up.apply(player);
      if (!player.upgrades._stacks) player.upgrades._stacks = {};
      player.upgrades._stacks[up.id] = (player.upgrades._stacks[up.id] || 0) + 1;
      const upName = lang === 'zh' ? up.nameZh : up.nameEn;
      waveBannerText = (lang === 'zh' ? '任务完成！获得升级：' : 'MISSION COMPLETE! Upgrade: ') + upName;
    } else {
      player.hp = player.maxHp;
      waveBannerText = lang === 'zh' ? '任务完成！生命回满' : 'MISSION COMPLETE! Full heal';
    }
  }
  waveBannerTime = 120;
  currentMission = null;
  updateHUD();
}

// 绘制任务UI
function drawMission() {
  if (!currentMission) return;
  const m = currentMission;
  // 任务进度条（屏幕右侧）
  const barW = 200, barH = 8;
  const barX = VIEW_W - barW - 20;
  const barY = 80;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
  ctx.fillStyle = '#2a3a1e';
  ctx.fillRect(barX, barY, barW, barH);

  let pct = 0;
  let label = '';
  if (m.type === 'extract') {
    pct = 1 - m.data.holdTime / m.data.maxHoldTime;
    label = lang === 'zh' ? '撤离中' : 'EXTRACTING';
    // 绘制撤离点
    const ex = m.data.extractX, ey = m.data.extractY;
    ctx.strokeStyle = m.data.inZone ? '#00ff88' : '#ffdd44';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.arc(ex, ey, 80, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = `rgba(255,221,68,${0.15 + Math.sin(performance.now() * 0.005) * 0.05})`;
    ctx.beginPath();
    ctx.arc(ex, ey, 80, 0, Math.PI * 2);
    ctx.fill();
    // 撤离点文字
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px Oswald';
    ctx.textAlign = 'center';
    ctx.fillText(lang === 'zh' ? '撤离点' : 'EXTRACT', ex, ey - 90);
    ctx.textAlign = 'left';
  } else if (m.type === 'defend') {
    pct = m.data.killCount / m.data.target;
    label = lang === 'zh' ? `据点 ${m.data.killCount}/${m.data.target}` : `DEFEND ${m.data.killCount}/${m.data.target}`;
    // 绘制据点
    const zx = m.data.zoneX - camera.x, zy = m.data.zoneY - camera.y;
    ctx.strokeStyle = '#ffaa33';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.arc(zx, zy, m.data.zoneRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = `rgba(255,170,51,0.08)`;
    ctx.beginPath();
    ctx.arc(zx, zy, m.data.zoneRadius, 0, Math.PI * 2);
    ctx.fill();
  } else if (m.type === 'hunt') {
    pct = m.data.killCount / m.data.target;
    label = lang === 'zh' ? `狩猎精英 ${m.data.killCount}/${m.data.target}` : `HUNT ${m.data.killCount}/${m.data.target}`;
  } else if (m.type === 'survive') {
    pct = m.data.timer / m.data.target;
    const sec = Math.ceil((m.data.target - m.data.timer) / 60);
    label = lang === 'zh' ? `生存 ${sec}s` : `SURVIVE ${sec}s`;
    // 绘制生存区域
    const zx = m.data.zoneX, zy = m.data.zoneY;
    ctx.strokeStyle = '#aa44ff';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 8]);
    ctx.beginPath();
    ctx.arc(zx, zy, m.data.zoneRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = `rgba(170,68,255,${0.05 + Math.sin(performance.now() * 0.004) * 0.03})`;
    ctx.beginPath();
    ctx.arc(zx, zy, m.data.zoneRadius, 0, Math.PI * 2);
    ctx.fill();
  } else if (m.type === 'frenzy') {
    pct = m.data.killCount / m.data.target;
    const sec = Math.ceil(m.data.timeLeft / 60);
    label = lang === 'zh' ? `狂热 ${m.data.killCount}/${m.data.target} (${sec}s)` : `FRENZY ${m.data.killCount}/${m.data.target} (${sec}s)`;
  }

  ctx.fillStyle = '#ffaa33';
  ctx.fillRect(barX, barY, barW * pct, barH);
  ctx.fillStyle = '#e8e4d8';
  ctx.font = 'bold 12px Oswald';
  ctx.fillText(label, barX, barY - 6);
}

function showClassSelect() {
  state = GameState.CLASS_SELECT;
  const overlay = document.getElementById('classOverlay');
  const titleEl = document.getElementById('classTitle');
  const descEl = document.getElementById('classDescText');
  const list = document.getElementById('classList');

  titleEl.textContent = t('classSelect');
  descEl.textContent = t('classDesc');
  list.innerHTML = '';

  const classes = [
    { id: 'assault', icon: '\uD83D\uDCA5', name: t('assault'), desc: t('assaultDesc') },
    { id: 'medic',   icon: '\u271A',       name: t('medic'),   desc: t('medicDesc') },
    { id: 'engineer',icon: '\uD83D\uDEE0', name: t('engineer'),desc: t('engineerDesc') },
    { id: 'scout',   icon: '\uD83C\uDFAF', name: t('scout'),   desc: t('scoutDesc') },
    { id: 'heavy',   icon: '\uD83D\uDEE1', name: t('heavy'),   desc: t('heavyDesc') },
    { id: 'sniper',  icon: '\uD83C\uDFAF', name: t('sniper'),  desc: t('sniperDesc') },
    { id: 'berserker',icon:'\uD83E\uDDDB', name: t('berserker'),desc: t('berserkerDesc') }
  ];

  // 属性条计算（基于 CLASSES 数据，归一化到 0-100%）
  const hpMax = 150, hpMin = 60;
  const dmgMax = 1.5, dmgMin = 0.85;
  const spdMax = 1.25, spdMin = 0.8;

  classes.forEach((c, i) => {
    const cd = CLASSES[c.id];
    const hpPct = Math.round((cd.hp - hpMin) / (hpMax - hpMin) * 100);
    const dmgPct = Math.round((cd.damageMult - dmgMin) / (dmgMax - dmgMin) * 100);
    const spdPct = Math.round((cd.speedMult - spdMin) / (spdMax - spdMin) * 100);
    const item = document.createElement('div');
    item.className = 'class-item';
    const statLabel = lang === 'zh' ? { hp: '生命', dmg: '伤害', spd: '速度' } : { hp: 'HP', dmg: 'DMG', spd: 'SPD' };
    item.innerHTML =
      `<div class="idx mono">0${i + 1}</div>` +
      `<div class="icon-box">${c.icon}</div>` +
      `<div class="text-wrap">` +
        `<div class="desc">${c.name}</div>` +
        `<div class="sub">${c.desc}</div>` +
        `<div class="stats-mini">` +
          `<div class="stat-mini">${statLabel.hp}<div class="stat-bar"><div class="fill" style="width:${hpPct}%"></div></div></div>` +
          `<div class="stat-mini">${statLabel.dmg}<div class="stat-bar"><div class="fill" style="width:${dmgPct}%"></div></div></div>` +
          `<div class="stat-mini">${statLabel.spd}<div class="stat-bar"><div class="fill" style="width:${spdPct}%"></div></div></div>` +
        `</div>` +
      `</div>` +
      `<div class="arrow">\u203A</div>`;
    item.onclick = () => selectClass(c.id);
    list.appendChild(item);
  });

  overlay.classList.remove('hidden');
}

function selectClass(classId) {
  applyClass(classId);
  document.getElementById('classOverlay').classList.add('hidden');
  state = GameState.PLAYING;
  startGame();
}

// =====================================================================
// RENDER
// =====================================================================
function render() {
  // Dark base
  ctx.fillStyle = '#080a0c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (state === GameState.IDLE || state === GameState.GAMEOVER) {
    drawGrid(0, 0);
    return;
  }

  ctx.save();
  ctx.scale(1 / PIXEL_SCALE, 1 / PIXEL_SCALE);
  ctx.translate(-camera.x + shakeX, -camera.y + shakeY);

  // World background
  drawWorldBackground();

  // Terrain features (under everything)
  drawTerrainFeatures();

  // Blood stains
  ctx.drawImage(bloodCanvas, 0, 0);

  // Poison pools
  for (const pool of poisonPools) {
    drawPoisonPool(pool);
  }

  // Fire pools (火焰枪残留)
  for (const f of firePools) {
    drawFirePool(f);
  }

  // Pickups
  for (const p of pickups) {
    drawPickup(p);
  }

  // Crates
  for (const c of crates) {
    drawCrate(c);
  }

  // Barrels
  for (const b of barrels) {
    drawBarrel(b);
  }

  // Mines
  for (const m of mines) {
    drawMine(m);
  }

  // Turrets
  drawTurrets();

  // Barricades
  for (const b of barricades) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle);
    ctx.fillStyle = '#556b2f';
    ctx.fillRect(-18, -5, 36, 10);
    ctx.fillStyle = '#3a4a1f';
    ctx.fillRect(-18, -5, 36, 2);
    ctx.fillStyle = '#6b8e23';
    ctx.fillRect(-16, -3, 4, 6);
    ctx.fillRect(-8, -3, 4, 6);
    ctx.fillRect(0, -3, 4, 6);
    ctx.fillRect(8, -3, 4, 6);
    ctx.restore();
    // HP bar
    if (b.hp < b.maxHp) {
      ctx.fillStyle = '#333';
      ctx.fillRect(b.x - 15, b.y - 12, 30, 3);
      ctx.fillStyle = '#6b8e23';
      ctx.fillRect(b.x - 15, b.y - 12, 30 * (b.hp / b.maxHp), 3);
    }
  }

  // Grenades
  for (const g of grenades) {
    ctx.fillStyle = '#ff8833';
    ctx.beginPath();
    ctx.arc(g.x, g.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(g.x, g.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Pulse waves
  for (const p of pulseWaves) {
    const alpha = p.life / 20;
    ctx.strokeStyle = `rgba(68, 221, 255, ${alpha})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + Math.cos(p.angle) * p.range, p.y + Math.sin(p.angle) * p.range);
    ctx.stroke();
    ctx.strokeStyle = `rgba(68, 221, 255, ${alpha * 0.3})`;
    ctx.lineWidth = p.width;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + Math.cos(p.angle) * p.range, p.y + Math.sin(p.angle) * p.range);
    ctx.stroke();
  }

  // Shockwaves
  for (const s of shockwaves) {
    drawShockwave(s);
  }

  // Spawn telegraphs (warning markers)
  for (const s of spawnTelegraphs) {
    drawSpawnTelegraph(s);
  }

  // Poison projectiles
  for (const p of poisonProjectiles) {
    drawPoisonProjectile(p);
  }

  // Zombies
  for (const z of zombies) {
    drawZombie(z);
  }

  // BOSS
  drawBoss();

  // Bullets
  for (const b of bullets) {
    drawBullet(b);
  }

  // Player dash trail (drawn before player)
  drawDashTrail();

  // Player
  drawPlayer();

  // Particles
  for (const p of particles) {
    drawParticle(p);
  }

  // Damage numbers
  for (const d of damageNumbers) {
    drawDamageNumber(d);
  }

  // Lightning effects (电磁枪链式闪电)
  drawLightningEffects();

  // Floating hints (生存系统引导文字)
  for (const h of floatingHints) {
    drawFloatingHint(h);
  }

  // Lighting overlay (vignette around player)
  drawLightingOverlay();
  // 天气效果（雨/雾/闪电）叠加在 lighting 之后
  drawWeather();

  ctx.restore();

  // World boundary
  drawWorldBounds();

  // Screen-space UI overlays
  drawMinimap();
  drawWaveBanner();
  drawComboIndicator();
  drawDashCooldown();
  drawReloadBar();
  // 生存警告（生存状态条已移至 HTML #survivalPanel）
  drawSurvivalHUD();
}

function drawGrid(ox, oy) {
  // Subtle animated grid for menu
  const time = performance.now() * 0.0002;
  ctx.strokeStyle = `rgba(0,255,136,${0.04 + Math.sin(time) * 0.01})`;
  ctx.lineWidth = 2;
  const gridSize = 50;
  for (let x = 0; x < canvas.width; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

function drawWorldBackground() {
  // Dark flat floor (pixel style - no gradient)
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);

  // Subtle noise/dirt patches (deterministic positions) - square pixel blocks
  ctx.fillStyle = 'rgba(40,50,40,0.15)';
  for (let i = 0; i < 60; i++) {
    const x = (i * 373) % WORLD_W;
    const y = (i * 617) % WORLD_H;
    const r = 30 + (i * 13) % 40;
    ctx.fillRect(PX(x - r), PX(y - r), PX(r * 2), PX(r * 2));
  }

  // Grid lines - 2px thick, pixel color
  ctx.strokeStyle = '#12121e';
  ctx.lineWidth = 2;
  const gridSize = 60;
  for (let x = 0; x <= WORLD_W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_H);
    ctx.stroke();
  }
  for (let y = 0; y <= WORLD_H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y); ctx.lineTo(WORLD_W, y);
    ctx.stroke();
  }

  // Brighter grid intersections near player - small pixel squares
  const pgx = Math.floor(player.x / gridSize) * gridSize;
  const pgy = Math.floor(player.y / gridSize) * gridSize;
  for (let dx = -3; dx <= 3; dx++) {
    for (let dy = -3; dy <= 3; dy++) {
      const gx = pgx + dx * gridSize;
      const gy = pgy + dy * gridSize;
      const distSq = (gx - player.x) ** 2 + (gy - player.y) ** 2;
      if (distSq < 60000) {
        const alpha = (1 - distSq / 60000) * 0.3;
        ctx.fillStyle = `rgba(0,255,136,${alpha})`;
        ctx.fillRect(gx, gy, 2, 2);
      }
    }
  }
}

function drawTerrainFeatures() {
  for (const f of terrainFeatures) {
    if (f.type === 'grass') {
      // Grass patch base - flat pixel block
      ctx.fillStyle = 'rgba(40,80,40,0.25)';
      ctx.fillRect(PX(f.x - f.radius), PX(f.y - f.radius), PX(f.radius * 2), PX(f.radius * 2));
      // Grass blades - small pixel lines
      const time = performance.now() * 0.002;
      ctx.fillStyle = 'rgba(80,140,60,0.7)';
      for (const blade of f.blades) {
        const sway = Math.sin(time + blade.phase) * 1.5;
        pxRect(f.x + blade.x, f.y + blade.y - blade.h, 1, blade.h, 'rgba(80,140,60,0.7)');
        pxRect(f.x + blade.x + sway, f.y + blade.y - blade.h - 1, 1, 1, 'rgba(80,140,60,0.7)');
      }
      // Highlight if player inside - pixel dashed square
      if (player.inGrass && Math.hypot(player.x - f.x, player.y - f.y) < f.radius) {
        ctx.strokeStyle = 'rgba(100,200,80,0.3)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(PX(f.x - f.radius), PX(f.y - f.radius), PX(f.radius * 2), PX(f.radius * 2));
        ctx.setLineDash([]);
      }
    } else if (f.type === 'water') {
      // Water puddle - flat color pixel block
      pxCircle(f.x, f.y, f.radius, 'rgba(40,70,110,0.6)');
      ctx.fillStyle = 'rgba(30,50,80,0.5)';
      ctx.fillRect(PX(f.x - f.radius), PX(f.y - f.radius), PX(f.radius * 2), PX(f.radius * 2));
      pxCircle(f.x, f.y, f.radius, 'rgba(40,70,110,0.5)');
      // Ripples - pixel ring circles (thin ring only)
      const time = performance.now() * 0.001;
      for (let i = 0; i < 2; i++) {
        const r = (time * 10 + i * 15) % f.radius;
        const ringColor = `rgba(120,180,220,${0.2 + Math.sin(time) * 0.1})`;
        ctx.fillStyle = ringColor;
        var rrx = PX(f.x), rry = PX(f.y), rr = Math.ceil(r);
        // Thin ring: only draw rows near the edge
        for (var dy = -rr; dy <= rr; dy += 2) {
          var dxOuter = Math.floor(Math.sqrt(rr * rr - dy * dy));
          var innerR = rr - 2;
          var dxInner = innerR > 0 ? Math.floor(Math.sqrt(innerR * innerR - dy * dy)) : 0;
          if (dxOuter > dxInner) {
            ctx.fillRect(rrx - dxOuter, rry + dy, dxOuter - dxInner, 2);
            ctx.fillRect(rrx + dxInner, rry + dy, dxOuter - dxInner, 2);
          }
        }
      }
      // Highlight if player inside - pixel dashed square
      if (player.inWater && Math.hypot(player.x - f.x, player.y - f.y) < f.radius) {
        ctx.strokeStyle = 'rgba(100,180,220,0.4)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(PX(f.x - f.radius), PX(f.y - f.radius), PX(f.radius * 2), PX(f.radius * 2));
        ctx.setLineDash([]);
      }
    }
  }
}

function drawWorldBounds() {
  ctx.save();
  ctx.scale(1 / PIXEL_SCALE, 1 / PIXEL_SCALE);
  ctx.translate(-camera.x + shakeX, -camera.y + shakeY);
  // Outer glow
  ctx.strokeStyle = 'rgba(255,80,40,0.15)';
  ctx.lineWidth = 12;
  ctx.strokeRect(-6, -6, WORLD_W + 12, WORLD_H + 12);
  // Main border
  ctx.strokeStyle = 'rgba(255,100,60,0.5)';
  ctx.lineWidth = 3;
  ctx.setLineDash([14, 8]);
  ctx.strokeRect(0, 0, WORLD_W, WORLD_H);
  ctx.setLineDash([]);
  ctx.restore();
}

function drawPoisonPool(pool) {
  const alpha = Math.min(1, pool.life / 60);
  // Flat color pool (pixel style - no gradient)
  pxCircle(pool.x, pool.y, pool.radius, `rgba(80,180,40,${alpha * 0.5})`);
  // Darker center
  pxCircle(pool.x, pool.y, pool.radius * 0.6, `rgba(60,140,30,${alpha * 0.5})`);
  // Bubbling effect - small pixel squares
  const time = performance.now() * 0.003;
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2 + time;
    const bx = pool.x + Math.cos(a) * pool.radius * 0.5;
    const by = pool.y + Math.sin(a) * pool.radius * 0.5;
    pxRect(bx - 2, by - 2, 4, 4, `rgba(180,255,120,${alpha * 0.6})`);
  }
}

// 火焰枪地面残留火焰渲染
function drawFirePool(f) {
  const alpha = Math.min(1, f.life / 60);
  const flicker = 0.85 + Math.sin(performance.now() * 0.02) * 0.15;
  // Flat color fire pool (pixel style - no gradient)
  pxCircle(f.x, f.y, f.radius, `rgba(255,80,30,${alpha * 0.5 * flicker})`);
  // Center bright area
  pxCircle(f.x, f.y, f.radius * 0.4, `rgba(255,220,120,${alpha * 0.4 * flicker})`);
  // Bright pixel sparks
  const time = performance.now() * 0.01;
  for (let i = 0; i < 3; i++) {
    const a = i * 2.1 + time;
    const sx = f.x + Math.cos(a) * f.radius * 0.3;
    const sy = f.y + Math.sin(a) * f.radius * 0.3;
    pxRect(sx - 1, sy - 1, 2, 2, `rgba(255,240,180,${alpha * 0.6 * flicker})`);
  }
}

function drawPickup(p) {
  const bob = Math.sin(p.bob) * 3;
  ctx.save();
  ctx.translate(p.x, p.y + bob);

  // Shadow - pixel rect
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(PX(-8), PX(10 - bob), PX(16), PX(6));

  if (p.type === 'health') {
    // Glow - flat pixel circle
    pxCircle(0, 0, 14, 'rgba(255,60,80,0.2)');
    // Health pack
    ctx.fillStyle = '#f0f0f0';
    ctx.fillRect(-8, -8, 16, 16);
    ctx.strokeStyle = '#cc1133';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-8, -8, 16, 16);
    ctx.fillStyle = '#ff3344';
    ctx.fillRect(-5, -1.5, 10, 3);
    ctx.fillRect(-1.5, -5, 3, 10);
  } else if (p.type === 'ammo') {
    // Glow - flat pixel circle
    pxCircle(0, 0, 14, 'rgba(255,200,80,0.2)');
    // Ammo pack
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(-9, -6, 18, 12);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(-9, -6, 18, 12);
    ctx.fillStyle = '#ffcc44';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(-6 + i * 5, -4, 3, 8);
    }
    ctx.fillStyle = '#aa8822';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(-6 + i * 5, -4, 3, 2);
    }
  } else if (p.type.startsWith('buff_')) {
    const buffType = p.type.slice(5);
    let color, icon;
    if (buffType === 'rage') { color = '#ff4422'; icon = '\uD83D\uDD25'; }
    else if (buffType === 'shield') { color = '#44aaff'; icon = '\uD83D\uDEE1'; }
    else { color = '#ffdd44'; icon = '\u26A1'; }
    // Pulsing glow - flat pixel circle
    const pulse = (Math.sin(performance.now() * 0.008) + 1) * 0.5;
    pxCircle(0, 0, 16, color + '30');
    // Diamond shape
    ctx.save();
    ctx.rotate(Math.PI / 4);
    ctx.fillStyle = '#111417';
    ctx.fillRect(-9, -9, 18, 18);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(-9, -9, 18, 18);
    ctx.restore();
    // Icon
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(icon, 0, 1);
  } else if (p.type === 'food') {
    // 食物：罐头
    pxCircle(0, 0, 14, 'rgba(212,160,74,0.2)');
    // 罐头身
    ctx.fillStyle = '#8a6a3a';
    ctx.fillRect(-7, -8, 14, 16);
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(-7, -8, 14, 3);
    ctx.fillRect(-7, 5, 14, 3);
    ctx.strokeStyle = '#3a2a1a';
    ctx.lineWidth = 1;
    ctx.strokeRect(-7, -8, 14, 16);
    // 标签
    ctx.fillStyle = '#d4a04a';
    ctx.fillRect(-6, -3, 12, 6);
    ctx.fillStyle = '#3a2a1a';
    ctx.font = '700 6px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(lang === 'zh' ? '食物' : 'FOOD', 0, 0);
  } else if (p.type === 'water') {
    // 水：水壶
    pxCircle(0, 0, 14, 'rgba(74,138,212,0.2)');
    // 水壶身
    ctx.fillStyle = '#4a8ad4';
    ctx.beginPath();
    ctx.roundRect(-6, -7, 12, 14, 2);
    ctx.fill();
    ctx.fillStyle = '#2a6ab4';
    ctx.fillRect(-4, -9, 8, 2);
    ctx.strokeStyle = '#1a4a8a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(-6, -7, 12, 14, 2);
    ctx.stroke();
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(-4, -5, 2, 8);
    ctx.fillStyle = '#fff';
    ctx.font = '700 6px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('H2O', 0, 1);
  } else if (p.type.startsWith('weapon_')) {
    // 武器掉落
    const wId = p.type.slice(7);
    const wDef = WEAPONS[wId];
    if (wDef) {
      // 颜色光晕 - flat pixel circle
      pxCircle(0, 0, 18, wDef.color + '30');
      // 底座
      ctx.fillStyle = '#1a1e22';
      ctx.fillRect(-12, -10, 24, 20);
      ctx.strokeStyle = wDef.color;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(-12, -10, 24, 20);
      // 重武器底色更暗
      if (wDef.weaponClass === 'heavy') {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(-12, -10, 24, 20);
      }
      // 枪型剪影
      ctx.fillStyle = wDef.color;
      if (wId === 'pistol') {
        ctx.fillRect(-5, -2, 10, 4);
        ctx.fillRect(-4, 2, 4, 5);
      } else if (wId === 'shotgun') {
        ctx.fillRect(-9, -2, 14, 3);
        ctx.fillRect(-9, 1, 10, 3);
        ctx.fillRect(-9, 4, 6, 2);
      } else if (wId === 'hmg') {
        // 重机枪：大枪身+弹链
        ctx.fillRect(-10, -2, 18, 4);
        ctx.fillRect(-10, 2, 14, 3);
        ctx.fillRect(-2, 5, 5, 4);
        ctx.fillRect(7, -4, 5, 3);
        ctx.fillStyle = '#aa8822';
        ctx.fillRect(-8, -3, 12, 1);
      } else if (wId === 'flamethrower') {
        // 火焰枪：喷嘴+罐体
        ctx.fillRect(-8, -2, 12, 4);
        ctx.fillRect(4, -1, 5, 2);  // 喷嘴
        ctx.fillRect(-7, 2, 6, 5);  // 罐体
        ctx.fillStyle = '#ffaa33';
        ctx.fillRect(9, -1, 2, 2);  // 火焰小点
      } else if (wId === 'rocket') {
        // 火箭筒：粗管+火箭弹头
        ctx.fillRect(-10, -3, 18, 5);
        ctx.fillRect(8, -2, 4, 3);  // 弹头
        ctx.fillStyle = '#ffdd44';
        ctx.fillRect(11, -1, 2, 1); // 弹头尖
      } else if (wId === 'laser') {
        // 激光枪：枪身+蓝色能量管
        ctx.fillRect(-8, -2, 14, 4);
        ctx.fillStyle = '#44ddff';
        ctx.fillRect(-4, -3, 8, 1);
      } else if (wId === 'homing') {
        // 追踪弹：发射器+雷达
        ctx.fillRect(-8, -2, 14, 4);
        ctx.fillStyle = '#ff66dd';
        ctx.fillRect(6, -1, 3, 2);
        ctx.fillRect(-2, -5, 1, 3);
      } else if (wId === 'grenade') {
        // 榴弹：粗管+绿色弹头
        ctx.fillRect(-10, -3, 16, 6);
        ctx.fillStyle = '#88dd44';
        ctx.fillRect(6, -2, 4, 4);
      } else if (wId === 'micro_rocket') {
        // 微型火箭：多管发射器
        ctx.fillRect(-8, -2, 14, 4);
        ctx.fillStyle = '#666';
        ctx.fillRect(6, -3, 3, 1);
        ctx.fillRect(6, -1, 3, 1);
        ctx.fillRect(6, 1, 3, 1);
      }
      // 标签
      ctx.font = '700 7px "JetBrains Mono", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = wDef.color;
      const label = lang === 'zh' ? wDef.nameZh : wDef.name;
      ctx.fillText(label, 0, -14);
    }
  } else if (p.type.startsWith('attachment_')) {
    // 配件掉落：紫色光晕+齿轮图标
    const parts = p.type.slice(11).split('_');
    const attId = parts.slice(1).join('_');
    const att = ATTACHMENTS[attId];
    if (att) {
      // 脉冲光晕 - flat pixel circle
      const pulse = (Math.sin(performance.now() * 0.006) + 1) * 0.5;
      pxCircle(0, 0, 16, att.color + '30');
      // 六边形底座
      ctx.save();
      ctx.rotate(performance.now() * 0.002);
      ctx.fillStyle = '#111417';
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI * 2 / 6) * i;
        const px = Math.cos(a) * 9;
        const py = Math.sin(a) * 9;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = att.color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
      // 配件图标
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = att.color;
      ctx.fillText(att.icon, 0, 1);
      // 标签
      ctx.font = '700 6px "JetBrains Mono", monospace';
      ctx.fillStyle = att.color;
      const attLabel = lang === 'zh' ? att.nameZh : att.nameEn;
      ctx.fillText(attLabel, 0, -15);
    }
  }
  ctx.restore();
}

function drawCrate(c) {
  const dmgRatio = c.hp / c.maxHp;
  ctx.save();
  ctx.translate(c.x, c.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(-c.w / 2 + 4, -c.h / 2 + 5, c.w, c.h);

  // 3D side (right and bottom)
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(c.w / 2 - 2, -c.h / 2 + 2, 4, c.h);
  ctx.fillRect(-c.w / 2 + 2, c.h / 2 - 2, c.w - 4, 4);

  // Top face (flat color - pixel style, no gradient)
  ctx.fillStyle = '#8b5a2b';
  ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
  // Lighter top edge highlight
  ctx.fillStyle = '#a0683a';
  ctx.fillRect(-c.w / 2, -c.h / 2, c.w, 3);
  // Darker bottom edge
  ctx.fillStyle = '#6b4220';
  ctx.fillRect(-c.w / 2, c.h / 2 - 3, c.w, 3);

  // Wood plank lines - pixel fillRect
  ctx.fillStyle = '#5a3818';
  ctx.fillRect(-c.w / 2, PX(-2), c.w, 2);
  ctx.fillRect(-c.w / 2, PX(2), c.w, 2);

  // Border
  ctx.strokeStyle = '#4a2810';
  ctx.lineWidth = 2;
  ctx.strokeRect(-c.w / 2, -c.h / 2, c.w, c.h);

  // Metal corner brackets
  ctx.fillStyle = '#888';
  const cs = 6;
  ctx.fillRect(-c.w / 2, -c.h / 2, cs, 3);
  ctx.fillRect(-c.w / 2, -c.h / 2, 3, cs);
  ctx.fillRect(c.w / 2 - cs, -c.h / 2, cs, 3);
  ctx.fillRect(c.w / 2 - 3, -c.h / 2, 3, cs);
  ctx.fillRect(-c.w / 2, c.h / 2 - 3, cs, 3);
  ctx.fillRect(-c.w / 2, c.h / 2 - cs, 3, cs);
  ctx.fillRect(c.w / 2 - cs, c.h / 2 - 3, cs, 3);
  ctx.fillRect(c.w / 2 - 3, c.h / 2 - cs, 3, cs);

  // Damage cracks - pixel blocks
  if (dmgRatio < 0.75) {
    ctx.fillStyle = '#2a1808';
    pxRect(-c.w / 4, -c.h / 3, 2, 2);
    pxRect(-2, 0, 2, 2);
    pxRect(c.w / 5, c.h / 4, 2, 2);
    ctx.fillRect(PX(-c.w / 4) + 2, PX(-c.h / 3) + 2, 2, 2);
    ctx.fillRect(PX(c.w / 5) - 2, PX(c.h / 4) - 2, 2, 2);
  }
  if (dmgRatio < 0.5) {
    ctx.fillStyle = '#2a1808';
    pxRect(c.w / 4, -c.h / 3, 2, 2);
    pxRect(2, -2, 2, 2);
    pxRect(-c.w / 5, c.h / 4, 2, 2);
    ctx.fillRect(PX(c.w / 4) - 2, PX(-c.h / 3) + 2, 2, 2);
    ctx.fillRect(PX(-c.w / 5) + 2, PX(c.h / 4) - 2, 2, 2);
  }
  if (dmgRatio < 0.25) {
    // Heavy damage: dark overlay
    ctx.fillStyle = 'rgba(20,10,5,0.3)';
    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
  }
  ctx.restore();
}

function drawMine(m) {
  ctx.save();
  ctx.translate(m.x, m.y);

  // Shadow - pixel rect
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(PX(2 - m.radius), PX(3), PX(m.radius * 2), PX(m.radius * 0.6));

  // Body (flat color - pixel style)
  if (m.triggered) {
    pxCircle(0, 0, m.radius, '#cc2211');
    pxRect(-m.radius, -m.radius, 2, 2, '#661100');
    pxRect(m.radius - 2, -m.radius, 2, 2, '#661100');
    pxRect(-m.radius, m.radius - 2, 2, 2, '#661100');
    pxRect(m.radius - 2, m.radius - 2, 2, 2, '#661100');
  } else {
    pxCircle(0, 0, m.radius, '#333');
    pxRect(-m.radius, -m.radius, 2, 2, '#111');
    pxRect(m.radius - 2, -m.radius, 2, 2, '#111');
    pxRect(-m.radius, m.radius - 2, 2, 2, '#111');
    pxRect(m.radius - 2, m.radius - 2, 2, 2, '#111');
  }

  // Spikes around the mine - pixel blocks
  ctx.fillStyle = m.triggered ? '#aa3322' : '#222';
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const sx = Math.cos(a) * m.radius;
    const sy = Math.sin(a) * m.radius;
    pxRect(sx - 1, sy - 1, 4, 4, m.triggered ? '#aa3322' : '#222');
  }

  // Blinking LED
  const time = performance.now() * 0.01;
  if (m.triggered) {
    const blink = Math.sin(time * 3) > 0;
    if (blink) {
      pxCircle(0, 0, 8, 'rgba(255,50,50,0.5)');
      pxRect(-2, -2, 4, 4, '#ff0000');
    }
  } else {
    const pulse = (Math.sin(time) + 1) * 0.5;
    pxCircle(0, 0, 6, `rgba(0,255,136,${pulse * 0.3})`);
    pxRect(-1, -1, 2, 2, `rgba(0,255,136,${0.6 + pulse * 0.4})`);
  }
  ctx.restore();
}

function drawShockwave(s) {
  const alpha = s.life / s.maxLife;
  const progress = 1 - s.life / s.maxLife;

  // Outer ring
  ctx.strokeStyle = `rgba(255,200,100,${alpha * 0.85})`;
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
  ctx.stroke();

  // Inner ring
  ctx.strokeStyle = `rgba(255,240,180,${alpha * 0.5})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.radius * 0.75, 0, Math.PI * 2);
  ctx.stroke();

  // Glow fill — flat color, no gradient
  ctx.fillStyle = `rgba(255,200,100,${alpha * 0.2})`;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
  ctx.fill();
}

function drawPoisonProjectile(p) {
  // Trail
  ctx.fillStyle = 'rgba(120,200,60,0.25)';
  for (let i = 1; i <= 3; i++) {
    ctx.beginPath();
    ctx.arc(p.x - p.vx * i * 1.2, p.y - p.vy * i * 1.2, p.radius * (1 - i * 0.2), 0, Math.PI * 2);
    ctx.fill();
  }

  // Glow — flat color circle, no gradient
  ctx.fillStyle = 'rgba(120,220,60,0.3)';
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.radius * 2, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#7acc44';
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#aaff66';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Highlight
  ctx.fillStyle = 'rgba(220,255,180,0.7)';
  ctx.beginPath();
  ctx.arc(p.x - 2, p.y - 2, p.radius * 0.4, 0, Math.PI * 2);
  ctx.fill();
}

function drawZombie(z) {
  ctx.save();
  ctx.translate(z.x, z.y);

  const flashWhite = z.hurtFlash > 0;
  const bob = Math.sin(z.walkPhase) * 1.5;
  const sway = Math.sin(z.walkPhase * 0.5) * 0.08;

  // Shadow - pixel rect
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(PX(3 - z.radius), PX(4 + Math.abs(bob) * 0.3), PX(z.radius * 2), Math.ceil(z.radius * 0.5));

  ctx.rotate(sway);

  if (z.type === 'brute') {
    drawBruteZombie(z, flashWhite, bob);
  } else if (z.type === 'runner') {
    drawRunnerZombie(z, flashWhite, bob);
  } else if (z.type === 'spitter') {
    drawSpitterZombie(z, flashWhite, bob);
  } else if (z.type === 'tank') {
    drawTankZombie(z, flashWhite, bob);
  } else if (z.type === 'screamer') {
    drawScreamerZombie(z, flashWhite, bob);
  } else {
    drawNormalZombie(z, flashWhite, bob);
  }

  // Elite aura - pixel dashed square
  if (z.isElite) {
    ctx.save();
    const pulse = (Math.sin(performance.now() * 0.005) + 1) * 0.5;
    ctx.strokeStyle = z.color + Math.floor(80 + pulse * 60).toString(16).padStart(2, '0');
    ctx.lineWidth = 2;
    ctx.setLineDash([3, 3]);
    const aR = z.radius + 5 + pulse * 2;
    ctx.strokeRect(PX(-aR), PX(-aR), PX(aR * 2), PX(aR * 2));
    ctx.setLineDash([]);
    ctx.restore();
  }

  // HP bar
  if (z.hp < z.maxHp) {
    const barW = z.radius * 2.2;
    const barH = 4;
    const barY = -z.radius - 12;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(-barW / 2 - 1, barY - 1, barW + 2, barH + 2);
    ctx.fillStyle = '#1a0808';
    ctx.fillRect(-barW / 2, barY, barW, barH);
    const hpRatio = z.hp / z.maxHp;
    const hpColor = hpRatio > 0.5 ? '#44dd44' : hpRatio > 0.25 ? '#ffaa33' : '#ff3344';
    ctx.fillStyle = hpColor;
    ctx.fillRect(-barW / 2, barY, barW * hpRatio, barH);
  }

  // 新增怪物特殊外观
  if (z.isCrawler) {
    ctx.fillStyle = z.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, z.radius, z.radius * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    // 4条腿
    for (let i = 0; i < 4; i++) {
      const la = (i / 4) * Math.PI * 2 + z.walkPhase;
      ctx.strokeStyle = z.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(la) * z.radius * 0.7, Math.sin(la) * z.radius * 0.5);
      ctx.lineTo(Math.cos(la) * z.radius * 1.3, Math.sin(la) * z.radius * 0.8);
      ctx.stroke();
    }
  }
  if (z.isExploder) {
    const pulse = Math.sin(performance.now() * 0.01) * 0.2 + 1;
    ctx.fillStyle = `rgba(255,68,0,${0.3})`;
    ctx.beginPath();
    ctx.arc(0, 0, z.radius * pulse * 1.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = z.color;
    ctx.beginPath();
    ctx.arc(0, 0, z.radius * pulse, 0, Math.PI * 2);
    ctx.fill();
  }
  if (z.isHealer) {
    // 治疗光环
    ctx.strokeStyle = `rgba(68,255,68,${0.3 + Math.sin(performance.now() * 0.005) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, z.healRange * 0.3, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawNormalZombie(z, flash, bob) {
  const r = z.radius;
  // Legs (animated) - pixel fillRect snapped to grid
  const legSwing = Math.sin(z.walkPhase) * 4;
  pxRect(-5, r * 0.5, 4, 8 + legSwing * 0.3, flash ? '#fff' : '#3a4a28');
  pxRect(1, r * 0.5, 4, 8 - legSwing * 0.3, flash ? '#fff' : '#3a4a28');

  // Body (torso) - flat color, no gradient
  var bodyColor = flash ? '#ffffff' : z.color;
  pxCircle(0, bob, r, bodyColor);
  // Darker bottom edge
  pxRect(-r + 2, bob + r - 4, r * 2 - 4, 4, flash ? '#cccccc' : '#3a5020');

  // Pixel border blocks on edges
  pxRect(-r, bob - 2, 2, 2, flash ? '#fff' : '#2a3818');
  pxRect(r - 2, bob - 2, 2, 2, flash ? '#fff' : '#2a3818');
  pxRect(-r, bob + r - 4, 2, 2, flash ? '#fff' : '#2a3818');
  pxRect(r - 2, bob + r - 4, 2, 2, flash ? '#fff' : '#2a3818');

  pxRect(r * 0.3, -r * 0.5 + bob, r * 0.8, 4, flash ? '#fff' : '#5a7038');
  pxRect(r * 0.3, r * 0.2 + bob, r * 0.8, 4, flash ? '#fff' : '#5a7038');

  // Eyes (pixel blocks)
  pxRect(-r * 0.4, -r * 0.3 + bob, 3, 3, 'rgba(255,40,20,0.4)');
  pxRect(r * 0.2, -r * 0.3 + bob, 3, 3, 'rgba(255,40,20,0.4)');

  pxRect(-r * 0.25, r * 0.3 + bob, r * 0.5, 2, '#1a0808');
}
