<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Rotwood 腐木镇</title>
<style>
:root{
  --navy:#17202B; --char:#242321; --parch:#D6C29A; --gold:#B18A45;
  --red:#743C38; --green:#30483A; --iron:#5B5C57; --paper:#B9A47A; --off:#E5DDC8;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--navy)}
#app{position:fixed;inset:0;overflow:hidden}
#scaler{position:absolute;left:50%;top:50%;width:1280px;height:720px;transform-origin:center center;
  overflow:hidden;background:var(--navy);font-family:Georgia,'Times New Roman',serif;
  user-select:none;-webkit-user-select:none;touch-action:none}
#c{position:absolute;inset:0}
#c canvas{display:block}
.hidden{display:none !important}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:40}
.panel{background:var(--off);border:1.5px solid var(--iron);box-shadow:4px 4px 0 rgba(0,0,0,.4);padding:18px 22px;color:var(--char)}
.btn{display:inline-block;background:var(--green);color:var(--off);border:1.5px solid var(--char);
  box-shadow:2px 2px 0 rgba(0,0,0,.45);padding:8px 18px;font-family:inherit;font-size:16px;cursor:pointer;text-align:center}
.btn:hover{filter:brightness(1.12)}
.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(0,0,0,.45)}
.btn.red{background:var(--red)}
.btn.gold{background:var(--gold);color:var(--char)}
.btn.iron{background:var(--iron)}
.btn.sel{outline:2px solid var(--gold);outline-offset:1px}
/* ---------- HUD ---------- */
#hud{position:absolute;inset:0;pointer-events:none;z-index:10}
#stats{position:absolute;left:14px;top:12px}
.bar{position:relative;width:190px;height:14px;background:var(--char);border:1.5px solid var(--iron);margin-bottom:5px;box-shadow:2px 2px 0 rgba(0,0,0,.35)}
.bar .fill{position:absolute;left:0;top:0;bottom:0;width:100%}
.fill.hp{background:var(--red)} .fill.hu{background:var(--gold)} .fill.th{background:var(--green)} .fill.st{background:var(--off)}
.bar .bl{position:absolute;left:5px;top:0;line-height:12px;font-size:10px;color:var(--off);letter-spacing:1px}
.bar.warn{animation:barBlink .7s steps(2) infinite}
@keyframes barBlink{50%{opacity:.4}}
#infBox{display:flex;align-items:center;margin-top:4px;color:var(--red);font-size:13px}
#infBox svg{margin-right:5px}
#topCenter{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center;color:var(--off)}
#waveTxt{font-size:20px;letter-spacing:2px;text-shadow:1px 1px 0 var(--char)}
#dayTxt{font-size:13px;margin-top:3px;color:var(--parch);display:flex;align-items:center;justify-content:center;gap:6px}
#comboTxt{font-size:19px;color:var(--gold);margin-top:2px;letter-spacing:3px;text-shadow:1px 1px 0 var(--char);min-height:23px;font-weight:bold}
#bossWrap{position:absolute;top:92px;left:50%;transform:translateX(-50%);width:420px;text-align:center}
#bossLbl{font-size:13px;color:#C05848;letter-spacing:3px;margin-bottom:3px;text-shadow:1px 1px 0 var(--char)}
#bossBar{height:12px;background:var(--char);border:1.5px solid var(--iron);box-shadow:2px 2px 0 rgba(0,0,0,.35)}
#bossFill{height:100%;width:100%;background:var(--red)}
#banner{position:absolute;left:0;right:0;top:27%;text-align:center;font-size:46px;letter-spacing:8px;color:var(--off);
  text-shadow:2px 2px 0 var(--char);opacity:0;transition:opacity .35s;pointer-events:none;z-index:16;font-weight:bold}
#pickHint{position:absolute;left:50%;bottom:28%;transform:translateX(-50%);background:rgba(20,20,18,0.85);
  border:2px solid #B18A45;border-radius:6px;padding:8px 18px;color:#E5DDC8;font-size:15px;
  pointer-events:none;z-index:15;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.5)}
#pickHint .pk{display:inline-block;background:#B18A45;color:#242321;font-weight:bold;padding:2px 8px;border-radius:4px;margin-right:6px}
#questP{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:25;text-align:center;min-width:320px;pointer-events:auto}
#questP .questCard{background:rgba(36,35,33,0.95);border:2px solid #5A6A4A;border-radius:8px;padding:12px 20px;margin:8px auto;max-width:380px}
#questP .questName{font-size:17px;color:#E5DDC8;font-weight:bold;margin-bottom:6px}
#questP .questBar{height:8px;background:#2A2A28;border-radius:4px;overflow:hidden;margin:6px 0}
#questP .questFill{height:100%;background:linear-gradient(90deg,#5A8A6A,#7AAA8A);transition:width .3s}
#questP .questDesc{font-size:13px;color:#A09884}
#attachP{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:25;text-align:center;min-width:320px;pointer-events:auto;max-height:80vh;overflow-y:auto}
#dmgLayer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:14}
.dmgN{position:absolute;font-size:17px;font-weight:bold;color:#fff;text-shadow:1px 1px 0 var(--char);
  pointer-events:none;transform:translate(-50%,-50%);white-space:nowrap}
#mmBox{position:absolute;right:14px;top:12px;text-align:right}
#mm{border:1.5px solid var(--iron);box-shadow:2px 2px 0 rgba(0,0,0,.4);background:var(--char)}
#killTxt{color:var(--off);font-size:13px;margin-top:4px;text-shadow:1px 1px 0 var(--char)}
#scoreTxt{color:var(--gold);font-size:13px;margin-top:2px;text-shadow:1px 1px 0 var(--char);letter-spacing:1px}
#wpnBox{position:absolute;right:14px;bottom:16px;text-align:right;color:var(--off)}
#wpnName{font-size:16px;letter-spacing:1px;text-shadow:1px 1px 0 var(--char)}
#durTxt{font-size:11px;color:var(--parch);margin-top:2px;text-shadow:1px 1px 0 var(--char);min-height:14px}
#ammoTxt{font-size:22px;color:var(--parch);margin-top:2px;text-shadow:1px 1px 0 var(--char)}
#relBar{width:130px;height:8px;background:var(--char);border:1.5px solid var(--iron);margin:6px 0 0 auto}
#relFill{height:100%;width:0%;background:var(--gold)}
#hotbar{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:flex;pointer-events:auto}
.hslot{width:56px;height:56px;background:var(--paper);border:1.5px solid var(--iron);margin:0 4px;position:relative;
  box-shadow:2px 2px 0 rgba(0,0,0,.4);cursor:pointer;display:flex;align-items:center;justify-content:center}
.hslot.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),2px 2px 0 rgba(0,0,0,.4)}
.hslot .key{position:absolute;left:3px;top:1px;font-size:10px;color:var(--char)}
.hslot .qty{position:absolute;right:3px;top:1px;font-size:11px;color:var(--char)}
.hslot .dwrap{position:absolute;left:4px;right:4px;bottom:3px;height:4px;background:var(--char)}
.hslot .dfill{height:100%;background:var(--gold)}
#msgTxt{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);color:var(--off);font-size:15px;
  text-shadow:1px 1px 0 var(--char);text-align:center;line-height:1.5}
#hurtFx{position:absolute;inset:0;background:rgba(116,60,56,.32);opacity:0;pointer-events:none;z-index:15}
#sideBtns{position:absolute;right:14px;top:196px;display:flex;flex-direction:column;gap:8px;pointer-events:auto}
.sbtn{width:44px;height:44px;background:var(--paper);border:1.5px solid var(--iron);box-shadow:2px 2px 0 rgba(0,0,0,.4);
  cursor:pointer;display:flex;align-items:center;justify-content:center}
.sbtn:hover{filter:brightness(1.08)}
/* ---------- tooltip ---------- */
#tip{position:absolute;z-index:60;background:var(--off);border:1.5px solid var(--iron);
  box-shadow:3px 3px 0 rgba(0,0,0,.4);padding:7px 11px;font-size:12px;color:var(--char);
  pointer-events:none;max-width:240px;line-height:1.55}
#tip .tn{font-size:14px;color:var(--red);letter-spacing:1px;display:block;margin-bottom:2px}
/* ---------- inventory / craft ---------- */
#invP,#craftP{position:absolute;z-index:30}
#invP{left:50%;top:50%;transform:translate(-50%,-50%);width:460px}
#craftP{left:50%;top:50%;transform:translate(-50%,-50%);width:470px}
.ptitle{font-size:18px;letter-spacing:2px;border-bottom:1.5px solid var(--iron);padding-bottom:6px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.pclose{cursor:pointer;font-size:14px;color:var(--red);border:1.5px solid var(--red);padding:1px 7px}
#invGrid{display:flex;flex-wrap:wrap;gap:8px}
.islot{width:64px;height:64px;background:var(--paper);border:1.5px solid var(--iron);position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.islot:hover{filter:brightness(1.06)}
.islot .qty{position:absolute;right:3px;bottom:1px;font-size:11px}
.islot .nm{position:absolute;left:0;right:0;bottom:-18px;font-size:10px;text-align:center;white-space:nowrap}
.islot .drop{position:absolute;top:2px;right:2px;width:14px;height:14px;line-height:12px;text-align:center;font-size:10px;background:rgba(180,40,40,.7);color:#fff;border-radius:7px;cursor:pointer;opacity:0;transition:opacity .15s}
.islot:hover .drop{opacity:1}
.islot[draggable=true]:hover{border-color:#B18A45;cursor:grab}
#invHint{font-size:12px;color:var(--iron);margin-top:24px;line-height:1.6}
#craftTabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ctab{padding:4px 12px;font-size:14px;background:var(--paper);border:1.5px solid var(--iron);cursor:pointer}
.ctab:hover{filter:brightness(1.08)}
.ctab.sel{background:var(--gold);color:var(--char);border-color:var(--char)}
.crow{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--paper)}
.crow .cname{font-size:15px;display:flex;align-items:center;gap:6px}
.crow .creq{font-size:12px;color:var(--iron);margin-top:2px}
.crow .creq .lack{color:var(--red);font-weight:bold}
.crow .btn{padding:4px 14px;font-size:14px}
.crow .btn.dis{background:var(--iron);cursor:default;opacity:.6}
.cprog{position:relative;width:96px;height:24px;background:var(--char);border:1.5px solid var(--iron);cursor:pointer}
.cprog .cfill{position:absolute;left:0;top:0;bottom:0;background:var(--gold);width:0%}
.cprog span{position:absolute;inset:0;text-align:center;font-size:12px;line-height:21px;color:var(--off)}
/* ---------- menu / death / pause ---------- */
#menu{background:rgba(23,32,43,.92)}
#menu .panel{width:540px;text-align:center}
#title{font-size:56px;letter-spacing:10px;color:var(--char);margin:4px 0 2px}
#subtitle{font-size:15px;color:var(--red);letter-spacing:3px;margin-bottom:16px}
.mrow{margin:10px 0}
#diffRow .btn{margin:0 5px;padding:5px 14px;font-size:14px}
#tut{font-size:12.5px;color:var(--iron);text-align:left;line-height:1.75;margin:14px 6px 4px;border-top:1px solid var(--paper);padding-top:10px}
#bestTxt{font-size:12px;color:var(--green);margin-top:8px}
#dead{background:rgba(36,20,18,.88)}
#dead .panel{width:460px;text-align:center}
#deadTitle{font-size:40px;letter-spacing:6px;color:var(--red);margin-bottom:12px}
.dst{font-size:15px;margin:5px 0;color:var(--char)}
#pause{background:rgba(23,32,43,.9);z-index:45}
#pause .panel{width:420px;text-align:center}
#pauseTitle{font-size:30px;letter-spacing:8px;color:var(--char);margin-bottom:12px}
#pause .btn{margin:5px 6px 0}
/* ---------- touch ---------- */
#touchUI{position:absolute;inset:0;pointer-events:none}
#joy{position:absolute;left:26px;bottom:96px;width:120px;height:120px;border:1.5px solid var(--iron);
  background:rgba(185,164,122,.35);border-radius:50%;pointer-events:auto}
#joyKnob{position:absolute;left:38px;top:38px;width:44px;height:44px;background:var(--paper);border:1.5px solid var(--iron);border-radius:50%}
#atkBtn{position:absolute;right:30px;bottom:104px;width:84px;height:84px;border-radius:50%;background:var(--red);
  border:1.5px solid var(--char);box-shadow:2px 2px 0 rgba(0,0,0,.45);pointer-events:auto;display:flex;align-items:center;justify-content:center}
#atkBtn:active{filter:brightness(1.2)}
.tbtn{position:absolute;width:54px;height:54px;border-radius:50%;background:var(--paper);
  border:1.5px solid var(--char);box-shadow:2px 2px 0 rgba(0,0,0,.45);pointer-events:auto;display:flex;align-items:center;justify-content:center}
.tbtn:active{filter:brightness(1.2)}
#rollBtn{right:44px;bottom:206px}
#relBtn{right:118px;bottom:190px}
.ico{display:block}
</style>
</head>

/* shared geometry / material cache */
const BOX=new THREE.BoxGeometry(1,1,1);
const CYL=new THREE.CylinderGeometry(0.5,0.5,1,7);
const CONE=new THREE.ConeGeometry(0.6,1,7);
const PYR=new THREE.ConeGeometry(0.72,1,4);
const RINGU=new THREE.RingGeometry(0.86,1,32);
const CIR=new THREE.CircleGeometry(1,20);
const MATC={};
function mat(c){ if(!MATC[c]) MATC[c]=new THREE.MeshLambertMaterial({color:c}); return MATC[c]; }
const BMATC={};
function bmat(c,op){ const k=c+'_'+(op||1); if(!BMATC[k]) BMATC[k]=new THREE.MeshBasicMaterial({color:c,transparent:op!==undefined&&op<1,opacity:op||1}); return BMATC[k]; }
function bx(w,h,d,c,x,y,z,parent,shadow){ const m=new THREE.Mesh(BOX,mat(c)); m.scale.set(w,h,d);
  m.position.set(x||0,y||0,z||0); if(shadow!==false){m.castShadow=true;} m.receiveShadow=true;
  (parent||scene).add(m); return m; }

function addObstacle(x,z,hw,hd){ obstacles.push({x,z,hw,hd}); }

function tree(x,z,big){
  const type=Math.random();
  const th=R(1.7,2.6)*(big?1.3:1);
  if(type<0.3){
    // 枯树 - 无叶，扭曲树干
    const tr=new THREE.Mesh(CYL,mat(0x4A3828)); tr.scale.set(0.3,th*1.2,0.3);
    tr.position.set(x,th*0.6,z); tr.rotation.z=R(-0.15,0.15); tr.castShadow=true; scene.add(tr);
    // 几根枯枝
    for(let i=0;i<3;i++){
      const br=new THREE.Mesh(CYL,mat(0x4A3828)); br.scale.set(0.06,R(0.8,1.5),0.06);
      br.position.set(x,th*1.0+i*0.2,z); br.rotation.set(0,R(0,3.14),R(0.8,1.4)); scene.add(br);
    }
  } else if(type<0.6){
    // 圆冠树 - 球形树冠
    const tr=new THREE.Mesh(CYL,mat(0x5A4632)); tr.scale.set(0.36,th,0.36);
    tr.position.set(x,th/2,z); tr.castShadow=true; scene.add(tr);
    const cols=[0x30483A,0x3A5644,0x2A3E32,0x4A6A44];
    for(let i=0;i<3;i++){
      const lv=new THREE.Mesh(new THREE.SphereGeometry(R(1.0,1.5),8,6),mat(pick(cols)));
      lv.position.set(x+R(-0.5,0.5),th+R(0.5,1.8),z+R(-0.5,0.5)); lv.scale.set(1,R(0.8,1.2),1);
      lv.castShadow=true; scene.add(lv);
    }
  } else {
    // 原始锥形树（增强版）
    const tr=new THREE.Mesh(CYL,mat(0x5A4632)); tr.scale.set(0.36,th,0.36);
    tr.position.set(x,th/2,z); tr.castShadow=true; scene.add(tr);
    const cols=[0x30483A,0x3A5644,0x2A3E32,0x3E5A3E];
    const n=big?3:2;
    for(let i=0;i<n;i++){
      const lv=new THREE.Mesh(CONE,mat(pick(cols)));
      const s=(big?3.2:2.4)-i*0.7;
      lv.scale.set(s*R(0.9,1.1),R(2.2,3.0)-i*0.3,s*R(0.9,1.1));
      lv.position.set(x+R(-0.15,0.15),th+0.7+i*1.1,z+R(-0.15,0.15));
      lv.castShadow=true; scene.add(lv);
    }
  }
  circles.push({x,z,r:0.55});
}

function house(x,z,w,d){
  const h=R(3.0,3.8), wc=pick([0xB9A47A,0xD6C29A,0x9A8B6A]);
  const roofC=pick([0x743C38,0x6B4A3A,0x5B5C57]);
  // 外壳建筑（进入后隐藏）
  const shell=new THREE.Group();
  const body=bx(w,h,d,wc,0,h/2,0,scene,false); body.castShadow=true; shell.add(body);
  const roof=new THREE.Mesh(PYR,mat(roofC));
  roof.scale.set(w*1.08,1.7,d*1.08); roof.position.set(0,h+0.85,0); roof.rotation.y=Math.PI/4;
  roof.castShadow=true; shell.add(roof);
  bx(0.5,1.0,0.5,0x8C8070,w/4,h+1.6,-d/4,shell,false); // chimney
  // 门（绿色标识可进入）
  bx(1.4,2.2,0.2,0x2A5A3A,0,1.1,-d/2-0.02,shell,false);
  bx(2.0,0.3,0.15,0xD4A84B,0,2.6,-d/2-0.02,shell,false); // 金色门楣
  // 窗户 - 夜间发光
  for(const s of [-1,1]){
    const winMesh=bx(0.9,0.9,0.15,0x2E3A45,s*w/4,h*0.6,-d/2+0.02,shell,false);
    winMesh.castShadow=false;
    windowGlow.push(winMesh);
  }
  shell.position.set(x,0,z); scene.add(shell);
  // 障碍物：左右后三面墙，门前留通道
  addObstacle(x-w/2-0.3,z,0.3,d/2);
  addObstacle(x+w/2+0.3,z,0.3,d/2);
  addObstacle(x,z+d/2+0.3,w/2,0.3);
  enterableBuildings.push({x,z,w,d,type:'house',label:T('居民屋','House'),entered:false,shell});
}

function gasStation(x,z){
  // canopy
  for(const [px,pz] of [[-3,-2],[3,-2],[-3,2],[3,2]]) bx(0.4,3.6,0.4,0x5B5C57,x+px,1.8,z+pz);
  bx(8,0.4,6,0xB9A47A,x,3.8,z);
  bx(8.4,0.5,0.6,0x743C38,x,4.05,z-3,scene,false).castShadow=false; // sign strip
  // pumps
  for(const px of [-1.6,1.6]){ bx(0.7,1.3,0.5,0x743C38,x+px,0.65,z); bx(0.5,0.4,0.52,0xE5DDC8,x+px,1.0,z,scene,false).castShadow=false; addObstacle(x+px,z,0.45,0.35); }
  // fuel tank (horizontal cylinder)
  const tk=new THREE.Mesh(CYL,mat(0x8C8070)); tk.scale.set(1.6,5,1.6);
  tk.rotation.z=Math.PI/2; tk.position.set(x+6,0.8,z+1); tk.castShadow=true; scene.add(tk);
  addObstacle(x+6,z+1,2.6,0.9);
  for(const [px,pz] of [[-3,-2],[3,-2],[-3,2],[3,2]]) addObstacle(x+px,z+pz,0.3,0.3);
  lootSpots.push({x:x,z:z+2.6}); lootSpots.push({x:x-4.6,z:z});
}

  const g=new THREE.Group();
  bx(3.4,0.7,1.6,col,0,0.55,0,g);
  bx(1.9,0.6,1.5,col,-0.2,1.2,0,g);
  bx(1.7,0.5,1.3,0x2E3A45,-0.2,1.25,0,g,false).castShadow=false;
  for(const [wx,wz] of [[-1.1,0.8],[1.1,0.8],[-1.1,-0.8],[1.1,-0.8]]){
    const wh=new THREE.Mesh(CYL,mat(0x242321)); wh.scale.set(0.55,0.3,0.55);
    wh.rotation.x=Math.PI/2; wh.position.set(wx,0.3,wz); g.add(wh);
  }
  g.position.set(x,flip?0.85:0,z); if(flip) g.rotation.z=Math.PI;
  g.traverse(o=>{if(o.isMesh)o.castShadow=true;});
  scene.add(g);
  addObstacle(x,z,1.9,1.1);
}

function hospital(x,z){
  // 医院：大型白色建筑+红十字
  const w=10,h=5,d=8;
  bx(w,h,d,0xD6D0C8,x,h/2,z);
  bx(w+0.6,0.3,d+0.6,0x4A4842,x,h+0.15,z,scene,false);
  // 红十字标志
  bx(0.3,2,0.15,0xC04038,x,h*0.65,z+d/2+0.02,scene,false);
  bx(1.8,0.3,0.15,0xC04038,x,h*0.65,z+d/2+0.02,scene,false);
  // 入口
  bx(2,3,0.15,0x2E3A45,x,h*0.3,z-d/2-0.02,scene,false);
  // 窗户
  for(const s of [-1,1]){
    for(let i=0;i<2;i++){
      const winMesh=bx(1.2,1.2,0.15,0x2E3A45,x+s*w/3,h*0.5+i*1.5,z+d/2+0.02,scene,false);
      windowGlow.push(winMesh);
    }
  }
  // 屋顶设备
  bx(2,0.8,1.5,0x5A5852,x-w/4,h+0.4,z,scene,false);
  bx(1.5,1.2,1,0x4A4842,x+w/4,h+0.6,z,scene,false);
  addObstacle(x,z,w/2+0.2,d/2+0.2);
  lootSpots.push({x:x+3,z:z+3}); lootSpots.push({x:x-3,z:z+3});
}
function military(x,z){
  // 军事哨站：沙袋墙+铁丝网+哨塔
  const w=8,d=8;
  // 沙袋围墙
  for(let i=-w/2;i<=w/2;i+=1.2){
    bx(0.9,0.7,0.7,0x6B6555,x+i,0.35,z-d/2,scene,false);
    bx(0.9,0.7,0.7,0x6B6555,x+i,0.35,z+d/2,scene,false);
    bx(0.7,0.7,0.9,0x6B6555,x-w/2,0.35,z+i,scene,false);
    bx(0.7,0.7,0.9,0x6B6555,x+w/2,0.35,z+i,scene,false);
  }
  // 哨塔
  const tower=bx(1.5,4,1.5,0x4A4842,x-w/2+1,2,z-d/2+1,scene,false); tower.castShadow=true;
  bx(2,0.2,2,0x3A3835,x-w/2+1,4.1,z-d/2+1,scene,false);
  // 军用帐篷
  const tent=new THREE.Mesh(PYR,mat(0x4A5A3E)); tent.scale.set(3,2,3);

  for(let i=0;i<3;i++){ bx(0.8,0.6,0.6,0x5A6A3A,x-1+i*0.9,0.3,z+2,scene,false); }

}

  const c=bx(6,2.5,2.5,col||pick([0x743C38,0x3A5A6A,0x5A6A3A,0x6B5B40]),x,1.25,z);

  for(let i=0;i<4;i++){ bx(6.02,0.08,2.5,0x000000,x,0.5+i*0.5,z,scene,false); }

function graveyard(x,z){
  // 墓地：墓碑群
  for(let i=0;i<12;i++){
    const gx=x+R(-5,5), gz=z+R(-5,5);
    const h=R(0.8,1.5);
    const stone=bx(R(0.4,0.7),h,R(0.1,0.2),pick([0x6A6A66,0x5A5A56,0x7A7A76]),gx,h/2,gz,scene,false);
    stone.castShadow=true;
    stone.rotation.y=R(-0.2,0.2);
    // 倾斜的墓碑
    if(Math.random()<0.3) stone.rotation.z=R(-0.15,0.15);
  }
  // 十字架
  for(let i=0;i<3;i++){
    const cx=x+R(-4,4), cz=z+R(-4,4);
    bx(0.15,1.5,0.15,0x5A4A3A,cx,0.75,cz,scene,false);
    bx(0.7,0.15,0.15,0x5A4A3A,cx,1.0,cz,scene,false);
  }
  // 枯树点缀
  tree(x+R(-5,5),z+R(-5,5),false);
}
function bridge(x,z,len,horiz){
  // 简易桥/高架步道
  const plank=bx(horiz?len:2,0.3,horiz?2:len,0x6B5B40,x,0.5,z,scene,false);
  plank.castShadow=true;
  // 栏杆
  for(let i=-len/2;i<=len/2;i+=2){
    const px=horiz?x+i:x, pz=horiz?z:z+i;
    bx(0.12,1,0.12,0x5A4A3A,horiz?px:x+(horiz?0:1),1,z+(horiz?1:0),scene,false);
    bx(0.12,1,0.12,0x5A4A3A,horiz?px:x-(horiz?0:1),1,z-(horiz?1:0),scene,false);
  }
}

  else if(type==='school'){ w=20; d=14; label=T('学校','School'); extColor=0x7A6A5A; roofColor=0x6A5A4A; }
  else if(type==='mall'){ w=22; d=16; label=T('购物中心','Shopping Mall'); extColor=0x5A6A7A; roofColor=0x4A5A6A; }
  else { w=14; d=10; label=T('仓库','Warehouse'); extColor=0x6B5B40; roofColor=0x5A4A30; }
  // 外壳建筑（进入后隐藏）
  const shell=new THREE.Group();
  const body=bx(w,4,d,extColor,0,2,0,scene,false); body.castShadow=true; shell.add(body);
  const roof=new THREE.Mesh(PYR,mat(roofColor));

  roof.castShadow=true; shell.add(roof);

  const door=bx(2,3,0.15,0x2A5A3A,0,1.5,-d/2-0.02,shell,false);

  bx(2.5,0.4,0.15,0xD4A84B,0,3.2,-d/2-0.02,shell,false);

  for(const s of [-1,1]){

    windowGlow.push(winMesh);
  }
  shell.position.set(x,0,z); scene.add(shell);
  // 障碍物：只在左右两侧和后方设置，门前留通道让玩家可以靠近
  addObstacle(x-w/2-0.3,z,0.3,d/2); // 左墙
  addObstacle(x+w/2+0.3,z,0.3,d/2); // 右墙
  addObstacle(x,z-d/2-0.3,w/2,0.3);  // 后墙
  enterableBuildings.push({x,z,w,d,type,label,entered:false,door,shell});
}
function enterBuilding(b){
  if(G.inBuilding) return;
  G.inBuilding=b;
  G._prevPos={x:P.x,z:P.z};
  // 隐藏建筑外壳
  b.shell.visible=false;
  // 在独立室内场景中构建内部
  buildInterior(b);
  // 玩家位置重置到室内门口
  P.x=0; P.z=b.d/2-1;
  // 清除附近僵尸（它们不应该跟着进室内）
  for(let i=zombies.length-1;i>=0;i--){
    if(Math.hypot(zombies[i].x-G._prevPos.x,zombies[i].z-G._prevPos.z)<15){
      scene.remove(zombies[i].mesh); zombies.splice(i,1);
    }
  }
  // 添加玩家模型到室内场景
  if(P.mesh) interiorScene.add(P.mesh);
  // 生成室内僵尸（根据建筑面积决定数量）
  G._interiorZombies=[];
  G._interiorSpawnT=75; // 75秒后刷新下一波僵尸
  G._interiorWave=1;
  const indoorTypes=['walker','runner','crawler','spitter','hunter'];
  const area=b.w*b.d;
  const isSmall=area<120;
  const isLarge=area>=250;
  const numZ=isSmall?RI(1,2):isLarge?RI(3,4):RI(2,3);
  const w=b.w-1, d=b.d-1;
  for(let i=0;i<numZ;i++){
    const zx=R(-w/2+0.5,w/2-0.5), zz=R(-d/2+0.5,-1); // 在房间后部
    spawnInteriorZombie(zx,zz,pick(indoorTypes));
  }
  // 室内额外随机生成僵尸，小建筑不额外生成
  const extraZ=isSmall?0:isLarge?RI(1,2):RI(0,1);
  for(let i=0;i<extraZ;i++){
    const zx=R(-w/2+0.5,w/2-0.5), zz=R(-d/2+0.5,d/2-1);
    spawnInteriorZombie(zx,zz,pick(indoorTypes));
  }
  showBanner(T('进入 '+b.label,'Entered '+b.label),'#5A8A6A',1.5);
  showMsg(T('按 C 键离开建筑','Press C to exit building'));
}
function spawnInteriorZombie(x,z,type){
  // 支持不同僵尸类型，使用ZT定义的属性
  const zt=type||'walker';
  const c=ZT[zt]||ZT.walker;
  const df=DIFF[G.diff];
  const zb={x,z,hp:c.hp*df.hp,maxHp:c.hp*df.hp,spd:c.spd*df.spd*0.6,dmg:c.dmg*df.dmg*0.8,dir:0,atkCd:0,state:'chase',mesh:null,type:zt,c,flash:0};
  const g=new THREE.Group();
  const body=new THREE.Mesh(BOX,new THREE.MeshLambertMaterial({color:c.shirt}));
  body.scale.set(0.5,0.9,0.3); body.position.y=0.9; body.castShadow=true; g.add(body);
  const head=new THREE.Mesh(BOX,new THREE.MeshLambertMaterial({color:c.skin}));
  head.scale.set(0.35,0.35,0.35); head.position.y=1.6; g.add(head);
  g.position.set(x,0,z); interiorScene.add(g);
  zb.mesh=g;
  G._interiorZombies.push(zb);
}
function updateInteriorZombies(dt){
  if(!G.inBuilding||!G._interiorZombies) return;
  const w=G.inBuilding.w-1, d=G.inBuilding.d-1;
  // 定期刷新僵尸（每60秒一波），防止玩家在屋内逗留过久
  if(G._interiorSpawnT!==undefined){
    G._interiorSpawnT-=dt;
    // 10秒倒计时警告
    if(G._interiorSpawnT<=10&&G._interiorSpawnT+dt>10){
      showMsg(T('僵尸正在接近建筑！','Zombies are approaching the building!'));
    }
    if(G._interiorSpawnT<=0){
      G._interiorWave=(G._interiorWave||1)+1;
      // 每波数量根据建筑大小递增，小建筑最多3只，大建筑最多6只
      const area2=G.inBuilding.w*G.inBuilding.d;
      const maxZ=area2<120?3:area2>=250?6:4;
      const numZ=Math.min(1+G._interiorWave,maxZ);
      const waveTypes=['walker','runner','crawler','spitter','hunter','screamer'];
      // 从门窗涌入，生成在房间边缘
      for(let i=0;i<numZ;i++){
        const side=RI(0,2); // 0=左侧门, 1=右侧门, 2=后窗
        let zx,zz;
        if(side===0){ zx=-w/2+0.5; zz=R(-d/2+0.5,d/2-1); }
        else if(side===1){ zx=w/2-0.5; zz=R(-d/2+0.5,d/2-1); }
        else { zx=R(-w/2+0.5,w/2-0.5); zz=-d/2+0.5; }
        spawnInteriorZombie(zx,zz,pick(waveTypes));
      }
      showBanner(T('第 '+G._interiorWave+' 波僵尸涌入！','Wave '+G._interiorWave+' zombies surge in!'),'#8A3A3A',1.5);
      G.shake=0.4; // 屏幕震动反馈
      G._interiorSpawnT=75; // 重置计时器
    }
  }
  for(let i=G._interiorZombies.length-1;i>=0;i--){
    const zb=G._interiorZombies[i];
    // 死亡处理（子弹和近战伤害由 updateBullets/doMeleeDamage 负责）
    if(zb.hp<=0){
      bloodBurst(zb.x,1.0,zb.z,8);
      interiorScene.remove(zb.mesh);
      G._interiorZombies.splice(i,1);
      G.kills++; updateQuestProgress('kill',1);
      if(Math.random()<0.4) spawnInteriorLoot(zb.x,zb.z);
      continue;
    }
    // 受击闪烁
    if(zb.flash>0){
      zb.flash-=dt;
      zb.mesh.traverse(o=>{ if(o.isMesh){ if(!o.userData.om) o.userData.om=o.material;
        o.material=zb.flash>0?mat(0xC04038):o.userData.om; }});
    }
    const dx=P.x-zb.x, dz=P.z-zb.z;
    const dist=Math.hypot(dx,dz)||1;
    if(dist>0.8){
      const sp=zb.spd*dt;
      zb.x+=dx/dist*sp; zb.z+=dz/dist*sp;
    } else {
      // 攻击玩家
      zb.atkCd-=dt;
      if(zb.atkCd<=0){ zb.atkCd=1.0; damagePlayer(zb.dmg,RI(3,8)); G.shake=0.3; }
    }
    zb.x=clamp(zb.x,-w/2+0.3,w/2-0.3);
    zb.z=clamp(zb.z,-d/2+0.3,d/2-0.3);
    zb.dir=Math.atan2(dx,dz);
    zb.mesh.position.set(zb.x,0,zb.z);
    zb.mesh.rotation.y=zb.dir;
  }
}
function spawnInteriorLoot(x,z){
  const id=pick(['can','water','bandage','scrap','nails','ammo9','fuel','shell']);
  G._interiorLoot=G._interiorLoot||[];
  const mesh=bx(0.3,0.3,0.3,0xD4A84B,x,0.15,z,interiorScene,false);

function exitBuilding(){
  if(!G.inBuilding) return;
  // 移除室内场景所有物体
  if(G._interior){ for(const m of G._interior) interiorScene.remove(m); G._interior=null; }
  // 恢复建筑外壳显示
  G.inBuilding.shell.visible=true;
  // 玩家模型移回主场景
  if(P.mesh){ interiorScene.remove(P.mesh); scene.add(P.mesh); }
  // 清除室内僵尸和掉落物
  if(G._interiorZombies){ for(const z of G._interiorZombies) interiorScene.remove(z.mesh); G._interiorZombies=null; }
  if(G._interiorLoot){ for(const l of G._interiorLoot) interiorScene.remove(l.mesh); G._interiorLoot=null; }
  G._interiorSpawnT=undefined; G._interiorWave=undefined; // 清除刷新计时器
  // 恢复玩家位置（在门外）
  const b=G.inBuilding;
  P.x=b.x; P.z=b.z+b.d/2+2;
  showMsg(T('离开了建筑','Left the building'));
  G.inBuilding=null;
}

  floor.rotation.x=-Math.PI/2; floor.position.y=0.02; floor.receiveShadow=true; interiorScene.add(floor); addM(floor);

    addM(bx(1.2,0.8,0.8,0x6B5B40,0,0.4,d/4,interiorScene,false));

    addM(bx(0.4,0.5,0.4,0x5A4A30,0.5,0.25,d/4,interiorScene,false));
    addM(bx(1.5,0.6,0.4,0x3A3A38,0,0.3,-d/2+0.3,interiorScene,false));

function trySearchInterior(){
  if(!G.inBuilding||!G._interiorSearchables) return false;
  for(const s of G._interiorSearchables){
    if(s.searched) continue;
    if(Math.hypot(P.x-s.x,P.z-s.z)<1.5){
      s.searched=true;
      s.mesh.material=mat(0x3A3A38);
      const qty=RI(1,3);
      addInv(s.loot,qty);
      updateQuestProgress('lootW',1);
      AU.pickup();
      showMsg(T('搜查获得 '+itemName(s.loot)+' ×'+qty,'Searched: '+itemName(s.loot)+' ×'+qty));
      return true;
    }
  }
  return false;
}
function updateEnterable(dt){
  if(G.inBuilding){
    // 限制玩家在室内
    const w=G.inBuilding.w-1, d=G.inBuilding.d-1;
    P.x=clamp(P.x,-w/2+0.5,w/2-0.5);
    P.z=clamp(P.z,-d/2+0.5,d/2-0.5);
    // 检查附近可搜查容器
    G._nearSearch=null;
    for(const s of G._interiorSearchables||[]){
      if(s.searched) continue;
      if(Math.hypot(P.x-s.x,P.z-s.z)<1.5){ G._nearSearch=s; break; }
    }
    // 检查附近掉落物
    G._nearInteriorLoot=null;
    for(const l of G._interiorLoot||[]){
      if(Math.hypot(P.x-l.x,P.z-l.z)<1.2){ G._nearInteriorLoot=l; break; }
    }
    return;
  }
  // 检查是否在可进入建筑门口
  G._nearBuilding=null;
  for(const b of enterableBuildings){
    const dist=Math.hypot(P.x-b.x,P.z-b.z);
    if(dist<3.5){ G._nearBuilding=b; break; }
  }
}
function pickupInteriorLoot(){
  if(!G._nearInteriorLoot) return false;
  const l=G._nearInteriorLoot;
  addInv(l.id,l.qty);
  interiorScene.remove(l.mesh);
  const idx=G._interiorLoot.indexOf(l);
  if(idx>=0) G._interiorLoot.splice(idx,1);
  AU.pickup();
  showMsg(T('拾取了 '+itemName(l.id),'Picked up '+itemName(l.id)));
  G._nearInteriorLoot=null;
  return true;
}

function trySearch(){
  for(const s of searchables){
    if(s.searched) continue;
    if(Math.hypot(P.x-s.x,P.z-s.z)<2.5){
      s.searched=true;
      // 变色表示已搜查
      s.mesh.material=mat(0x3A3A38);
      const qty=RI(1,3);
      addInv(s.loot,qty);
      updateQuestProgress('lootW',1);
      AU.pickup();
      showMsg(T('搜查'+(s.type==='cabinet'?'文件柜':s.type==='locker'?'储物柜':'板条箱')+'：获得 '+itemName(s.loot)+' ×'+qty,
        'Searched '+(s.type==='cabinet'?'cabinet':s.type==='locker'?'locker':'crate')+': '+itemName(s.loot)+' ×'+qty));
      return true;
    }
  }
  return false;
}
function updateSearchables(dt){
  // 检查附近可搜查容器
  G._nearSearch=null;
  for(const s of searchables){
    if(s.searched) continue;
    if(Math.hypot(P.x-s.x,P.z-s.z)<2.5){ G._nearSearch=s; break; }
  }
}
function hitExpBarrel(barrel,dmg){
  barrel.hp-=dmg/30;
  if(barrel.hp<=0){
    // 爆炸
    explodeAt(barrel.x,0.5,barrel.z,60,4);
    scene.remove(barrel.mesh);
    expBarrels.splice(expBarrels.indexOf(barrel),1);
  }
}

    const fenceCol=0x4A4842, postCol=0x5A5650;
    const seg=4; // 每段4单位
    for(let i=-HALF;i<=HALF;i+=seg){
      // 北边(z=-HALF)
      const fn=bx(3.5,1.2,0.15,fenceCol,i+seg/2,0.6,-HALF,scene,false); fn.castShadow=true;
      const pn=bx(0.2,1.5,0.2,postCol,i,0.75,-HALF,scene,false); pn.castShadow=true;
      // 南边(z=HALF)
      const fs=bx(3.5,1.2,0.15,fenceCol,i+seg/2,0.6,HALF,scene,false); fs.castShadow=true;
      const ps=bx(0.2,1.5,0.2,postCol,i,0.75,HALF,scene,false); ps.castShadow=true;
      // 东边(x=HALF)
      if(i>-HALF+seg){
        const fe=bx(0.15,1.2,3.5,fenceCol,HALF,0.6,i+seg/2,scene,false); fe.castShadow=true;
      }
      const pe=bx(0.2,1.5,0.2,postCol,HALF,0.75,i,scene,false); pe.castShadow=true;
      // 西边(x=-HALF)
      if(i>-HALF+seg){
        const fw=bx(0.15,1.2,3.5,fenceCol,-HALF,0.6,i+seg/2,scene,false); fw.castShadow=true;
      }
      const pw=bx(0.2,1.5,0.2,postCol,-HALF,0.75,i,scene,false); pw.castShadow=true;
    }
    // 角落的废弃瞭望塔
    for(const [cx,cz] of [[-HALF,-HALF],[HALF,-HALF],[-HALF,HALF],[HALF,HALF]]){
      const tower=bx(2,5,2,0x4A4540,cx,2.5,cz,scene,false); tower.castShadow=true;
      const roof=new THREE.Mesh(PYR,mat(0x5A4A3A)); roof.scale.set(2.4,1.2,2.4); roof.position.set(cx,6,cz); roof.castShadow=true; scene.add(roof);
      // 塔顶栏杆
      bx(2.2,0.3,0.1,0x3A3835,cx,5.2,cz-1,scene,false);
      bx(2.2,0.3,0.1,0x3A3835,cx,5.2,cz+1,scene,false);
    }
  }
  buildBoundary();
  // 可搜查容器散布
  for(let i=0;i<25;i++){
    const x=R(-HALF+5,HALF-5), z=R(-HALF+5,HALF-5);
    if(Math.hypot(x,z)<10) continue;
    let bad=false;
    for(const o of obstacles){ if(Math.abs(x-o.x)<o.hw+1&&Math.abs(z-o.z)<o.hd+1){bad=true;break;} }
    if(!bad) spawnSearchable(x,z,pick(['cabinet','locker','crate','crate','cabinet']));
  }
  // 爆炸桶
  for(let i=0;i<12;i++){
    const x=R(-HALF+5,HALF-5), z=R(-HALF+5,HALF-5);
    if(Math.hypot(x,z)<15) continue;
    let bad=false;
    for(const o of obstacles){ if(Math.abs(x-o.x)<o.hw+1&&Math.abs(z-o.z)<o.hd+1){bad=true;break;} }
    if(!bad) spawnExpBarrel(x,z);
  }

  // safe house
  const sh=bx(5,2.6,4,0x8C8070,-5,1.3,-5); sh.castShadow=true;
  const shr=new THREE.Mesh(PYR,mat(0x30483A)); shr.scale.set(5.6,1.4,4.6);
  shr.position.set(-5,3.3,-5); shr.rotation.y=Math.PI/4; shr.castShadow=true; scene.add(shr);
  addObstacle(-5,-5,2.65,2.15);
  // sandbags ring arc
  for(let a=0;a<10;a++){
    const ang=a/10*Math.PI*2;
    if(Math.abs(ang-Math.PI*0.25)<0.9) continue; // entrance gap
    const sx=Math.cos(ang)*6.6, sz=Math.sin(ang)*6.6;
    const sb=bx(1.1,0.5,0.6,0x9A8B6A,sx,0.25,sz,scene,false);
    sb.rotation.y=-ang; sb.castShadow=true;
  }
  // flag
  const fp=new THREE.Mesh(CYL,mat(0x5B5C57)); fp.scale.set(0.08,4.6,0.08);
  fp.position.set(-5,5.4,-5); scene.add(fp);
  const fl=bx(1.2,0.7,0.06,0xB18A45,-4.3,7.2,-5,scene,false); fl.castShadow=false;
  const ring=new THREE.Mesh(new THREE.RingGeometry(7.4,7.9,40),bmat(0xB18A45,0.55));
  ring.material.side=THREE.DoubleSide;
  ring.rotation.x=-Math.PI/2; ring.position.set(0,0.06,0); scene.add(ring);
  lootSpots.push({x:-5,z:-1.6});
}

  const head=bx(0.4*s,0.4*s,0.38*s,c.skin,0,c.crawl?0.62:legH+0.98*s,c.crawl?0.42:0,g);
  const e1=bx(0.07,0.05,0.03,0xB13A32,-0.09*s,(c.crawl?0.66:legH+1.02*s),(c.crawl?0.62:0.2),g,false);

  bx(0.16*s,0.6*s,0.16*s,c.skin,0,-0.26*s,0,lArm);
  const rArm=new THREE.Group(); rArm.position.set(0.4*s,torsoY+0.25*s,c.crawl?0.15:0); g.add(rArm);

  lArm.rotation.x=c.crawl?-0.4:-1.25; rArm.rotation.x=c.crawl?-0.5:-1.25;
  const lLeg=new THREE.Group(); lLeg.position.set(-0.16*s,c.crawl?0.3:legH,c.crawl?-0.15:0); g.add(lLeg);

  bx(0.2*s,legH*s,0.22*s,c.pants,0,-legH*s/2,0,rLeg);

  if(c.boss){
    bx(0.4*s,0.22*s,0.44*s,0x4A4A42,-0.32*s,torsoY+0.42*s,0,g);

  const c=ZT[type], df=DIFF[G.diff];

function killZombie(zb){
  if(zb.dead) return;
  zb.dead=1; zb.deadT=0;
  G.kills++;
  // 任务进度
  updateQuestProgress('killZ',1);
  if(zb.type==='runner') updateQuestProgress('killRun',1);
  if(zb.type==='spitter') updateQuestProgress('killSpit',1);
  if(zb._headshot) updateQuestProgress('headshot',1);
  // XP 经验值
  const xpGain=zb.c.boss?100:zb.c.score||10;
  
  // combo & score
  G.combo=(G.comboT>0)?G.combo+1:1; G.comboT=4;
  const base=zb.c.score||10;
  const pts=Math.round(base*(1+G.combo*0.1));
  G.score+=pts;
  if(G.combo>=2) AU.combo(G.combo);
  bloodBurst(zb.x,1.0,zb.z,10);
  if(zb.c.explode){
    AU.explode();
    bloodBurst(zb.x,1.2,zb.z,26,0x7A8A55);
    showRing(zb.x,zb.z,4.2,0xC04038,0.3,null);
    const dp=Math.hypot(P.x-zb.x,P.z-zb.z);
    if(dp<4.2){ damagePlayer(34*(1-dp/5.5),0); G.shake=Math.max(G.shake,0.5); }
    for(const o of zombies){ if(o!==zb&&!o.dead){
      const d=Math.hypot(o.x-zb.x,o.z-zb.z);
      if(d<4.2) hitZombie(o,55,zb.x,zb.z,0.5);
    }}
    for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
      if(Math.hypot(b.x-zb.x,b.z-zb.z)<4.2) damageBarricade(b,80,i); }
  }
  // drops - 拾荒直觉技能提升掉落率
  const lootBoost=P.lootBonusT>0;
  const roll=Math.random();
  if(zb.c.boss){
    dropLoot(zb.x,zb.z,'medkit',1);
    dropLoot(zb.x+0.8,zb.z,pick(['ammo762','shell','ammo9']),RI(10,16));
    dropLoot(zb.x-0.8,zb.z,pick(['rifle','smg','sledge']),1);
    if(zb.c.queen){
      // 虫群女王额外掉落
      dropLoot(zb.x,zb.z+0.8,'railgun',1);
      dropLoot(zb.x,zb.z-0.8,'medkit',1);
      dropLoot(zb.x+1.2,zb.z,'bolt',RI(8,15));
      checkAch('brute1');
      showBanner(T('虫群女王被击败！','SWARM QUEEN SLAIN!'),'#D4A84B',3);
    } else {
      checkAch('brute1');
    }
  }
  else if(roll<(lootBoost?0.45:0.35)) dropLoot(zb.x,zb.z,pick(['can','water','bandage','cloth','wood']),1);
  else if(roll<(lootBoost?0.75:0.60)) dropLoot(zb.x,zb.z,pick(['ammo9','shell','ammo762','scrap']),RI(8,16));
  else if(roll<(lootBoost?0.90:0.75)) dropLoot(zb.x,zb.z,pick(['wood','cloth','nails','scrap','fuel']),RI(2,5));
  else if(zb.type==='survivor'&&Math.random()<(lootBoost?0.75:0.55)) dropLoot(zb.x,zb.z,pick(['crowbar','axe','pistol','machete','smg']),1);
  else if(zb.type==='tank') dropLoot(zb.x,zb.z,pick(['medkit','rifle','ammo762']),RI(2,6));
  else if(zb.type==='spitter'&&Math.random()<(lootBoost?0.85:0.65)) dropLoot(zb.x,zb.z,pick(['fuel','flamethrower','shell','molotov']),1);
  else if(zb.type==='brute2') dropLoot(zb.x,zb.z,pick(['railgun','rocket','shotgun2','ammo762','medkit']),RI(1,3));
  // 拾荒直觉加成：额外材料掉落
  if(lootBoost && !zb.c.boss && Math.random()<0.5){
    dropLoot(zb.x+R(-0.6,0.6),zb.z+R(-0.6,0.6),pick(['scrap','nails','cloth','wood','ammo9']),RI(2,6));
  }
  // 蓝图掉落（基础蓝图低概率，高级蓝图后期/强敌掉落）
  const advTypes=['brute2','tank','spitter','hunter','sniper'];
  const isAdv=advTypes.includes(zb.type);
  const bpChance=G.wave>=10?0.12:G.wave>=5?0.08:0.05;
  if(Math.random()<bpChance){
    const bps=['bp_pistol','bp_smg','bp_shotgun','bp_rifle'];
    // 高级蓝图：10波后或强敌才掉
    if(G.wave>=10||isAdv){
      bps.push('bp_flame','bp_rocket','bp_rail','bp_shotgun2','bp_mine','bp_turret');
    }
    const bp=pick(bps);
    if(!(G.blueprints||[]).includes(bp)){
      G.blueprints=G.blueprints||[];
      G.blueprints.push(bp);
      showMsg(T('发现蓝图：','Found blueprint: ')+bpName(bp));
      AU.ui();
    }
  }
}
function bpName(bp){
  const m={bp_pistol:['手枪蓝图','Pistol BP'],bp_smg:['冲锋枪蓝图','SMG BP'],bp_shotgun:['霰弹枪蓝图','Shotgun BP'],bp_rifle:['步枪蓝图','Rifle BP'],
    bp_flame:['喷火器蓝图','Flamethrower BP'],bp_rocket:['火箭筒蓝图','Rocket BP'],bp_rail:['电磁炮蓝图','Railgun BP'],bp_shotgun2:['战斗霰弹枪蓝图','Combat Shotgun BP'],
    bp_mine:['地雷蓝图','Land Mine BP'],bp_turret:['炮台蓝图','Sentry Turret BP']};
  return T((m[bp]||['蓝图','Blueprint'])[0],(m[bp]||['Blueprint','Blueprint'])[1]);
}

function hitZombie(zb,dmg,fx,fz,kb,crit){
  if(zb.dead) return;
  // 虫群女王护盾
  if(zb.qShield){
    spawnDmg(zb.x,2.2,zb.z,'BLOCK',0);
    showRing(zb.x,zb.z,1.5,0xAA6AE0,0.3,null);
    return;
  }
  zb.hp-=dmg; zb.flash=0.12;
  AU.hitF();
  bloodBurst(zb.x,1.0,zb.z,crit?7:4);
  spawnDmg(zb.x,1.9*zb.c.scale,zb.z,Math.round(dmg)+(crit?'!':''),crit);
  showHpBar(zb);
  if(kb){ const d=Math.hypot(zb.x-fx,zb.z-fz)||1;
    const k=kb*((zb.type==='tank'||zb.c.boss)?0.2:1);
    zb.kbx+=(zb.x-fx)/d*k; zb.kbz+=(zb.z-fz)/d*k; }
  if(zb.hp<=0) killZombie(zb);
}

function enterChase(zb){
  zb.state='chase'; zb.loseT=0;
  // pack aggro share（扩大群体追击范围）
  for(const o of zombies){ if(o===zb||o.dead) continue;
    if(o.state==='idle'||o.state==='investigate'){
      if(Math.hypot(o.x-zb.x,o.z-zb.z)<12){ o.state='chase'; o.loseT=0; o.lastX=P.x; o.lastZ=P.z; }
    }
  }
  if(zb.c.scream&&!zb.screamed){ zb.screamed=1; AU.groan(2);
    for(const o of zombies){ if(!o.dead&&(o.state==='idle'||o.state==='investigate')&&Math.hypot(o.x-zb.x,o.z-zb.z)<30){ o.state='chase'; o.loseT=0; } }
  }
}

function blockedAt(x,z,rad){
  for(const o of obstacles){ if(Math.abs(x-o.x)<o.hw+rad&&Math.abs(z-o.z)<o.hd+rad) return true; }
  for(const o of circles){ const dx=x-o.x,dz=z-o.z; if(dx*dx+dz*dz<(o.r+rad)*(o.r+rad)) return true; }
  return false;
}
function steer(zb,mvx,mvz){
  const rad=0.42*zb.c.scale;
  const lookAhead=2.0; // 更远距离检测
  // 如果当前方向可行，检查前方更远是否也可行
  if(!blockedAt(zb.x+mvx*lookAhead,zb.z+mvz*lookAhead,rad)){
    // 前方可行，再检查更远处是否有障碍
    if(!blockedAt(zb.x+mvx*lookAhead*2,zb.z+mvz*lookAhead*2,rad)) return [mvx,mvz];
    // 远处有障碍，提前转向
    const turnDir=zb._lastTurn||1;
    for(const a of [Math.PI/4*turnDir,-Math.PI/4*turnDir,Math.PI/2*turnDir,-Math.PI/2*turnDir]){
      const c=Math.cos(a), s=Math.sin(a);
      const rx=mvx*c-mvz*s, rz=mvx*s+mvz*c;
      if(!blockedAt(zb.x+rx*lookAhead,zb.z+rz*lookAhead,rad)){ zb._lastTurn=turnDir; return [rx,rz]; }
    }
    return [mvx,mvz];
  }
  // 当前方向被阻挡，尝试更多角度
  const angles=[Math.PI/8,-Math.PI/8,Math.PI/6,-Math.PI/6,Math.PI/4,-Math.PI/4,Math.PI/3,-Math.PI/3,Math.PI/2,-Math.PI/2,Math.PI*2/3,-Math.PI*2/3,Math.PI*3/4,-Math.PI*3/4];
  for(const a of angles){
    const c=Math.cos(a), s=Math.sin(a);
    const rx=mvx*c-mvz*s, rz=mvx*s+mvz*c;
    if(!blockedAt(zb.x+rx*1.6,zb.z+rz*1.6,rad)){ zb._lastTurn=a>0?1:-1; return [rx,rz]; }
  }
  // 最后尝试纯X或纯Z
  if(!blockedAt(zb.x+mvx*1.4,zb.z,rad)) return [mvx,0];
  if(!blockedAt(zb.x,zb.z+mvz*1.4,rad)) return [0,mvz];
  return [mvx,mvz];
}

function stompHit(zb){
  const r=zb.c.boss?4.6:3.6;
  AU.stomp();
  G.shake=Math.max(G.shake,0.4);
  bloodBurst(zb.x,0.4,zb.z,10,0x6B5B40);
  const dp=Math.hypot(P.x-zb.x,P.z-zb.z);
  if(dp<r){ damagePlayer(zb.c.boss?30:20,0);
    const d=dp||1; P.kbx+=(P.x-zb.x)/d*7.5; P.kbz+=(P.z-zb.z)/d*7.5; }
  for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
    if(Math.hypot(b.x-zb.x,b.z-zb.z)<r) damageBarricade(b,45,i); }
}

function zombieAI(zb,dt,idx){
  const night=nightFactor()>0.5;
  const bmNight=G.bloodMoon&&night;
  if(zb.dead){
    zb.deadT+=dt;
    zb.mesh.rotation.x=lerp(zb.mesh.rotation.x,-Math.PI/2,dt*8);
    zb.mesh.position.y=lerp(zb.mesh.position.y,0.15,dt*8);
    if(zb.deadT>1.4){ zb.mesh.position.y-=dt*0.6; }
    if(zb.deadT>2.2) removeZombie(zb,idx);
    return;
  }
  // rise from ground
  if(zb.rise>0){
    zb.rise-=dt;
    zb.mesh.position.y=-1.2*Math.max(0,zb.rise);
    return;
  }
  if(zb.flash>0){ zb.flash-=dt;
    zb.mesh.traverse(o=>{ if(o.isMesh){ if(!o.userData.om) o.userData.om=o.material;
      o.material=zb.flash>0?mat(0xC04038):o.userData.om; }});
  }
  // 燃烧持续伤害
  if(zb.burnT>0){
    zb.burnT-=dt;
    zb._burnTick=(zb._burnTick||0)+dt;
    if(zb._burnTick>=0.5){
      zb._burnTick=0;
      hitZombie(zb,zb.burnDmg||6,0,0,0.05);
      // 燃烧粒子
      spawnP(zb.x,R(0.5,1.5),zb.z,R(-0.3,0.3),R(0.5,1.5),R(-0.3,0.3),0.3,10,0.05,0xFF6A22);
    }
    // 燃烧时身体发红
    if(zb.mesh.userData&&zb.mesh.userData.burnMat===undefined){
      zb.mesh.traverse(o=>{ if(o.isMesh){ o.userData.om=o.material; }});
    }
  }
  zb.x+=zb.kbx*dt*8; zb.z+=zb.kbz*dt*8;
  zb.kbx*=Math.pow(0.001,dt); zb.kbz*=Math.pow(0.001,dt);

  // spike traps
  zb.spkCd=Math.max(0,zb.spkCd-dt);
  for(let i=spikesArr.length-1;i>=0;i--){ const s=spikesArr[i];
    if(Math.abs(zb.x-s.x)<s.hw&&Math.abs(zb.z-s.z)<s.hd){
      if(zb.spkCd<=0){ zb.spkCd=0.5; hitZombie(zb,9,s.x,s.z,0.1); AU.spike(); damageDefense(spikesArr,i,5*dt,null); }
      if(zb.dead) break;
    } }
  if(zb.dead) return;

  // barbed wire - 减速+持续伤害
  zb.wireCd=Math.max(0,(zb.wireCd||0)-dt);
  for(let i=wireArr.length-1;i>=0;i--){ const w=wireArr[i];
    if(Math.abs(zb.x-w.x)<w.hw&&Math.abs(zb.z-w.z)<w.hd){
      zb.spdMult=(zb.spdMult||1)*0.4; // 减速60%
      if(zb.wireCd<=0){ zb.wireCd=0.4; hitZombie(zb,6,w.x,w.z,0.05); }
      damageDefense(wireArr,i,8*dt,T('铁丝网损坏了。','Barbed wire broke.'));
      if(zb.dead) break;
    } }
  if(zb.dead) return;

  // land mines - 触碰爆炸
  for(let i=mineArr.length-1;i>=0;i--){ const mn=mineArr[i];
    if(Math.abs(zb.x-mn.x)<mn.hw&&Math.abs(zb.z-mn.z)<mn.hd){
      scene.remove(mn.m); mineArr.splice(i,1);
      explodeAt(mn.x,1,mn.z,60,4); AU.explode(); G.shake=0.3;
      for(const z2 of zombies){ if(z2.dead) continue;
        const d=Math.hypot(z2.x-mn.x,z2.z-mn.z);
        if(d<4) hitZombie(z2,60*(1-d/4),mn.x,mn.z,2); }
      break;
    } }

  const dx=P.x-zb.x, dz=P.z-zb.z;
  const dist=Math.hypot(dx,dz);
  // 玩家在建筑内时，僵尸在门外徘徊（不追入室内）
  if(G.inBuilding){
    const b=G.inBuilding;
    // 僵尸移动到建筑门口附近后停下
    const doorX=b.x, doorZ=b.z+b.d/2+1;
    const ddx=doorX-zb.x, ddz=doorZ-zb.z;
    const ddist=Math.hypot(ddx,ddz);
    if(ddist>2){
      const sp=zb.spd*0.6;
      const mv=steer(zb,ddx/ddist*sp,ddz/ddist*sp);
      zb.x+=mv[0]*dt; zb.z+=mv[1]*dt;
    }
    zb.dir=Math.atan2(b.x-zb.x,b.z-zb.z);
    zb.mesh.rotation.y=zb.dir;
    // 不攻击玩家
    return;
  }
  // 保卫模式：部分僵尸优先攻击研究所
  let targetX=P.x, targetZ=P.z;
  if(G.mode==='defense' && G.labMesh){
    const dLab=Math.hypot(0-zb.x,0-zb.z);
    // 30%僵尸直奔研究所，或离研究所更近的
    if(zb._labTarget || dLab<dist*0.8 || (zb._labTarget===undefined && Math.random()<0.35)){
      zb._labTarget=true;
      targetX=0; targetZ=0;
    }
  }
  const dtx=targetX-zb.x, dtz=targetZ-zb.z;
  const tdist=Math.hypot(dtx,dtz);

  /* ---- senses ---- */
  // 全图追击：僵尸一旦发现玩家就永远追击，感知范围大幅增加
  const baseR=zb.c.scream?28:22;
  let see=false;
  if(P.hp>0){
    if(night){ see=dist<baseR*1.3; }
    else if(dist<6) see=true;
    else if(dist<baseR){
      const fx=Math.sin(zb.dir), fz=Math.cos(zb.dir);
      see=((dx*fx+dz*fz)/(dist||1))>0.3; // 150 deg cone（更宽视野）
    }
    // 远距离也能听到枪声/脚步（只要不太远就有感知）
    if(!see&&dist<40&&(P.moving||P.atkCd>0.2)) see=true;
  }
  // 侦察兵隐身：僵尸看不到玩家
  if(P.cloakT>0) see=false;
  // 保卫模式：实验室目标僵尸自动发现目标
  if(G.mode==='defense' && G.labMesh && zb._labTarget){
    see=true; zb.lastX=targetX; zb.lastZ=targetZ; zb.loseT=0;
    if(zb.state!=='chase'&&zb.state!=='attack') enterChase(zb);
    zb.tx=targetX; zb.tz=targetZ;
    // 直奔研究所
    if(tdist>3){ const sp=zb.spd*(night?1.3:1.1); zb.x+=dtx/tdist*sp*dt; zb.z+=dtz/tdist*sp*dt; }
  } else if(see){
    if(zb.state!=='chase'&&zb.state!=='attack') enterChase(zb);
    zb.lastX=P.x; zb.lastZ=P.z; zb.loseT=0;
  } else if(zb.state==='chase'||zb.state==='attack'){
    // 僵尸永不放弃追击，持续向玩家最后已知位置移动
    zb.loseT+=dt;
    zb.tx=P.x; zb.tz=P.z; // 持续更新目标为玩家当前位置
    // 远距离加速冲刺追击
    if(dist>20){ const sp=zb.spd*(night?1.3:1.1); zb.x+=dx/dist*sp*dt*0.7; zb.z+=dz/dist*sp*dt*0.7; }
  }
  // hearing
  if(zb.state==='idle'||zb.state==='investigate'){
    for(const n of noises){ const nd=Math.hypot(n.x-zb.x,n.z-zb.z);
      if(nd<n.r){ zb.state='investigate'; zb.tx=n.x; zb.tz=n.z; zb.invT=5; break; } }
  }

  /* ---- stomp (tank / brute) ---- */
  zb.stompCd=Math.max(0,zb.stompCd-dt);
  if(zb.stomping>0){
    zb.stomping-=dt;
    if(zb.stomping<=0) stompHit(zb);
  } else if(zb.c.stomp&&dist<4.5&&zb.stompCd<=0&&(zb.state==='chase'||zb.state==='attack')){
    zb.stomping=0.9; zb.stompCd=5.5;
    showRing(zb.x,zb.z,zb.c.boss?4.6:3.6,0xC04038,0.9,null);
    AU.groan(dist);
  }

  /* ---- runner lunge ---- */
  zb.lungeCd=Math.max(0,zb.lungeCd-dt);
  if(zb.type==='runner'&&zb.state==='chase'&&zb.lungeT<=0&&zb.lungeCd<=0&&dist>3&&dist<5){
    zb.lungeT=0.34; zb.lungeCd=4; zb.lungeHit=0;
    zb.ldx=dx/(dist||1); zb.ldz=dz/(dist||1);
  }

  /* ---- spitter ranged spit ---- */
  zb.spitCd=Math.max(0,zb.spitCd-dt);
  if(zb.spitting>0){
    zb.spitting-=dt;
    if(zb.spitting<=0){
      const tx=P.x-zb.x, tz=P.z-zb.z, td=Math.hypot(tx,tz)||1;
      const svx=tx/td, svz=tz/td;
      let range=14, dmg=zb.dmg, bcol=0x66DD44, bsize=0.15;
      if(zb.type==='hunter'){ range=20; dmg=zb.dmg*0.8; bcol=0x44AAFF; bsize=0.12; }
      else if(zb.type==='sniper'){ range=30; dmg=zb.dmg*1.5; bcol=0xFF6600; bsize=0.2; }
      fireBullet(zb.x,1.2,zb.z,svx,svz,range,dmg,0,0,0,0,1);
      const lb=bullets[bullets.length-1];
      if(lb){ lb.enemy=1; lb.m.material=mat(bcol); lb.m.scale.set(bsize,bsize,bsize); }
      AU.groan(dist);
    }
  } else if(zb.c.ranged&&zb.spitCd<=0&&(zb.state==='chase'||zb.state==='attack')){
    if(zb.type==='spitter'&&dist>4&&dist<14){
      zb.spitting=0.6; zb.spitCd=R(2.5,4);
      showRing(zb.x,zb.z,1.0,0x66DD44,0.5,null);
    } else if(zb.type==='hunter'&&dist>6&&dist<20){
      // 猎手：快速射击，射程远
      zb.spitting=0.4; zb.spitCd=R(1.5,2.5);
      showRing(zb.x,zb.z,0.8,0x4488AA,0.4,null);
    } else if(zb.type==='sniper'&&dist>10&&dist<30){
      // 狙击尸：高伤害远射程，蓄力长
      zb.spitting=1.2; zb.spitCd=R(3,5);
      showRing(zb.x,zb.z,1.2,0xFF4400,0.6,null);
    }
  }

  /* ---- leaper jump attack ---- */
  if(zb.c.leap){
    zb.leapCd=Math.max(0,(zb.leapCd||0)-dt);
    if(zb.leapCd<=0&&dist>5&&dist<12&&zb.state==='chase'){
      zb.leapCd=R(4,7);
      zb.leaping=0.7; zb.leapDX=P.x; zb.leapDZ=P.z;
      AU.groan(dist*1.5);
    }
    if(zb.leaping>0){
      zb.leaping-=dt;
      const t=1-(zb.leaping/0.7);
      const sx=zb.x, sz=zb.z;
      zb.x=lerp(zb.leapSX||sx,sx+(zb.leapDX-sx)*Math.min(1,t*1.5),dt*3);
      zb.z=lerp(zb.leapSZ||sz,sz+(zb.leapDZ-sz)*Math.min(1,t*1.5),dt*3);
      zb._yJump=Math.sin(t*Math.PI)*2.5; // 跳跃弧线
      if(zb.leaping<=0){
        zb._yJump=0;
        // 落地伤害
        if(dist<2.5) hitPlayer(zb.dmg*1.5);
        AU.slam(dist);
        // 落地粒子
        for(let p=0;p<6;p++) spawnP(zb.x,R(0.1,0.5),zb.z,R(-1,1),R(1,2),R(-1,1),0.3,8,0.02,0x8A6A3A);
      }
    }
  }
  // 应用跳跃高度到mesh
  if(zb._yJump){ zb.mesh.position.y=zb._yJump; }

  /* ---- necromancer summon ---- */
  if(zb.c.summon){
    zb.sumCd=Math.max(0,(zb.sumCd||0)-dt);
    if(zb.sumCd<=0&&dist<16&&zombies.length<40){
      zb.sumCd=R(6,10);
      // 召唤2-3个行尸
      const n=RI(2,3);
      for(let i=0;i<n;i++){
        const a=R(0,Math.PI*2), r=R(1.5,3);
        spawnZombie('walker',zb.x+Math.cos(a)*r,zb.z+Math.sin(a)*r);
      }
      showRing(zb.x,zb.z,2.5,0x8A5AC0,0.8,null);
      AU.groan(dist*2);
    }
  }

  /* ---- swarm queen: summon + shield ---- */
  if(zb.c.queen){
    // 召唤虫群
    zb.qSumCd=Math.max(0,(zb.qSumCd||0)-dt);
    if(zb.qSumCd<=0&&zombies.length<35){
      zb.qSumCd=R(3,5);
      const n=RI(3,5);
      for(let i=0;i<n;i++){
        const a=R(0,Math.PI*2), r=R(2,5);
        spawnZombie(pick(['runner','crawler','leaper']),zb.x+Math.cos(a)*r,zb.z+Math.sin(a)*r);
      }
      showRing(zb.x,zb.z,4,0x8A5AC0,0.6,null);
      AU.groan(dist*2);
    }
    // 护盾：周期性无敌
    zb.qShieldCd=Math.max(0,(zb.qShieldCd||0)-dt);
    if(zb.qShieldCd<=0&&!zb.qShield){
      zb.qShield=true; zb.qShieldT=3; zb.qShieldCd=R(8,12);
      showRing(zb.x,zb.z,2.5,0xAA6AE0,1.0,null);
    }
    if(zb.qShield){
      zb.qShieldT-=dt;
      // 护盾视觉
      if(!zb._shieldMesh){
        zb._shieldMesh=new THREE.Mesh(new THREE.SphereGeometry(2.2,16,12),new THREE.MeshBasicMaterial({color:0xAA6AE0,transparent:true,opacity:0.25}));
        zb.mesh.add(zb._shieldMesh);
      }
      zb._shieldMesh.visible=true;
      zb._shieldMesh.material.opacity=0.15+Math.sin(Date.now()/100)*0.1;
      if(zb.qShieldT<=0){ zb.qShield=false; if(zb._shieldMesh) zb._shieldMesh.visible=false; }
    }
  }

  /* ---- state behaviors ---- */
  let mvx=0, mvz=0;
  let spd=zb.spd*(night?1.28:1)*(bmNight?1.15:1);
  // 铁丝网减速效果
  if(zb.spdMult&&zb.spdMult<1){ spd*=zb.spdMult; zb.spdMult=Math.min(1,(zb.spdMult||1)+dt*0.5); } // 缓慢恢复
  // 眩晕状态：无法移动和攻击
  if(zb.stunT>0){ zb.stunT-=dt; spd=0; mvx=0; mvz=0; }
  if(zb.stomping>0) spd=0;
  const reach=(zb.c.crawl?1.1:1.35)*zb.c.scale;
  zb.atkCd-=dt;

  if(zb.state==='idle'){
    zb.idleT-=dt;
    if(zb.idleT<=0){ zb.dir=R(0,Math.PI*2); zb.idleT=R(1.5,4); }
    mvx=Math.sin(zb.dir)*0.4; mvz=Math.cos(zb.dir)*0.4;
  }
  else if(zb.state==='investigate'){
    const tx=zb.tx-zb.x, tz=zb.tz-zb.z, td=Math.hypot(tx,tz);
    if(td>1.5){ mvx=tx/td*0.85; mvz=tz/td*0.85; zb.dir=Math.atan2(tx,tz); }
    else {
      zb.invT-=dt;
      zb.idleT-=dt;
      if(zb.idleT<=0){ zb.dir=R(0,Math.PI*2); zb.idleT=R(0.8,1.6); }
      mvx=Math.sin(zb.dir)*0.35; mvz=Math.cos(zb.dir)*0.35;
      if(zb.invT<=0){ zb.state='chase'; zb.tx=P.x; zb.tz=P.z; } // 改为回到chase
    }
  }
  else if(zb.state==='chase'){
    if(dist<reach) zb.state='attack';
    else {
      const d=dist||1;
      // 预判玩家移动位置（基于玩家速度方向）
      const leadX=P.x+P.kbx*0.3, leadZ=P.z+P.kbz*0.3;
      const ldx=leadX-zb.x, ldz=leadZ-zb.z, ld=Math.hypot(ldx,ldz)||1;
      mvx=ldx/ld; mvz=ldz/ld; zb.dir=Math.atan2(ldx,ldz);
    }
  }
  else if(zb.state==='attack'){
    zb.dir=Math.atan2(dx,dz);
    if(dist>reach+0.7) zb.state='chase';
    else if(zb.atkCd<=0){
      zb.atkCd=(zb.type==='tank'||zb.c.boss)?1.6:1.0;
      zb.atkAnimT=0.3;
      damagePlayer(zb.dmg, zb.type==='crawler'?0:RI(5,10));
      if(zb.c.grab){ P.grabT=1.4; showMsg(T('被爬行尸抓住了！','Grabbed by a crawler!')); }
    }
  }
  // lunge motion override
  if(zb.lungeT>0){
    zb.lungeT-=dt;
    mvx=zb.ldx*2.6; mvz=zb.ldz*2.6; spd=zb.spd*1.4;
    if(!zb.lungeHit&&dist<1.3){ zb.lungeHit=1; damagePlayer(zb.dmg*1.3,RI(3,6)); }
  }
  if(P.grabT>0&&zb.c.grab) spd*=1.1;

  // cohesion (gentle pull to nearby pack center)
  if(zb.state==='chase'){
    let cx=0,cz=0,cn=0;
    for(const o of zombies){ if(o===zb||o.dead||o.state!=='chase') continue;
      const sd=Math.hypot(o.x-zb.x,o.z-zb.z);
      if(sd<3&&sd>0.01){ cx+=o.x; cz+=o.z; cn++; } }
    if(cn>0){ cx/=cn; cz/=cn;
      mvx+=(cx-zb.x)*0.06; mvz+=(cz-zb.z)*0.06;
      const ml=Math.hypot(mvx,mvz)||1; mvx/=ml; mvz/=ml; }
  }
  // obstacle avoidance steering
  if(spd>0&&(mvx||mvz)){ const st=steer(zb,mvx,mvz); mvx=st[0]; mvz=st[1]; }

  zb.x+=mvx*spd*dt; zb.z+=mvz*spd*dt;
  resolveCollision(zb,0.42*zb.c.scale);

  // attack barricade blocking the way
  if(zb.state==='chase'||zb.state==='attack'){
    for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
      if(Math.abs(zb.x-b.x)<b.hw+0.8&&Math.abs(zb.z-b.z)<b.hd+0.8){
        if(zb.atkCd<=0){ zb.atkCd=1.1; zb.atkAnimT=0.3; damageBarricade(b,zb.dmg*1.4,i); AU.build(); }
        break; }
    }
  }
  // separation
  for(const o of zombies){ if(o===zb||o.dead) continue;
    const sx=zb.x-o.x, sz=zb.z-o.z, sd=Math.hypot(sx,sz);
    if(sd<0.8&&sd>0.001){ zb.x+=sx/sd*dt*1.2; zb.z+=sz/sd*dt*1.2; } }

  zb.mesh.position.set(zb.x,0,zb.z);
  zb.mesh.rotation.y=zb.dir;
  /* ---- animation ---- */
  zb.ph+=dt*(2+spd*2.2);
  const pa=zb.mesh.userData.parts, sw=Math.sin(zb.ph)*0.5;
  if(!zb.c.crawl){
    pa.lLeg.rotation.x=sw; pa.rLeg.rotation.x=-sw;
    pa.torso.rotation.z=Math.sin(zb.ph*0.5)*0.09;       // shamble sway
    pa.torso.rotation.x=zb.type==='runner'?0.32:0;      // runner lean
  }
  if(zb.atkAnimT>0){ zb.atkAnimT-=dt;
    pa.lArm.rotation.x=-2.2; pa.rArm.rotation.x=-2.2;   // lunge swipe
  } else if(zb.stomping>0){
    pa.lArm.rotation.x=-2.9; pa.rArm.rotation.x=-2.9;   // raise for stomp
  } else if(zb.spitting>0){
    pa.lArm.rotation.x=-1.8; pa.rArm.rotation.x=-1.8;   // spit pose
  } else {
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,zb.c.crawl?-0.4:-1.25,dt*6);
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,zb.c.crawl?-0.5:-1.25,dt*6);
  }
  // groans
  zb.groanT-=dt;
  if(zb.groanT<=0){ zb.groanT=R(4,11); if(dist<26) AU.groan(dist); }
}

/* ================= pooled particles ================= */
const PPOOL=[];
function spawnP(x,y,z,vx,vy,vz,life,gr,size,col){
  let p=null;
  for(const q of PPOOL){ if(!q.on){ p=q; break; } }
  if(!p){
    if(PPOOL.length>=150) return;
    const m=new THREE.Mesh(BOX,mat(0xA4382E)); m.castShadow=false; m.visible=false;
    scene.add(m); p={m,on:false,vx:0,vy:0,vz:0,life:0,gr:12}; PPOOL.push(p);
  }
  p.on=true; p.m.visible=true; p.m.material=mat(col);
  p.m.scale.set(size,size,size); p.m.position.set(x,y,z);
  // 室内时将粒子移到 interiorScene（three.js 的 add 会自动从旧父级移除）
  const _sc=G.inBuilding?interiorScene:scene;
  if(p.m.parent!==_sc) _sc.add(p.m);
  p.vx=vx; p.vy=vy; p.vz=vz; p.life=life; p.gr=gr;
}
function explodeAt(x,y,z,dmg,radius){
  // 范围爆炸，伤害所有僵尸
  for(const z2 of zombies){
    if(z2.dead) continue;
    const d=Math.hypot(z2.x-x,z2.z-z);
    if(d<radius){ hitZombie(z2,dmg*(1-d/radius),x,z,2); }
  }
  // 爆炸特效
  for(let p=0;p<12;p++){
    const ang=Math.PI*2*p/12;
    spawnP(x,y,z,Math.cos(ang)*4,R(1,4),Math.sin(ang)*4,0.4,12,0.07,0xB18A45);
  }
  showRing(x,z,radius,0xB18A45,0.3,null);
  G.shake=Math.max(G.shake,0.35);
}
function bloodBurst(x,y,z,n,col){
  const c=col||0xA4382E;
  for(let i=0;i<n;i++){
    spawnP(x,y,z,(Math.random()-0.5)*R(2,6),R(1,5),(Math.random()-0.5)*R(2,6),R(0.4,0.9),12,R(0.05,0.12),c);
  }
}
function ejectShell(x,y,z,dx,dz){
  spawnP(x,y,z,-dz*R(1.5,2.5)+R(-0.5,0.5),R(2,3.2),dx*R(1.5,2.5)+R(-0.5,0.5),0.6,12,0.05,0xB18A45);
}
function updateParticles(dt){
  for(const p of PPOOL){ if(!p.on) continue;
    p.life-=dt;
    p.m.position.x+=p.vx*dt; p.m.position.y+=p.vy*dt; p.m.position.z+=p.vz*dt;
    p.vy-=p.gr*dt;
    if(p.m.position.y<0.03){ p.m.position.y=0.03; p.vy*=-0.3; p.vx*=0.7; p.vz*=0.7; }
    if(p.life<=0){ p.on=false; p.m.visible=false; }
  }
}

/* ================= pooled rings (telegraph / flash) ================= */
const RPOOL=[];
function showRing(x,z,r,col,dur,cb){
  let f=null;
  for(const q of RPOOL){ if(!q.on){ f=q; break; } }
  if(!f){
    if(RPOOL.length>=8) { if(cb) cb(); return; }
    const m=new THREE.Mesh(RINGU,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.6,side:THREE.DoubleSide,depthWrite:false}));
    m.rotation.x=-Math.PI/2; m.visible=false; scene.add(m);
    f={m,on:false,r:1,life:0,total:1,cb:null}; RPOOL.push(f);
  }
  f.on=true; f.m.visible=true; f.m.material.color.set(col);
  f.m.position.set(x,0.12,z); f.r=r; f.life=dur; f.total=dur; f.cb=cb||null;
  f.m.scale.setScalar(r);
}
function updateRings(dt){
  for(const f of RPOOL){ if(!f.on) continue;
    f.life-=dt;
    const k=Math.max(0,f.life/f.total);
    f.m.scale.setScalar(f.r*(0.25+0.75*k));
    f.m.material.opacity=0.25+0.45*Math.abs(Math.sin(f.life*9));
    if(f.life<=0){ f.on=false; f.m.visible=false; if(f.cb) f.cb(); }
  }
}

(function(){ const layer=$('dmgLayer');

function updateDmg(dt){
  for(const d of dmgPool){ if(d.life<=0) continue;
    d.life-=dt; d.y+=1.6*dt;

/* ================= zombie hp bars (pooled sprites) ================= */
const hpPool=[];
function makeHpSprite(col,w,h){ const m=new THREE.Sprite(new THREE.SpriteMaterial({color:col,depthTest:false}));
  m.scale.set(w,h,1); m.visible=false; scene.add(m); return m; }
function showHpBar(zb){

  if(!b){
    if(hpPool.length>=14) return;
    b={ brd:makeHpSprite(0xB18A45,0.98,0.15), bg:makeHpSprite(0x3A2220,0.9,0.09), fill:makeHpSprite(0xA4382E,0.86,0.06),
        ttl:0, zb:null };
    hpPool.push(b);
  }
  b.zb=zb; b.ttl=2.5;
}
function updateHpBars(){
  for(const b of hpPool){ if(b.ttl<=0) continue;
    b.ttl-=1/60;
    const zb=b.zb;
    if(!zb||zb.dead||b.ttl<=0){ b.ttl=0; b.brd.visible=b.bg.visible=b.fill.visible=false; continue; }

    b.brd.visible=b.bg.visible=b.fill.visible=true;
    b.brd.position.set(zb.x,y,zb.z); b.bg.position.set(zb.x,y,zb.z); b.fill.position.set(zb.x,y,zb.z);
    const frac=clamp(zb.hp/zb.maxhp,0,1);
    b.fill.scale.x=0.86*frac;
  }
}

/* ================= muzzle flash ================= */
const mzLight=new THREE.PointLight(0xE8C98A,0,10,1.8); scene.add(mzLight);
const mzQuad=new THREE.Mesh(BOX,bmat(0xE8C98A)); mzQuad.scale.set(0.24,0.24,0.24);
mzQuad.visible=false; scene.add(mzQuad);
const mzCone=new THREE.Mesh(new THREE.ConeGeometry(0.15,0.4,6),bmat(0xE8C98A));
mzCone.visible=false; scene.add(mzCone);
let mzColor=0xE8C98A;
function muzzleFlash(wk){
  P.mzT=0.06;
  const mx=P.x+P.aimX*0.95, mz=P.z+P.aimZ*0.95;
  // 不同武器不同枪口火光颜色
  mzColor=0xE8C98A;
  let sz=0.24, coneSz=0.15, intensity=2.4, pcount=3;
  if(wk==='flamethrower'){ mzColor=0xFF6A22; sz=0.35; coneSz=0.28; intensity=3.0; pcount=6; }
  else if(wk==='rocket'){ mzColor=0xD6A040; sz=0.38; coneSz=0.3; intensity=3.2; pcount=8; }
  else if(wk==='railgun'){ mzColor=0x88DDFF; sz=0.22; coneSz=0.12; intensity=3.5; pcount=4; }
  else if(wk==='shotgun'||wk==='shotgun2'){ mzColor=0xFFC070; sz=0.32; coneSz=0.22; intensity=2.8; pcount=5; }
  else if(wk==='rifle'){ mzColor=0xE8C98A; sz=0.28; coneSz=0.18; intensity=2.6; pcount=4; }
  else if(wk==='smg'){ mzColor=0xE8D08A; sz=0.22; coneSz=0.14; intensity=2.2; pcount=3; }
  else if(wk==='pistol'){ mzColor=0xE8C98A; sz=0.2; coneSz=0.12; intensity=2.0; pcount=2; }
  mzLight.color.set(mzColor);
  mzLight.position.set(mx,1.4,mz); mzLight.intensity=intensity;
  mzQuad.material.color.set(mzColor); mzQuad.scale.set(sz,sz,sz);
  mzQuad.position.set(mx,1.35,mz); mzQuad.visible=true;
  mzQuad.rotation.y=R(0,Math.PI);
  // 锥形火光
  mzCone.material.color.set(mzColor); mzCone.scale.set(coneSz,coneSz*2,coneSz);
  mzCone.position.set(mx,1.35,mz); mzCone.visible=true;
  mzCone.rotation.set(Math.PI/2,0,Math.atan2(P.aimX,P.aimZ));
  // 火花粒子
  for(let i=0;i<pcount;i++){
    const ang=Math.atan2(P.aimX,P.aimZ)+R(-0.4,0.4);
    const sp=R(2,5);
    spawnP(mx,1.35,mz,Math.sin(ang)*sp,R(1,3),Math.cos(ang)*sp,0.3,12,0.04,mzColor);
  }
  // 轻微屏幕震动
  if(wk==='rocket'||wk==='shotgun'||wk==='shotgun2') G.shake=Math.max(G.shake,0.08);
}
function updateMuzzle(dt){
  if(P.mzT>0){ P.mzT-=dt;
    if(P.mzT<=0){ mzLight.intensity=0; mzQuad.visible=false; mzCone.visible=false; } }
}

/* ================= noise events ================= */
const noises=[];
// 放置预览
let placePreview=null;
function updatePlacePreview(){
  const wk=P.weapon||'fists';
  const placeable=['barricade','rbarricade','spikes','sentry','wire','sandbag','mine'];
  if(!placeable.includes(wk)){
    if(placePreview){ placePreview.visible=false; }
    return;
  }
  if(!placePreview){
    placePreview=new THREE.Mesh(new THREE.RingGeometry(0.8,1.1,16),new THREE.MeshBasicMaterial({color:0x7AAB5A,transparent:true,opacity:0.5,side:THREE.DoubleSide}));
    placePreview.rotation.x=-Math.PI/2;
    scene.add(placePreview);
  }
  const dist=2.0;
  const px=P.x+P.aimX*dist, pz=P.z+P.aimZ*dist;
  placePreview.position.set(px,0.05,pz);
  placePreview.visible=true;
  // 检查是否可放置（无障碍物重叠）
  let canPlace=true;
  for(const o of obstacles){ if(Math.abs(px-o.x)<o.hw+1.0&&Math.abs(pz-o.z)<o.hd+1.0){ canPlace=false; break; } }
  placePreview.material.color.set(canPlace?0x7AAB5A:0xC04038);
}
function addNoise(x,z,r){ noises.push({x,z,r,ttl:0.9}); if(noises.length>10) noises.shift(); }
function updateNoises(dt){ for(let i=noises.length-1;i>=0;i--){ noises[i].ttl-=dt; if(noises[i].ttl<=0) noises.splice(i,1); } }

/* ================= shooting / combat ================= */
const bullets=[];
let bPool=[];
function shoot(){
  const wk=P.weapon||'fists';
  if(P.atkCd>0||P.rollT>0) return;
  // 非武器道具优先处理
  if(wk==='molotov'){ throwMolotov(); return; }
  if(wk==='barricade'){ buildBarricade('barricade'); return; }
  if(wk==='rbarricade'){ buildRBarricade(); return; }
  if(wk==='spikes'){ placeSpikes(); return; }
  if(wk==='sentry'){ placeSentry(); return; }
  if(wk==='wire'){ placeWire(); return; }
  if(wk==='sandbag'){ placeSandbag(); return; }
  if(wk==='mine'){ placeMine(); return; }
  if(!WEAPONS[wk]){ P.weapon='fists'; return; }
  const w=WEAPONS[wk]; if(!w) return;
  if(w.melee){ meleeAtk(wk,w); return; }
  if(P.reloadT>0) return;
  if(P.mags[wk]<=0){ reload(); return; }
  P.mags[wk]--;
  let dmgMult=(P.dmgMult||1)*(P.frenzyT>0?1.5:1);
  P.atkCd=w.rate*(P.frenzyT>0?0.65:1);
  P.recoilT=0.09*(applyAttachmentEffects(wk,w).recoil);
  AU.shoot(wk);
  const _att=applyAttachmentEffects(wk,w);
  if(!_att.silent) addNoise(P.x,P.z,w.noise||18);
  muzzleFlash(wk);
  ejectShell(P.x,1.35,P.z,P.aimX,P.aimZ);
  // 特殊武器类型
  if(w.type==='flame'){
    // 火焰喷射器：短距离多发
    for(let p=0;p<3;p++){
      const spread=0.12;
      const sx=(Math.random()-0.5)*spread, sz=(Math.random()-0.5)*spread;
      const dir=new V3(P.aimX,0,P.aimZ).normalize().add(new V3(sx,0,sz)).normalize();
      fireBullet(P.x,1.4,P.z,dir.x,dir.z,w.range,w.dmg*dmgMult,0,0,0,0,1);
    }
    P.kbx-=P.aimX*0.05; P.kbz-=P.aimZ*0.05;
    if(P.mags[wk]<=0) reload();
    return;
  }
  if(w.type==='rocket'){
    // 火箭筒：单发爆炸弹
    const dir=new V3(P.aimX,0,P.aimZ).normalize();
    fireBullet(P.x,1.4,P.z,dir.x,dir.z,w.range,w.dmg*dmgMult,w.explode,w.explodeDmg,w.explodeR,0);
    P.kbx-=P.aimX*0.5; P.kbz-=P.aimZ*0.5;
    G.shake=Math.max(G.shake,0.2);
    if(P.mags[wk]<=0) reload();
    return;
  }
  if(w.type==='rail'){
    // 轨道炮：穿透弹
    const dir=new V3(P.aimX,0,P.aimZ).normalize();
    fireBullet(P.x,1.4,P.z,dir.x,dir.z,w.range,w.dmg*dmgMult,0,0,0,w.pierce||99);
    P.kbx-=P.aimX*0.3; P.kbz-=P.aimZ*0.3;
    G.shake=Math.max(G.shake,0.15);
    if(P.mags[wk]<=0) reload();
    return;
  }
  if(w.type==='bolt'){
    // 十字弩：静音穿透箭
    const dir=new V3(P.aimX,0,P.aimZ).normalize();
    fireBullet(P.x,1.4,P.z,dir.x,dir.z,w.range,w.dmg*dmgMult,0,0,0,w.pierce||2);
    const lb=bullets[bullets.length-1];
    if(lb){ lb.m.material=mat(0x8A6A42); lb.m.scale.set(0.08,0.08,0.5); lb._isBolt=1; }
    AU.gun(3); // 低噪音
    if(P.mags[wk]<=0) reload();
    return;
  }
  if(w.type==='throw'){
    // 手榴弹：投掷爆炸
    const dir=new V3(P.aimX,0,P.aimZ).normalize();
    throwGrenade(P.x,1.4,P.z,dir.x,dir.z,w.range,w.explodeDmg,w.explodeR);
    P.atkCd=w.rate;
    if(P.mags[wk]<=0) reload();
    return;
  }
  const pellets=w.pellets||1;
  const att=applyAttachmentEffects(wk,w);
  for(let p=0;p<pellets;p++){
    const spread=w.spread*(P.moving?2.2:1)*att.spread;
    const sx=(Math.random()-0.5)*spread, sz=(Math.random()-0.5)*spread;
    const dir=new V3(P.aimX,0,P.aimZ).normalize().add(new V3(sx,0,sz)).normalize();
    fireBullet(P.x,1.4,P.z,dir.x,dir.z,w.range*att.range,w.dmg*dmgMult);
  }
  P.kbx-=P.aimX*0.12; P.kbz-=P.aimZ*0.12;
  if(P.mags[wk]<=0) reload();
}
function meleeAtk(wk,w){
  // 近战消耗体力
  const stamCost=w.heavy?20:12;
  if(P.stam<stamCost){
    showMsg(T('体力不足！','Stamina too low!'));
    return;
  }
  P.stam-=stamCost;
  // 近战攻击CD（更长的基础冷却）
  P.atkCd=w.rate*(P.frenzyT>0?0.7:1)*1.3;
  P.swingMax=Math.min(0.5,Math.max(0.32,w.rate*0.85));
  P.swingT=P.swingMax;
  P.meleeHitT=P.swingMax*0.36;
  P.meleeHitW=wk;
  AU.swing();
  if(w.noise) addNoise(P.x,P.z,w.noise);
  // 近战挥砍弧形特效
  const slashCol= wk==='machete'||wk==='crowbar' ? 0xCCCCCC : wk==='axe'||wk==='sledge' ? 0xB18A45 : 0xD6C29A;
  const arcR=w.range*0.9;
  for(let i=0;i<6;i++){
    const a=Math.atan2(P.aimX,P.aimZ)+R(-w.arc/2,w.arc/2);
    const r=arcR*R(0.6,1.0);
    spawnP(P.x+Math.sin(a)*r,1.2+R(-0.3,0.3),P.z+Math.cos(a)*r,
      Math.sin(a)*1.5,R(0.5,2),Math.cos(a)*1.5,0.25,8,0.04,slashCol);
  }
  // 辅助瞄准：吸附到弧形范围内最近的僵尸
  let best=null, bd=w.range*1.15;
  const _zList=G.inBuilding&&G._interiorZombies?G._interiorZombies:zombies;
  for(const z of _zList){ if(z.dead) continue;
    const dx=z.x-P.x, dz=z.z-P.z, d=Math.hypot(dx,dz);
    if(d<bd){ const ang=Math.acos(clamp((dx*P.aimX+dz*P.aimZ)/(d||1),-1,1));
      if(ang<w.arc){ bd=d; best=z; } } }
  if(best){ const dx=best.x-P.x, dz=best.z-P.z, d=Math.hypot(dx,dz)||1;
    P.aimX=dx/d; P.aimZ=dz/d; P.dir=Math.atan2(dx,dz); }
}
function doMeleeDamage(wk){
  const w=WEAPONS[wk]; if(!w) return;
  const dmgMult=(P.dmgMult||1)*(P.frenzyT>0?1.5:1);
  let hitAny=false;
  // 室内：检测室内僵尸
  if(G.inBuilding&&G._interiorZombies){
    for(const z of G._interiorZombies){
      const dx=z.x-P.x, dz=z.z-P.z;
      const d=Math.hypot(dx,dz);
      if(d<w.range){
        const ang=Math.acos(clamp((dx*P.aimX+dz*P.aimZ)/(d||1),-1,1));
        if(ang<w.arc/2){
          z.hp-=w.dmg*dmgMult; z.flash=0.12;
          AU.hitF(); bloodBurst(z.x,1.0,z.z,5);
          spawnDmg(z.x,1.9,z.z,Math.round(w.dmg*dmgMult),false);
          hitAny=true;
        }
      }
    }
  } else {
  for(const z of zombies){
    if(z.dead||z.rise>0) continue;
    const dx=z.x-P.x, dz=z.z-P.z;
    const d=Math.hypot(dx,dz);
    if(d<w.range){
      const ang=Math.acos(clamp((dx*P.aimX+dz*P.aimZ)/(d||1),-1,1));
      if(ang<w.arc/2){ hitZombie(z,w.dmg*dmgMult,P.x,P.z,w.kb||0.6); hitAny=true; }
    }
  }
  }
  for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
    const d=Math.hypot(b.x-P.x,b.z-P.z);
    if(d<w.range){ damageBarricade(b,w.dmg*0.6,i); hitAny=true; } }
  if(hitAny) decDurability();
}
function decDurability(){
  const s=P.hot[P.hsel]; if(!s||s.id!==P.weapon) return;
  const max=WEAPONS[s.id]&&WEAPONS[s.id].dur;
  if(max===undefined||max===Infinity) return;
  if(s.dur===undefined) s.dur=max;
  s.dur--;
  if(s.dur<=0){ breakWeapon(P.hsel); }
  refreshHud();
}
function breakWeapon(slot){
  const id=P.hot[slot]?P.hot[slot].id:null;
  P.hot[slot]=null;
  AU.breakW();
  showMsg(T('你的 '+(id?itemName(id):'')+' 损坏了！','Your '+(id?itemName(id):'')+' broke!'));
  // 确保 fists 始终存在于 hot[3]
  if(!P.hot[3]||P.hot[3].id!=='fists'){ P.hot[3]={id:'fists',q:1}; }
  if(P.weapon===id){
    P.weapon='fists';
    P.hsel=3;
  }
  setWeaponMesh(); refreshHud();
}
function fireBullet(x,y,z,vx,vz,range,dmg,explode,explodeDmg,explodeR,pierce,isFlame){
  const _sc=G.inBuilding?interiorScene:scene;
  let m=bPool.pop();
  if(!m){ m=new THREE.Mesh(BOX,mat(0xD6C29A)); m.scale.set(0.06,0.06,0.18); _sc.add(m); }
  else { _sc.add(m); } // 从对象池取出时需要加入当前场景
  m.visible=true; m.position.set(x,y,z);
  m.rotation.y=Math.atan2(vx,vz);
  let trailCol=0xD6C29A, trailRate=0;
  if(explode){ m.material=mat(0xB18A45); m.scale.set(0.12,0.12,0.3); trailCol=0xD6A040; trailRate=0.02; }
  else if(pierce>0){ m.material=mat(0x88DDFF); m.scale.set(0.04,0.04,0.35); trailCol=0x88DDFF; trailRate=0.015; }
  else if(isFlame){ m.material=mat(0xFF8822); m.scale.set(0.1,0.1,0.1); trailCol=0xFF6A22; trailRate=0.03; }
  else { m.material=mat(0xE8C98A); m.scale.set(0.05,0.05,0.2); trailCol=0xE8C98A; trailRate=0.02; }
  bullets.push({m,x,y,z,vx,vz,rng:range,dmg,dist:0,explode:explode||0,explodeDmg:explodeDmg||0,explodeR:explodeR||0,pierce:pierce||0,hitZ:[],isFlame:isFlame||0,trailCol,trailT:0,trailRate});
}
function updateBullets(dt){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; const spd=b.isFlame?18:28;
    const dx=b.vx*spd*dt, dz=b.vz*spd*dt; b.dist+=Math.hypot(dx,dz);
    b.x+=dx; b.z+=dz;
    b.m.position.set(b.x,b.y,b.z);
    // 子弹拖尾粒子
    if(b.trailRate>0){
      b.trailT+=dt;
      if(b.trailT>=b.trailRate){
        b.trailT=0;
        spawnP(b.x,b.y,b.z,R(-0.3,0.3),R(-0.2,0.5),R(-0.3,0.3),0.2,8,0.03,b.trailCol);
      }
    }
    if(b.dist>b.rng){
      // 火焰弹飞行结束时产生小爆裂特效
      if(b.isFlame){
        for(let p=0;p<4;p++){
          const ang=Math.PI*2*p/4;
          spawnP(b.x,1.4,b.z,Math.cos(ang)*2,Math.sin(ang)*2,0.3,12,0.06,0xFF8822);
        }
      }
      // 火箭弹飞行结束时爆炸
      if(b.explode){ explodeBullet(b); }
      killBullet(i); continue;
    }
    // 敌方子弹：检测命中玩家
    if(b.enemy){
      if(Math.abs(b.x-P.x)<0.5&&Math.abs(b.z-P.z)<0.5){
        damagePlayer(b.dmg,3);
        for(let p=0;p<6;p++){
          spawnP(b.x,1.4,b.z,R(-1,1),R(0,2),R(-1,1),0.4,12,0.06,0x66DD44);
        }
        killBullet(i); continue;
      }
      // 敌方子弹不检测僵尸命中，只检测障碍物
      let hitObs=false;
      for(let bi=barricades.length-1;bi>=0;bi--){
        const bb=barricades[bi]; if(Math.abs(b.x-bb.x)<bb.hw&&Math.abs(b.z-bb.z)<bb.hd){
          damageBarricade(bb,b.dmg*0.6,bi); hitObs=true; break; } }
      if(hitObs) killBullet(i);
      continue;
    }
    let hit=false;
    // 室内：检测室内僵尸
    if(G.inBuilding&&G._interiorZombies){
      for(const z of G._interiorZombies){
        if(Math.abs(b.x-z.x)<0.5&&Math.abs(b.z-z.z)<0.5){
          let dmg=b.dmg, crit=false;
          if(Math.random()<0.15){ dmg*=2; crit=true; AU.headshot(); }
          z.hp-=dmg; z.flash=0.12;
          AU.hitF(); bloodBurst(z.x,1.0,z.z,crit?7:4);
          spawnDmg(z.x,1.9,z.z,Math.round(dmg)+(crit?'!':''),crit);
          // 火焰弹命中产生小火花
          if(b.isFlame){
            for(let p=0;p<3;p++){
              spawnP(b.x,1.4,b.z,R(-1,1),R(0,2),R(-1,1),0.3,12,0.05,0xFF8822);
            }
          }
          if(b.explode){ explodeBullet(b); }
          hit=true; break;
        }
      }
    } else {
    for(const z of zombies){ if(z.dead||z.rise>0) continue;
      const rr=0.5*z.c.scale;
      if(Math.abs(b.x-z.x)<rr&&Math.abs(b.z-z.z)<rr){
        let dmg=b.dmg, crit=false;
        if(Math.random()<0.15){ dmg*=2; crit=true; AU.headshot(); }
        // 穿透：可击中多个目标
        if(b.pierce>0){
          if(!b.hitZ)b.hitZ=[];
          if(b.hitZ.includes(z)) continue;
          b.hitZ.push(z);
          hitZombie(z,dmg,b.x,b.z,0.25,crit);
          // 火焰弹命中产生小火花
          if(b.isFlame){
            for(let p=0;p<3;p++){
              spawnP(b.x,1.4,b.z,R(-1,1),R(0,2),R(-1,1),0.3,12,0.05,0xFF8822);
            }
          }
          if(b.hitZ.length>=b.pierce){
            if(b.explode){ explodeBullet(b); }
            hit=true; break;
          }
          continue;
        }
        hitZombie(z,dmg,b.x,b.z,0.25,crit);
        if(b.isFlame){
          for(let p=0;p<3;p++){
            spawnP(b.x,1.4,b.z,R(-1,1),R(0,2),R(-1,1),0.3,12,0.05,0xFF8822);
          }
        }
        if(b.explode){ explodeBullet(b); }
        hit=true; break;
      }
    }
    }
    if(!hit){ for(let bi=barricades.length-1;bi>=0;bi--){
      const bb=barricades[bi]; if(Math.abs(b.x-bb.x)<bb.hw&&Math.abs(b.z-bb.z)<bb.hd){
        damageBarricade(bb,b.dmg*0.6,bi);
        if(b.explode){ explodeBullet(b); }
        hit=true; break; } } }
    // 爆炸桶检测
    if(!hit){ for(const eb of expBarrels){
      if(Math.abs(b.x-eb.x)<0.5&&Math.abs(b.z-eb.z)<0.5){
        hitExpBarrel(eb,b.dmg);
        hit=true; break; } } }
    if(hit) killBullet(i);
  }
}
function explodeBullet(b){
  // 爆炸：范围内所有僵尸受伤
  if(G.inBuilding&&G._interiorZombies){
    for(const z2 of G._interiorZombies){
      const ed=Math.hypot(z2.x-b.x,z2.z-b.z);
      if(ed<b.explodeR){
        const edmg=b.explodeDmg*(1-ed/b.explodeR);
        z2.hp-=edmg; z2.flash=0.12;
        bloodBurst(z2.x,1.0,z2.z,6);
        spawnDmg(z2.x,1.9,z2.z,Math.round(edmg),false);
      }
    }
  }
  for(const z2 of zombies){
    if(z2.dead||z2.rise>0) continue;
    const ed=Math.hypot(z2.x-b.x,z2.z-b.z);
    if(ed<b.explodeR){
      const edmg=b.explodeDmg*(1-ed/b.explodeR);
      hitZombie(z2,edmg,b.x,b.z,1.5);
    }
  }
  // 爆炸特效 - 多层粒子
  const cx=b.x, cy=1.4, cz=b.z;
  // 核心闪光
  for(let p=0;p<8;p++){
    const ang=Math.PI*2*p/8;
    spawnP(cx,cy,cz,Math.cos(ang)*3,R(2,5),Math.sin(ang)*3,0.3,12,0.06,0xFFE0A0);
  }
  // 外围碎片
  for(let p=0;p<16;p++){
    const ang=Math.PI*2*p/16;
    const sp=R(3,7);
    spawnP(cx,cy,cz,Math.cos(ang)*sp,R(1,4),Math.sin(ang)*sp,0.5,14,0.08,0xB18A45);
  }
  // 黑烟
  for(let p=0;p<6;p++){
    const ang=R(0,Math.PI*2);
    spawnP(cx,cy,cz,Math.cos(ang)*1.5,R(0.5,2),Math.sin(ang)*1.5,0.8,10,0.1,0x4A3A30);
  }
  showRing(cx,cz,b.explodeR,0xB18A45,0.35,null);
  showRing(cx,cz,b.explodeR*0.5,0xFFE0A0,0.2,null);
  G.shake=Math.max(G.shake,0.35);
}
function killBullet(i){
  const b=bullets[i]; b.m.visible=false;
  // 从子弹所在的场景中移除（室内或室外）
  (G.inBuilding?interiorScene:scene).remove(b.m);
  bPool.push(b.m); bullets.splice(i,1);
}
function reload(){
  const w=WEAPONS[P.weapon]; if(!w||w.melee||P.reloadT>0||P.rollT>0) return;
  const invQty=invCount(w.ammo);
  const att=applyAttachmentEffects(P.weapon,w);
  const maxMag=att.mag;
  const need=maxMag-P.mags[P.weapon];
  if(need<=0||invQty<=0) return;
  const take=Math.min(need,invQty);
  removeItem(w.ammo,take); P.mags[P.weapon]+=take;
  P.reloadT=att.reload; P.reloadMax=P.reloadT;
  AU.reloadS();
}

function throwMolotov(){
  const ix=hotIndex('molotov'); if(ix<0) return;
  P.atkCd=0.6;
  removeFromHot(ix,1);
  AU.shoot('pistol');
  addNoise(P.x,P.z,10);
  const dir=new V3(P.aimX,0,P.aimZ).normalize();
  const tx=P.x+dir.x*7, tz=P.z+dir.z*7;

  bottle.position.y=0.1;

    type:'molotov'
  });

}

let projectiles=[];
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.life-=dt;
    // 抛物线运动
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.vy-=9.8*dt;
    p.z+=p.vz*dt;
    p.mesh.position.set(p.x,p.y,p.z);
    p.mesh.rotation.x+=dt*8;
    p.mesh.rotation.z+=dt*6;
    // 到达目标或落地
    const landY=p.y<=0.3;
    const reached=Math.hypot(p.x-p.tx,p.z-p.tz)<0.8;
    if(landY||reached||p.life<=0){
      // 爆炸效果
      molotovExplode(p.x,p.z);
      scene.remove(p.mesh);
      projectiles.splice(i,1);
    }
  }
}

function molotovExplode(x,z){
  // 火焰范围伤害

  showRing(x,z,2.0,0xFF8822,0.25,null);

  for(let i=0;i<14;i++){
    const a=R(0,Math.PI*2),r=R(0,2.5);
    spawnP(x+r*Math.cos(a),1,z+r*Math.sin(a),Math.cos(a)*1.5,R(2,5),Math.sin(a)*1.5,0.6,14,0.08,0xFF6A22);
  }
  // 外围火星
  for(let i=0;i<12;i++){
    const a=R(0,Math.PI*2),r=R(2,4);
    spawnP(x+r*Math.cos(a),1,z+r*Math.sin(a),Math.cos(a)*2,R(1,3),Math.sin(a)*2,0.5,12,0.06,0xD6A040);
  }
  // 黑烟
  for(let i=0;i<6;i++){
    const a=R(0,Math.PI*2),r=R(0,2);
    spawnP(x+r*Math.cos(a),1.5,z+r*Math.sin(a),R(-0.5,0.5),R(0.5,1.5),R(-0.5,0.5),1.0,10,0.1,0x3A2A20);
  }
  for(const z2 of zombies){ if(z2.dead) continue;
    const d=Math.hypot(z2.x-x,z2.z-z);
    if(d<3.5){ hitZombie(z2,40,x,z,0.4); z2.burnT=3; z2.burnDmg=6; } }
  // 留下燃烧区域
  firePools.push({x:x,z:z,r:3.5,life:5,dmg:8,tickT:0});
  G.shake=0.3;

/* 燃烧区域更新 - 持续伤害+视觉效果 */
function updateFirePools(dt){
  for(let i=firePools.length-1;i>=0;i--){
    const f=firePools[i];
    f.life-=dt;
    f.tickT+=dt;
    if(f.tickT>=0.5){
      f.tickT=0;
      // 对范围内僵尸造成持续伤害
      for(const z of zombies){
        if(z.dead) continue;
        const d=Math.hypot(z.x-f.x,z.z-f.z);
        if(d<f.r){ hitZombie(z,f.dmg*(1-d/f.r),f.x,f.z,0.1); z.burnT=Math.max(z.burnT||0,1.5); z.burnDmg=8; }
      }
      // 火焰粒子效果
      for(let p=0;p<6;p++){
        const a=R(0,Math.PI*2),r=R(0,f.r);
        spawnP(f.x+r*Math.cos(a),R(0.3,1.5),f.z+r*Math.sin(a),R(-0.5,0.5),R(1,3),R(-0.5,0.5),0.5,12,0.06,0xFF6A22);
      }
    }
    if(f.life<=0) firePools.splice(i,1);

}

function buildBarricade(id){

  b.m.traverse(o=>{
    if(o.isMesh&&o.material&&o.material.color){
      const orig=o.userData.origCol||(o.userData.origCol=o.material.color.getHex());
      const r=((orig>>16)&0xff)*ratio, g=((orig>>8)&0xff)*ratio, bl=(orig&0xff)*ratio;
      o.material.color.setRGB(r/255,g/255,bl/255);
    }
  });

/* ================= waves ================= */
function waveTypes(n){
  const t=['walker','walker','walker'];
  if(n>=2) t.push('runner','runner');
  if(n>=3) t.push('crawler');
  if(n>=4) t.push('screamer');
  if(n>=5) t.push('bloater','bloater','spitter','leaper');
  if(n>=6) t.push('survivor','survivor','spitter','leaper');
  if(n>=7) t.push('tank','brute2','necro');
  if(n>=8) t.push('leaper','leaper','necro','hunter');
  if(n>=9) t.push('tank','runner','screamer','brute2','spitter','necro','hunter','sniper');
  if(n>=11) t.push('hunter','hunter','sniper','spitter','necro');
  return t;
}
function startWave(n){
  G.wave=n; G.waveState='wave'; G.spawned=0;
  G.spawnQ=Math.round((3+n*1.8)*DIFF[G.diff].count*(G.bloodMoon?1.5:1));
  G.spawnTick=0.5; G.waveActiveT=0; G.stuckCheckT=0;
  AU.waveHorn();
  showBanner(T('第 '+n+' 波','WAVE '+n),'#E5DDC8');
  if(n%5===0) spawnBoss(n);
}
function spawnBoss(n){
  // 每10波出现虫群女王，其他boss波出现蛮兽
  if(n%10===0&&n>=10){ spawnQueen(); }
  else { spawnBrute(); }
}
