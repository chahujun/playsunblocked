function updateWaves(dt){
  if(G.waveState==='wave'){
    G.waveActiveT+=dt;
    G.spawnTick-=dt;
    if(G.spawnTick<=0&&G.spawned<G.spawnQ&&aliveZ()<MAX_Z){
      G.spawnTick=R(1.0,1.8);
      const batch=Math.min(RI(1,2),G.spawnQ-G.spawned);
      for(let i=0;i<batch;i++){
        const a=R(0,Math.PI*2), r=R(45,65);
        const x=clamp(Math.cos(a)*r,-HALF+2,HALF-2), z=clamp(Math.sin(a)*r,-HALF+2,HALF-2);
        if(spawnZombie(pick(waveTypes(G.wave)),x,z)) G.spawned++;
      }
    }
    // 防卡机制：波次活跃超过90秒且剩余僵尸≤3只时，将远离玩家的僵尸传送到附近
    if(G.waveActiveT>90&&aliveZ()<=3&&G.spawned>=G.spawnQ){
      G.stuckCheckT+=dt;
      if(G.stuckCheckT>3){
        G.stuckCheckT=0;
        for(const z of zombies){
          if(z.dead) continue;
          const dist=Math.hypot(P.x-z.x,P.z-z.z);
          if(dist>40){
            const ang=R(0,Math.PI*2), r=R(15,25);
            z.x=clamp(P.x+Math.cos(ang)*r,-HALF+2,HALF-2);
            z.z=clamp(P.z+Math.sin(ang)*r,-HALF+2,HALF-2);
            if(z.mesh){ z.mesh.position.set(z.x,0,z.z); }
            showMsg(T('僵尸从暗处涌来！','Zombies emerge from the shadows!'));
          }
        }
      }
    }
    // 终极防卡：波次活跃超过3分钟，强制清除剩余僵尸
    if(G.waveActiveT>180&&aliveZ()>0&&G.spawned>=G.spawnQ){
      for(const z of zombies){ if(!z.dead){ z.hp=0; } }
      showBanner(T('尸潮已被驱散','WAVE DISPERSED'),'#B18A45');
    }
    if(G.spawned>=G.spawnQ&&aliveZ()===0){
      G.waveState='rest'; G.restT=REST_T; G.waveActiveT=0; G.stuckCheckT=0;
      updateQuestProgress('wave',1); // 波次任务
      showBanner(T('尸潮已清除','WAVE CLEARED'),'#B18A45');
      saveGame();
    }
  } else {
    G.restT-=dt;
    if(G.restT<=0) startWave(G.wave+1);
  }
}
function aliveZ(){ let n=0; for(const z of zombies) if(!z.dead) n++; return n; }

/* ================= collision / movement ================= */
function resolveCollision(ent,rad){
  const mapLimit=HALF-1.0;
  ent.x=clamp(ent.x,-mapLimit,mapLimit); ent.z=clamp(ent.z,-mapLimit,mapLimit);
  // 矩形障碍物：基于穿透深度的分轴碰撞解决
  for(const o of obstacles){
    const dx=ent.x-o.x, dz=ent.z-o.z;
    const ox=Math.abs(dx)-o.hw, oz=Math.abs(dz)-o.hd;
    if(ox<rad&&oz<rad){
      // 计算穿透深度
      const penX=rad-ox, penZ=rad-oz;
      // 只推穿透更深的那个轴，避免滑动
      if(penX<penZ){
        ent.x=o.x+Math.sign(dx||1)*(o.hw+rad);
      } else {
        ent.z=o.z+Math.sign(dz||1)*(o.hd+rad);
      }
    }
  }
  for(const o of circles){ const dx=ent.x-o.x, dz=ent.z-o.z, d=Math.hypot(dx,dz);
    if(d<rad+o.r&&d>0.001){ const p=(rad+o.r)/d; ent.x=o.x+dx*p; ent.z=o.z+dz*p; } }
  for(const b of barricades){
    const dx=ent.x-b.x, dz=ent.z-b.z;
    const ox=Math.abs(dx)-b.hw, oz=Math.abs(dz)-b.hd;
    if(ox<rad&&oz<rad){
      const penX=rad-ox, penZ=rad-oz;
      if(penX<penZ){
        ent.x=b.x+Math.sign(dx||1)*(b.hw+rad);
      } else {
        ent.z=b.z+Math.sign(dz||1)*(b.hd+rad);
      }
    }
  }
}

/* ================= player update ================= */
function doRoll(){
  if(G.state!=='play'||G.paused) return;
  if(P.rollCd>0||P.rollT>0) return;
  if(P.stam<25){ showMsg(T('体力不足，无法翻滚！','Too tired to roll!')); return; }
  // 基于角色朝向的翻滚方向：W=前滚，S=后滚，A=左滚，D=右滚
  let fwd=0, strafe=0;
  if(keys.w||keys.ArrowUp) fwd+=1; if(keys.s||keys.ArrowDown) fwd-=1;
  if(keys.a||keys.ArrowLeft) strafe+=1; if(keys.d||keys.ArrowRight) strafe-=1;
  if(touchActive){ fwd=touchDy; strafe=touchDx; }
  let len=Math.hypot(fwd,strafe);
  if(len<0.2){ fwd=1; strafe=0; len=1; } // 默认前滚
  fwd/=len; strafe/=len;
  const cosD=Math.cos(P.dir), sinD=Math.sin(P.dir);
  const dx=sinD*fwd+cosD*strafe;
  const dz=cosD*fwd-sinD*strafe;
  P.rollDx=dx; P.rollDz=dz;
  P.rollT=0.35; P.rollCd=1.2; P.invulnT=0.4;
  P.stam-=25;
  P.dir=Math.atan2(P.rollDx,P.rollDz);
  P.meleeHitT=0; P.swingT=0;
  AU.roll();
}
function updatePlayer(dt){
  if(P.grabT>0){ P.grabT-=dt; }
  const df=DIFF[G.diff];
  const drain=df.drain;
  P.hunger-=0.016*dt*drain; P.thirst-=0.022*dt*drain;
  if(P.hunger<12||P.thirst<12) P.hp-=0.15*dt;
  if(P.inf>=100) P.hp-=0.4*dt;
  // 自愈天赋
    P.hp=clamp(P.hp,0,P.maxHp||100); P.hunger=clamp(P.hunger,0,100); P.thirst=clamp(P.thirst,0,100);
  P.stam+=10*dt*(P.stamRegenT>0?3:1); P.stam=clamp(P.stam,0,P.maxStam||100);
  if(P.stamRegenT>0) P.stamRegenT-=dt;
  P.inf=clamp(P.inf,0,100);
  P.rollCd=Math.max(0,P.rollCd-dt);
  P.invulnT=Math.max(0,P.invulnT-dt);
  P.crouchT=Math.max(0,P.crouchT-dt);
  P.recoilT=Math.max(0,P.recoilT-dt);
  // 职业技能计时器
  P.skillCd=Math.max(0,(P.skillCd||0)-dt);
  P.cloakT=Math.max(0,(P.cloakT||0)-dt);
  P.frenzyT=Math.max(0,(P.frenzyT||0)-dt);
  P.healBoostT=Math.max(0,(P.healBoostT||0)-dt);
  P.infPauseT=Math.max(0,(P.infPauseT||0)-dt);
  P.infImmuneT=Math.max(0,(P.infImmuneT||0)-dt);
  P.scavengeT=Math.max(0,(P.scavengeT||0)-dt);
  P.lootBonusT=Math.max(0,(P.lootBonusT||0)-dt);
  // 工程师炮台处理
  if(P.turrets){
    for(let i=P.turrets.length-1;i>=0;i--){
      const t=P.turrets[i];
      t.life-=dt; t.cd-=dt;
      // 僵尸攻击炮台
      if(!t.atkCdZ) t.atkCdZ=0;
      t.atkCdZ-=dt;
      for(const z of zombies){
        if(z.dead) continue;
        if(Math.hypot(z.x-t.x,z.z-t.z)<1.8&&t.atkCdZ<=0){
          t.atkCdZ=1.0; t.hp-=z.dmg*0.8;
          // 受损视觉反馈
          t.mesh.traverse(o=>{
            if(o.isMesh&&o.material&&o.material.color){
              if(!o.userData.origCol) o.userData.origCol=o.material.color.getHex();
              const ratio=Math.max(0.3,t.hp/t.max);
              const orig=o.userData.origCol;
              o.material.color.setRGB(((orig>>16)&0xff)*ratio/255,((orig>>8)&0xff)*ratio/255,(orig&0xff)*ratio/255);
            }
          });
          // 火花粒子
          for(let p=0;p<3;p++) spawnP(t.x,R(0.5,1.2),t.z,R(-1,1),R(1,3),R(-1,1),0.3,10,0.03,0xFFAA44);
        }
      }
      if(t.hp<=0||t.life<=0){
        if(t.mesh) scene.remove(t.mesh);
        // 摧毁特效
        for(let p=0;p<10;p++) spawnP(t.x,R(0.3,1.5),t.z,R(-2,2),R(2,5),R(-2,2),0.5,12,0.05,0x5B5C57);
        if(t.hp<=0) showMsg(T('炮台被摧毁！','Sentry destroyed!'));
        P.turrets.splice(i,1); continue;
      }
      if(t.cd<=0){
        // 找最近僵尸
        let best=null,bd=15;
        for(const z of zombies){ if(z.dead) continue;
          const d=Math.hypot(z.x-t.x,z.z-t.z);
          if(d<bd){ bd=d; best=z; } }
        if(best){
          const dx=best.x-t.x, dz=best.z-t.z, d=Math.hypot(dx,dz)||1;
          fireBullet(t.x,1.2,t.z,dx/d,dz/d,20,15);
          t.cd=0.3;
        }
      }
    }
  }

  if(P.hp<=0){ dieGame(); return; }

  // knockback
  P.x+=P.kbx*dt*6; P.z+=P.kbz*dt*6;
  P.kbx*=Math.pow(0.001,dt); P.kbz*=Math.pow(0.001,dt);

  if(P.rollT>0){
    P.rollT-=dt;
    P.x+=P.rollDx*9.2*dt; P.z+=P.rollDz*9.2*dt;
    P.moving=true;
  } else {
    // WASD基于角色朝向（鼠标控制方向）：W=前进，S=后退，A=左移，D=右移
    let fwd=0, strafe=0;
    if(keys.w||keys.ArrowUp) fwd+=1; if(keys.s||keys.ArrowDown) fwd-=1;
    if(keys.a||keys.ArrowLeft) strafe+=1; if(keys.d||keys.ArrowRight) strafe-=1;
    if(touchActive){ fwd=touchDy; strafe=touchDx; }
    const len=Math.hypot(fwd,strafe);
    if(len>0.2){
      const spd=P.spd*(P.sprint&&P.stam>3?1.55:1)*(P.frenzyT>0?1.5:1);
      fwd/=len; strafe/=len;
      // 基于角色朝向计算移动方向（P.dir由鼠标updateAim控制）
      const cosD=Math.cos(P.dir), sinD=Math.sin(P.dir);
      // 前进方向 = (sin(dir), cos(dir))，左移方向 = (cos(dir), -sin(dir))
      const mx=sinD*fwd+cosD*strafe;
      const mz=cosD*fwd-sinD*strafe;
      if(P.sprint&&P.stam>3&&P.frenzyT<=0) P.stam-=18*dt;
      if(P.grabT>0){ mx*=0.55; mz*=0.55; }
      P.x+=mx*spd*dt; P.z+=mz*spd*dt;
      // 地图边界限制
      P.x=clamp(P.x,-HALF+1.5,HALF-1.5); P.z=clamp(P.z,-HALF+1.5,HALF-1.5);
      P.moving=true;
      P.stepT-=dt;
      if(P.stepT<=0){ P.stepT=P.sprint?0.26:0.42; AU.step(); }
    } else { P.moving=false; }
  }
  resolveCollision(P,0.35);
  P.mesh.position.set(P.x,0,P.z);
  P.mesh.rotation.y=P.dir;

  // timers
  P.atkCd=Math.max(0,P.atkCd-dt);
  P.reloadT=Math.max(0,P.reloadT-dt);
  P.swingT=Math.max(0,P.swingT-dt);
  P.hurtT=Math.max(0,P.hurtT-dt);
  if(P.meleeHitT>0){ P.meleeHitT-=dt; if(P.meleeHitT<=0&&P.meleeHitW){ doMeleeDamage(P.meleeHitW); P.meleeHitW=null; } }
  playerAnim(dt);

  // loot pick - 改为按F拾取，不再自动拾取
  G._nearbyLoot=null;
  for(const lo of lootEnts){
    if(Math.hypot(P.x-lo.x,P.z-lo.z)<1.8){ G._nearbyLoot=lo; break; }
  }
  // safe house regen
  if(Math.hypot(P.x,P.z)<7){ P.hp=Math.min(P.maxHp||100,P.hp+1.2*dt); P.inf=Math.max(0,P.inf-0.5*dt); }
}

function playerAnim(dt){
  const pa=P.parts, b=pa.body;
  const sprint=P.sprint&&P.moving&&P.stam>3;
  const ph=G.time*(sprint?10.5:7);
  let lean=0, rollA=0, bobY=0, crouch=0;
  if(sprint) lean=0.22;
  if(P.hurtT>0) lean-=0.35*(P.hurtT/0.2);
  if(P.rollT>0) rollA=-(1-P.rollT/0.35)*Math.PI*2;
  if(P.moving&&P.rollT<=0) bobY=Math.abs(Math.sin(ph))*0.07;
  if(P.crouchT>0) crouch=0.22*Math.min(1,P.crouchT/0.45);
  b.rotation.x=lean+rollA;
  b.position.y=bobY-crouch;
  const w=WEAPONS[P.weapon];
  const swinging=P.swingT>0&&w&&w.melee;
  if(!swinging) b.rotation.y=lerp(b.rotation.y,0,dt*10);
  // legs
  if(P.rollT>0){ pa.lLeg.rotation.x=1.2; pa.rLeg.rotation.x=1.2; }
  else if(P.crouchT>0){ pa.lLeg.rotation.x=0.9; pa.rLeg.rotation.x=-0.5; }
  else if(P.moving){ pa.lLeg.rotation.x=Math.sin(ph)*0.75; pa.rLeg.rotation.x=-Math.sin(ph)*0.75; }
  else { pa.lLeg.rotation.x=lerp(pa.lLeg.rotation.x,0,dt*8); pa.rLeg.rotation.x=lerp(pa.rLeg.rotation.x,0,dt*8); }
  // arms
  const aimDir = P.dir;
  if(P.rollT>0){
    // 翻滚时双臂前伸
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,1.2,dt*15);
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,1.2,dt*15);
  }
  else if(swinging){ meleeAnim(w.anim); }
  else if(w&&!w.melee){
    // 持枪姿势：双臂前伸略向下，模拟双手握枪
    const rec=P.recoilT>0?0.4:0;
    const aimNoise=Math.sin(G.time*3)*0.02; // 微小晃动模拟呼吸
    if(P.reloadT>0){
      // 换弹：双手下沉+左右摆动
      pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,-0.35+Math.sin(G.time*12)*0.18,dt*14);
      pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,-0.45+Math.sin(G.time*12+1.2)*0.18,dt*14);
      pa.rArm.rotation.y=lerp(pa.rArm.rotation.y||0,0.15,dt*10);
      pa.lArm.rotation.y=lerp(pa.lArm.rotation.y||0,-0.15,dt*10);
      pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,0.2,dt*10);
      pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,-0.2,dt*10);
    } else {
      // 持枪瞄准：右臂前伸略低，左臂托枪身
      pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,-0.7+rec+aimNoise,dt*18);
      pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,-0.6+rec*0.5+aimNoise,dt*18);
      // 右臂微内收持枪
      pa.rArm.rotation.y=lerp(pa.rArm.rotation.y||0,-0.08,dt*12);
      pa.lArm.rotation.y=lerp(pa.lArm.rotation.y||0,0.12,dt*12);
      pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,-0.12,dt*10);
      pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,0.18,dt*10);
    }
  }
  else if(P.moving){
    // 徒手移动：手臂自然摆动
    const swingAmt=P.sprint?0.7:0.45;
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,-Math.sin(ph)*swingAmt,dt*15);
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,Math.sin(ph)*swingAmt,dt*15);
    pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,0,dt*8);
    pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,0,dt*8);
    pa.rArm.rotation.y=lerp(pa.rArm.rotation.y||0,0,dt*8);
    pa.lArm.rotation.y=lerp(pa.lArm.rotation.y||0,0,dt*8);
  }
  else {
    // 站立：手臂自然下垂
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,-0.05,dt*8);
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,-0.05,dt*8);
    pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,0,dt*8);
    pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,0,dt*8);
    pa.rArm.rotation.y=lerp(pa.rArm.rotation.y||0,0,dt*8);
    pa.lArm.rotation.y=lerp(pa.lArm.rotation.y||0,0,dt*8);
  }
  // 装备切换动画：手臂快速下垂再抬起
  if(P.equipT>0){
    const f=P.equipT/0.25;
    const dropAmt=-1.2*f;
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,dropAmt,dt*20);
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,dropAmt,dt*20);
    P.equipT-=dt;
  }
  // 武器持握动画细节：持枪时双臂略微内收，提升观感
  if(!swinging&&P.rollT<=0){
    if(w&&!w.melee){
      pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,-0.15,dt*8);
      pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,0.15,dt*8);
      // 后坐力时身体微后仰
      if(P.recoilT>0){ b.rotation.x=lerp(b.rotation.x,lean-0.05,dt*12); }
    } else {
      pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,0,dt*8);
      pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,0,dt*8);
    }
  }
  // 站定时身体朝向瞄准方向微调
  if(!P.moving&&P.rollT<=0&&!swinging){
    b.rotation.y=lerp(b.rotation.y,0,dt*6);
  }
  // 头部微转动（看向瞄准方向）
  if(pa.head){
    if(!P.moving&&P.rollT<=0){
      pa.head.rotation.y=lerp(pa.head.rotation.y||0,Math.sin(P.dir)*0.15,dt*4);
    }
  }
  // 呼吸效果
  if(!P.moving&&P.rollT<=0&&!swinging){
    b.position.y=bobY-crouch+Math.sin(G.time*1.8)*0.015;
  }
}
function meleeAnim(kind){
  const f=1-P.swingT/P.swingMax, pa=P.parts, b=pa.body;
  const a=pa.rArm.rotation;
  if(kind==='sweep'){
    if(f<0.3){ const t=f/0.3; a.x=lerp(-0.2,-1.3,t*Math.PI/2); b.rotation.y=lerp(0,-0.4,t); pa.lArm.rotation.x=lerp(-0.2,-0.7,t); }
    else if(f<0.55){ const t=(f-0.3)/0.25; a.x=lerp(-1.3,-1.7,t*Math.PI/2); b.rotation.y=lerp(-0.4,0.7,t); pa.lArm.rotation.x=lerp(-0.7,-0.4,t); }
    else { const t=(f-0.55)/0.45; a.x=lerp(-1.7,-0.2,t*t); b.rotation.y=lerp(0.7,0,t); pa.lArm.rotation.x=lerp(-0.4,-0.1,t); }
    b.position.y=b.position.y*0.8-0.03;
  } else if(kind==='chop'){
    if(f<0.3){ const t=f/0.3; a.x=lerp(-0.2,-2.3,t*Math.PI/2); pa.lArm.rotation.x=lerp(-0.2,-0.6,t); }
    else if(f<0.5){ const t=(f-0.3)/0.2; a.x=lerp(-2.3,-2.5,t); pa.lArm.rotation.x=lerp(-0.6,-0.5,t); }
    else { const t=(f-0.5)/0.5; a.x=lerp(-2.5,-0.2,t*t); pa.lArm.rotation.x=lerp(-0.5,-0.1,t); }
  } else if(kind==='bigswing'){
    if(f<0.3){ const t=f/0.3; a.x=lerp(-0.2,-2.5,t*Math.PI/2); pa.lArm.rotation.x=lerp(-0.2,-2.5,t*Math.PI/2); b.rotation.y=lerp(0,-0.35,t); }
    else if(f<0.6){ const t=(f-0.3)/0.3; a.x=lerp(-2.5,-0.4,t*Math.PI/2); pa.lArm.rotation.x=lerp(-2.5,-0.4,t*Math.PI/2); b.rotation.y=lerp(-0.35,0.45,t); }
    else { const t=(f-0.6)/0.4; a.x=lerp(-0.4,-0.2,t*t); pa.lArm.rotation.x=lerp(-0.4,-0.2,t*t); b.rotation.y=lerp(0.45,0,t); }
    b.position.y=b.position.y*0.85;
  } else {
    if(f<0.3){ const t=f/0.3; a.x=lerp(-0.15,-0.5,t*Math.PI/2); }
    else if(f<0.55){ const t=(f-0.3)/0.25; a.x=lerp(-0.5,-1.5,t*Math.PI/2); }
    else { const t=(f-0.55)/0.45; a.x=lerp(-1.5,-0.15,t*t); }
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,-0.2,0.15);
  }
}

function damagePlayer(dmg,inf){
  if(dmg<=0&&inf<=0) return;
  if(P.invulnT>0||P.cloakT>0) return;
  if(G.state!=='play') return;
  // 护盾吸收伤害
  if(P.shield>0){
    const absorbed=Math.min(P.shield,dmg);
    P.shield-=absorbed; dmg-=absorbed;
    if(P.shield<=0) showMsg(T('护盾损坏！','Shield broken!'));
  }
  if(dmg<=0) return;
  // 护甲减伤
  if(P.armorRed>0) dmg*=(1-P.armorRed);
  P.hp-=dmg; P.hurtT=0.2;
  if(P.infImmuneT<=0&&P.infPauseT<=0) P.inf+=inf; // 免疫/暂停时不增加感染
  $('hurtFx').style.opacity='1';
  setTimeout(()=>$('hurtFx').style.opacity='0',180);
  G.shake=Math.max(G.shake,0.18);
  AU.hurt();
}

/* ================= loot & inventory ================= */
function itemName(id){ if(id==='invExpand') return T('背包扩容','Bag Expansion'); return (ITEMS[id]&&ITEMS[id].n)?(LANG==='en'?ITEMS[id].n[1]:ITEMS[id].n[0]):id; }
function itemTip(id){
  const it=ITEMS[id]; if(!it) return '';
  if(it.tip) return LANG==='en'?it.tip[1]:it.tip[0];
  return '';
}
function addInv(id,q){
  const it=ITEMS[id]; if(!it) return false;
  const slots=P.invSlots||16;
  const stack=it.stack||10; q=q||1;
  if(WEAPONS[id]&&WEAPONS[id].dur!==undefined&&WEAPONS[id].dur!==Infinity){
    // weapon: add with full durability, never stack
    for(let i=0;i<slots;i++) if(!P.inv[i]){ P.inv[i]={id,q:1,dur:WEAPONS[id].dur}; refreshHud(); return true; }
    return false;
  }
  for(let i=0;i<slots;i++){
    const s=P.inv[i];
    if(s&&s.id===id&&s.q<stack){ const take=Math.min(q,stack-s.q); s.q+=take; q-=take;
      if(q<=0){ refreshHud(); return true; } }
  }
  for(let i=0;i<slots;i++) if(!P.inv[i]){ P.inv[i]={id,q}; refreshHud(); return true; }
  // 背包满了，不再自动丢弃，返回false
  return false;
}
function invCount(id){ let n=0; for(const s of P.inv) if(s&&s.id===id) n+=s.q; return n; }
function removeItem(id,n){
  for(let i=0;i<16;i++){ const s=P.inv[i];
    if(s&&s.id===id){ const t=Math.min(n,s.q); s.q-=t; n-=t; if(s.q<=0) P.inv[i]=null; if(n<=0) break; } }
  refreshHud();
}
function hotIndex(id){ for(let i=0;i<4;i++) if(P.hot[i]&&P.hot[i].id===id) return i; return -1; }
function removeFromHot(ix,n){ const s=P.hot[ix]; if(!s) return; s.q-=n||1; if(s.q<=0) P.hot[ix]=null; refreshHud(); }

function dropLoot(x,z,id,q){
  const g=new THREE.Group();
  buildLootModel(g,id);
  g.position.set(x,0,z); g.traverse(o=>{if(o.isMesh)o.castShadow=true;});
  scene.add(g);
  lootEnts.push({mesh:g,x,z,id,qty:q||1,bob:R(0,6)});
}
// 按F拾取物品
function pickupLoot(lo){
  if(!lo||!lootEnts.includes(lo)) return;
  if(addInv(lo.id,lo.qty)){
    scene.remove(lo.mesh); lootEnts.splice(lootEnts.indexOf(lo),1);
    AU.pickup(); P.crouchT=0.45;
    updateQuestProgress('lootW',1); // 拾取任务
    showMsg(T('拾取了 '+itemName(lo.id)+' ×'+lo.qty,'Picked up '+itemName(lo.id)+' ×'+lo.qty));
    G._nearbyLoot=null;
  } else {
    showMsg(T('背包已满！无法拾取。','Inventory full! Cannot pick up.'));
  }
}
// 手榴弹投掷
const grenades=[];
function throwGrenade(x,y,z,dx,dz,range,dmg,radius){
  const m=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,6),mat(0x3A4A2A));
  m.position.set(x,y,z); scene.add(m);
  grenades.push({m,x,y,z,vx:dx*12,vy:8,vz:dz*12,dmg,radius,t:1.5,maxY:3});
}
function updateGrenades(dt){
  for(let i=grenades.length-1;i>=0;i--){
    const g=grenades[i];
    g.t-=dt;
    g.vy-=20*dt; // 重力
    g.x+=g.vx*dt; g.y+=g.vy*dt; g.z+=g.vz*dt;
    if(g.y<0.2){ g.y=0.2; g.vy*=-0.3; g.vx*=0.5; g.vz*=0.5; }
    g.m.position.set(g.x,g.y,g.z);
    if(g.t<=0){
        // 爆炸
        explodeAt(g.x,g.y,g.z,g.dmg,g.radius);
        scene.remove(g.m); grenades.splice(i,1);
      }
  }
}
/* 掉落物3D建模 - 每种物品有独特造型 */

  if(WEAPONS[id]){ buildWeaponLoot(g,id); return; }
  switch(id){
    // ---- 食物/饮水 ----
    case 'can': // 罐头：矮圆柱+顶部拉环
      bx(0.28,0.35,0.28,0x8A7A5A,0,0.18,0,g);
      bx(0.28,0.04,0.28,0xB9A47A,0,0.37,0,g);
      bx(0.06,0.03,0.06,0x5B5C57,0,0.40,0,g);
      break;
    case 'water': // 净水：透明蓝瓶+盖
      bx(0.18,0.5,0.18,0x4A7A8A,0,0.25,0,g);
      bx(0.1,0.12,0.1,0x5B5C57,0,0.55,0,g);
      break;
    case 'hotmeal': // 热食：浅碗+食物
      bx(0.35,0.1,0.35,0xD6C29A,0,0.05,0,g);
      bx(0.26,0.08,0.26,0x8A5A35,0,0.12,0,g);
      break;
    case 'bottle': // 空瓶：细长瓶身+瓶颈
      bx(0.15,0.45,0.15,0x5A7A55,0,0.23,0,g);
      bx(0.07,0.15,0.07,0x5A7A55,0,0.53,0,g);
      break;
    // ---- 医疗 ----
    case 'bandage': // 绷带：白色卷
      bx(0.18,0.18,0.18,0xE5DDC8,0,0.09,0,g);
      bx(0.14,0.02,0.14,0xB9A47A,0,0.19,0,g);
      break;
    case 'medkit': // 医疗包：红箱+白十字
      bx(0.32,0.2,0.24,0x743C38,0,0.1,0,g);
      bx(0.16,0.03,0.05,0xE5DDC8,0,0.22,0,g);
      bx(0.05,0.03,0.16,0xE5DDC8,0,0.22,0,g);
      break;
    case 'antibio': // 抗生素：药瓶
      bx(0.12,0.25,0.12,0xB18A45,0,0.13,0,g);
      bx(0.1,0.04,0.1,0xE5DDC8,0,0.27,0,g);
      break;
    // ---- 材料 ----
    case 'cloth': // 布料：折叠的布
      bx(0.3,0.12,0.22,0xB9A47A,0,0.06,0,g);
      bx(0.26,0.04,0.18,0xD6C29A,0,0.13,0,g);
      break;
    case 'wood': // 木材：木桩
      bx(0.16,0.4,0.16,0x6B5B40,0,0.2,0,g);

function spawnInitialLoot(){
  const L=[['can',4],['water',4],['bandage',3],['cloth',2],['wood',2],['nails',3],['fuel',4],['bottle',3],
    ['ammo9',5],['ammo9',5],['shell',4],['shell',4],['ammo762',4],['ammo762',4],
    ['bat',1],['crowbar',1],['molotov',1],['barricade',2],['scrap',3],
    ['axe',1],['medkit',1],['machete',1],['hotmeal',1],
    ['flamethrower',1],['rocket',1],['railgun',1],['shotgun2',1],
    ['antibio',1]];
  for(let i=0;i<lootSpots.length;i++){
    const s=lootSpots[i];
    // 外围loot点有更高概率和更好品质
    const dist=Math.hypot(s.x,s.z);
    const chance=dist>30?0.92:0.8;
    if(Math.random()<chance){
      const e=pick(L);
      dropLoot(s.x+R(-1.5,1.5),s.z+R(-1.5,1.5),e[0],e[1]?RI(1,e[1]):1);
    }
    // 额外弹药拾取点：每个loot点有概率再额外生成一份弹药
    if(Math.random()<0.35){
      const am=pick(['ammo9','shell','ammo762']);
      dropLoot(s.x+R(-1.5,1.5),s.z+R(-1.5,1.5),am,RI(4,10));
    }
    // 额外生存资源：增加末日生存感，每个loot点有概率生成生存材料
    if(Math.random()<0.45){
      const res=pick(['wood','cloth','nails','scrap','bottle','fuel','fuel','fuel']);
      dropLoot(s.x+R(-1.5,1.5),s.z+R(-1.5,1.5),res,RI(2,6));
    }
  }
}

let tipX=0, tipY=0;
$('scaler').addEventListener('mousemove',e=>{
  const r=$('scaler').getBoundingClientRect();
  // 使用scaler的实际显示尺寸计算tooltip位置
  tipX=e.clientX-r.left;
  tipY=e.clientY-r.top;
  const tip=$('tip');
  if(!tip.classList.contains('hidden')){
    // 智能定位：避免超出右边界和下边界
    const tw=tip.offsetWidth||200, th=tip.offsetHeight||60;
    let tx=tipX+16, ty=tipY+14;
    if(tx+tw>r.width) tx=tipX-tw-8;
    if(ty+th>r.height) ty=tipY-th-8;
    tip.style.left=Math.max(4,tx)+'px';
    tip.style.top=Math.max(4,ty)+'px';
  }
});
function showTip(id){
  const tip=$('tip');
  tip.innerHTML='<span class="tn">'+itemName(id)+'</span>'+itemTip(id);
  // 先显示再定位（确保offsetWidth正确）
  tip.classList.remove('hidden');
  const r=$('scaler').getBoundingClientRect();
  const tw=tip.offsetWidth||200, th=tip.offsetHeight||60;
  let tx=tipX+16, ty=tipY+14;
  if(tx+tw>r.width) tx=tipX-tw-8;
  if(ty+th>r.height) ty=tipY-th-8;
  tip.style.left=Math.max(4,tx)+'px';
  tip.style.top=Math.max(4,ty)+'px';
}
function hideTip(){ $('tip').classList.add('hidden'); }
function bindTip(el,id){ el.addEventListener('mouseenter',()=>showTip(id)); el.addEventListener('mouseleave',hideTip); }

let dragSrc=-1;
function openInv(){
  const g=$('invGrid'); g.innerHTML='';
  const slots=P.invSlots||16;
  for(let i=0;i<16;i++){
    const d=document.createElement('div'); d.className='islot';
    if(i>=slots){
      // 锁定的背包格子 - 需要扩容
      d.className='islot locked';
      d.innerHTML='<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#5B5C57" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="10" width="12" height="10" rx="1"/><path d="M9 10V7a3 3 0 0 1 6 0v3"/></svg>';
      d.style.opacity='0.3';
      d.style.cursor='default';
      g.appendChild(d);
      continue;
    }
    const s=P.inv[i];
    if(s){
      d.innerHTML=icon(s.id)+'<span class="qty">'+s.q+'</span>'+'<span class="nm">'+itemName(s.id)+'</span><span class="drop" title="'+T('丢弃','Drop')+'"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#C05848" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></span>';
      d.onclick=()=>useInv(i);
      // 右键：消耗品直接使用，其他丢弃
      d.oncontextmenu=(e)=>{ e.preventDefault(); const it=ITEMS[s.id]; if(it.use==='food'||it.use==='thirst'||it.use==='heal'||it.use==='expand'||it.use==='armor'){ consumeInv(i); } else { dropInvItem(i); } };
      // 拖拽交换
      d.draggable=true;
      d.ondragstart=(e)=>{ dragSrc=i; e.dataTransfer.effectAllowed='move'; };
      d.ondragover=(e)=>{ e.preventDefault(); };
      d.ondrop=(e)=>{ e.preventDefault(); if(dragSrc>=0&&dragSrc!==i){ swapInv(dragSrc,i); dragSrc=-1; }
        // 接收来自hotbar的拖拽
        const data=e.dataTransfer.getData('text/plain');
        if(data&&data.startsWith('hot:')){ const hi=parseInt(data.substring(4)); if(!isNaN(hi)&&P.hot[hi]){ const hs=P.hot[hi]; if(addInv(hs.id,hs.q)){ P.hot[hi]=null; if(P.hsel===hi){ P.weapon='fists'; P.hsel=3; setWeaponMesh(); } refreshHud(); openInv(); } } } };
      // 丢弃按钮
      const dropBtn=d.querySelector('.drop');
      if(dropBtn){ dropBtn.onclick=(e)=>{ e.stopPropagation(); dropInvItem(i); }; }
      bindTip(d,s.id);
    } else { d.style.opacity='0.35'; }
    g.appendChild(d);
  }
  $('invHint').innerHTML=T(
    '左键放入快捷栏；右键使用/丢弃；点击垃圾桶丢弃到地上 | 按 F 拾取地上物品 | 背包 '+slots+'/12格',
    'L-click to hotbar; R-click use/drop; click trash to drop | Press F to pick up | Bag '+slots+'/12 slots');
  $('invP').classList.remove('hidden');
  updatePanelsPos();
}
function swapInv(a,b){
  const tmp=P.inv[a]; P.inv[a]=P.inv[b]; P.inv[b]=tmp;
  openInv();
}
function dropInvItem(i){
  const s=P.inv[i]; if(!s) return;
  dropLoot(P.x+P.aimX*1.5, P.z+P.aimZ*1.5, s.id, s.q);
  showMsg(T('丢弃 '+itemName(s.id)+'×'+s.q,'Dropped '+itemName(s.id)+'×'+s.q));
  P.inv[i]=null;
  openInv(); refreshHud();
}
function useInv(i){
  const s=P.inv[i]; if(!s) return;
  const it=ITEMS[s.id];
  // 所有物品均可放入快捷栏 0-2 格（第 3 格留给拳头）
  if(WEAPONS[s.id]&&WEAPONS[s.id].dur!==undefined&&WEAPONS[s.id].dur!==Infinity&&s.dur===undefined) s.dur=WEAPONS[s.id].dur;
  for(let h=0;h<3;h++){ if(!P.hot[h]){ P.hot[h]={id:s.id,q:s.q,dur:s.dur}; P.inv[i]=null; P.hsel=h; refreshHud(); openInv(); return; } }
  showMsg(T('快捷栏已满。','Hotbar full.'));
}
function consumeInv(i){
  const s=P.inv[i]; if(!s) return false;
  const it=ITEMS[s.id];
  const boost=P.healBoostT>0?2:1; // 医生技能：治疗效果翻倍
  if(it.use==='food'){ P.hunger=clamp(P.hunger+it.v,0,100); if(it.hp) P.hp=clamp(P.hp+it.hp*boost,0,100); AU.eat(); }
  else if(it.use==='thirst'){ P.thirst=clamp(P.thirst+it.v,0,100); AU.eat(); }
  else if(it.use==='heal'){ P.hp=clamp(P.hp+it.v*boost,0,100); P.inf=clamp(P.inf-(it.inf||0)*boost,0,100); AU.eat(); }
  else if(it.use==='expand'){ P.invSlots=Math.min(16,(P.invSlots||8)+2); AU.craft(); showMsg(T('背包扩容！当前 '+P.invSlots+'/16 格','Bag expanded! '+P.invSlots+'/16 slots')); }
  else if(it.use==='armor'){ P.armorRed=0.3; AU.craft(); showMsg(T('护甲装备！减伤30%。','Armor equipped! -30% damage.')); }
  else return false;
  s.q--; if(s.q<=0) P.inv[i]=null;
  openInv(); refreshHud();
  return true;
}
let craftCat='med';
function openCraft(){
  const tabs=$('craftTabs'); tabs.innerHTML='';
  for(const c of CRAFT_CATS){
    const b=document.createElement('div'); b.className='ctab'+(craftCat===c[0]?' sel':'');
    b.textContent=LANG==='en'?c[2]:c[1];
    b.onclick=()=>{ craftCat=c[0]; openCraft(); AU.ui(); };
    tabs.appendChild(b);
  }
  const list=$('craftList'); list.innerHTML='';
  const job=G.craftJob;
  for(const rc of RECIPES){
    if(rc.cat!==craftCat) continue;
    // 检查蓝图是否已解锁
    if(rc.bp && !(G.blueprints||[]).includes(rc.bp)){
      const row=document.createElement('div'); row.className='crow locked';
      row.innerHTML='<div class="cname"><svg class="ico" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#5B5C57" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="10" width="12" height="10" rx="1"/><path d="M9 10V7a3 3 0 0 1 6 0v3"/></svg> '+T('未解锁蓝图','Locked Blueprint')+'</div><div class="creq">'+T('需要发现蓝图','Need to find blueprint')+'</div>';
      list.appendChild(row);
      continue;
    }
    const row=document.createElement('div'); row.className='crow';
    const reqTxt=Object.entries(rc.req).map(([k,v])=>{
      const have=invCount(k);
      return '<span class="'+(have<v?'lack':'')+'">'+itemName(k)+'×'+v+'('+have+')</span>';
    }).join(' + ');
    const left=document.createElement('div');
    left.innerHTML='<div class="cname">'+icon(rc.out)+' '+itemName(rc.out)+(rc.qty>1?'×'+rc.qty:'')+'</div>'+
      '<div class="creq">'+reqTxt+'</div>';
    row.appendChild(left);
    if(job&&job.rc===rc){
      const pg=document.createElement('div'); pg.className='cprog';
      pg.innerHTML='<div class="cfill" style="width:'+(100*(1-job.left/job.total))+'%"></div><span>'+T('点击取消','Click to cancel')+'</span>';
      pg.onclick=()=>cancelCraft();
      row.appendChild(pg);
    } else {
      const can=Object.entries(rc.req).every(([k,v])=>invCount(k)>=v);
      const b=document.createElement('span'); b.className='btn'+(can&&!job?'':' dis');
      b.textContent=T('合成','Craft');
      if(can&&!job) b.onclick=()=>doCraft(rc);
      row.appendChild(b);
    }
    bindTip(row,rc.out);
    list.appendChild(row);
  }
  $('craftP').classList.remove('hidden');
  updatePanelsPos();
}
function doCraft(rc){
  for(const [k,v] of Object.entries(rc.req)) removeItem(k,v);
  G.craftJob={rc,left:rc.t,total:rc.t};
  AU.ui(); openCraft();
}
function cancelCraft(){
  const job=G.craftJob; if(!job) return;
  for(const [k,v] of Object.entries(job.rc.req)) addInv(k,v);
  G.craftJob=null; showMsg(T('已取消合成。','Crafting cancelled.'));
  if(!$('craftP').classList.contains('hidden')) openCraft();
}
function craftTick(dt){
  const job=G.craftJob; if(!job) return;
  job.left-=dt;
  if(job.left<=0){
    G.craftJob=null;
    if(job.rc.out==='invExpand'){
      // 背包扩容：增加2格，上限16
      P.invSlots=Math.min(16,(P.invSlots||8)+2);
      AU.craft(); showMsg(T('背包扩容完成！当前 '+P.invSlots+'/16 格','Bag expanded! Now '+P.invSlots+'/16 slots'));
    } else {
      addInv(job.rc.out,job.rc.qty);
      updateQuestProgress('craft',1); // 合成任务
      AU.craft(); showMsg(T('合成完成：','Crafted: ')+itemName(job.rc.out)+(job.rc.qty>1?'×'+job.rc.qty:''));
    }
    if(!$('craftP').classList.contains('hidden')) openCraft();
  } else if(!$('craftP').classList.contains('hidden')){
    openCraft();
  }
}
function closePanels(){ $('invP').classList.add('hidden'); $('craftP').classList.add('hidden'); hideTip(); }
function updatePanelsPos(){}

function refreshHud(){

  $('fHu').style.width=P.hunger+'%'; $('tHu').textContent=T('饱食 ','Food ')+Math.ceil(P.hunger);
  $('fTh').style.width=P.thirst+'%'; $('tTh').textContent=T('饮水 ','Water ')+Math.ceil(P.thirst);
  $('fSt').style.width=P.stam+'%'; $('tSt').textContent=T('体力 ','Stam ')+Math.ceil(P.stam);
  $('fHp').parentElement.classList.toggle('warn',P.hp<25);
  $('fHu').parentElement.classList.toggle('warn',P.hunger<25);
  $('fTh').parentElement.classList.toggle('warn',P.thirst<25);
  $('fSt').parentElement.classList.toggle('warn',P.stam<25);
  $('infTxt').textContent=Math.round(P.inf)+'%';
  $('killTxt').textContent=T('击杀 ','Kills ')+G.kills;
  $('scoreTxt').textContent=T('得分 ','Score ')+G.score;
  $('comboTxt').textContent=G.combo>=3?('x'+G.combo+' COMBO'):'';
  const w=WEAPONS[P.weapon]||WEAPONS.fists;
  $('wpnName').textContent=LANG==='en'?w.n[1]:w.n[0];
  const s=P.hot[P.hsel];
  if(w.melee&&w.dur!==Infinity&&s){
    const max=w.dur, cur=(s.dur===undefined?max:s.dur);
    $('durTxt').textContent=T('耐久 ','Dur ')+Math.max(0,Math.round(cur/max*100))+'%';
  } else $('durTxt').textContent='';
  $('ammoTxt').textContent=w.melee?'':(P.mags[P.weapon]||0)+' / '+invCount(w.ammo);
  const rt=G.waveState==='rest'?T('下一波 ','Next wave ')+Math.ceil(G.restT)+'s':T('剩余 ','Left ')+Math.max(0,G.spawnQ-G.spawned+aliveZ());
  $('waveTxt').textContent=T('第 '+Math.max(1,G.wave)+' 波','Wave '+Math.max(1,G.wave))+' · '+rt;
  
  const night=nightFactor()>0.5;
  $('dayIco').innerHTML=night?icon('moon'):icon('sun');
  $('dayLbl').textContent=(G.bloodMoon&&night?T('血月 · 第 ','BLOOD MOON · Day '):T('第 ','Day '))+G.dayCount+T(' 天','');
  $('dayLbl').style.color=(G.bloodMoon&&night)?'#C05848':'';
  // 模式信息
  let modeInfo='';
  if(G.mode==='defense'&&G.labMesh){
    modeInfo=T('研究所 HP '+Math.ceil(G.labHp)+'/'+G.labMaxHp+' | 研究 '+G.labProgress+'/'+G.labTarget+'天',
      'Lab HP '+Math.ceil(G.labHp)+'/'+G.labMaxHp+' | Research '+G.labProgress+'/'+G.labTarget+'d');
  } else if(G.mode==='survival'){
    if(G.extractMesh){
      const d=Math.hypot(P.x-G.extractX,P.z-G.extractZ);
      modeInfo=T('撤离点距离 '+Math.ceil(d)+'m'+(G.extractT>0?' ('+Math.ceil((3-G.extractT))+'s)':''),
        'Extraction '+Math.ceil(d)+'m'+(G.extractT>0?' ('+Math.ceil((3-G.extractT))+'s)':''));
    } else {
      modeInfo=T('生存目标：第15天撤离 ('+Math.max(0,15-G.dayCount)+'天剩余)',
        'Goal: Extract on Day 15 ('+Math.max(0,15-G.dayCount)+'d left)');
    }
  } else if(G.mode==='endless'){
    modeInfo=T('无尽模式','Endless Mode');
  }
  if(modeInfo){
    if(!$('modeInfo')){
      const el=document.createElement('div'); el.id='modeInfo';
      el.style.cssText='position:absolute;top:36px;left:50%;transform:translateX(-50%);font-size:13px;color:#B9A47A;text-align:center;pointer-events:none;white-space:nowrap;';
      elHud.appendChild(el);
    }
    $('modeInfo').textContent=modeInfo;
  }
  // 室内僵尸刷新倒计时
  if(G.inBuilding&&G._interiorSpawnT!==undefined&&G._interiorSpawnT!==null){
    if(!$('interiorTimer')){
      const el=document.createElement('div'); el.id='interiorTimer';
      el.style.cssText='position:absolute;top:58px;left:50%;transform:translateX(-50%);font-size:12px;color:#8A6A4A;text-align:center;pointer-events:none;white-space:nowrap;';
      elHud.appendChild(el);
    }
    const t=Math.ceil(G._interiorSpawnT);
    const warn=t<=10;
    $('interiorTimer').textContent=T('下一波僵尸：'+t+'s','Next wave: '+t+'s');
    $('interiorTimer').style.color=warn?'#C05848':'#8A6A4A';
  } else if($('interiorTimer')){
    $('interiorTimer').remove();
  }
  // boss bar
  const bw=$('bossWrap');
  if(G.boss&&!G.boss.dead&&G.boss.hp>0){
    bw.classList.remove('hidden');
    $('bossLbl').textContent=T('蛮兽 BRUTE','BRUTE');
    $('bossFill').style.width=(clamp(G.boss.hp/G.boss.maxhp,0,1)*100)+'%';
  } else bw.classList.add('hidden');
  // hotbar - 只在数据变化时重建DOM（修复每帧重建导致点击丢失）
  var hotSig='';
  for(var hi=0;hi<4;hi++){ var hsl=P.hot[hi]; hotSig+=(hsl?hsl.id+':'+hsl.q+':'+(hsl.dur||0):'empty')+'|'; }
  hotSig+=P.hsel;
  if(hotSig!==G._hotSig){
    G._hotSig=hotSig;
    elHot.innerHTML='';
  for(let i=0;i<4;i++){
    const s=P.hot[i];
    const d=document.createElement('div'); d.className='hslot'+(i===P.hsel?' sel':'');
    d.innerHTML='<span class="key">'+(i+1)+'</span>'+(s?icon(s.id)+'<span class="qty">'+(s.q>1?s.q:'')+'</span>':'');
    if(s&&WEAPONS[s.id]&&WEAPONS[s.id].dur!==undefined&&WEAPONS[s.id].dur!==Infinity){
      const max=WEAPONS[s.id].dur, cur=(s.dur===undefined?max:s.dur);
      d.innerHTML+='<div class="dwrap"><div class="dfill" style="width:'+Math.max(0,cur/max*100)+'%"></div></div>';
    }
    d.onclick=()=>{
      // 背包打开时：点击快捷栏放回背包
      if(!$('invP').classList.contains('hidden')){
        var cur=P.hot[i];
        if(cur&&cur.id!=='fists'){
          if(addInv(cur.id,cur.q)){
            P.hot[i]=null;
            if(P.hsel===i){ P.weapon='fists'; P.hsel=3; setWeaponMesh(); }
            G._hotSig=''; refreshHud(); openInv();
            showMsg(T('已放回背包','Returned to inventory'));
          } else {
            dropLoot(P.x+P.aimX*1.5,P.z+P.aimZ*1.5,cur.id,cur.q);
            P.hot[i]=null;
            if(P.hsel===i){ P.weapon='fists'; P.hsel=3; setWeaponMesh(); }
            G._hotSig=''; refreshHud(); openInv();
            showMsg(T('背包已满，已丢弃','Bag full, dropped'));
          }
        }
      } else { equipHot(i); }
    };
    // 右键：放回背包或丢弃（fists除外）
    if(s&&s.id!=='fists'){
      d.oncontextmenu=(e)=>{
        e.preventDefault();
        // 优先放回背包
        if(addInv(s.id,s.q)){
          P.hot[i]=null;
          if(P.hsel===i){ P.weapon='fists'; P.hsel=3; setWeaponMesh(); }
          G._hotSig=''; refreshHud();
          showMsg(T('已放回背包','Returned to inventory'));
        } else {
          // 背包满了则丢弃
          dropLoot(P.x+P.aimX*1.5,P.z+P.aimZ*1.5,s.id,s.q);
          P.hot[i]=null;
          if(P.hsel===i){ P.weapon='fists'; P.hsel=3; setWeaponMesh(); }
          G._hotSig=''; refreshHud();
          showMsg(T('背包已满，已丢弃','Bag full, dropped'));
        }
      };
      // 拖拽到背包
      d.draggable=true;
      d.ondragstart=(e)=>{ e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain','hot:'+i); };
    }
    if(s) bindTip(d,s.id);
    elHot.appendChild(d);
    }
  }
  // 技能HUD
  const sh=$('skillHud');
  if(sh){
    const cls=CLASSES[P.classId];
    if(cls){
      const cd=Math.ceil(P.skillCd||0);
      const ready=cd<=0;
      const fren=(P.frenzyT||0)>0;
      const clk=(P.cloakT||0)>0;
      sh.innerHTML='<div style="padding:6px 14px;border:2px solid '+(ready?'#B18A45':'#5B5C57')+';border-radius:8px;background:'+(ready?'#242321':'#17202B')+';color:'+(ready?'#D6C29A':'#5B5C57')+';font-size:13px;text-align:center;min-width:100px;'+
        (fren?'border-color:#743C38;':'')+(clk?'border-color:#30483A;':'')+'">'+
        '<div style="font-size:11px;opacity:.7">[V] '+T(cls.skill.nameZh,cls.skill.nameEn)+'</div>'+
        '<div style="font-size:14px;font-weight:bold">'+(ready?T('就绪','READY'):(cd+'s'))+'</div>'+
        '</div>';
    } else { sh.innerHTML=''; }
  }
  // 拾取/交易/搜查/进入建筑提示
  const ph=$('pickHint');
  if(ph){
    if(G._nearBuilding&&!G.inBuilding&&G.state==='play'&&!G.paused){
      const b=G._nearBuilding;
      ph.innerHTML='<span class="pk">C</span>'+T('进入 '+b.label,'Enter '+b.label);
      ph.classList.remove('hidden');
    } else if(G.inBuilding&&G._nearSearch&&G.state==='play'&&!G.paused){
      const s=G._nearSearch;
      const tn=s.type==='cabinet'?T('文件柜','Cabinet'):s.type==='locker'?T('储物柜','Locker'):T('板条箱','Crate');
      ph.innerHTML='<span class="pk">F</span>'+T('搜查 '+tn,'Search '+tn)+' <span style="color:#A09884">'+T('按C离开','C to exit')+'</span>';
      ph.classList.remove('hidden');
    } else if(G.inBuilding&&G._nearInteriorLoot&&G.state==='play'&&!G.paused){
      ph.innerHTML='<span class="pk">F</span>'+T('拾取 '+itemName(G._nearInteriorLoot.id),'Pick up '+itemName(G._nearInteriorLoot.id))+' <span style="color:#A09884">'+T('按C离开','C to exit')+'</span>';
      ph.classList.remove('hidden');
    } else if(G.inBuilding&&G.state==='play'&&!G.paused){
      ph.innerHTML='<span style="color:#A09884">'+T('按 C 离开建筑','Press C to exit')+'</span>';
      ph.classList.remove('hidden');
    } else if(G._nearSearch&&G.state==='play'&&!G.paused){
      const s=G._nearSearch;
      const tn=s.type==='cabinet'?T('文件柜','Cabinet'):s.type==='locker'?T('储物柜','Locker'):T('板条箱','Crate');
      ph.innerHTML='<span class="pk">F</span>'+T('搜查 '+tn,'Search '+tn);
      ph.classList.remove('hidden');
    } else if(G._nearTrader&&G.state==='play'&&!G.paused){
      const t=G._nearTrader;
      const deal=t.deals[0];
      if(deal){
        const giveStr=Object.entries(deal.give).map(([k,v])=>v+' '+itemName(k)).join('+');
        ph.innerHTML='<span class="pk">F</span>'+T('交易：'+giveStr+' → '+itemName(deal.get.id)+' ×'+deal.get.q,'Trade: '+giveStr+' → '+itemName(deal.get.id)+' ×'+deal.get.q);
        ph.classList.remove('hidden');
      }
    } else if(G._nearbyLoot&&G.state==='play'&&!G.paused){
      const lo=G._nearbyLoot;
      ph.innerHTML='<span class="pk">F</span>'+T('拾取 ','Pick up ')+itemName(lo.id)+(lo.qty>1?' ×'+lo.qty:'');
      ph.classList.remove('hidden');
    } else { ph.classList.add('hidden'); }
  }
}

/* ================= minimap ================= */
const mmC=$('mm').getContext('2d');
function drawMinimap(){
  const c=mmC, S=140, sc=S/MAP;
  c.fillStyle='#242321'; c.fillRect(0,0,S,S);
  c.fillStyle='#3B3B38';
  c.fillRect((-20-2.75+HALF)*sc,(0)*sc,5.5*sc,S);
  c.fillRect((20-2.75+HALF)*sc,0,5.5*sc,S);
  c.fillRect(0,(-20-2.75+HALF)*sc,S,5.5*sc);
  c.fillRect(0,(20-2.75+HALF)*sc,S,5.5*sc);
  c.fillStyle='#4A453C';
  c.fillRect((-7+HALF)*sc,(-7+HALF)*sc,14*sc,14*sc);
  c.strokeStyle='#B18A45'; c.lineWidth=1;
  c.strokeRect((-7.9+HALF)*sc,(-7.9+HALF)*sc,15.8*sc,15.8*sc);
  const pulse=Math.sin(G.time*4)*0.5+0.5;
  for(const z of zombies){
    if(z.dead) continue;
    // 追击中的僵尸更亮+脉动
    const chasing=z.state==='chase'||z.state==='attack';
    const baseCol=z.c.boss?'#C05848':(z.c.explode?'#8A9A6A':(z.c.ranged?'#6B8A4A':(z.type==='brute2'?'#886633':'#A4382E')));
    if(chasing){
      c.fillStyle='#FF2222';
      const ps=3+pulse*2;
      c.fillRect((z.x+HALF)*sc-ps/2,(z.z+HALF)*sc-ps/2,ps,ps);
    }
    c.fillStyle=chasing?'#FF6644':baseCol;
    const s=z.c.boss?4:(z.type==='brute2'||z.type==='tank'?3.5:2.5);
    c.fillRect((z.x+HALF)*sc-s/2,(z.z+HALF)*sc-s/2,s,s);
  }
  for(const lo of lootEnts){
    if(P.scavengeT>0){
      const ld=Math.hypot(lo.x-P.x,lo.z-P.z);
      if(ld<40){ c.fillStyle='#B18A45';
        const ps=4+Math.sin(Date.now()/200+lo.bob)*1.2;
        c.fillRect((lo.x+HALF)*sc-ps/2,(lo.z+HALF)*sc-ps/2,ps,ps);
        c.strokeStyle='#E5DDC8'; c.lineWidth=0.6;
        c.strokeRect((lo.x+HALF)*sc-ps/2,(lo.z+HALF)*sc-ps/2,ps,ps);
        continue; }
    }
    c.fillStyle='#D6C29A';
    c.fillRect((lo.x+HALF)*sc-1.5,(lo.z+HALF)*sc-1.5,3,3);
  }
  if(G.supply){ c.fillStyle='#B18A45';
    c.fillRect((G.supply.x+HALF)*sc-3,(G.supply.z+HALF)*sc-3,6,6);
    c.strokeStyle='#E5DDC8'; c.strokeRect((G.supply.x+HALF)*sc-3,(G.supply.z+HALF)*sc-3,6,6); }
  // 商人
  if(G.trader){
    const ts=5+Math.sin(Date.now()/300)*1;
    c.fillStyle='#5A8A6A';
    c.fillRect((G.trader.x+HALF)*sc-ts/2,(G.trader.z+HALF)*sc-ts/2,ts,ts);
    c.strokeStyle='#E5DDC8'; c.lineWidth=0.8;
    c.strokeRect((G.trader.x+HALF)*sc-ts/2,(G.trader.z+HALF)*sc-ts/2,ts,ts);
  }
  // 可进入建筑（金色方块标记）
  for(const b of enterableBuildings){
    if(b.shell.visible===false) continue;
    c.fillStyle='#D4A84B';
    c.fillRect((b.x+HALF)*sc-3,(b.z+HALF)*sc-3,6,6);
    c.strokeStyle='#E5DDC8'; c.lineWidth=0.5;
    c.strokeRect((b.x+HALF)*sc-3,(b.z+HALF)*sc-3,6,6);
  }
  // 可搜查容器（仅拾荒直觉激活时显示）
  if(P.scavengeT>0||P.cloakT>0){
    for(const s of searchables){
      if(s.searched) continue;
      c.fillStyle='#8A8A6A';
      c.fillRect((s.x+HALF)*sc-1.5,(s.z+HALF)*sc-1.5,3,3);
    }
  }
  // 待救援幸存者
  if(G.allyRescue){
    const ps=5+Math.sin(Date.now()/200)*1.5;
    c.fillStyle='#5A8A6A';
    c.fillRect((G.allyRescue.x+HALF)*sc-ps/2,(G.allyRescue.z+HALF)*sc-ps/2,ps,ps);
    c.strokeStyle='#E5DDC8'; c.lineWidth=0.8;
    c.strokeRect((G.allyRescue.x+HALF)*sc-ps/2,(G.allyRescue.z+HALF)*sc-ps/2,ps,ps);
  }
  // AI队友
  if(G.ally){
    c.fillStyle='#7AAA7A';
    c.fillRect((G.ally.x+HALF)*sc-2.5,(G.ally.z+HALF)*sc-2.5,5,5);
  }
  // 模式标记
  if(G.labMesh){
    c.fillStyle='#E5DDC8';
    c.fillRect((0+HALF)*sc-4,(0+HALF)*sc-4,8,8);
    c.strokeStyle='#743C38'; c.lineWidth=1.5;
    c.strokeRect((0+HALF)*sc-4,(0+HALF)*sc-4,8,8);
  }
  if(G.extractMesh){
    c.fillStyle='#30483A';
    const ep=4+Math.sin(Date.now()/200)*1.5;
    c.fillRect((G.extractX+HALF)*sc-ep/2,(G.extractZ+HALF)*sc-ep/2,ep,ep);
    c.strokeStyle='#E5DDC8'; c.lineWidth=1;
    c.strokeRect((G.extractX+HALF)*sc-ep/2,(G.extractZ+HALF)*sc-ep/2,ep,ep);
  }
  for(const b of barricades){ c.fillStyle='#8A6A42';
    c.fillRect((b.x+HALF)*sc-2,(b.z+HALF)*sc-2,4,4); }
  c.fillStyle='#E5DDC8';
  c.fillRect((P.x+HALF)*sc-2.5,(P.z+HALF)*sc-2.5,5,5);
  // 玩家朝向指示
  const px=(P.x+HALF)*sc, py=(P.z+HALF)*sc;
  c.strokeStyle='#FFD700'; c.lineWidth=2;
  c.beginPath();
  c.moveTo(px,py);
  c.lineTo(px+Math.sin(P.dir)*8,py+Math.cos(P.dir)*8);
  c.stroke();
  c.strokeStyle='#5B5C57'; c.strokeRect(0,0,S,S);
}

/* ================= day/night & blood moon ================= */
const skyDay=new THREE.Color(0xBFC7CE), skyNight=new THREE.Color(0x17202B);
const bloodCol=new THREE.Color(0x4A1F1C);
const sunDay=new THREE.Color(0xfff2dd), sunNight=new THREE.Color(0x8FA3B8);
const fogDay=new THREE.Color(0xBFC7CE), fogNight=new THREE.Color(0x121B26);
function nightFactor(){ const h=Math.sin(G.cycleT*Math.PI*2); return h>0?0:clamp(-h*1.6,0,1); }
function onNightStart(){
  if(G.dayCount%4===0){
    G.bloodMoon=true;
    showBanner(T('血月升起！尸潮汹涌！','BLOOD MOON! The horde stirs!'),'#C05848',2.4);
    AU.waveHorn();
    showMsg(T('血月之夜：尸潮更密、速度更快！','Blood moon: denser, faster horde!'));
  } else {
    showMsg(T('夜幕降临……它们更活跃了。','Night falls... they grow restless.'));
  }
}
function onDayStart(){
  G.bloodMoon=false;
  spawnSupply();
  rollQuests(); // 每日任务
  // 随机天气
  const r=Math.random();
  if(r<0.25) G.weather='rain';
  else if(r<0.40) G.weather='fog';
  else if(r<0.45) G.weather='storm';
  else G.weather='clear';
  if(G.weather==='rain') showMsg(T('开始下雨了，视野受限。','It starts raining. Visibility reduced.'));
  else if(G.weather==='fog') showMsg(T('浓雾弥漫，难以看清远处。','Thick fog rolls in. Hard to see far.'));
  else if(G.weather==='storm') showBanner(T('暴风雨！','STORM!'),'#5A7A9A',2);
  // 白天有40%概率出现商人
  if(Math.random()<0.40){ setTimeout(()=>{ if(G.state==='play'&&nightFactor()<0.3) spawnTrader(); },R(5000,15000)); }
}
/* ================= weather ================= */
let rainParticles=null;
function updateWeather(dt){
  const night=nightFactor();
  let fogNear=lerp(80,48,night), fogFar=lerp(230,150,night);
  if(G.weather==='rain'){ fogNear-=15; fogFar-=30; }
  else if(G.weather==='fog'){ fogNear=lerp(35,22,night); fogFar=lerp(100,70,night); }
  else if(G.weather==='storm'){ fogNear-=20; fogFar-=40; }
  if(G.bloodMoon){ fogNear=lerp(fogNear,18,night*0.5); }
  scene.fog.near=fogNear; scene.fog.far=fogFar;
  // 雨粒子
  if((G.weather==='rain'||G.weather==='storm')&&G.state==='play'){
    if(!rainParticles){
      const N=G.weather==='storm'?800:500;
      const geo=new THREE.BufferGeometry();
      const pos=new Float32Array(N*3);
      for(let i=0;i<N;i++){ pos[i*3]=R(-40,40); pos[i*3+1]=R(15,45); pos[i*3+2]=R(-40,40); }
      geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
      rainParticles=new THREE.Points(geo,new THREE.PointsMaterial({color:0xAACCEE,size:0.15,transparent:true,opacity:0.6}));
      scene.add(rainParticles);
    }
    rainParticles.visible=true;
    rainParticles.position.x=P.x; rainParticles.position.z=P.z;
    const pos=rainParticles.geometry.attributes.position;
    const spd=G.weather==='storm'?45:30;
    for(let i=0;i<pos.count;i++){
      pos.array[i*3+1]-=spd*dt;
      if(pos.array[i*3+1]<0){ pos.array[i*3+1]=R(30,45); pos.array[i*3]=R(-40,40); pos.array[i*3+2]=R(-40,40); }
    }
    pos.needsUpdate=true;
  } else if(rainParticles){ rainParticles.visible=false; }
}
/* ================= random events ================= */
function updateEvents(dt){
  if(G.state!=='play') return;
  G.eventT+=dt;
  if(G.eventT<G.eventCooldown) return;
  G.eventT=0;
  G.eventCooldown=R(90,180); // 1.5-3分钟一次
  const r=Math.random();
  if(r<0.30){ triggerHordeSurge(); }
  else if(r<0.55){ triggerSupplyDrop(); }
  else if(r<0.75){ triggerAirdrop(); }
  else if(r<0.90){ triggerSurvivor(); }
  else { triggerCacheStash(); }
}

  G.trader={mesh:g,x,z,deals,life:120}; // 2分钟
  showBanner(T('流浪商人出现！','Wandering Trader!'),'#5A8A6A',2);
  showMsg(T('靠近商人按F交易。','Press F near trader to trade.'));

function updateTrader(dt){
  if(!G.trader) return;
  G.trader.life-=dt;
  if(G.trader.life<=0){
    scene.remove(G.trader.mesh); G.trader=null;
    showMsg(T('商人离开了。','The trader has left.'));
    return;
  }
  const d=Math.hypot(P.x-G.trader.x,P.z-G.trader.z);
  G._nearTrader=d<3?G.trader:null;
}
function tryTrade(){
  if(!G._nearTrader) return false;
  const t=G._nearTrader;
  // 尝试第一个可交易的deal
  for(const deal of t.deals){
    let can=true;
    for(const k in deal.give){ if(invCount(k)<deal.give[k]){ can=false; break; } }
    if(can){
      for(const k in deal.give) removeItem(k,deal.give[k]);
      // 蓝图特殊处理
      if(deal.get.id.startsWith('bp_')){ G.blueprints.push(deal.get.id); }
      else { addInv(deal.get.id,deal.get.q); }
      showMsg(T('交易成功！获得 '+itemName(deal.get.id)+' ×'+deal.get.q,'Trade! Got '+itemName(deal.get.id)+' ×'+deal.get.q));
      AU.pickup();
      // 从交易列表移除已交易的
      t.deals.splice(t.deals.indexOf(deal),1);
      if(t.deals.length===0){ scene.remove(t.mesh); G.trader=null; showMsg(T('商人商品已售罄。','Trader sold out.')); }
      return true;
    }
  }
  showMsg(T('材料不足，无法交易。','Not enough materials to trade.'));
  return false;
}

function getAttachments(wk){ return G.attachments[wk]||{}; }
function hasAttachment(wk,slot){ return getAttachments(wk)[slot]||null; }
function applyAttachmentEffects(wk,w){
  const a=getAttachments(wk);
  let magMult=1, reloadMult=1, spreadMult=1, rangeMult=1, recoilMult=1;
  if(a.mag==='extmag') magMult=1.5;
  if(a.mag==='fastmag') reloadMult=0.7;
  if(a.muzzle==='compensator') recoilMult=0.6;
  if(a.grip==='laser') spreadMult=0.85;
  if(a.grip==='foregrip') spreadMult=0.7;
  if(a.grip==='scope') rangeMult=1.5;
  return {mag:Math.round(w.mag*magMult), reload:w.reload*reloadMult, spread:spreadMult, range:rangeMult, recoil:recoilMult, silent:a.muzzle==='suppressor'};
}
function showAttachUI(){
  const wk=P.weapon;
  const w=ITEMS[wk];
  if(!w||!w.ranged){ showMsg(T('当前武器无法改装','Current weapon cannot be modified')); return; }
  const a=getAttachments(wk);
  let html='<div class="perkTitle">'+T('武器改装 - ','Weapon Mods - ')+T(w.n[0],w.n[1])+'</div>';
  for(const slot of ['muzzle','mag','grip']){
    const slotName=slot==='muzzle'?T('枪口','Muzzle'):slot==='mag'?T('弹匣','Magazine'):T('握把','Grip');
    const cur=a[slot];
    html+=`<div style="margin:8px auto;max-width:380px"><div style="color:#A09884;font-size:13px;margin-bottom:4px">${slotName}</div>`;
    for(const id in ATTACHMENTS){
      const att=ATTACHMENTS[id];
      if(att.slot!==slot) continue;
      const owned=cur===id;
      const costStr=Object.entries(att.cost).map(([k,v])=>`${v} ${itemName(k)}`).join(' + ');
      const canBuy=!owned&&hasCost(att.cost);
      html+=`<div class="perkCard" style="${owned?'border-color:#5A8A6A;':''}" ${canBuy?`onclick="buyAttachment('${wk}','${id}')"`:''}>
        <div class="perkName">${T(att.n[0],att.n[1])} ${owned?'<span style="color:#5A8A6A">✓</span>':''}</div>
        <div class="perkDesc">${T(att.d[0],att.d[1])} · ${costStr}</div>
      </div>`;
    }
    html+='</div>';
  }
  html+=`<div class="perkCard" onclick="$('attachP').classList.add('hidden');G.paused=false;" style="border-color:#8A3A3A;margin-top:12px"><div class="perkName">${T('关闭','Close')}</div></div>`;
  const p=$('attachP');
  p.innerHTML=html; p.classList.remove('hidden');
  G.paused=true;
}
function buyAttachment(wk,id){
  const att=ATTACHMENTS[id];
  if(!hasCost(att.cost)){ showMsg(T('材料不足','Not enough materials')); return; }
  spendCost(att.cost);
  if(!G.attachments[wk]) G.attachments[wk]={};
  G.attachments[wk][att.slot]=id;
  AU.craft();
  showMsg(T('安装了 '+att.n[0],'Installed '+att.n[1]));
  showAttachUI();
}

function rollQuests(){
  G.quests=[]; G.questKills={}; G.questLoot={};
  const pool=[...QUEST_POOL];
  for(let i=0;i<3&&pool.length>0;i++){
    const idx=RI(0,pool.length-1);
    const q=pool.splice(idx,1)[0];
    const target=q.n[0]+RI(0,q.n[1]-q.n[0]);

      startWave:G.wave, startTime:G.time, startLoot:G.questLootCount||0});

function updateQuestProgress(type,n){
  for(const q of G.quests){
    if(q.done) continue;
    if(q.id===type){ q.progress=Math.min(q.target,q.progress+n); if(q.progress>=q.target){ q.done=true; claimQuest(q); } }
  }
}

      showMsg(T('幸存者已死亡...','The survivor has died...'));
    }
  }
  // AI队友
  if(G.ally){
    const al=G.ally;
    // 寻找最近僵尸
    let nearest=null,nd=999;
    for(const z of zombies){
      if(z.dead) continue;
      const d=Math.hypot(z.x-al.x,z.z-al.z);
      if(d<25&&d<nd){ nearest=z; nd=d; }
    }
    if(nearest){
      al.target=nearest;
      // 保持距离射击
      if(nd<8){
        // 后退
        const dx=al.x-nearest.x, dz=al.z-nearest.z;
        const len=Math.hypot(dx,dz)||1;
        al.x+=(dx/len)*3*dt; al.z+=(dz/len)*3*dt;
      } else if(nd>15){
        // 靠近
        const dx=nearest.x-al.x, dz=nearest.z-al.z;
        const len=Math.hypot(dx,dz)||1;
        al.x+=(dx/len)*3.5*dt; al.z+=(dz/len)*3.5*dt;
      }
      // 射击
      al.fireCd-=dt;
      if(al.fireCd<=0&&nd<20){
        al.fireCd=0.5;
        const dx=nearest.x-al.x, dz=nearest.z-al.z;
        const len=Math.hypot(dx,dz)||1;
        fireBullet(al.x,1.2,al.z,dx/len,dz/len,25,15,0,0,0,0);
        AU.gun(8);
      }
    } else {
      // 跟随玩家
      const d=Math.hypot(P.x-al.x,P.z-al.z);
      if(d>4){
        const dx=P.x-al.x, dz=P.z-al.z;
        const len=Math.hypot(dx,dz)||1;
        al.x+=(dx/len)*4*dt; al.z+=(dz/len)*4*dt;
      }
    }
    al.x=clamp(al.x,-HALF+1.5,HALF-1.5); al.z=clamp(al.z,-HALF+1.5,HALF-1.5);
    al.mesh.position.set(al.x,0,al.z);
    // 朝向目标或玩家
    const face=al.target||P;
    al.mesh.rotation.y=Math.atan2(face.x-al.x,face.z-al.z);
    // 被僵尸攻击
    for(const z of zombies){
      if(z.dead) continue;
      if(Math.hypot(z.x-al.x,z.z-al.z)<1.5){
        al.hp-=12*dt;
      }
    }
    if(al.hp<=0){
      scene.remove(al.mesh); G.ally=null;
      showBanner(T('队友阵亡...','Ally has fallen...'),'#8A3A3A',2);
    }
  }
}
function updateDayNight(dt){
  G.cycleT+=dt/DAY_LEN;
  if(G.cycleT>=1){ G.cycleT-=1; G.dayCount++; }
  const night=nightFactor();
  if(!G.wasNight&&night>0.5){ G.wasNight=true; onNightStart(); }
  if(G.wasNight&&night<=0.4){ G.wasNight=false; onDayStart(); }
  const sunH=Math.sin(G.cycleT*Math.PI*2);
  const sunA=G.cycleT*Math.PI*2;
  sun.position.set(Math.cos(sunA)*60,Math.max(4,sunH*70),Math.sin(sunA)*30);
  sun.intensity=lerp(1.15,0.08,night);
  hemi.intensity=lerp(0.75,0.25,night);
  amb.intensity=lerp(0.12,0.05,night);
  const skyCur=skyDay.clone().lerp(skyNight,night);
  if(G.bloodMoon) skyCur.lerp(bloodCol,night*0.85);
  scene.background.copy(skyCur);
  scene.fog.color.copy(fogDay.clone().lerp(fogNight,night));
  if(G.bloodMoon) scene.fog.color.lerp(bloodCol,night*0.6);
  // 更新天空穹顶颜色
  const skyTop=new THREE.Color(0x6B8EB8).lerp(new THREE.Color(0x0A1020),night);
  const skyBot=new THREE.Color(0xC4D0DA).lerp(new THREE.Color(0x1A2535),night);
  // 日出日落色调
  const sunset=Math.max(0,1-Math.abs(night-0.5)*3); // 在night=0.5附近最大
  if(sunset>0){ skyTop.lerp(new THREE.Color(0xD8784A),sunset*0.4); skyBot.lerp(new THREE.Color(0xE89868),sunset*0.5); }
  if(G.bloodMoon){ skyTop.lerp(new THREE.Color(0x4A1F1C),night*0.7); skyBot.lerp(new THREE.Color(0x6A2A26),night*0.5); }
  skyMat.uniforms.topColor.value.copy(skyTop);
  skyMat.uniforms.botColor.value.copy(skyBot);
  sun.color.copy(sunDay.clone().lerp(sunNight,night));
  // 窗户夜间发光
  for(const w of windowGlow){
    if(night>0.4){ w.material=mat(0xE8C98A); w.material.emissive=new THREE.Color(0xE8A84A); w.material.emissiveIntensity=(night-0.4)*1.5; }
    else { w.material=mat(0x2E3A45); }
  }
  for(const l of lamps){ l.li.intensity=night*1.5; l.head.material=mat(night>0.5?0xE8C98A:0xD6C29A); }
}

(function(){
  const joy=$('joy'), knob=$('joyKnob');
  let jid=null;
  function setKnob(dx,dy){ knob.style.left=(38+dx*30)+'px'; knob.style.top=(38+dy*30)+'px'; }
  joy.addEventListener('touchstart',e=>{
    jid=e.changedTouches[0].identifier; e.preventDefault();
  },{passive:false});
  addEventListener('touchmove',e=>{
    if(jid===null) return;
    for(const t of e.changedTouches){
      if(t.identifier===jid){
        const r=joy.getBoundingClientRect();
        let dx=(t.clientX-(r.left+r.width/2))/(r.width/2);
        let dy=(t.clientY-(r.top+r.height/2))/(r.height/2);
        const l=Math.hypot(dx,dy); if(l>1){dx/=l;dy/=l;}
        touchDx=dx; touchDy=dy; touchActive=true;
        setKnob(dx,dy);
      }
    }
  },{passive:true});
  addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===jid){ jid=null; touchActive=false; touchDx=0; touchDy=0; setKnob(0,0); }
    }
  });
})();

  else if(it.use==='wire'){ P.weapon='wire'; P.atkCd=0; P.reloadT=0; setWeaponMesh(); AU.ui(); }
  else if(it.use==='sandbag'){ P.weapon='sandbag'; P.atkCd=0; P.reloadT=0; setWeaponMesh(); AU.ui(); }

function useHotSlot(i){

  else return;
  removeFromHot(i,1); refreshHud();

/* ================= camera & aim ================= */
const camTarget=new V3(0,0,0), camPos=new V3(0,40,0);
let camAngle=0.785; // 相机角度（弧度），默认45度
let camDist=18; // 相机距离
let camHeight=26; // 相机高度
function updateCamera(dt){
  if(G.inBuilding){
    // 室内独立场景相机：斜俯视角，能看到地板和墙
    const w=G.inBuilding.w-1, d=G.inBuilding.d-1;
    const camH=Math.max(w,d)*0.9+3;
    interiorCam.position.set(0, camH, d*0.6+2);
    interiorCam.lookAt(0, 0.5, 0);
    return;
  }
  camTarget.lerp(new V3(P.x,0,P.z),1-Math.pow(0.001,dt));
  const off=new V3(Math.sin(camAngle)*camDist, camHeight, Math.cos(camAngle)*camDist);
  camPos.copy(camTarget).add(off);
  if(G.shake>0){ G.shake-=dt*2; camPos.x+=R(-1,1)*G.shake; camPos.z+=R(-1,1)*G.shake; camPos.y+=R(-1,1)*G.shake*0.5; }
  camera.position.copy(camPos);
  camera.lookAt(camTarget.x,0,camTarget.z);
  sun.target.position.set(P.x,0,P.z);
  sun.position.set(P.x+Math.cos(G.cycleT*Math.PI*2)*60,Math.max(4,Math.sin(G.cycleT*Math.PI*2)*70),P.z+Math.sin(G.cycleT*Math.PI*2)*30);
}
const ray=new THREE.Raycaster(), planeY=new THREE.Plane(new V3(0,1,0),-1.0);
const ndc=new THREE.Vector2(), hitP=new V3();
function updateAim(){
  const cw=renderer.domElement.clientWidth||1280, ch=renderer.domElement.clientHeight||720;
  ndc.set(mouseX/cw*2-1,-(mouseY/ch)*2+1);
  ray.setFromCamera(ndc,G.inBuilding?interiorCam:camera);
  ray.ray.intersectPlane(planeY,hitP);
  const dx=hitP.x-P.x, dz=hitP.z-P.z, d=Math.hypot(dx,dz)||1;
  P.aimX=dx/d; P.aimZ=dz/d;
  if(!touchMode) P.dir=Math.atan2(dx,dz);
}

let selectedClass='civilian';
function buildClassSelect(){
  const cs=$('classSelect'); if(!cs) return;
  cs.innerHTML='';
  const classIcons={
    doctor:'<path d="M12 4v8M10 8h4M10 14c-3 0-4 2-4 4v2h12v-2c0-2-1-4-4-4M9 14v4M15 14v4"/>',
    police:'<path d="M12 3l8 3v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6zM12 8v4M10 10h4"/>',
    firefighter:'<path d="M12 3c2 2 4 4 4 7a4 4 0 1 1-8 0c0-2 1-3 2-4M12 14v6M9 17h6"/>',
    clerk:'<path d="M4 7h16v12H4zM4 7l3-3h10l3 3M9 12h6M9 15h4"/>',
    civilian:'<path d="M12 4a3 3 0 1 0 0 6 3 3 0 0 0 0-6M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>'

    el.innerHTML='<div style="margin-bottom:2px"><svg class="ico" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#D6C29A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+classIcons[id]+'</svg></div><div>'+(T(c.nameZh,c.nameEn))+'</div>';
    el.onclick=()=>{ selectedClass=id; buildClassSelect(); AU.ui(); };
    el.title=T(c.skill.descZh,c.skill.descEn)+' (CD:'+c.skill.cd+'s)';
    cs.appendChild(el);
  }
}
function useClassSkill(){
  if(G.state!=='play'||G.paused) return;
  if((P.skillCd||0)>0){ showMsg(T('技能冷却中：'+Math.ceil(P.skillCd)+'秒','Skill CD: '+Math.ceil(P.skillCd)+'s')); return; }
  const cls=CLASSES[P.classId]; if(!cls||!cls.skill){ return; }
  P.skillCd=cls.skill.cd||10;
  try {
    switch(P.classId){
      case 'doctor':
        // 战地手术：恢复40HP + 15秒治疗效果翻倍 + 暂停感染蔓延
        P.hp=Math.min(P.maxHp||100,P.hp+40);
        P.healBoostT=15; P.infPauseT=15;
        bloodBurst(P.x,1,P.z,15,0x30483A);
        showRing(P.x,P.z,2.5,0x30483A,0.4,null);
        AU.eat();
        showMsg(T('战地手术：治疗效果翻倍15秒','Field Surgery: 2x heal 15s'));
        break;
      case 'police':
        // 战术补给：呼叫弹药+食物补给箱
        spawnSupply();
        showRing(P.x,P.z,3,0x2E3A4A,0.5,null);
        bloodBurst(P.x,1,P.z,10,0x2E3A4A);
        AU.ui();
        showMsg(T('战术补给已投放','Tactical supply dropped'));
        break;
      case 'firefighter':
        // 破障冲锋：冲刺5米 + 击退 + 眩晕2秒
        {
          const tx=P.x+P.aimX*5, tz=P.z+P.aimZ*5;
          let fx=tx, fz=tz;
          if(blockedAt(tx,tz,0.4)){ fx=P.x+P.aimX*3; fz=P.z+P.aimZ*3; }
          if(blockedAt(fx,fz,0.4)){ fx=P.x; fz=P.z; }
          P.x=fx; P.z=fz; P.invulnT=0.5;
          for(const z of zombies){ if(z.dead) continue;
            const d=Math.hypot(z.x-fx,z.z-fz);
            if(d<3.5){ hitZombie(z,35,fx,fz,2.0); z.stunT=2; } }
          showRing(fx,fz,3.5,0x743C38,0.4,null);
          bloodBurst(fx,1,fz,20,0x743C38);
          G.shake=0.4; AU.explode();
          resolveCollision(P,0.35);
          showMsg(T('破障冲锋！','Breach Charge!'));
        }
        break;
      case 'clerk':
        // 拾荒直觉：透视40米内战利品10秒 + 15秒拾取率提升
        P.scavengeT=10; P.lootBonusT=15;
        bloodBurst(P.x,1,P.z,8,0x5B5C57);
        showRing(P.x,P.z,4,0x5B5C57,0.3,null);
        AU.ui();
        showMsg(T('拾荒直觉：透视10秒','Scavenger Sense: 10s reveal'));
        break;
      case 'civilian':
        // 求生意志：瞬间恢复50体力+8秒体力回复3倍+免疫感染
        P.stam=Math.min(P.maxStam||100,P.stam+50);
        P.stamRegenT=8; P.infImmuneT=8;
        bloodBurst(P.x,1,P.z,10,0xD6C29A);
        showRing(P.x,P.z,2.5,0xD6C29A,0.3,null);
        showMsg(T('求生意志！体力恢复！','Survival Will! Stamina restored!'));
        break;
    }
  } catch(err){
    console.warn('Skill error:',err);
  }
  refreshHud();
}

function setupVaccineLab(){
  // 在地图中心放置疫苗研究所帐篷
  const g=new THREE.Group();
  // 帐篷主体
  const tent=new THREE.Mesh(new THREE.BoxGeometry(4,2.5,4),mat(0xD6C29A));
  tent.position.y=1.25; tent.castShadow=true; g.add(tent);
  // 帐篷顶（三角形屋顶）
  const roof=new THREE.Mesh(new THREE.ConeGeometry(3.2,1.5,4),mat(0x743C38));
  roof.position.y=3.2; roof.rotation.y=Math.PI/4; roof.castShadow=true; g.add(roof);
  // 十字标志（医疗标志）
  const cross1=new THREE.Mesh(BOX,bmat(0xE5DDC8)); cross1.scale.set(0.8,0.2,0.05); cross1.position.set(0,1.5,2.05); g.add(cross1);
  const cross2=new THREE.Mesh(BOX,bmat(0xE5DDC8)); cross2.scale.set(0.2,0.8,0.05); cross2.position.set(0,1.5,2.05); g.add(cross2);
  // 灯光
  G._labLight=new THREE.PointLight(0xE8C98A,0.8,12,1.5);
  G._labLight.position.set(0,3,0); scene.add(G._labLight);
  g.position.set(0,0,0);
  scene.add(g);
  G.labMesh=g;
  G.labHp=1000; G.labMaxHp=1000; G.labProgress=0;
  // 添加为障碍物，防止僵尸穿过
  obstacles.push({x:0,z:0,hw:2.2,hd:2.2});
}
function damageLab(dmg){
  if(!G.labMesh) return;
  G.labHp-=dmg;
  // 闪烁效果
  if(G.labMesh.children[0]) G.labMesh.children[0].material=mat(0xA4382E);
  setTimeout(()=>{ if(G.labMesh&&G.labMesh.children[0]) G.labMesh.children[0].material=mat(0xD6C29A); },100);
  if(G.labHp<=0){
    // 研究所被摧毁，游戏结束
    scene.remove(G.labMesh); G.labMesh=null;
    if(G._labLight){ scene.remove(G._labLight); G._labLight=null; }
    G.victory=false;
    gameOver(T('疫苗研究所被摧毁！','The vaccine lab has been destroyed!'));
  }
}
function spawnExtractionPoint(){
  // 在地图边缘随机位置生成撤离点
  const a=R(0,Math.PI*2), r=HALF-8;
  const ex=clamp(Math.cos(a)*r,-HALF+5,HALF-5), ez=clamp(Math.sin(a)*r,-HALF+5,HALF-5);
  const g=new THREE.Group();
  // 绿色光柱标记
  const pillar=new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.8,8,8),new THREE.MeshBasicMaterial({color:0x30483A,transparent:true,opacity:0.5}));
  pillar.position.y=4; g.add(pillar);
  // 底部圆环
  const ring=new THREE.Mesh(new THREE.RingGeometry(1.5,2.5,16),new THREE.MeshBasicMaterial({color:0x30483A,transparent:true,opacity:0.6,side:THREE.DoubleSide}));
  ring.rotation.x=-Math.PI/2; ring.position.y=0.1; g.add(ring);
  // 信号灯
  const light=new THREE.PointLight(0x30483A,1.5,10,1.5);
  light.position.y=3; g.add(light);
  g.position.set(ex,0,ez);
  scene.add(g);
  G.extractMesh=g;
  G.extractX=ex; G.extractZ=ez;
  showBanner(T('撤离点已出现！前往绿色信号区域！','EXTRACTION POINT APPEARED! Reach the green signal!'),'#30483A',3);
  AU.boss();
}
function checkExtraction(){
  if(!G.extractMesh) return;
  const d=Math.hypot(P.x-G.extractX,P.z-G.extractZ);
  if(d<3){
    G.extractT+=1/60;
    if(G.extractT>=3){
      G.victory=true;
      gameOver(T('撤离成功！你活了下来。','EXTRACTION SUCCESS! You survived.'),true);
    }
  } else {
    G.extractT=Math.max(0,G.extractT-1/60);
  }
}
function updateDefenseMode(dt){
  if(G.mode!=='defense'||!G.labMesh) return;
  // 研究进度每天增加1%
  G._labResearchT=(G._labResearchT||0)+dt;
  if(G._labResearchT>=DAY_LEN){
    G._labResearchT-=DAY_LEN;
    G.labProgress++;
    showBanner(T('研究进度：'+G.labProgress+'/'+G.labTarget+' 天','Research: '+G.labProgress+'/'+G.labTarget+' days'),'#30483A');
    if(G.labProgress>=G.labTarget){
      G.victory=true;
      gameOver(T('疫苗研究完成！人类有救了！','Vaccine research complete! Humanity is saved!'),true);
    }
  }
  // 僵尸优先攻击研究所
  for(const z of zombies){
    if(z.dead) continue;
    const dLab=Math.hypot(z.x,z.z);
    const dPlayer=Math.hypot(z.x-P.x,z.z-P.z);
    // 如果离研究所更近，优先攻击研究所
    if(dLab<3.5 && dLab<dPlayer){
      z._labAttackT=(z._labAttackT||0)+dt;
      if(z._labAttackT>=1){
        z._labAttackT=0;
        damageLab(z.c.dmg||10);
        bloodBurst(z.x,1,z.z,4,0xA4382E);
      }
    }
  }
}
function updateSurvivalMode(dt){
  if(G.mode!=='survival') return;
  // 第15天出现撤离点
  if(G.dayCount>=15 && !G.extractMesh){
    spawnExtractionPoint();
  }
  if(G.extractMesh) checkExtraction();
}
function gameOver(msg,victory){
  if(G.state!=='play') return;
  if(victory){
    G.state='dead'; G.victory=true; G.paused=false;
    saveBest(); clearSave();
    $('deadTitle').textContent=msg;
    $('dWave').textContent=T('存活波次：','Waves survived: ')+G.wave;
    $('dKill').textContent=T('击杀数：','Kills: ')+G.kills;
    $('dScore').textContent=T('总得分：','Score: ')+G.score;
    $('dTime').textContent=T('存活时间：','Time: ')+fmtTime(G.time);
    $('dead').classList.remove('hidden');
    $('pause').classList.add('hidden');
    elHud.classList.add('hidden');
  } else {
    dieGame();
    if(msg) $('deadTitle').textContent=msg;
  }
}
function resetWorldState(){
  // 辅助函数：释放mesh及其子mesh的几何体/材质
  function disposeMesh(obj){
    obj.traverse(o=>{
      if(o.isMesh){
        if(o.geometry&&o.geometry!==BOX&&o.geometry!==CYL&&o.geometry!==CONE&&o.geometry!==PYR) o.geometry.dispose();
        if(o.material&&o.material._shared!==true) o.material.dispose();
      }
    });
  }
  // 清理室内场景：把 P.mesh 移回主场景，清除室内物体
  if(G.inBuilding){
    if(P.mesh&&P.mesh.parent===interiorScene){ interiorScene.remove(P.mesh); scene.add(P.mesh); }
    if(G._interior){ for(const m of G._interior) interiorScene.remove(m); G._interior=null; }
    if(G._interiorZombies){ for(const z of G._interiorZombies) interiorScene.remove(z.mesh); G._interiorZombies=null; }
    if(G._interiorLoot){ for(const l of G._interiorLoot) interiorScene.remove(l.mesh); G._interiorLoot=null; }
    G._interiorSpawnT=null; G._interiorWave=null;
    // 恢复建筑外壳
    if(G.inBuilding.shell) G.inBuilding.shell.visible=true;
    G.inBuilding=null;
  }
  for(const z of zombies) scene.remove(z.mesh);
  zombies.length=0;
  for(const b of barricades) scene.remove(b.m);
  barricades.length=0;
  for(const s of spikesArr) scene.remove(s.m);
  spikesArr.length=0;
  for(const w of wireArr) scene.remove(w.m);
  wireArr.length=0;
  for(const mn of mineArr) scene.remove(mn.m);
  mineArr.length=0;
  if(P.turrets){ for(const t of P.turrets) scene.remove(t.mesh); P.turrets=null; }
  for(const lo of lootEnts){ disposeMesh(lo.mesh); scene.remove(lo.mesh); }
  lootEnts.length=0;
  for(const b of bullets){ b.m.visible=false; if(b.m.parent) b.m.parent.remove(b.m); bPool.push(b.m); }
  bullets.length=0;
  noises.length=0;
  firePools.length=0;
  if(G.supply){ scene.remove(G.supply.mesh); G.supply=null; }
  // 清理模式mesh
  if(G.labMesh){ disposeMesh(G.labMesh); scene.remove(G.labMesh); G.labMesh=null; }
  if(G._labLight){ scene.remove(G._labLight); G._labLight=null; }
  if(G.extractMesh){ disposeMesh(G.extractMesh); scene.remove(G.extractMesh); G.extractMesh=null; }
  // 清理工程师炮台
  if(P.turrets){ for(const t of P.turrets){ if(t.mesh) scene.remove(t.mesh); } P.turrets=null; }
  for(const p of PPOOL){ p.on=false; p.m.visible=false; if(p.m.parent===interiorScene){ interiorScene.remove(p.m); scene.add(p.m); } }
  for(const f of RPOOL){ f.on=false; f.m.visible=false; }
  for(const d of dmgPool){ d.life=0; d.el.style.display='none'; }
  for(const b of hpPool){ b.ttl=0; b.brd.visible=b.bg.visible=b.fill.visible=false; }
  mzLight.intensity=0; mzQuad.visible=false; mzCone.visible=false;
}
function newGame(from){
  resetWorldState();
  G.state='play'; G.diff=from||G.diff; G.wave=0; G.kills=0; G.score=0; G.time=0; G.dayCount=1;

function fmtTime(t){ const m=Math.floor(t/60), s=Math.floor(t%60); return m+'m '+s+'s'; }

/* ================= main loop ================= */
let lastT=performance.now();
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();
  let dt=Math.min(0.05,(now-lastT)/1000); lastT=now;
  if(G.state==='play'&&!G.paused){
    G.time+=dt;
    G.comboT=Math.max(0,G.comboT-dt);
    if(G.comboT<=0) G.combo=0;
    updatePlayer(dt);
    if(G.state==='play'){
      for(let i=zombies.length-1;i>=0;i--) zombieAI(zombies[i],dt,i);
      updateWaves(dt);
      updateBullets(dt);
      updateProjectiles(dt);
      updateParticles(dt);
      updateRings(dt);
      updateLootEnts(dt);
      updateSupply(dt);
      updateNoises(dt);
      updateMuzzle(dt);
      updateHpBars();
      updateFirePools(dt);
      updateGrenades(dt);
      updatePlacePreview();
      // 防御工事HP条渐隐
      for(const b of barricades){ if(b._hpBarT>0){ b._hpBarT-=dt; if(b._hpBarT<=0&&b.hpBar){ b.hpBar.visible=false; b.hpFill.visible=false; } } }
      for(const s of spikesArr){ if(s._hpBarT>0){ s._hpBarT-=dt; if(s._hpBarT<=0&&s.hpBar){ s.hpBar.visible=false; s.hpFill.visible=false; } } }
      for(const w of wireArr){ if(w._hpBarT>0){ w._hpBarT-=dt; if(w._hpBarT<=0&&w.hpBar){ w.hpBar.visible=false; w.hpFill.visible=false; } } }
      craftTick(dt);
      updateDayNight(dt);
      updateWeather(dt);
      updateEvents(dt);
      updateAchievements();
      updateTrader(dt);
      updateSearchables(dt);
      updateAlly(dt);
      updateEnterable(dt);
      updateInteriorZombies(dt);
      updateDefenseMode(dt);
      updateSurvivalMode(dt);
      if(G.time%25<dt) saveGame();
    }
    // Q/E 持续旋转相机视角（类似饥荒）
    // Q/E 持续旋转相机视角（类似饥荒），移动时减速以避免方向感错乱
    const camRotSpd = (keys.w||keys.a||keys.s||keys.d) ? 0.4 : 0.8;
    if(keys.q) camAngle-=camRotSpd*dt;
    if(keys.e) camAngle+=camRotSpd*dt;
    updateAim();
    if(mouseDown){
      const w=WEAPONS[P.weapon];
      if(w&&!w.melee&&w.auto&&P.atkCd<=0&&P.reloadT<=0) shoot();
    }
    refreshHud();
    drawMinimap();
  } else if(G.state==='dead'){
    // death fall animation
    P.mesh.rotation.x=lerp(P.mesh.rotation.x,-Math.PI/2,dt*4);
    updateParticles(dt);
    updateRings(dt);
  } else {
    // menu idle scene drift
    G.time+=dt*0.4;
    updateDayNight(dt*0.15);
    updateLootEnts(dt);
    for(let i=zombies.length-1;i>=0;i--) zombieAI(zombies[i],dt,i);
  }
  if(G.state!=='play'||!G.paused) updateDmg(dt);
  updateMsgs(G.paused?0:dt);
  updateCamera(dt);
  // 水面动画
  if(G._pond){ G._pond.material.opacity=0.65+Math.sin(G.time*1.5)*0.08; G._pond.material.emissiveIntensity=0.1+Math.sin(G.time*0.8)*0.06; }
  // 天空跟随相机
  if(skyMesh) skyMesh.position.copy(camera.position);
  // 室内渲染独立场景
  if(G.inBuilding){
    renderer.render(interiorScene,interiorCam);
  } else {
    renderer.render(scene,camera);
  }
}

let settings={vol:0.5,quality:'high'};
function loadSettings(){ try{ const s=JSON.parse(localStorage.getItem('rotwood_settings')||'{}'); Object.assign(settings,s); }catch(e){} }
function saveSettings(){ try{ localStorage.setItem('rotwood_settings',JSON.stringify(settings)); }catch(e){} }
loadSettings();
function applySettings(){
  // 应用音量
  if(typeof AU!=='undefined'&&AU.master) AU.master.gain.value=settings.vol;
  // 应用画质
  if(typeof renderer==='undefined') return;
  if(settings.quality==='low'){ renderer.shadowMap.enabled=false; renderer.setPixelRatio(1); }
  else if(settings.quality==='medium'){ renderer.shadowMap.enabled=true; renderer.setPixelRatio(Math.min(devicePixelRatio,1.5)); }
  else { renderer.shadowMap.enabled=true; renderer.setPixelRatio(Math.min(devicePixelRatio,2)); }
 }

$('btnRestart').onclick=()=>{ $('pause').classList.add('hidden'); newGame(G.diff); };
$('btnMenu').onclick=()=>{ resetWorldState(); $('pause').classList.add('hidden'); elHud.classList.add('hidden'); $('menu').classList.remove('hidden'); G.state='menu'; setupMenu(); };
$('btnSettingsClose').onclick=()=>{ $('settings').classList.add('hidden'); };
$('invClose').onclick=()=>closePanels();
$('craftClose').onclick=()=>closePanels();
$('btnInv').onclick=()=>{ $('invP').classList.contains('hidden')?openInv():closePanels(); };
$('btnCraft').onclick=()=>{ $('craftP').classList.contains('hidden')?openCraft():closePanels(); };
addEventListener('keydown',e=>{ if(e.key==='Shift') P.sprint=true; });
addEventListener('keyup',e=>{ if(e.key==='Shift') P.sprint=false; });
addEventListener('pointerdown',()=>AU.init(),{once:true});

/* ================= init ================= */
buildWorld();
buildPlayer();
setWeaponMesh();
setupMenu();
applySettings();
refreshHud();
loop();
</script>
