let selectedClass='civilian';
function buildClassSelect(){
  const cs=$('classSelect'); if(!cs) return;
  cs.innerHTML='';
  for(const id in CLASSES){
    const c=CLASSES[id];
    const el=document.createElement('div');
    el.style.cssText='padding:8px 12px;border:2px solid #555;border-radius:8px;cursor:pointer;background:#222;color:#eee;font-size:12px;min-width:80px;text-align:center;transition:all .2s';
    const emoji=id==='doctor'?'⚕️':(id==='police'?'👮':(id==='firefighter'?'🚒':(id==='clerk'?'💼':'👤')));
    el.innerHTML='<div style="font-size:18px">'+emoji+'</div><div>'+(T(c.nameZh,c.nameEn))+'</div>';
    el.onclick=()=>{ selectedClass=id; buildClassSelect(); AU.ui(); };
    if(selectedClass===id){ el.style.borderColor='#FFD700'; el.style.background='#333'; }
    // tooltip
    el.title=T(c.skill.descZh,c.skill.descEn)+' (CD:'+c.skill.cd+'s)';
    cs.appendChild(el);
  }
}
function useClassSkill(){
  if(G.state!=='play'||G.paused) return;
  if((P.skillCd||0)>0){ showMsg(T('技能冷却中：'+Math.ceil(P.skillCd)+'秒','Skill CD: '+Math.ceil(P.skillCd)+'s')); return; }
  const cls=CLASSES[P.classId]; if(!cls||!cls.skill){ return; }
  P.skillCd=cls.skill.cd||10;
  try {
    switch(P.classId){
      case 'doctor':
        // 紧急治疗：回60HP+清除感染
        P.hp=Math.min(P.maxHp||100,P.hp+60);
        P.inf=Math.max(0,P.inf-50);
        bloodBurst(P.x,1,P.z,15,0x44FF66);
        AU.eat();
        break;
      case 'police':
        // 呼叫支援：直接触发补给空投
        spawnSupply();
        showRing(P.x,P.z,3,0x4488FF,0.5,null);
        bloodBurst(P.x,1,P.z,10,0x4488FF);
        AU.ui();
        break;
      case 'firefighter':
        // 火焰冲锋：向前冲刺+范围火焰伤害
        {
          const tx=P.x+P.aimX*6, tz=P.z+P.aimZ*6;
          // 安全检查：确保目标位置不在障碍物中
          let fx=tx, fz=tz;
          if(blockedAt(tx,tz,0.4)){ fx=P.x+P.aimX*3; fz=P.z+P.aimZ*3; }
          if(blockedAt(fx,fz,0.4)){ fx=P.x; fz=P.z; }
          P.x=fx; P.z=fz; P.invulnT=0.5;
          for(const z of zombies){ if(z.dead) continue;
            const d=Math.hypot(z.x-fx,z.z-fz);
            if(d<4){ hitZombie(z,60,fx,fz,1.0);
              z.burnT=4; z.burnDmg=8; } }
          showRing(fx,fz,4,0xFF6600,0.4,null);
          bloodBurst(fx,1,fz,20,0xFF6600);
          G.shake=0.5; AU.explode();
          resolveCollision(P,0.35);
        }
        break;
      case 'clerk':
        // 背包整理：补满当前武器弹药
        {
          const w=WEAPONS[P.weapon];
          if(w&&!w.melee&&w.ammo){
            P.mags[P.weapon]=w.mag;
            addInv(w.ammo,20);
          }
          bloodBurst(P.x,1,P.z,8,0x88DDAA);
          AU.ui();
        }
        break;
      case 'civilian':
        // 求生本能：5秒移速+50%伤害+30%
        P.frenzyT=5;
        bloodBurst(P.x,1,P.z,10,0xDDDDDD);
        break;
    }
  } catch(err){
    console.warn('Skill error:',err);
  }
  refreshHud();
}
function resetWorldState(){
  for(const z of zombies) scene.remove(z.mesh);
  zombies.length=0;
  for(const b of barricades) scene.remove(b.m);
  barricades.length=0;
  for(const s of spikesArr) scene.remove(s.m);
  spikesArr.length=0;
  for(const lo of lootEnts) scene.remove(lo.mesh);
  lootEnts.length=0;
  for(const b of bullets) b.m.visible=false,bPool.push(b.m);
  bullets.length=0;
  noises.length=0;
  if(G.supply){ scene.remove(G.supply.mesh); G.supply=null; }
  // 清理工程师炮台
  if(P.turrets){ for(const t of P.turrets){ if(t.mesh) scene.remove(t.mesh); } P.turrets=null; }
  for(const p of PPOOL){ p.on=false; p.m.visible=false; }
  for(const f of RPOOL){ f.on=false; f.m.visible=false; }
  for(const d of dmgPool){ d.life=0; d.el.style.display='none'; }
  for(const b of hpPool){ b.ttl=0; b.brd.visible=b.bg.visible=b.fill.visible=false; }
  mzLight.intensity=0; mzQuad.visible=false;
}

function fmtTime(t){ const m=Math.floor(t/60), s=Math.floor(t%60); return m+'m '+s+'s'; }

/* ================= main loop ================= */
let lastT=performance.now();
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();
  let dt=Math.min(0.05,(now-lastT)/1000); lastT=now;
  if(G.state==='play'&&!G.paused){
    G.time+=dt;
    G.comboT=Math.max(0,G.comboT-dt);
    if(G.comboT<=0) G.combo=0;
    updatePlayer(dt);
    if(G.state==='play'){
      for(let i=zombies.length-1;i>=0;i--) zombieAI(zombies[i],dt,i);
      updateWaves(dt);
      updateBullets(dt);
      updateProjectiles(dt);
      updateParticles(dt);
      updateRings(dt);
      updateLootEnts(dt);
      updateSupply(dt);
      updateNoises(dt);
      updateMuzzle(dt);
      updateHpBars();
      craftTick(dt);
      updateDayNight(dt);
      if(G.time%25<dt) saveGame();
    }
    // Q/E 持续旋转相机视角（类似饥荒）
    // Q/E 持续旋转相机视角（类似饥荒），移动时减速以避免方向感错乱
    const camRotSpd = (keys.w||keys.a||keys.s||keys.d) ? 0.4 : 0.8;
    if(keys.q) camAngle-=camRotSpd*dt;
    if(keys.e) camAngle+=camRotSpd*dt;
    updateAim();
    if(mouseDown){
      const w=WEAPONS[P.weapon];
      if(w&&!w.melee&&w.auto&&P.atkCd<=0&&P.reloadT<=0) shoot();
    }
    refreshHud();
    drawMinimap();
  } else if(G.state==='dead'){
    // death fall animation
    P.mesh.rotation.x=lerp(P.mesh.rotation.x,-Math.PI/2,dt*4);
    updateParticles(dt);
    updateRings(dt);
  } else {
    // menu idle scene drift
    G.time+=dt*0.4;
    updateDayNight(dt*0.15);
    updateLootEnts(dt);
    for(let i=zombies.length-1;i>=0;i--) zombieAI(zombies[i],dt,i);
  }
  if(G.state!=='play'||!G.paused) updateDmg(dt);
  updateMsgs(G.paused?0:dt);
  updateCamera(dt);
  renderer.render(scene,camera);
}

    'Every 3rd night is a <b style="color:#743C38">Blood Moon</b>; a <b style="color:#743C38">Brute</b> comes every 5th wave. Supply drops land each dawn.');
  const b=getBest();
  $('bestTxt').textContent=b?T('最佳纪录：第 '+b.wave+' 波 / 击杀 '+b.kills+' / 得分 '+(b.score||0)+' / 存活 '+fmtTime(b.time),
    'Best: wave '+b.wave+' / kills '+b.kills+' / score '+(b.score||0)+' / '+fmtTime(b.time)):'';
  $('btnCont').classList.toggle('hidden',!loadSave());
  $('btnInv').innerHTML=icon('inv');
  $('btnCraft').innerHTML=icon('craft');
  $('atkBtn').innerHTML='<svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#E5DDC8" stroke-width="1.8" stroke-linecap="round">'+IC.atk+'</svg>';
  $('rollBtn').innerHTML='<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#242321" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+IC.roll+'</svg>';
  $('relBtn').innerHTML='<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#242321" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+IC.rel+'</svg>';
}
$('btnNew').onclick=()=>{ AU.init(); newGame(G.diff); };
$('btnCont').onclick=()=>{ AU.init(); continueGame(); };
$('btnRetry').onclick=()=>{ $('dead').classList.add('hidden'); $('menu').classList.remove('hidden'); elHud.classList.add('hidden'); G.state='menu'; setupMenu(); };
$('btnResume').onclick=()=>togglePause();
$('btnRestart').onclick=()=>{ $('pause').classList.add('hidden'); newGame(G.diff); };
$('btnMenu').onclick=()=>{ $('pause').classList.add('hidden'); elHud.classList.add('hidden'); $('menu').classList.remove('hidden'); G.state='menu'; setupMenu(); };
$('invClose').onclick=()=>closePanels();
$('craftClose').onclick=()=>closePanels();
$('btnInv').onclick=()=>{ $('invP').classList.contains('hidden')?openInv():closePanels(); };
$('btnCraft').onclick=()=>{ $('craftP').classList.contains('hidden')?openCraft():closePanels(); };
addEventListener('keydown',e=>{ if(e.key==='Shift') P.sprint=true; });
addEventListener('keyup',e=>{ if(e.key==='Shift') P.sprint=false; });
addEventListener('pointerdown',()=>AU.init(),{once:true});

/* ================= init ================= */
buildWorld();
buildPlayer();
setWeaponMesh();
setupMenu();
refreshHud();
loop();
</script>
</body>
</html>
