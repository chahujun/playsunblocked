<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Rotwood 腐木镇</title>
<style>
:root{
  --navy:#17202B; --char:#242321; --parch:#D6C29A; --gold:#B18A45;
  --red:#743C38; --green:#30483A; --iron:#5B5C57; --paper:#B9A47A; --off:#E5DDC8;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--navy)}
#app{position:fixed;inset:0;overflow:hidden}
#scaler{position:absolute;left:50%;top:50%;width:1280px;height:720px;transform-origin:center center;
  overflow:hidden;background:var(--navy);font-family:Georgia,'Times New Roman',serif;
  user-select:none;-webkit-user-select:none;touch-action:none}
#c{position:absolute;inset:0}
#c canvas{display:block}
.hidden{display:none !important}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:40}
.panel{background:var(--off);border:1.5px solid var(--iron);box-shadow:4px 4px 0 rgba(0,0,0,.4);padding:18px 22px;color:var(--char)}
.btn{display:inline-block;background:var(--green);color:var(--off);border:1.5px solid var(--char);
  box-shadow:2px 2px 0 rgba(0,0,0,.45);padding:8px 18px;font-family:inherit;font-size:16px;cursor:pointer;text-align:center}
.btn:hover{filter:brightness(1.12)}
.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(0,0,0,.45)}
.btn.red{background:var(--red)}
.btn.gold{background:var(--gold);color:var(--char)}
.btn.iron{background:var(--iron)}
.btn.sel{outline:2px solid var(--gold);outline-offset:1px}
/* ---------- HUD ---------- */
#hud{position:absolute;inset:0;pointer-events:none;z-index:10}
#stats{position:absolute;left:14px;top:12px}
.bar{position:relative;width:190px;height:14px;background:var(--char);border:1.5px solid var(--iron);margin-bottom:5px;box-shadow:2px 2px 0 rgba(0,0,0,.35)}
.bar .fill{position:absolute;left:0;top:0;bottom:0;width:100%}
.fill.hp{background:var(--red)} .fill.hu{background:var(--gold)} .fill.th{background:var(--green)} .fill.st{background:var(--off)}
.bar .bl{position:absolute;left:5px;top:0;line-height:12px;font-size:10px;color:var(--off);letter-spacing:1px}
.bar.warn{animation:barBlink .7s steps(2) infinite}
@keyframes barBlink{50%{opacity:.4}}
#infBox{display:flex;align-items:center;margin-top:4px;color:var(--red);font-size:13px}
#infBox svg{margin-right:5px}
#topCenter{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center;color:var(--off)}
#waveTxt{font-size:20px;letter-spacing:2px;text-shadow:1px 1px 0 var(--char)}
#dayTxt{font-size:13px;margin-top:3px;color:var(--parch);display:flex;align-items:center;justify-content:center;gap:6px}
#comboTxt{font-size:19px;color:var(--gold);margin-top:2px;letter-spacing:3px;text-shadow:1px 1px 0 var(--char);min-height:23px;font-weight:bold}
#bossWrap{position:absolute;top:92px;left:50%;transform:translateX(-50%);width:420px;text-align:center}
#bossLbl{font-size:13px;color:#C05848;letter-spacing:3px;margin-bottom:3px;text-shadow:1px 1px 0 var(--char)}
#bossBar{height:12px;background:var(--char);border:1.5px solid var(--iron);box-shadow:2px 2px 0 rgba(0,0,0,.35)}
#bossFill{height:100%;width:100%;background:var(--red)}
#banner{position:absolute;left:0;right:0;top:27%;text-align:center;font-size:46px;letter-spacing:8px;color:var(--off);
  text-shadow:2px 2px 0 var(--char);opacity:0;transition:opacity .35s;pointer-events:none;z-index:16;font-weight:bold}
#dmgLayer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:14}
.dmgN{position:absolute;font-size:17px;font-weight:bold;color:#fff;text-shadow:1px 1px 0 var(--char);
  pointer-events:none;transform:translate(-50%,-50%);white-space:nowrap}
#mmBox{position:absolute;right:14px;top:12px;text-align:right}
#mm{border:1.5px solid var(--iron);box-shadow:2px 2px 0 rgba(0,0,0,.4);background:var(--char)}
#killTxt{color:var(--off);font-size:13px;margin-top:4px;text-shadow:1px 1px 0 var(--char)}
#scoreTxt{color:var(--gold);font-size:13px;margin-top:2px;text-shadow:1px 1px 0 var(--char);letter-spacing:1px}
#wpnBox{position:absolute;right:14px;bottom:16px;text-align:right;color:var(--off)}
#wpnName{font-size:16px;letter-spacing:1px;text-shadow:1px 1px 0 var(--char)}
#durTxt{font-size:11px;color:var(--parch);margin-top:2px;text-shadow:1px 1px 0 var(--char);min-height:14px}
#ammoTxt{font-size:22px;color:var(--parch);margin-top:2px;text-shadow:1px 1px 0 var(--char)}
#relBar{width:130px;height:8px;background:var(--char);border:1.5px solid var(--iron);margin:6px 0 0 auto}
#relFill{height:100%;width:0%;background:var(--gold)}
#hotbar{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:flex;pointer-events:auto}
.hslot{width:56px;height:56px;background:var(--paper);border:1.5px solid var(--iron);margin:0 4px;position:relative;
  box-shadow:2px 2px 0 rgba(0,0,0,.4);cursor:pointer;display:flex;align-items:center;justify-content:center}
.hslot.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),2px 2px 0 rgba(0,0,0,.4)}
.hslot .key{position:absolute;left:3px;top:1px;font-size:10px;color:var(--char)}
.hslot .qty{position:absolute;right:3px;top:1px;font-size:11px;color:var(--char)}
.hslot .dwrap{position:absolute;left:4px;right:4px;bottom:3px;height:4px;background:var(--char)}
.hslot .dfill{height:100%;background:var(--gold)}
#msgTxt{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);color:var(--off);font-size:15px;
  text-shadow:1px 1px 0 var(--char);text-align:center;line-height:1.5}
#hurtFx{position:absolute;inset:0;background:rgba(116,60,56,.32);opacity:0;pointer-events:none;z-index:15}
#sideBtns{position:absolute;right:14px;top:196px;display:flex;flex-direction:column;gap:8px;pointer-events:auto}
.sbtn{width:44px;height:44px;background:var(--paper);border:1.5px solid var(--iron);box-shadow:2px 2px 0 rgba(0,0,0,.4);
  cursor:pointer;display:flex;align-items:center;justify-content:center}
.sbtn:hover{filter:brightness(1.08)}
/* ---------- tooltip ---------- */
#tip{position:absolute;z-index:60;background:var(--off);border:1.5px solid var(--iron);
  box-shadow:3px 3px 0 rgba(0,0,0,.4);padding:7px 11px;font-size:12px;color:var(--char);
  pointer-events:none;max-width:240px;line-height:1.55}
#tip .tn{font-size:14px;color:var(--red);letter-spacing:1px;display:block;margin-bottom:2px}
/* ---------- inventory / craft ---------- */
#invP,#craftP{position:absolute;z-index:30}
#invP{left:50%;top:50%;transform:translate(-50%,-50%);width:460px}
#craftP{left:50%;top:50%;transform:translate(-50%,-50%);width:470px}
.ptitle{font-size:18px;letter-spacing:2px;border-bottom:1.5px solid var(--iron);padding-bottom:6px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.pclose{cursor:pointer;font-size:14px;color:var(--red);border:1.5px solid var(--red);padding:1px 7px}
#invGrid{display:flex;flex-wrap:wrap;gap:8px}
.islot{width:64px;height:64px;background:var(--paper);border:1.5px solid var(--iron);position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.islot:hover{filter:brightness(1.06)}
.islot .qty{position:absolute;right:3px;bottom:1px;font-size:11px}
.islot .nm{position:absolute;left:0;right:0;bottom:-18px;font-size:10px;text-align:center;white-space:nowrap}
.islot .drop{position:absolute;top:2px;right:2px;width:14px;height:14px;line-height:12px;text-align:center;font-size:10px;background:rgba(180,40,40,.7);color:#fff;border-radius:7px;cursor:pointer;opacity:0;transition:opacity .15s}
.islot:hover .drop{opacity:1}
.islot[draggable=true]:hover{border-color:#FFD700;cursor:grab}
#invHint{font-size:12px;color:var(--iron);margin-top:24px;line-height:1.6}
#craftTabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ctab{padding:4px 12px;font-size:14px;background:var(--paper);border:1.5px solid var(--iron);cursor:pointer}
.ctab:hover{filter:brightness(1.08)}
.ctab.sel{background:var(--gold);color:var(--char);border-color:var(--char)}
.crow{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--paper)}
.crow .cname{font-size:15px;display:flex;align-items:center;gap:6px}
.crow .creq{font-size:12px;color:var(--iron);margin-top:2px}
.crow .creq .lack{color:var(--red);font-weight:bold}
.crow .btn{padding:4px 14px;font-size:14px}
.crow .btn.dis{background:var(--iron);cursor:default;opacity:.6}
.cprog{position:relative;width:96px;height:24px;background:var(--char);border:1.5px solid var(--iron);cursor:pointer}
.cprog .cfill{position:absolute;left:0;top:0;bottom:0;background:var(--gold);width:0%}
.cprog span{position:absolute;inset:0;text-align:center;font-size:12px;line-height:21px;color:var(--off)}
/* ---------- menu / death / pause ---------- */
#menu{background:rgba(23,32,43,.92)}
#menu .panel{width:540px;text-align:center}
#title{font-size:56px;letter-spacing:10px;color:var(--char);margin:4px 0 2px}
#subtitle{font-size:15px;color:var(--red);letter-spacing:3px;margin-bottom:16px}
.mrow{margin:10px 0}
#diffRow .btn{margin:0 5px;padding:5px 14px;font-size:14px}
#tut{font-size:12.5px;color:var(--iron);text-align:left;line-height:1.75;margin:14px 6px 4px;border-top:1px solid var(--paper);padding-top:10px}
#bestTxt{font-size:12px;color:var(--green);margin-top:8px}
#dead{background:rgba(36,20,18,.88)}
#dead .panel{width:460px;text-align:center}
#deadTitle{font-size:40px;letter-spacing:6px;color:var(--red);margin-bottom:12px}
.dst{font-size:15px;margin:5px 0;color:var(--char)}
#pause{background:rgba(23,32,43,.9);z-index:45}
#pause .panel{width:420px;text-align:center}
#pauseTitle{font-size:30px;letter-spacing:8px;color:var(--char);margin-bottom:12px}
#pause .btn{margin:5px 6px 0}
/* ---------- touch ---------- */
#touchUI{position:absolute;inset:0;pointer-events:none}
#joy{position:absolute;left:26px;bottom:96px;width:120px;height:120px;border:1.5px solid var(--iron);
  background:rgba(185,164,122,.35);border-radius:50%;pointer-events:auto}
#joyKnob{position:absolute;left:38px;top:38px;width:44px;height:44px;background:var(--paper);border:1.5px solid var(--iron);border-radius:50%}
#atkBtn{position:absolute;right:30px;bottom:104px;width:84px;height:84px;border-radius:50%;background:var(--red);
  border:1.5px solid var(--char);box-shadow:2px 2px 0 rgba(0,0,0,.45);pointer-events:auto;display:flex;align-items:center;justify-content:center}
#atkBtn:active{filter:brightness(1.2)}
.tbtn{position:absolute;width:54px;height:54px;border-radius:50%;background:var(--paper);
  border:1.5px solid var(--char);box-shadow:2px 2px 0 rgba(0,0,0,.45);pointer-events:auto;display:flex;align-items:center;justify-content:center}
.tbtn:active{filter:brightness(1.2)}
#rollBtn{right:44px;bottom:206px}
#relBtn{right:118px;bottom:190px}
.ico{display:block}
</style>
</head>

<script type="module">
import * as THREE from 'three';

/* ================= language ================= */
var LANG=(new URLSearchParams(location.search).get('lang')||'').toLowerCase(); if(LANG!=='en') LANG='cn';
function T(cn,en){ return LANG==='en' ? en : cn; }

/* ================= utils ================= */
const R=(a,b)=>a+Math.random()*(b-a);
const RI=(a,b)=>Math.floor(R(a,b+1));
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,t)=>a+(b-a)*t;
const V3=THREE.Vector3;
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

/* ================= audio ================= */
const AU={ctx:null,
 init(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
   if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); },
 tone(f,d,type,v,slide){ if(!this.ctx)return; const t=this.ctx.currentTime;
   const o=this.ctx.createOscillator(),g=this.ctx.createGain();
   o.type=type||'sine'; o.frequency.setValueAtTime(f,t);
   if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(20,slide),t+d);
   g.gain.setValueAtTime(v||0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+d);
   o.connect(g); g.connect(this.ctx.destination); o.start(t); o.stop(t+d+0.02); },
 noise(d,v,ff,q){ if(!this.ctx)return; const t=this.ctx.currentTime;
   const len=Math.max(1,Math.floor(this.ctx.sampleRate*d));
   const buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
   const ch=buf.getChannelData(0); for(let i=0;i<len;i++) ch[i]=(Math.random()*2-1)*(1-i/len);
   const src=this.ctx.createBufferSource(); src.buffer=buf;
   const fl=this.ctx.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=ff||1200; fl.Q.value=q||0.8;
   const g=this.ctx.createGain(); g.gain.setValueAtTime(v||0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+d);
   src.connect(fl); fl.connect(g); g.connect(this.ctx.destination); src.start(t); },
 step(){ this.noise(0.05,0.10,700); },
 swing(){ this.noise(0.07,0.14,900); },
 hitF(){ this.tone(120,0.09,'triangle',0.30,70); this.noise(0.06,0.22,500); },
 shoot(k){ if(k==='shotgun'){ this.noise(0.22,0.65,1400); this.tone(90,0.18,'square',0.28,45); }
   else if(k==='rifle'){ this.noise(0.10,0.45,2400); this.tone(180,0.06,'square',0.20,90); }
   else if(k==='smg'){ this.noise(0.07,0.38,2100); this.tone(170,0.05,'square',0.16,95); }
   else { this.noise(0.12,0.50,1900); this.tone(150,0.08,'square',0.22,80); } },
 reloadS(){ this.tone(500,0.05,'square',0.15); setTimeout(()=>this.tone(700,0.05,'square',0.15),160); },

 pickup(){ this.tone(620,0.06,'square',0.14); setTimeout(()=>this.tone(840,0.07,'square',0.14),70); },
 eat(){ this.tone(300,0.07,'triangle',0.18,200); setTimeout(()=>this.tone(260,0.07,'triangle',0.16,180),110); },
 hurt(){ this.tone(220,0.12,'sawtooth',0.25,110); },
 explode(){ this.noise(0.5,0.75,420); this.tone(65,0.45,'sine',0.5,32); },
 build(){ this.tone(180,0.08,'square',0.2,120); this.noise(0.08,0.2,600); },
 craft(){ this.tone(440,0.07,'triangle',0.16); setTimeout(()=>this.tone(560,0.08,'triangle',0.16),90); },
 ui(){ this.tone(520,0.04,'square',0.10); },
 waveHorn(){ this.tone(98,0.7,'sawtooth',0.28,70); this.tone(147,0.7,'sawtooth',0.18,98); },
 die(){ this.tone(160,1.2,'sawtooth',0.3,40); },
 roll(){ this.noise(0.18,0.20,600,0.6); this.tone(180,0.16,'sine',0.12,90); },
 headshot(){ this.tone(1250,0.06,'square',0.20,320); this.noise(0.05,0.28,3000); },
 combo(n){ const f=520+Math.min(n,10)*55; this.tone(f,0.07,'square',0.13); setTimeout(()=>this.tone(f*1.26,0.08,'square',0.13),70); },
 supply(){ for(let i=0;i<3;i++) setTimeout(()=>this.tone(660+i*160,0.12,'triangle',0.16),i*95); },
 boss(){ this.tone(55,1.0,'sawtooth',0.35,38); this.noise(0.7,0.32,300); },
 stomp(){ this.tone(70,0.3,'sine',0.42,36); this.noise(0.2,0.4,350); },
 spike(){ this.tone(900,0.04,'square',0.10,480); },
 breakW(){ this.noise(0.15,0.35,800); this.tone(140,0.12,'square',0.20,60); }
};

/* ================= config ================= */
const DIFF={

const MATC={};
function mat(c){ if(!MATC[c]) MATC[c]=new THREE.MeshLambertMaterial({color:c}); return MATC[c]; }
const BMATC={};
function bmat(c,op){ const k=c+'_'+(op||1); if(!BMATC[k]) BMATC[k]=new THREE.MeshBasicMaterial({color:c,transparent:op!==undefined&&op<1,opacity:op||1}); return BMATC[k]; }
function bx(w,h,d,c,x,y,z,parent,shadow){ const m=new THREE.Mesh(BOX,mat(c)); m.scale.set(w,h,d);
  m.position.set(x||0,y||0,z||0); if(shadow!==false){m.castShadow=true;} m.receiveShadow=true;
  (parent||scene).add(m); return m; }

function addObstacle(x,z,hw,hd){ obstacles.push({x,z,hw,hd}); }

function tree(x,z,big){
  const th=R(1.7,2.6)*(big?1.3:1);
  const tr=new THREE.Mesh(CYL,mat(0x5A4632)); tr.scale.set(0.36,th,0.36);
  tr.position.set(x,th/2,z); tr.castShadow=true; scene.add(tr);
  const cols=[0x30483A,0x3A5644,0x2A3E32];
  const n=big?3:2;
  for(let i=0;i<n;i++){
    const lv=new THREE.Mesh(CONE,mat(pick(cols)));
    const s=(big?3.2:2.4)-i*0.7;
    lv.scale.set(s*R(0.9,1.1),R(2.2,3.0)-i*0.3,s*R(0.9,1.1));
    lv.position.set(x+R(-0.15,0.15),th+0.7+i*1.1,z+R(-0.15,0.15));
    lv.castShadow=true; scene.add(lv);
  }
  circles.push({x,z,r:0.55});
}
function bush(x,z){
  const b=new THREE.Mesh(CONE,mat(pick([0x30483A,0x3A5644])));
  b.scale.set(R(0.9,1.5),R(0.6,1.0),R(0.9,1.5)); b.position.set(x,0.3,z);
  b.castShadow=true; scene.add(b);
}
function house(x,z,w,d){
  const h=R(3.0,3.8), wc=pick([0xB9A47A,0xD6C29A,0x9A8B6A]);
  bx(w,h,d,wc,x,h/2,z);
  const roof=new THREE.Mesh(PYR,mat(pick([0x743C38,0x6B4A3A,0x5B5C57])));
  roof.scale.set(w*1.08,1.7,d*1.08); roof.position.set(x,h+0.85,z); roof.rotation.y=Math.PI/4;
  roof.castShadow=true; scene.add(roof);
  bx(0.5,1.0,0.5,0x8C8070,x+w/4,h+1.6,z-d/4); // chimney
  const dd={x:(Math.abs(x)>Math.abs(z))?(x>0?-1:1):0,z:(Math.abs(x)>Math.abs(z))?0:(z>0?-1:1)};
  if(dd.x===0) bx(1.4,2.2,0.2,0x242321,x,1.1,z+dd.z*(d/2+0.02),scene,false);
  else bx(0.2,2.2,1.4,0x242321,x+dd.x*(w/2+0.02),1.1,z,scene,false);
  bx(dd.x?1.0:1.8,0.25,dd.x?1.8:1.0,0x8C8070,x+dd.x*(w/2+0.5),0.12,z+dd.z*(d/2+0.5),scene,false).castShadow=false; // doorstep
  for(const s of [-1,1]){
    bx(0.9,0.9,0.15,0x2E3A45,x+s*w/4,h*0.6,z+(d/2+0.02)*(z>0?-1:1),scene,false).castShadow=false;
  }
  addObstacle(x,z,w/2+0.15,d/2+0.15);
  lootSpots.push({x:x+dd.x*(w/2+2.2), z:z+dd.z*(d/2+2.2)});
}
function shop(x,z,w,d){
  const h=R(3.2,4.2), wc=pick([0x9A8B6A,0x8C8070,0xB9A47A]);
  bx(w,h,d,wc,x,h/2,z);
  bx(w+0.5,0.35,d+0.5,0x5B5C57,x,h+0.17,z,scene,false); // flat roof lip
  const fz=z>0?-1:1; // front faces center
  const sign=bx(w*0.7,0.8,0.15,pick([0xB18A45,0x743C38,0x30483A]),x,h-0.5,z+fz*(d/2+0.08),scene,false);
  sign.castShadow=false;
  const awn=bx(w*0.8,0.12,1.6,pick([0x743C38,0x30483A]),x,h*0.55,z+fz*(d/2+0.9),scene,false);
  awn.rotation.x=fz*0.25; awn.castShadow=true;
  bx(1.5,2.3,0.2,0x242321,x,1.15,z+fz*(d/2+0.02),scene,false); // door
  bx(1.0,1.1,0.15,0x2E3A45,x-w/4,1.6,z+fz*(d/2+0.03),scene,false).castShadow=false;
  bx(1.0,1.1,0.15,0x2E3A45,x+w/4,1.6,z+fz*(d/2+0.03),scene,false).castShadow=false;
  addObstacle(x,z,w/2+0.15,d/2+0.15);
  lootSpots.push({x:x,z:z+fz*(d/2+2.4)});
}
function warehouse(x,z){
  const w=10,d=8,h=5;

  bx(3.2,3.4,0.25,0x4A453C,x,1.7,z-d/2-0.05,scene,false); // big sliding door
  for(let i=-2;i<=2;i++) bx(0.12,3.4,0.28,0x3B3B38,x+i*0.64,1.7,z-d/2-0.06,scene,false).castShadow=false;

  addObstacle(x,z,w/2+0.15,d/2+0.15);
  lootSpots.push({x:x+2.4,z:z-d/2-2.0});
}

  bx(0.16,1.0,0.16,0xB18A45,x,11.2,z-d/2-1.2,scene,false).castShadow=false;

  bx(1.6,2.6,0.2,0x242321,x,1.3,z+(d/2+0.02)*(z>0?-1:1),scene,false); // door

  // 外围散落树木和灌木

  hydrant(-17,14); hydrant(17,-14); hydrant(-14,-23); hydrant(23,14);
  bush(10,-14); bush(-9,-15); bush(14,9); bush(-14,12);
  // blood stains / debris decals
  for(let i=0;i<14;i++){

  const sh=bx(5,2.6,4,0x8C8070,-5,1.3,-5); sh.castShadow=true;

  for(let a=0;a<10;a++){

function setWeaponMesh(){
  if(P.wmesh){ P.parts.rArm.remove(P.wmesh); P.wmesh.traverse(o=>{if(o.isMesh){o.geometry.dispose&&o.geometry.dispose();}}); P.wmesh=null; }

      tube.rotation.x=Math.PI/2; tube.position.set(0,-0.7,-0.45); m.add(tube);
      m.add(bx(0.06,0.12,0.1,0x242321,0,-0.6,-0.2)); // 握把
      m.add(bx(0.1,0.04,0.1,0x666666,0,-0.65,-0.75)); // 瞄准器
    } else if(wk==='flamethrower'){
      m=new THREE.Group();
      m.add(bx(0.12,0.12,0.5,0x884422,0,-0.62,-0.45));
      m.add(bx(0.1,0.2,0.1,0x444444,0,-0.6,-0.2)); // 罐体
      m.add(bx(0.04,0.04,0.25,0x242321,0,-0.62,-0.75)); // 喷嘴
    }
  }
  if(m){ m.traverse(o=>{if(o.isMesh)o.castShadow=true;});
    P.parts.rArm.add(m); P.wmesh=m; }
}

const zombies=[];
let zid=0;

function makeZombieMesh(t){
  const c=ZT[t], s=c.scale, g=new THREE.Group();
  const legH=c.crawl?0.28:0.72;
  const torsoY=c.crawl?0.42:legH+0.36;
  const torso=bx(0.62*s,(c.crawl?0.5:0.72)*s,0.36*s,c.shirt,0,torsoY,c.crawl?0.1:0,g);
  if(c.crawl) torso.rotation.x=0.5;
  const head=bx(0.4*s,0.4*s,0.38*s,c.skin,0,c.crawl?0.62:legH+0.98*s,c.crawl?0.42:0,g);
  const e1=bx(0.07,0.05,0.03,0xB13A32,-0.09*s,(c.crawl?0.66:legH+1.02*s),(c.crawl?0.62:0.2),g,false);
  const e2=bx(0.07,0.05,0.03,0xB13A32,0.09*s,(c.crawl?0.66:legH+1.02*s),(c.crawl?0.62:0.2),g,false);
  e1.castShadow=false; e2.castShadow=false;
  const lArm=new THREE.Group(); lArm.position.set(-0.4*s,torsoY+0.25*s,c.crawl?0.15:0); g.add(lArm);
  bx(0.16*s,0.6*s,0.16*s,c.skin,0,-0.26*s,0,lArm);
  const rArm=new THREE.Group(); rArm.position.set(0.4*s,torsoY+0.25*s,c.crawl?0.15:0); g.add(rArm);
  bx(0.16*s,0.6*s,0.16*s,c.skin,0,-0.26*s,0,rArm);
  lArm.rotation.x=c.crawl?-0.4:-1.25; rArm.rotation.x=c.crawl?-0.5:-1.25;
  const lLeg=new THREE.Group(); lLeg.position.set(-0.16*s,c.crawl?0.3:legH,c.crawl?-0.15:0); g.add(lLeg);
  bx(0.2*s,legH*s,0.22*s,c.pants,0,-legH*s/2,0,lLeg);
  const rLeg=new THREE.Group(); rLeg.position.set(0.16*s,c.crawl?0.3:legH,c.crawl?-0.15:0); g.add(rLeg);
  bx(0.2*s,legH*s,0.22*s,c.pants,0,-legH*s/2,0,rLeg);
  if(c.armed){ const wp=bx(0.07,0.7,0.07,0x5B5C57,0,-0.5,-0.25,rArm); wp.rotation.x=0.4; }
  if(t==='tank'){ bx(0.7*s,0.2*s,0.4*s,c.skin,0,torsoY+0.3,0,g); }
  if(c.boss){
    bx(0.4*s,0.22*s,0.44*s,0x4A4A42,-0.32*s,torsoY+0.42*s,0,g);
    bx(0.4*s,0.22*s,0.44*s,0x4A4A42,0.32*s,torsoY+0.42*s,0,g);
    bx(0.5*s,0.16*s,0.2*s,0x743C38,0,torsoY+0.1*s,0.2*s,g);
  }
  g.traverse(o=>{if(o.isMesh)o.castShadow=true;});
  g.userData.parts={lArm,rArm,lLeg,rLeg,torso};
  return g;
}

function spawnZombie(type,x,z){
  if(zombies.length>=MAX_Z&&!ZT[type].boss) return null;
  const c=ZT[type], df=DIFF[G.diff];
  const mesh=makeZombieMesh(type);
  mesh.position.set(x,-1.2,z);
  scene.add(mesh);
  const zb={ id:zid++, type, c, mesh,
    x, z, hp:c.hp*df.hp, maxhp:c.hp*df.hp,
    spd:c.spd*df.spd, dmg:c.dmg*df.dmg,
    state:'idle', dir:R(0,Math.PI*2), idleT:R(1,3), atkCd:0, atkAnimT:0,
    tx:0, tz:0, invT:0, lastX:0, lastZ:0, loseT:0,
    flash:0, dead:0, deadT:0, ph:R(0,6), groanT:R(2,9), screamed:0,
    stomping:0, stompCd:R(1,3), lungeT:0, lungeCd:0, lungeHit:0, ldx:0, ldz:0,
    rise:1.0, kbx:0, kbz:0, spkCd:0,
    spitCd:R(2,4), spitting:0, spitHit:0 };
  zombies.push(zb);
  return zb;
}

function removeZombie(zb,idx){
  scene.remove(zb.mesh);
  zombies.splice(idx,1);
}

function killZombie(zb){
  if(zb.dead) return;
  zb.dead=1; zb.deadT=0;
  G.kills++;
  // combo & score
  G.combo=(G.comboT>0)?G.combo+1:1; G.comboT=4;
  const base=zb.c.score||10;
  const pts=Math.round(base*(1+G.combo*0.1));
  G.score+=pts;
  if(G.combo>=2) AU.combo(G.combo);
  bloodBurst(zb.x,1.0,zb.z,10);
  if(zb.c.explode){
    AU.explode();
    bloodBurst(zb.x,1.2,zb.z,26,0x7A8A55);
    showRing(zb.x,zb.z,4.2,0xC04038,0.3,null);
    const dp=Math.hypot(P.x-zb.x,P.z-zb.z);
    if(dp<4.2){ damagePlayer(34*(1-dp/5.5),0); G.shake=Math.max(G.shake,0.5); }
    for(const o of zombies){ if(o!==zb&&!o.dead){
      const d=Math.hypot(o.x-zb.x,o.z-zb.z);
      if(d<4.2) hitZombie(o,55,zb.x,zb.z,0.5);
    }}
    for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
      if(Math.hypot(b.x-zb.x,b.z-zb.z)<4.2) damageBarricade(b,80,i); }
  }
  // drops
  const roll=Math.random();
  if(zb.c.boss){
    dropLoot(zb.x,zb.z,'medkit',1);
    dropLoot(zb.x+0.8,zb.z,pick(['ammo762','shell','ammo9']),RI(10,16));
    dropLoot(zb.x-0.8,zb.z,pick(['rifle','smg','sledge']),1);
  }
  else if(roll<0.30) dropLoot(zb.x,zb.z,pick(['can','water','bandage','cloth','wood']),1);
  else if(roll<0.60) dropLoot(zb.x,zb.z,pick(['ammo9','shell','ammo762','scrap']),RI(8,16));
  else if(roll<0.75) dropLoot(zb.x,zb.z,pick(['wood','cloth','nails','scrap']),RI(2,5));
  else if(zb.type==='survivor'&&Math.random()<0.55) dropLoot(zb.x,zb.z,pick(['crowbar','axe','pistol','machete','smg']),1);
  else if(zb.type==='tank') dropLoot(zb.x,zb.z,pick(['medkit','rifle','ammo762']),RI(2,6));
  else if(zb.type==='spitter'&&Math.random()<0.4) dropLoot(zb.x,zb.z,pick(['fuel','flamethrower','shell','molotov']),1);
  else if(zb.type==='brute2') dropLoot(zb.x,zb.z,pick(['railgun','rocket','shotgun2','ammo762','medkit']),RI(1,3));
  // 蓝图掉落（低概率）
  if(Math.random()<0.05){
    const bps=['bp_pistol','bp_smg','bp_shotgun','bp_rifle'];
    const bp=pick(bps);
    if(!(G.blueprints||[]).includes(bp)){
      G.blueprints=G.blueprints||[];
      G.blueprints.push(bp);
      showMsg(T('发现蓝图：','Found blueprint: ')+bpName(bp));
      AU.ui();
    }
  }
}
function bpName(bp){
  const m={bp_pistol:['手枪蓝图','Pistol BP'],bp_smg:['冲锋枪蓝图','SMG BP'],bp_shotgun:['霰弹枪蓝图','Shotgun BP'],bp_rifle:['步枪蓝图','Rifle BP']};
  return T((m[bp]||['蓝图','Blueprint'])[0],(m[bp]||['Blueprint','Blueprint'])[1]);
}

function hitZombie(zb,dmg,fx,fz,kb,crit){
  if(zb.dead) return;
  zb.hp-=dmg; zb.flash=0.12;
  AU.hitF();
  bloodBurst(zb.x,1.0,zb.z,crit?7:4);
  spawnDmg(zb.x,1.9*zb.c.scale,zb.z,Math.round(dmg)+(crit?'!':''),crit);
  showHpBar(zb);
  if(kb){ const d=Math.hypot(zb.x-fx,zb.z-fz)||1;
    const k=kb*((zb.type==='tank'||zb.c.boss)?0.2:1);
    zb.kbx+=(zb.x-fx)/d*k; zb.kbz+=(zb.z-fz)/d*k; }
  if(zb.hp<=0) killZombie(zb);
}

function enterChase(zb){
  zb.state='chase'; zb.loseT=0;
  // pack aggro share（扩大群体追击范围）
  for(const o of zombies){ if(o===zb||o.dead) continue;
    if(o.state==='idle'||o.state==='investigate'){
      if(Math.hypot(o.x-zb.x,o.z-zb.z)<8){ o.state='chase'; o.loseT=0; o.lastX=P.x; o.lastZ=P.z; }
    }
  }
  if(zb.c.scream&&!zb.screamed){ zb.screamed=1; AU.groan(2);
    for(const o of zombies){ if(!o.dead&&(o.state==='idle'||o.state==='investigate')&&Math.hypot(o.x-zb.x,o.z-zb.z)<30){ o.state='chase'; o.loseT=0; } }
  }
}

function blockedAt(x,z,rad){
  for(const o of obstacles){ if(Math.abs(x-o.x)<o.hw+rad&&Math.abs(z-o.z)<o.hd+rad) return true; }
  for(const o of circles){ const dx=x-o.x,dz=z-o.z; if(dx*dx+dz*dz<(o.r+rad)*(o.r+rad)) return true; }
  return false;
}
function steer(zb,mvx,mvz){
  const rad=0.42*zb.c.scale;
  if(!blockedAt(zb.x+mvx*1.4,zb.z+mvz*1.4,rad)) return [mvx,mvz];
  // 尝试更多角度
  for(const a of [Math.PI/6,-Math.PI/6,Math.PI/4,-Math.PI/4,Math.PI/3,-Math.PI/3,Math.PI/2,-Math.PI/2,Math.PI*2/3,-Math.PI*2/3]){
    const c=Math.cos(a), s=Math.sin(a);
    const rx=mvx*c-mvz*s, rz=mvx*s+mvz*c;
    if(!blockedAt(zb.x+rx*1.4,zb.z+rz*1.4,rad)) return [rx,rz];
  }
  // 最后尝试纯X或纯Z
  if(!blockedAt(zb.x+mvx*1.4,zb.z,rad)) return [mvx,0];
  if(!blockedAt(zb.x,zb.z+mvz*1.4,rad)) return [0,mvz];
  return [mvx,mvz];
}

function stompHit(zb){
  const r=zb.c.boss?4.6:3.6;
  AU.stomp();
  G.shake=Math.max(G.shake,0.4);
  bloodBurst(zb.x,0.4,zb.z,10,0x6B5B40);
  const dp=Math.hypot(P.x-zb.x,P.z-zb.z);
  if(dp<r){ damagePlayer(zb.c.boss?30:20,0);
    const d=dp||1; P.kbx+=(P.x-zb.x)/d*7.5; P.kbz+=(P.z-zb.z)/d*7.5; }
  for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
    if(Math.hypot(b.x-zb.x,b.z-zb.z)<r) damageBarricade(b,45,i); }
}

function zombieAI(zb,dt,idx){
  const night=nightFactor()>0.5;
  const bmNight=G.bloodMoon&&night;
  if(zb.dead){
    zb.deadT+=dt;
    zb.mesh.rotation.x=lerp(zb.mesh.rotation.x,-Math.PI/2,dt*8);
    zb.mesh.position.y=lerp(zb.mesh.position.y,0.15,dt*8);
    if(zb.deadT>1.4){ zb.mesh.position.y-=dt*0.6; }
    if(zb.deadT>2.2) removeZombie(zb,idx);
    return;
  }
  // rise from ground
  if(zb.rise>0){
    zb.rise-=dt;
    zb.mesh.position.y=-1.2*Math.max(0,zb.rise);
    return;
  }
  if(zb.flash>0){ zb.flash-=dt;
    zb.mesh.traverse(o=>{ if(o.isMesh){ if(!o.userData.om) o.userData.om=o.material;
      o.material=zb.flash>0?mat(0xC04038):o.userData.om; }});
  }
  zb.x+=zb.kbx*dt*8; zb.z+=zb.kbz*dt*8;
  zb.kbx*=Math.pow(0.001,dt); zb.kbz*=Math.pow(0.001,dt);

  // spike traps
  zb.spkCd=Math.max(0,zb.spkCd-dt);
  for(let i=spikesArr.length-1;i>=0;i--){ const s=spikesArr[i];
    if(Math.abs(zb.x-s.x)<s.hw&&Math.abs(zb.z-s.z)<s.hd){
      s.hp-=5*dt;
      if(zb.spkCd<=0){ zb.spkCd=0.5; hitZombie(zb,9,s.x,s.z,0.1); AU.spike(); }
      if(s.hp<=0){ scene.remove(s.m); spikesArr.splice(i,1); showMsg(T('钉刺陷阱损坏了。','A spike trap broke.')); }
      if(zb.dead) break;
    } }
  if(zb.dead) return;

  const dx=P.x-zb.x, dz=P.z-zb.z;
  const dist=Math.hypot(dx,dz);

  /* ---- senses ---- */
  // 全图追击：僵尸一旦发现玩家就永远追击，感知范围大幅增加
  const baseR=zb.c.scream?28:22;
  let see=false;
  if(P.hp>0){
    if(night){ see=dist<baseR*1.5; }
    else if(dist<6) see=true;
    else if(dist<baseR){
      const fx=Math.sin(zb.dir), fz=Math.cos(zb.dir);
      see=((dx*fx+dz*fz)/(dist||1))>0.3; // 150 deg cone（更宽视野）
    }
    // 远距离也能听到枪声/脚步（只要不太远就有感知）
    if(!see&&dist<40&&(P.moving||P.atkCd>0.3)) see=true;
  }
  // 侦察兵隐身：僵尸看不到玩家
  if(P.cloakT>0) see=false;
  if(see){
    if(zb.state!=='chase'&&zb.state!=='attack') enterChase(zb);
    zb.lastX=P.x; zb.lastZ=P.z; zb.loseT=0;
  } else if(zb.state==='chase'||zb.state==='attack'){
    // 僵尸永不放弃追击，持续向玩家最后已知位置移动
    zb.loseT+=dt;
    zb.tx=P.x; zb.tz=P.z; // 持续更新目标为玩家当前位置
    // 远距离加速冲刺追击
    if(dist>25){ const sp=zb.spd*(night?1.4:1.2); zb.x+=dx/dist*sp*dt*0.7; zb.z+=dz/dist*sp*dt*0.7; }
  }
  // hearing
  if(zb.state==='idle'||zb.state==='investigate'){
    for(const n of noises){ const nd=Math.hypot(n.x-zb.x,n.z-zb.z);
      if(nd<n.r){ zb.state='investigate'; zb.tx=n.x; zb.tz=n.z; zb.invT=5; break; } }
  }

  /* ---- stomp (tank / brute) ---- */
  zb.stompCd=Math.max(0,zb.stompCd-dt);
  if(zb.stomping>0){
    zb.stomping-=dt;
    if(zb.stomping<=0) stompHit(zb);
  } else if(zb.c.stomp&&dist<4.5&&zb.stompCd<=0&&(zb.state==='chase'||zb.state==='attack')){
    zb.stomping=0.9; zb.stompCd=5.5;
    showRing(zb.x,zb.z,zb.c.boss?4.6:3.6,0xC04038,0.9,null);
    AU.groan(dist);
  }

  /* ---- runner lunge ---- */
  zb.lungeCd=Math.max(0,zb.lungeCd-dt);
  if(zb.type==='runner'&&zb.state==='chase'&&zb.lungeT<=0&&zb.lungeCd<=0&&dist>3&&dist<5){
    zb.lungeT=0.34; zb.lungeCd=4; zb.lungeHit=0;
    zb.ldx=dx/(dist||1); zb.ldz=dz/(dist||1);
  }

  /* ---- spitter ranged spit ---- */
  zb.spitCd=Math.max(0,zb.spitCd-dt);
  if(zb.spitting>0){
    zb.spitting-=dt;
    if(zb.spitting<=0){
      // 发射酸液弹（敌方子弹）
      const tx=P.x-zb.x, tz=P.z-zb.z, td=Math.hypot(tx,tz)||1;
      const svx=tx/td, svz=tz/td;
      fireBullet(zb.x,1.2,zb.z,svx,svz,14,zb.dmg,0,0,0,0,1);
      // 标记为敌方子弹，用绿色
      const lb=bullets[bullets.length-1];
      if(lb){ lb.enemy=1; lb.m.material=mat(0x66DD44); lb.m.scale.set(0.15,0.15,0.15); }
      AU.groan(dist);
    }
  } else if(zb.c.ranged&&dist>4&&dist<14&&zb.spitCd<=0&&(zb.state==='chase'||zb.state==='attack')){
    zb.spitting=0.6; zb.spitCd=R(2.5,4);
    showRing(zb.x,zb.z,1.0,0x66DD44,0.5,null);
  }

  /* ---- state behaviors ---- */
  let mvx=0, mvz=0;
  let spd=zb.spd*(night?1.28:1)*(bmNight?1.15:1);
  if(zb.stomping>0) spd=0;
  const reach=(zb.c.crawl?1.1:1.35)*zb.c.scale;
  zb.atkCd-=dt;

  if(zb.state==='idle'){
    zb.idleT-=dt;
    if(zb.idleT<=0){ zb.dir=R(0,Math.PI*2); zb.idleT=R(1.5,4); }
    mvx=Math.sin(zb.dir)*0.4; mvz=Math.cos(zb.dir)*0.4;
  }
  else if(zb.state==='investigate'){
    const tx=zb.tx-zb.x, tz=zb.tz-zb.z, td=Math.hypot(tx,tz);
    if(td>1.5){ mvx=tx/td*0.85; mvz=tz/td*0.85; zb.dir=Math.atan2(tx,tz); }
    else {
      zb.invT-=dt;
      zb.idleT-=dt;
      if(zb.idleT<=0){ zb.dir=R(0,Math.PI*2); zb.idleT=R(0.8,1.6); }
      mvx=Math.sin(zb.dir)*0.35; mvz=Math.cos(zb.dir)*0.35;
      if(zb.invT<=0){ zb.state='chase'; zb.tx=P.x; zb.tz=P.z; } // 改为回到chase
    }
  }
  else if(zb.state==='chase'){
    if(dist<reach) zb.state='attack';
    else {
      const d=dist||1;
      // 预判玩家移动位置（基于玩家速度方向）
      const leadX=P.x+P.kbx*0.3, leadZ=P.z+P.kbz*0.3;
      const ldx=leadX-zb.x, ldz=leadZ-zb.z, ld=Math.hypot(ldx,ldz)||1;
      mvx=ldx/ld; mvz=ldz/ld; zb.dir=Math.atan2(ldx,ldz);
    }
  }
  else if(zb.state==='attack'){
    zb.dir=Math.atan2(dx,dz);
    if(dist>reach+0.7) zb.state='chase';
    else if(zb.atkCd<=0){
      zb.atkCd=(zb.type==='tank'||zb.c.boss)?1.6:1.0;
      zb.atkAnimT=0.3;
      damagePlayer(zb.dmg, zb.type==='crawler'?0:RI(5,10));
      if(zb.c.grab){ P.grabT=1.4; showMsg(T('被爬行尸抓住了！','Grabbed by a crawler!')); }
    }
  }
  // lunge motion override
  if(zb.lungeT>0){
    zb.lungeT-=dt;
    mvx=zb.ldx*2.6; mvz=zb.ldz*2.6; spd=zb.spd*1.4;
    if(!zb.lungeHit&&dist<1.3){ zb.lungeHit=1; damagePlayer(zb.dmg*1.3,RI(3,6)); }
  }
  if(P.grabT>0&&zb.c.grab) spd*=1.1;

  // cohesion (gentle pull to nearby pack center)
  if(zb.state==='chase'){
    let cx=0,cz=0,cn=0;
    for(const o of zombies){ if(o===zb||o.dead||o.state!=='chase') continue;
      const sd=Math.hypot(o.x-zb.x,o.z-zb.z);
      if(sd<3&&sd>0.01){ cx+=o.x; cz+=o.z; cn++; } }
    if(cn>0){ cx/=cn; cz/=cn;
      mvx+=(cx-zb.x)*0.06; mvz+=(cz-zb.z)*0.06;
      const ml=Math.hypot(mvx,mvz)||1; mvx/=ml; mvz/=ml; }
  }
  // obstacle avoidance steering
  if(spd>0&&(mvx||mvz)){ const st=steer(zb,mvx,mvz); mvx=st[0]; mvz=st[1]; }

  zb.x+=mvx*spd*dt; zb.z+=mvz*spd*dt;
  resolveCollision(zb,0.42*zb.c.scale);

  // attack barricade blocking the way
  if(zb.state==='chase'||zb.state==='attack'){
    for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
      if(Math.abs(zb.x-b.x)<b.hw+0.8&&Math.abs(zb.z-b.z)<b.hd+0.8){
        if(zb.atkCd<=0){ zb.atkCd=1.1; zb.atkAnimT=0.3; damageBarricade(b,zb.dmg*1.4,i); AU.build(); }
        break; }
    }
  }
  // separation
  for(const o of zombies){ if(o===zb||o.dead) continue;
    const sx=zb.x-o.x, sz=zb.z-o.z, sd=Math.hypot(sx,sz);
    if(sd<0.8&&sd>0.001){ zb.x+=sx/sd*dt*1.2; zb.z+=sz/sd*dt*1.2; } }

  zb.mesh.position.set(zb.x,0,zb.z);
  zb.mesh.rotation.y=zb.dir;
  /* ---- animation ---- */
  zb.ph+=dt*(2+spd*2.2);
  const pa=zb.mesh.userData.parts, sw=Math.sin(zb.ph)*0.5;
  if(!zb.c.crawl){
    pa.lLeg.rotation.x=sw; pa.rLeg.rotation.x=-sw;
    pa.torso.rotation.z=Math.sin(zb.ph*0.5)*0.09;       // shamble sway
    pa.torso.rotation.x=zb.type==='runner'?0.32:0;      // runner lean
  }
  if(zb.atkAnimT>0){ zb.atkAnimT-=dt;
    pa.lArm.rotation.x=-2.2; pa.rArm.rotation.x=-2.2;   // lunge swipe
  } else if(zb.stomping>0){
    pa.lArm.rotation.x=-2.9; pa.rArm.rotation.x=-2.9;   // raise for stomp
  } else if(zb.spitting>0){
    pa.lArm.rotation.x=-1.8; pa.rArm.rotation.x=-1.8;   // spit pose
  } else {
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,zb.c.crawl?-0.4:-1.25,dt*6);
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,zb.c.crawl?-0.5:-1.25,dt*6);
  }
  // groans
  zb.groanT-=dt;
  if(zb.groanT<=0){ zb.groanT=R(4,11); if(dist<26) AU.groan(dist); }
}

/* ================= pooled particles ================= */
const PPOOL=[];
function spawnP(x,y,z,vx,vy,vz,life,gr,size,col){
  let p=null;
  for(const q of PPOOL){ if(!q.on){ p=q; break; } }
  if(!p){
    if(PPOOL.length>=150) return;
    const m=new THREE.Mesh(BOX,mat(0xA4382E)); m.castShadow=false; m.visible=false;
    scene.add(m); p={m,on:false,vx:0,vy:0,vz:0,life:0,gr:12}; PPOOL.push(p);
  }
  p.on=true; p.m.visible=true; p.m.material=mat(col);
  p.m.scale.set(size,size,size); p.m.position.set(x,y,z);
  p.vx=vx; p.vy=vy; p.vz=vz; p.life=life; p.gr=gr;
}
function bloodBurst(x,y,z,n,col){
  const c=col||0xA4382E;
  for(let i=0;i<n;i++){
    spawnP(x,y,z,(Math.random()-0.5)*R(2,6),R(1,5),(Math.random()-0.5)*R(2,6),R(0.4,0.9),12,R(0.05,0.12),c);
  }
}
function ejectShell(x,y,z,dx,dz){
  spawnP(x,y,z,-dz*R(1.5,2.5)+R(-0.5,0.5),R(2,3.2),dx*R(1.5,2.5)+R(-0.5,0.5),0.6,12,0.05,0xB18A45);
}
function updateParticles(dt){
  for(const p of PPOOL){ if(!p.on) continue;
    p.life-=dt;
    p.m.position.x+=p.vx*dt; p.m.position.y+=p.vy*dt; p.m.position.z+=p.vz*dt;
    p.vy-=p.gr*dt;
    if(p.m.position.y<0.03){ p.m.position.y=0.03; p.vy*=-0.3; p.vx*=0.7; p.vz*=0.7; }
    if(p.life<=0){ p.on=false; p.m.visible=false; }
  }
}

/* ================= pooled rings (telegraph / flash) ================= */
const RPOOL=[];
function showRing(x,z,r,col,dur,cb){
  let f=null;
  for(const q of RPOOL){ if(!q.on){ f=q; break; } }
  if(!f){
    if(RPOOL.length>=8) { if(cb) cb(); return; }
    const m=new THREE.Mesh(RINGU,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.6,side:THREE.DoubleSide,depthWrite:false}));
    m.rotation.x=-Math.PI/2; m.visible=false; scene.add(m);
    f={m,on:false,r:1,life:0,total:1,cb:null}; RPOOL.push(f);
  }
  f.on=true; f.m.visible=true; f.m.material.color.set(col);
  f.m.position.set(x,0.12,z); f.r=r; f.life=dur; f.total=dur; f.cb=cb||null;
  f.m.scale.setScalar(r);
}
function updateRings(dt){
  for(const f of RPOOL){ if(!f.on) continue;
    f.life-=dt;
    const k=Math.max(0,f.life/f.total);
    f.m.scale.setScalar(f.r*(0.25+0.75*k));
    f.m.material.opacity=0.25+0.45*Math.abs(Math.sin(f.life*9));
    if(f.life<=0){ f.on=false; f.m.visible=false; if(f.cb) f.cb(); }
  }
}

/* ================= noise events ================= */
const noises=[];
function addNoise(x,z,r){ noises.push({x,z,r,ttl:0.9}); if(noises.length>10) noises.shift(); }
function updateNoises(dt){ for(let i=noises.length-1;i>=0;i--){ noises[i].ttl-=dt; if(noises[i].ttl<=0) noises.splice(i,1); } }

/* ================= shooting / combat ================= */
const bullets=[];
let bPool=[];
function shoot(){
  const wk=P.weapon||'fists';
  if(P.atkCd>0||P.rollT>0) return;
  // molotov和barricade等非WEAPONS道具优先处理
  if(wk==='molotov'){ throwMolotov(); return; }
  if(wk==='barricade'){ buildBarricade('barricade'); return; }
  if(wk==='rbarricade'){ buildRBarricade(); return; }
  if(wk==='spikes'){ placeSpikes(); return; }
  if(!WEAPONS[wk]){ P.weapon='fists'; return; }
  const w=WEAPONS[wk]; if(!w) return;
  if(w.melee){ meleeAtk(wk,w); return; }
  if(P.reloadT>0) return;
  if(P.mags[wk]<=0){ reload(); return; }
  P.mags[wk]--;
  const dmgMult=(P.dmgMult||1)*(P.frenzyT>0?1.5:1);
  P.atkCd=w.rate*(P.frenzyT>0?0.65:1);
  P.recoilT=0.09;
  AU.shoot(wk);
  addNoise(P.x,P.z,w.noise||18);
  muzzleFlash();
  ejectShell(P.x,1.35,P.z,P.aimX,P.aimZ);
  // 特殊武器类型
  if(w.type==='flame'){
    // 火焰喷射器：短距离多发
    for(let p=0;p<3;p++){
      const spread=0.12;
      const sx=(Math.random()-0.5)*spread, sz=(Math.random()-0.5)*spread;
      const dir=new V3(P.aimX,0,P.aimZ).normalize().add(new V3(sx,0,sz)).normalize();
      fireBullet(P.x,1.4,P.z,dir.x,dir.z,w.range,w.dmg*dmgMult,0,0,0,0,1);
    }
    P.kbx-=P.aimX*0.05; P.kbz-=P.aimZ*0.05;
    if(P.mags[wk]<=0) reload();
    return;
  }
  if(w.type==='rocket'){
    // 火箭筒：单发爆炸弹
    const dir=new V3(P.aimX,0,P.aimZ).normalize();
    fireBullet(P.x,1.4,P.z,dir.x,dir.z,w.range,w.dmg*dmgMult,w.explode,w.explodeDmg,w.explodeR,0);
    P.kbx-=P.aimX*0.5; P.kbz-=P.aimZ*0.5;
    G.shake=Math.max(G.shake,0.2);
    if(P.mags[wk]<=0) reload();
    return;
  }
  if(w.type==='rail'){
    // 轨道炮：穿透弹
    const dir=new V3(P.aimX,0,P.aimZ).normalize();
    fireBullet(P.x,1.4,P.z,dir.x,dir.z,w.range,w.dmg*dmgMult,0,0,0,w.pierce||99);
    P.kbx-=P.aimX*0.3; P.kbz-=P.aimZ*0.3;
    G.shake=Math.max(G.shake,0.15);
    if(P.mags[wk]<=0) reload();
    return;
  }
  const pellets=w.pellets||1;
  for(let p=0;p<pellets;p++){
    const spread=w.spread*(P.moving?2.2:1);
    const sx=(Math.random()-0.5)*spread, sz=(Math.random()-0.5)*spread;
    const dir=new V3(P.aimX,0,P.aimZ).normalize().add(new V3(sx,0,sz)).normalize();
    fireBullet(P.x,1.4,P.z,dir.x,dir.z,w.range,w.dmg*dmgMult);
  }
  P.kbx-=P.aimX*0.12; P.kbz-=P.aimZ*0.12;
  if(P.mags[wk]<=0) reload();
}
function meleeAtk(wk,w){
  P.atkCd=w.rate*(P.frenzyT>0?0.65:1);
  P.swingMax=Math.min(0.5,Math.max(0.32,w.rate*0.85));
  P.swingT=P.swingMax;
  P.meleeHitT=P.swingMax*0.36;
  P.meleeHitW=wk;
  AU.swing();
  if(w.noise) addNoise(P.x,P.z,w.noise);
  // assist aim: snap to nearest zombie in a wide arc
  let best=null, bd=w.range*1.15;
  for(const z of zombies){ if(z.dead) continue;
    const dx=z.x-P.x, dz=z.z-P.z, d=Math.hypot(dx,dz);
    if(d<bd){ const ang=Math.acos(clamp((dx*P.aimX+dz*P.aimZ)/(d||1),-1,1));
      if(ang<w.arc){ bd=d; best=z; } } }
  if(best){ const dx=best.x-P.x, dz=best.z-P.z, d=Math.hypot(dx,dz)||1;
    P.aimX=dx/d; P.aimZ=dz/d; P.dir=Math.atan2(dx,dz); }
}
function doMeleeDamage(wk){
  const w=WEAPONS[wk]; if(!w) return;
  const dmgMult=(P.dmgMult||1)*(P.frenzyT>0?1.5:1);
  let hitAny=false;
  for(const z of zombies){
    if(z.dead||z.rise>0) continue;
    const dx=z.x-P.x, dz=z.z-P.z;
    const d=Math.hypot(dx,dz);
    if(d<w.range){
      const ang=Math.acos(clamp((dx*P.aimX+dz*P.aimZ)/(d||1),-1,1));
      if(ang<w.arc/2){ hitZombie(z,w.dmg*dmgMult,P.x,P.z,w.kb||0.6); hitAny=true; }
    }
  }
  for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
    const d=Math.hypot(b.x-P.x,b.z-P.z);
    if(d<w.range){ damageBarricade(b,w.dmg*0.6,i); hitAny=true; } }
  if(hitAny) decDurability();
}
function decDurability(){
  const s=P.hot[P.hsel]; if(!s||s.id!==P.weapon) return;
  const max=WEAPONS[s.id]&&WEAPONS[s.id].dur;
  if(max===undefined||max===Infinity) return;
  if(s.dur===undefined) s.dur=max;
  s.dur--;
  if(s.dur<=0){ breakWeapon(P.hsel); }
  refreshHud();
}
function breakWeapon(slot){
  const id=P.hot[slot]?P.hot[slot].id:null;
  P.hot[slot]=null;
  AU.breakW();
  showMsg(T('你的 '+(id?itemName(id):'')+' 损坏了！','Your '+(id?itemName(id):'')+' broke!'));
  // 确保 fists 始终存在于 hot[3]
  if(!P.hot[3]||P.hot[3].id!=='fists'){ P.hot[3]={id:'fists',q:1}; }
  if(P.weapon===id){
    P.weapon='fists';
    P.hsel=3;
  }
  setWeaponMesh(); refreshHud();
}
function fireBullet(x,y,z,vx,vz,range,dmg,explode,explodeDmg,explodeR,pierce,isFlame){
  let m=bPool.pop();
  if(!m){ m=new THREE.Mesh(BOX,mat(0xD6C29A)); m.scale.set(0.06,0.06,0.18); scene.add(m); }
  m.visible=true; m.position.set(x,y,z);
  m.rotation.y=Math.atan2(vx,vz);
  if(explode){ m.material=mat(0xFF6600); m.scale.set(0.12,0.12,0.3); }
  else if(pierce>0){ m.material=mat(0xFFFF44); m.scale.set(0.04,0.04,0.25); }
  else if(isFlame){ m.material=mat(0xFF8822); m.scale.set(0.1,0.1,0.1); }
  bullets.push({m,x,y,z,vx,vz,rng:range,dmg,dist:0,explode:explode||0,explodeDmg:explodeDmg||0,explodeR:explodeR||0,pierce:pierce||0,hitZ:[],isFlame:isFlame||0});
}
function updateBullets(dt){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; const spd=b.isFlame?18:28;
    const dx=b.vx*spd*dt, dz=b.vz*spd*dt; b.dist+=Math.hypot(dx,dz);
    b.x+=dx; b.z+=dz;
    b.m.position.set(b.x,b.y,b.z);
    if(b.dist>b.rng){
      // 火焰弹飞行结束时产生小爆裂特效
      if(b.isFlame){
        for(let p=0;p<4;p++){
          const ang=Math.PI*2*p/4;
          spawnP(b.x,1.4,b.z,Math.cos(ang)*2,Math.sin(ang)*2,0.3,12,0.06,0xFF8822);
        }
      }
      // 火箭弹飞行结束时爆炸
      if(b.explode){ explodeBullet(b); }
      killBullet(i); continue;
    }
    // 敌方子弹：检测命中玩家
    if(b.enemy){
      if(Math.abs(b.x-P.x)<0.5&&Math.abs(b.z-P.z)<0.5){
        damagePlayer(b.dmg,3);
        for(let p=0;p<6;p++){
          spawnP(b.x,1.4,b.z,R(-1,1),R(0,2),R(-1,1),0.4,12,0.06,0x66DD44);
        }
        killBullet(i); continue;
      }
      // 敌方子弹不检测僵尸命中，只检测障碍物
      let hitObs=false;
      for(let bi=barricades.length-1;bi>=0;bi--){
        const bb=barricades[bi]; if(Math.abs(b.x-bb.x)<bb.hw&&Math.abs(b.z-bb.z)<bb.hd){
          damageBarricade(bb,b.dmg*0.6,bi); hitObs=true; break; } }
      if(hitObs) killBullet(i);
      continue;
    }
    let hit=false;
    for(const z of zombies){ if(z.dead||z.rise>0) continue;
      const rr=0.5*z.c.scale;
      if(Math.abs(b.x-z.x)<rr&&Math.abs(b.z-z.z)<rr){
        let dmg=b.dmg, crit=false;
        if(Math.random()<0.15){ dmg*=2; crit=true; AU.headshot(); }
        // 穿透：可击中多个目标
        if(b.pierce>0){
          if(!b.hitZ)b.hitZ=[];
          if(b.hitZ.includes(z)) continue;
          b.hitZ.push(z);
          hitZombie(z,dmg,b.x,b.z,0.25,crit);
          // 火焰弹命中产生小火花
          if(b.isFlame){
            for(let p=0;p<3;p++){
              spawnP(b.x,1.4,b.z,R(-1,1),R(0,2),R(-1,1),0.3,12,0.05,0xFF8822);
            }
          }
          if(b.hitZ.length>=b.pierce){
            if(b.explode){ explodeBullet(b); }
            hit=true; break;
          }
          continue;
        }
        hitZombie(z,dmg,b.x,b.z,0.25,crit);
        if(b.isFlame){
          for(let p=0;p<3;p++){
            spawnP(b.x,1.4,b.z,R(-1,1),R(0,2),R(-1,1),0.3,12,0.05,0xFF8822);
          }
        }
        if(b.explode){ explodeBullet(b); }
        hit=true; break;
      }
    }
    if(!hit){ for(let bi=barricades.length-1;bi>=0;bi--){
      const bb=barricades[bi]; if(Math.abs(b.x-bb.x)<bb.hw&&Math.abs(b.z-bb.z)<bb.hd){
        damageBarricade(bb,b.dmg*0.6,bi);
        if(b.explode){ explodeBullet(b); }
        hit=true; break; } } }
    if(hit) killBullet(i);
  }
}
function explodeBullet(b){
  // 爆炸：范围内所有僵尸受伤
  for(const z2 of zombies){
    if(z2.dead||z2.rise>0) continue;
    const ed=Math.hypot(z2.x-b.x,z2.z-b.z);
    if(ed<b.explodeR){
      const edmg=b.explodeDmg*(1-ed/b.explodeR);
      hitZombie(z2,edmg,b.x,b.z,0.5);
    }
  }
  // 爆炸特效
  for(let p=0;p<12;p++){
    const ang=Math.PI*2*p/12;
    spawnP(b.x,1.4,b.z,Math.cos(ang)*4,Math.sin(ang)*4,0.5,12,0.08,0xFF6600);
  }
  showRing(b.x,b.z,b.explodeR,0xFF6600,0.3,null);
  G.shake=Math.max(G.shake,0.3);
}
function killBullet(i){
  const b=bullets[i]; b.m.visible=false; bPool.push(b.m); bullets.splice(i,1);
}
function reload(){
  const w=WEAPONS[P.weapon]; if(!w||w.melee||P.reloadT>0||P.rollT>0) return;
  const invQty=invCount(w.ammo);
  const need=w.mag-P.mags[P.weapon];
  if(need<=0||invQty<=0) return;
  const take=Math.min(need,invQty);
  removeItem(w.ammo,take); P.mags[P.weapon]+=take;
  P.reloadT=w.reload; P.reloadMax=w.reload;
  AU.reloadS();
}

let projectiles=[];
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.life-=dt;
    // 抛物线运动
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.vy-=9.8*dt;
    p.z+=p.vz*dt;
    p.mesh.position.set(p.x,p.y,p.z);
    p.mesh.rotation.x+=dt*8;
    p.mesh.rotation.z+=dt*6;
    // 到达目标或落地
    const landY=p.y<=0.3;
    const reached=Math.hypot(p.x-p.tx,p.z-p.tz)<0.8;
    if(landY||reached||p.life<=0){
      // 爆炸效果
      molotovExplode(p.x,p.z);
      scene.remove(p.mesh);
      projectiles.splice(i,1);
    }
  }
}

function molotovExplode(x,z){

/* ================= waves ================= */
function waveTypes(n){
  const t=['walker','walker','walker'];
  if(n>=2) t.push('runner','runner');
  if(n>=3) t.push('crawler');
  if(n>=4) t.push('screamer');
  if(n>=5) t.push('bloater','bloater','spitter');
  if(n>=6) t.push('survivor','survivor','spitter');
  if(n>=7) t.push('tank','brute2');
  if(n>=9) t.push('tank','runner','screamer','brute2','spitter');
  return t;
}
function startWave(n){
  G.wave=n; G.waveState='wave'; G.spawned=0;
  G.spawnQ=Math.round((4+n*2.2)*DIFF[G.diff].count*(G.bloodMoon?1.6:1));
  G.spawnTick=0.5;
  AU.waveHorn();
  showBanner(T('第 '+n+' 波','WAVE '+n),'#E5DDC8');
  if(n%5===0) spawnBrute();
}
function spawnBrute(){
  const a=R(0,Math.PI*2), r=R(30,36);
  const x=clamp(Math.cos(a)*r,-HALF+2,HALF-2), z=clamp(Math.sin(a)*r,-HALF+2,HALF-2);
  const zb=spawnZombie('brute',x,z);
  if(zb){ G.boss=zb; AU.boss();
    showBanner(T('蛮兽出现了！','A BRUTE approaches!'),'#C05848',2.2);

}
function updateWaves(dt){
  if(G.waveState==='wave'){
    G.spawnTick-=dt;
    if(G.spawnTick<=0&&G.spawned<G.spawnQ&&aliveZ()<MAX_Z){
      G.spawnTick=R(0.7,1.4);
      const batch=Math.min(RI(1,2),G.spawnQ-G.spawned);
      for(let i=0;i<batch;i++){
        const a=R(0,Math.PI*2), r=R(34,42);
        const x=clamp(Math.cos(a)*r,-HALF+2,HALF-2), z=clamp(Math.sin(a)*r,-HALF+2,HALF-2);
        if(spawnZombie(pick(waveTypes(G.wave)),x,z)) G.spawned++;
      }

      G.waveState='rest'; G.restT=REST_T;

      saveGame();
    }

    if(G.restT<=0) startWave(G.wave+1);
  }
}
function aliveZ(){ let n=0; for(const z of zombies) if(!z.dead) n++; return n; }

/* ================= collision / movement ================= */
function resolveCollision(ent,rad){
  const mapLimit=HALF-1.0;
  ent.x=clamp(ent.x,-mapLimit,mapLimit); ent.z=clamp(ent.z,-mapLimit,mapLimit);
  // 矩形障碍物：基于穿透深度的分轴碰撞解决
  for(const o of obstacles){
    const dx=ent.x-o.x, dz=ent.z-o.z;
    const ox=Math.abs(dx)-o.hw, oz=Math.abs(dz)-o.hd;
    if(ox<rad&&oz<rad){
      // 计算穿透深度
      const penX=rad-ox, penZ=rad-oz;
      // 只推穿透更深的那个轴，避免滑动
      if(penX<penZ){
        ent.x=o.x+Math.sign(dx||1)*(o.hw+rad);
      } else {
        ent.z=o.z+Math.sign(dz||1)*(o.hd+rad);
      }
    }
  }
  for(const o of circles){ const dx=ent.x-o.x, dz=ent.z-o.z, d=Math.hypot(dx,dz);
    if(d<rad+o.r&&d>0.001){ const p=(rad+o.r)/d; ent.x=o.x+dx*p; ent.z=o.z+dz*p; } }
  for(const b of barricades){
    const dx=ent.x-b.x, dz=ent.z-b.z;
    const ox=Math.abs(dx)-b.hw, oz=Math.abs(dz)-b.hd;
    if(ox<rad&&oz<rad){
      const penX=rad-ox, penZ=rad-oz;
      if(penX<penZ){
        ent.x=b.x+Math.sign(dx||1)*(b.hw+rad);
      } else {
        ent.z=b.z+Math.sign(dz||1)*(b.hd+rad);
      }
    }
  }
}

/* ================= player update ================= */
function doRoll(){
  if(G.state!=='play'||G.paused) return;
  if(P.rollCd>0||P.rollT>0) return;
  if(P.stam<25){ showMsg(T('体力不足，无法翻滚！','Too tired to roll!')); return; }
  // 基于角色朝向的翻滚方向：W=前滚，S=后滚，A=左滚，D=右滚
  let fwd=0, strafe=0;
  if(keys.w||keys.ArrowUp) fwd+=1; if(keys.s||keys.ArrowDown) fwd-=1;
  if(keys.a||keys.ArrowLeft) strafe-=1; if(keys.d||keys.ArrowRight) strafe+=1;
  if(touchActive){ fwd=touchDy; strafe=touchDx; }
  let len=Math.hypot(fwd,strafe);
  if(len<0.2){ fwd=1; strafe=0; len=1; } // 默认前滚
  fwd/=len; strafe/=len;
  const cosD=Math.cos(P.dir), sinD=Math.sin(P.dir);
  const dx=sinD*fwd+cosD*strafe;
  const dz=cosD*fwd-sinD*strafe;
  P.rollDx=dx; P.rollDz=dz;
  P.rollT=0.35; P.rollCd=1.2; P.invulnT=0.4;
  P.stam-=25;
  P.dir=Math.atan2(P.rollDx,P.rollDz);
  P.meleeHitT=0; P.swingT=0;
  AU.roll();
}
function updatePlayer(dt){
  if(P.grabT>0){ P.grabT-=dt; }
  const df=DIFF[G.diff];
  const drain=df.drain;
  P.hunger-=0.018*dt*drain; P.thirst-=0.024*dt*drain;
  if(P.hunger<15||P.thirst<15) P.hp-=0.25*dt;
  if(P.inf>=100) P.hp-=0.6*dt;
  P.hp=clamp(P.hp,0,P.maxHp||100); P.hunger=clamp(P.hunger,0,100); P.thirst=clamp(P.thirst,0,100);
  P.stam+=8*dt; P.stam=clamp(P.stam,0,100);
  P.inf=clamp(P.inf,0,100);
  P.rollCd=Math.max(0,P.rollCd-dt);
  P.invulnT=Math.max(0,P.invulnT-dt);
  P.crouchT=Math.max(0,P.crouchT-dt);
  P.recoilT=Math.max(0,P.recoilT-dt);
  // 职业技能计时器
  P.skillCd=Math.max(0,(P.skillCd||0)-dt);
  P.cloakT=Math.max(0,(P.cloakT||0)-dt);
  P.frenzyT=Math.max(0,(P.frenzyT||0)-dt);
  // 工程师炮台处理
  if(P.turrets){
    for(let i=P.turrets.length-1;i>=0;i--){
      const t=P.turrets[i];
      t.life-=dt; t.cd-=dt;
      if(t.life<=0){
        if(t.mesh) scene.remove(t.mesh);
        P.turrets.splice(i,1); continue;
      }
      if(t.cd<=0){
        // 找最近僵尸
        let best=null,bd=15;
        for(const z of zombies){ if(z.dead) continue;
          const d=Math.hypot(z.x-t.x,z.z-t.z);
          if(d<bd){ bd=d; best=z; } }
        if(best){
          const dx=best.x-t.x, dz=best.z-t.z, d=Math.hypot(dx,dz)||1;
          fireBullet(t.x,1.2,t.z,dx/d,dz/d,20,15);
          t.cd=0.3;
        }
      }
    }
  }

  if(P.hp<=0){ dieGame(); return; }

  // knockback
  P.x+=P.kbx*dt*6; P.z+=P.kbz*dt*6;
  P.kbx*=Math.pow(0.001,dt); P.kbz*=Math.pow(0.001,dt);

  if(P.rollT>0){
    P.rollT-=dt;
    P.x+=P.rollDx*9.2*dt; P.z+=P.rollDz*9.2*dt;
    P.moving=true;
  } else {
    // WASD基于角色朝向（鼠标控制方向）：W=前进，S=后退，A=左移，D=右移
    let fwd=0, strafe=0;
    if(keys.w||keys.ArrowUp) fwd+=1; if(keys.s||keys.ArrowDown) fwd-=1;
    if(keys.a||keys.ArrowLeft) strafe-=1; if(keys.d||keys.ArrowRight) strafe+=1;
    if(touchActive){ fwd=touchDy; strafe=touchDx; }
    const len=Math.hypot(fwd,strafe);
    if(len>0.2){
      const spd=P.spd*(P.sprint&&P.stam>3?1.55:1);
      fwd/=len; strafe/=len;
      // 基于角色朝向计算移动方向（P.dir由鼠标updateAim控制）
      const cosD=Math.cos(P.dir), sinD=Math.sin(P.dir);
      // 前进方向 = (sin(dir), cos(dir))，左移方向 = (cos(dir), -sin(dir))
      const mx=sinD*fwd+cosD*strafe;
      const mz=cosD*fwd-sinD*strafe;
      if(P.sprint&&P.stam>3) P.stam-=18*dt;
      if(P.grabT>0){ mx*=0.55; mz*=0.55; }
      P.x+=mx*spd*dt; P.z+=mz*spd*dt;
      P.moving=true;
      P.stepT-=dt;
      if(P.stepT<=0){ P.stepT=P.sprint?0.26:0.42; AU.step(); }
    } else { P.moving=false; }
  }
  resolveCollision(P,0.35);
  P.mesh.position.set(P.x,0,P.z);
  P.mesh.rotation.y=P.dir;

  // timers
  P.atkCd=Math.max(0,P.atkCd-dt);
  P.reloadT=Math.max(0,P.reloadT-dt);
  P.swingT=Math.max(0,P.swingT-dt);
  P.hurtT=Math.max(0,P.hurtT-dt);
  if(P.meleeHitT>0){ P.meleeHitT-=dt; if(P.meleeHitT<=0&&P.meleeHitW){ doMeleeDamage(P.meleeHitW); P.meleeHitW=null; } }
  playerAnim(dt);

  // loot pick
  for(let i=lootEnts.length-1;i>=0;i--){ const lo=lootEnts[i];
    if(Math.hypot(P.x-lo.x,P.z-lo.z)<1.4){
      if(addInv(lo.id,lo.qty)){ scene.remove(lo.mesh); lootEnts.splice(i,1); AU.pickup();
        P.crouchT=0.45; showMsg(itemName(lo.id)+' x'+lo.qty); }
    } }
  // safe house regen
  if(Math.hypot(P.x,P.z)<7){ P.hp=Math.min(P.maxHp||100,P.hp+0.8*dt); P.inf=Math.max(0,P.inf-0.35*dt); }
}

function playerAnim(dt){
  const pa=P.parts, b=pa.body;
  const sprint=P.sprint&&P.moving&&P.stam>3;
  const ph=G.time*(sprint?10.5:7);
  let lean=0, rollA=0, bobY=0, crouch=0;
  if(sprint) lean=0.22;
  if(P.hurtT>0) lean-=0.35*(P.hurtT/0.2);
  if(P.rollT>0) rollA=-(1-P.rollT/0.35)*Math.PI*2;
  if(P.moving&&P.rollT<=0) bobY=Math.abs(Math.sin(ph))*0.07;
  if(P.crouchT>0) crouch=0.22*Math.min(1,P.crouchT/0.45);
  b.rotation.x=lean+rollA;
  b.position.y=bobY-crouch;
  const w=WEAPONS[P.weapon];
  const swinging=P.swingT>0&&w&&w.melee;
  if(!swinging) b.rotation.y=lerp(b.rotation.y,0,dt*10);
  // legs
  if(P.rollT>0){ pa.lLeg.rotation.x=1.2; pa.rLeg.rotation.x=1.2; }
  else if(P.crouchT>0){ pa.lLeg.rotation.x=0.9; pa.rLeg.rotation.x=-0.5; }
  else if(P.moving){ pa.lLeg.rotation.x=Math.sin(ph)*0.75; pa.rLeg.rotation.x=-Math.sin(ph)*0.75; }
  else { pa.lLeg.rotation.x=lerp(pa.lLeg.rotation.x,0,dt*8); pa.rLeg.rotation.x=lerp(pa.rLeg.rotation.x,0,dt*8); }
  // arms
  const aimDir = P.dir;
  if(P.rollT>0){
    // 翻滚时双臂前伸
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,1.2,dt*15);
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,1.2,dt*15);
  }
  else if(swinging){ meleeAnim(w.anim); }
  else if(w&&!w.melee){
    // 持枪姿势：双臂前伸略向下，模拟双手握枪
    const rec=P.recoilT>0?0.4:0;
    const aimNoise=Math.sin(G.time*3)*0.02; // 微小晃动模拟呼吸
    if(P.reloadT>0){
      // 换弹：双手下沉+左右摆动
      pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,-0.4+Math.sin(G.time*10)*0.15,dt*12);
      pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,-0.5+Math.sin(G.time*10+0.5)*0.15,dt*12);
      pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,0.2,dt*10);
      pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,-0.2,dt*10);
    } else {
      // 持枪瞄准：右臂前伸略低，左臂托枪身
      pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,-0.9+rec+aimNoise,dt*18);
      pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,-0.75+rec*0.6+aimNoise,dt*18);
      pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,-0.12,dt*10);
      pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,0.18,dt*10);
    }
  }
  else if(P.moving){
    // 徒手移动：手臂自然摆动
    const swingAmt=P.sprint?0.7:0.45;
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,-Math.sin(ph)*swingAmt,dt*15);
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,Math.sin(ph)*swingAmt,dt*15);
    pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,0,dt*8);
    pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,0,dt*8);
  }
  else {
    // 站立：手臂自然下垂
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,-0.05,dt*8);
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,-0.05,dt*8);
    pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,0,dt*8);
    pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,0,dt*8);
  }
  // 装备切换动画：手臂快速下垂再抬起
  if(P.equipT>0){
    const f=P.equipT/0.25;
    const dropAmt=-1.2*f;
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,dropAmt,dt*20);
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,dropAmt,dt*20);
    P.equipT-=dt;
  }
  // 武器持握动画细节：持枪时双臂略微内收，提升观感
  if(!swinging&&P.rollT<=0){
    if(w&&!w.melee){
      pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,-0.15,dt*8);
      pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,0.15,dt*8);
      // 后坐力时身体微后仰
      if(P.recoilT>0){ b.rotation.x=lerp(b.rotation.x,lean-0.05,dt*12); }
    } else {
      pa.rArm.rotation.z=lerp(pa.rArm.rotation.z||0,0,dt*8);
      pa.lArm.rotation.z=lerp(pa.lArm.rotation.z||0,0,dt*8);
    }
  }
  // 站定时身体朝向瞄准方向微调
  if(!P.moving&&P.rollT<=0&&!swinging){
    b.rotation.y=lerp(b.rotation.y,0,dt*6);
  }
  // 头部微转动（看向瞄准方向）
  if(pa.head){
    if(!P.moving&&P.rollT<=0){
      pa.head.rotation.y=lerp(pa.head.rotation.y||0,Math.sin(P.dir)*0.15,dt*4);
    }
  }
  // 呼吸效果
  if(!P.moving&&P.rollT<=0&&!swinging){
    b.position.y=bobY-crouch+Math.sin(G.time*1.8)*0.015;
  }
}
function meleeAnim(kind){
  const f=1-P.swingT/P.swingMax, pa=P.parts, b=pa.body;
  const a=pa.rArm.rotation;
  if(kind==='sweep'){
    if(f<0.3){ const t=f/0.3; a.x=lerp(-0.3,-1.4,t*Math.PI/2); b.rotation.y=lerp(0,-0.5,t); pa.lArm.rotation.x=lerp(-0.3,-0.8,t); }
    else if(f<0.55){ const t=(f-0.3)/0.25; a.x=lerp(-1.4,-1.8,t*Math.PI/2); b.rotation.y=lerp(-0.5,0.8,t); pa.lArm.rotation.x=lerp(-0.8,-0.5,t); }
    else { const t=(f-0.55)/0.45; a.x=lerp(-1.8,-0.3,t*t); b.rotation.y=lerp(0.8,0,t); pa.lArm.rotation.x=lerp(-0.5,-0.2,t); }
    // 蓄力时身体微蹲（b.position.y 已由 playerAnim 设为 bobY-crouch）
    if(f<0.3){ b.position.y=b.position.y*0.7-0.05; }
  } else if(kind==='chop'){
    if(f<0.3){ const t=f/0.3; a.x=lerp(-0.3,-2.5,t*Math.PI/2); pa.lArm.rotation.x=lerp(-0.3,-0.7,t); }
    else if(f<0.5){ const t=(f-0.3)/0.2; a.x=lerp(-2.5,-2.7,t); pa.lArm.rotation.x=lerp(-0.7,-0.6,t); }
    else { const t=(f-0.5)/0.5; a.x=lerp(-2.7,-0.3,t*t); pa.lArm.rotation.x=lerp(-0.6,-0.2,t); }
  } else if(kind==='bigswing'){
    if(f<0.3){ const t=f/0.3; a.x=lerp(-0.3,-2.7,t*Math.PI/2); pa.lArm.rotation.x=lerp(-0.3,-2.7,t*Math.PI/2); b.rotation.y=lerp(0,-0.4,t); }
    else if(f<0.6){ const t=(f-0.3)/0.3; a.x=lerp(-2.7,-0.5,t*Math.PI/2); pa.lArm.rotation.x=lerp(-2.7,-0.5,t*Math.PI/2); b.rotation.y=lerp(-0.4,0.5,t); }
    else { const t=(f-0.6)/0.4; a.x=lerp(-0.5,-0.3,t*t); pa.lArm.rotation.x=lerp(-0.5,-0.3,t*t); b.rotation.y=lerp(0.5,0,t); }
  } else {
    if(f<0.3) { const t=f/0.3; a.x=lerp(-0.2,-0.5,t*Math.PI/2); }
    else if(f<0.55) { const t=(f-0.3)/0.25; a.x=lerp(-0.5,-1.6,t*Math.PI/2); }
    else { const t=(f-0.55)/0.45; a.x=lerp(-1.6,-0.2,t*t); }
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,-0.3,0.2);
  }
}

function damagePlayer(dmg,inf){
  if(dmg<=0&&inf<=0) return;
  if(P.invulnT>0||P.cloakT>0) return;
  if(G.state!=='play') return;
  // 护盾吸收伤害
  if(P.shield>0){
    const absorbed=Math.min(P.shield,dmg);
    P.shield-=absorbed; dmg-=absorbed;
    if(P.shield<=0) showMsg(T('护盾损坏！','Shield broken!'));
  }
  if(dmg<=0) return;
  P.hp-=dmg; P.hurtT=0.2; P.inf+=inf;
  $('hurtFx').style.opacity='1';
  setTimeout(()=>$('hurtFx').style.opacity='0',180);
  G.shake=Math.max(G.shake,0.18);
  AU.hurt();
}

/* ================= loot & inventory ================= */
function itemName(id){ return (ITEMS[id]&&ITEMS[id].n)?(LANG==='en'?ITEMS[id].n[1]:ITEMS[id].n[0]):id; }
function itemTip(id){
  const it=ITEMS[id]; if(!it) return '';
  if(it.tip) return LANG==='en'?it.tip[1]:it.tip[0];
  return '';
}
function addInv(id,q){
  const it=ITEMS[id]; if(!it) return false;
  const stack=it.stack||10; q=q||1;
  if(WEAPONS[id]&&WEAPONS[id].dur!==undefined&&WEAPONS[id].dur!==Infinity){
    // weapon: add with full durability, never stack
    for(let i=0;i<12;i++) if(!P.inv[i]){ P.inv[i]={id,q:1,dur:WEAPONS[id].dur}; refreshHud(); return true; }
    return false;
  }
  for(let i=0;i<12;i++){
    const s=P.inv[i];
    if(s&&s.id===id&&s.q<stack){ const take=Math.min(q,stack-s.q); s.q+=take; q-=take;
      if(q<=0){ refreshHud(); return true; } }
  }
  for(let i=0;i<12;i++) if(!P.inv[i]){ P.inv[i]={id,q}; refreshHud(); return true; }
  // 背包满：自动丢弃最低优先级的杂物腾出空间
  const priority={water:1,food:1,can:1,bottle:1,bandage:2,medkit:3,scrap:4,nails:4,wood:4,cloth:4,fuel:4};
  let lowestPri=99, lowestIdx=-1;
  for(let i=0;i<12;i++){ const s=P.inv[i]; if(!s) continue;
    const pri=priority[s.id]||5;
    if(pri<lowestPri){ lowestPri=pri; lowestIdx=i; } }
  if(lowestIdx>=0){ showMsg(T('丢弃 '+itemName(P.inv[lowestIdx].id)+' 腾出空间','Dropped '+itemName(P.inv[lowestIdx].id)+' to make room')); P.inv[lowestIdx]={id,q}; refreshHud(); return true; }
  return q<=0;
}
function invCount(id){ let n=0; for(const s of P.inv) if(s&&s.id===id) n+=s.q; return n; }
function removeItem(id,n){
  for(let i=0;i<12;i++){ const s=P.inv[i];
    if(s&&s.id===id){ const t=Math.min(n,s.q); s.q-=t; n-=t; if(s.q<=0) P.inv[i]=null; if(n<=0) break; } }
  refreshHud();
}
function hotIndex(id){ for(let i=0;i<4;i++) if(P.hot[i]&&P.hot[i].id===id) return i; return -1; }
function removeFromHot(ix,n){ const s=P.hot[ix]; if(!s) return; s.q-=n||1; if(s.q<=0) P.hot[ix]=null; refreshHud(); }

function dropLoot(x,z,id,q){
  const g=new THREE.Group();
  let m;
  if(WEAPONS[id]){
    if(id==='bat') m=bx(0.12,0.9,0.12,0x8A6A42,0,0.45,0,g);
    else if(id==='crowbar'||id==='machete') m=bx(0.09,0.7,0.09,0x5B5C57,0,0.35,0,g);
    else if(id==='axe'||id==='sledge'){ m=new THREE.Group(); m.add(bx(0.09,0.8,0.09,0x6B5B40,0,0.4,0)); m.add(bx(0.3,0.2,0.07,0x5B5C57,0.1,0.72,0)); g.add(m); }
    else m=bx(0.14,0.2,0.7,0x33322F,0,0.3,0,g);
  } else {
    m=bx(0.3,0.3,0.3,pick([0xD6C29A,0xB18A45,0x9A8B6A]),0,0.15,0,g);
  }
  g.position.set(x,0,z); g.traverse(o=>{if(o.isMesh)o.castShadow=true;});
  scene.add(g);
  lootEnts.push({mesh:g,x,z,id,qty:q||1,bob:R(0,6)});
}
function updateLootEnts(dt){
  for(const lo of lootEnts){
    lo.bob+=dt;
    lo.mesh.position.y=0.1+Math.abs(Math.sin(lo.bob*2))*0.2;
    lo.mesh.rotation.y+=dt*1.2;
  }
}
function spawnInitialLoot(){
  const L=[['can',3],['water',3],['bandage',3],['cloth',3],['wood',4],['nails',3],['fuel',2],['bottle',3],
    ['ammo9',6],['ammo9',6],['shell',4],['shell',4],['ammo762',5],['ammo762',5],
    ['bat',1],['crowbar',1],['molotov',1],['barricade',2],['scrap',2],
    ['axe',1],['medkit',1],['machete',1],['hotmeal',1],
    ['flamethrower',1],['rocket',1],['railgun',1],['shotgun2',1]];
  for(let i=0;i<lootSpots.length;i++){
    const s=lootSpots[i];
    // 外围loot点有更高概率和更好品质
    const dist=Math.hypot(s.x,s.z);
    const chance=dist>30?0.92:0.8;
    if(Math.random()<chance){
      const e=pick(L);
      dropLoot(s.x+R(-1.5,1.5),s.z+R(-1.5,1.5),e[0],e[1]?RI(1,e[1]):1);
    }
    // 额外弹药拾取点：每个loot点有概率再额外生成一份弹药
    if(Math.random()<0.35){
      const am=pick(['ammo9','shell','ammo762']);
      dropLoot(s.x+R(-1.5,1.5),s.z+R(-1.5,1.5),am,RI(4,10));
    }
    // 额外生存资源：增加末日生存感，每个loot点有概率生成生存材料
    if(Math.random()<0.45){
      const res=pick(['wood','cloth','nails','scrap','bottle','fuel']);
      dropLoot(s.x+R(-1.5,1.5),s.z+R(-1.5,1.5),res,RI(2,6));
    }
  }
}

/* ================= tooltips ================= */
let tipX=0, tipY=0;
$('scaler').addEventListener('mousemove',e=>{
  const r=$('scaler').getBoundingClientRect();
  // 使用scaler的实际显示尺寸计算tooltip位置
  tipX=e.clientX-r.left;
  tipY=e.clientY-r.top;
  const tip=$('tip');
  if(!tip.classList.contains('hidden')){
    // 智能定位：避免超出右边界和下边界
    const tw=tip.offsetWidth||200, th=tip.offsetHeight||60;
    let tx=tipX+16, ty=tipY+14;
    if(tx+tw>r.width) tx=tipX-tw-8;
    if(ty+th>r.height) ty=tipY-th-8;
    tip.style.left=Math.max(4,tx)+'px';
    tip.style.top=Math.max(4,ty)+'px';
  }
});
function showTip(id){
  const tip=$('tip');
  tip.innerHTML='<span class="tn">'+itemName(id)+'</span>'+itemTip(id);
  // 先显示再定位（确保offsetWidth正确）
  tip.classList.remove('hidden');
  const r=$('scaler').getBoundingClientRect();
  const tw=tip.offsetWidth||200, th=tip.offsetHeight||60;
  let tx=tipX+16, ty=tipY+14;
  if(tx+tw>r.width) tx=tipX-tw-8;
  if(ty+th>r.height) ty=tipY-th-8;
  tip.style.left=Math.max(4,tx)+'px';
  tip.style.top=Math.max(4,ty)+'px';
}
function hideTip(){ $('tip').classList.add('hidden'); }
function bindTip(el,id){ el.addEventListener('mouseenter',()=>showTip(id)); el.addEventListener('mouseleave',hideTip); }

/* ================= inventory & craft UI ================= */
let dragSrc=-1;
function openInv(){
  const g=$('invGrid'); g.innerHTML='';
  P.inv.forEach((s,i)=>{
    const d=document.createElement('div'); d.className='islot';
    if(s){
      d.innerHTML=icon(s.id)+'<span class="qty">'+s.q+'</span>'+'<span class="nm">'+itemName(s.id)+'</span><span class="drop">✕</span>';
      d.onclick=()=>useInv(i);
      // 右键丢弃
      d.oncontextmenu=(e)=>{ e.preventDefault(); dropInvItem(i); };
      // 拖拽交换
      d.draggable=true;
      d.ondragstart=(e)=>{ dragSrc=i; e.dataTransfer.effectAllowed='move'; };
      d.ondragover=(e)=>{ e.preventDefault(); };
      d.ondrop=(e)=>{ e.preventDefault(); if(dragSrc>=0&&dragSrc!==i){ swapInv(dragSrc,i); dragSrc=-1; } };
      // 丢弃按钮
      const dropBtn=d.querySelector('.drop');
      if(dropBtn){ dropBtn.onclick=(e)=>{ e.stopPropagation(); dropInvItem(i); }; }
      bindTip(d,s.id);
    } else { d.style.opacity='0.35'; }
    g.appendChild(d);
  });
  $('invHint').innerHTML=T(
    '左键使用/装备；右键或✕丢弃；拖拽交换位置',
    'Left-click to use/equip; right-click or ✕ to drop; drag to swap');
  $('invP').classList.remove('hidden');
  updatePanelsPos();
}
function swapInv(a,b){
  const tmp=P.inv[a]; P.inv[a]=P.inv[b]; P.inv[b]=tmp;
  openInv();
}
function dropInvItem(i){
  const s=P.inv[i]; if(!s) return;
  dropLoot(P.x+P.aimX*1.5, P.z+P.aimZ*1.5, s.id, s.q);
  showMsg(T('丢弃 '+itemName(s.id)+'×'+s.q,'Dropped '+itemName(s.id)+'×'+s.q));
  P.inv[i]=null;
  openInv(); refreshHud();
}
function useInv(i){
  const s=P.inv[i]; if(!s) return;
  const it=ITEMS[s.id];
  if(it.weapon){
    if(s.dur===undefined&&WEAPONS[s.id].dur!==undefined&&WEAPONS[s.id].dur!==Infinity) s.dur=WEAPONS[s.id].dur;
    // 武器只放入hot[0-2]，保留hot[3]给fists
    for(let h=0;h<3;h++){ if(!P.hot[h]){ P.hot[h]={id:s.id,q:1,dur:s.dur}; P.inv[i]=null; equipHot(h); openInv(); return; } }
    showMsg(T('快捷栏已满。','Hotbar full.')); return;
  }
  if(it.use==='food'){ P.hunger=clamp(P.hunger+it.v,0,100); if(it.hp) P.hp=clamp(P.hp+it.hp,0,100); AU.eat(); }
  else if(it.use==='thirst'){ P.thirst=clamp(P.thirst+it.v,0,100); AU.eat(); }
  else if(it.use==='heal'){ P.hp=clamp(P.hp+it.v,0,100); P.inf=clamp(P.inf-it.inf,0,100); AU.eat(); }
  else if(it.use==='molotov'||it.use==='build'||it.use==='build2'||it.use==='spikes'){
    // 道具也只放入hot[0-2]，保留hot[3]给fists
    for(let h=0;h<3;h++){ if(!P.hot[h]){ P.hot[h]={id:s.id,q:s.q}; P.inv[i]=null; equipHot(h); openInv(); return; } }
    showMsg(T('快捷栏已满。','Hotbar full.')); return;
  }
  else return;
  s.q--; if(s.q<=0) P.inv[i]=null;
  openInv(); refreshHud();
}
let craftCat='med';
function openCraft(){
  const tabs=$('craftTabs'); tabs.innerHTML='';
  for(const c of CRAFT_CATS){
    const b=document.createElement('div'); b.className='ctab'+(craftCat===c[0]?' sel':'');
    b.textContent=LANG==='en'?c[2]:c[1];
    b.onclick=()=>{ craftCat=c[0]; openCraft(); AU.ui(); };
    tabs.appendChild(b);
  }
  const list=$('craftList'); list.innerHTML='';
  const job=G.craftJob;
  for(const rc of RECIPES){
    if(rc.cat!==craftCat) continue;
    // 检查蓝图是否已解锁
    if(rc.bp && !(G.blueprints||[]).includes(rc.bp)){
      const row=document.createElement('div'); row.className='crow locked';
      row.innerHTML='<div class="cname">🔒 '+T('未解锁蓝图','Locked Blueprint')+'</div><div class="creq">'+T('需要发现蓝图','Need to find blueprint')+'</div>';
      list.appendChild(row);
      continue;
    }
    const row=document.createElement('div'); row.className='crow';
    const reqTxt=Object.entries(rc.req).map(([k,v])=>{
      const have=invCount(k);
      return '<span class="'+(have<v?'lack':'')+'">'+itemName(k)+'×'+v+'('+have+')</span>';
    }).join(' + ');
    const left=document.createElement('div');
    left.innerHTML='<div class="cname">'+icon(rc.out)+' '+itemName(rc.out)+(rc.qty>1?'×'+rc.qty:'')+'</div>'+
      '<div class="creq">'+reqTxt+'</div>';
    row.appendChild(left);
    if(job&&job.rc===rc){
      const pg=document.createElement('div'); pg.className='cprog';
      pg.innerHTML='<div class="cfill" style="width:'+(100*(1-job.left/job.total))+'%"></div><span>'+T('点击取消','Click to cancel')+'</span>';
      pg.onclick=()=>cancelCraft();
      row.appendChild(pg);
    } else {
      const can=Object.entries(rc.req).every(([k,v])=>invCount(k)>=v);
      const b=document.createElement('span'); b.className='btn'+(can&&!job?'':' dis');
      b.textContent=T('合成','Craft');
      if(can&&!job) b.onclick=()=>doCraft(rc);
      row.appendChild(b);
    }
    bindTip(row,rc.out);
    list.appendChild(row);
  }
  $('craftP').classList.remove('hidden');
  updatePanelsPos();
}
function doCraft(rc){
  for(const [k,v] of Object.entries(rc.req)) removeItem(k,v);
  G.craftJob={rc,left:rc.t,total:rc.t};
  AU.ui(); openCraft();
}
function cancelCraft(){
  const job=G.craftJob; if(!job) return;
  for(const [k,v] of Object.entries(job.rc.req)) addInv(k,v);
  G.craftJob=null; showMsg(T('已取消合成。','Crafting cancelled.'));
  if(!$('craftP').classList.contains('hidden')) openCraft();
}
function craftTick(dt){
  const job=G.craftJob; if(!job) return;
  job.left-=dt;
  if(job.left<=0){
    G.craftJob=null;
    addInv(job.rc.out,job.rc.qty);
    AU.craft(); showMsg(T('合成完成：','Crafted: ')+itemName(job.rc.out)+(job.rc.qty>1?'×'+job.rc.qty:''));
    if(!$('craftP').classList.contains('hidden')) openCraft();
  } else if(!$('craftP').classList.contains('hidden')){
    openCraft();
  }
}
function closePanels(){ $('invP').classList.add('hidden'); $('craftP').classList.add('hidden'); hideTip(); }
function updatePanelsPos(){}

/* ================= HUD ================= */
function refreshHud(){
  $('fHp').style.width=(P.hp/(P.maxHp||100)*100)+'%'; $('tHp').textContent='HP '+Math.ceil(P.hp)+(P.shield>0?' (+'+Math.ceil(P.shield)+')':'');
  $('fHu').style.width=P.hunger+'%'; $('tHu').textContent=T('饱食 ','Food ')+Math.ceil(P.hunger);
  $('fTh').style.width=P.thirst+'%'; $('tTh').textContent=T('饮水 ','Water ')+Math.ceil(P.thirst);
  $('fSt').style.width=P.stam+'%'; $('tSt').textContent=T('体力 ','Stam ')+Math.ceil(P.stam);
  $('fHp').parentElement.classList.toggle('warn',P.hp<25);
  $('fHu').parentElement.classList.toggle('warn',P.hunger<25);
  $('fTh').parentElement.classList.toggle('warn',P.thirst<25);
  $('fSt').parentElement.classList.toggle('warn',P.stam<25);
  $('infTxt').textContent=Math.round(P.inf)+'%';
  $('killTxt').textContent=T('击杀 ','Kills ')+G.kills;
  $('scoreTxt').textContent=T('得分 ','Score ')+G.score;
  $('comboTxt').textContent=G.combo>=3?('x'+G.combo+' COMBO'):'';
  const w=WEAPONS[P.weapon]||WEAPONS.fists;
  $('wpnName').textContent=LANG==='en'?w.n[1]:w.n[0];
  const s=P.hot[P.hsel];
  if(w.melee&&w.dur!==Infinity&&s){
    const max=w.dur, cur=(s.dur===undefined?max:s.dur);
    $('durTxt').textContent=T('耐久 ','Dur ')+Math.max(0,Math.round(cur/max*100))+'%';
  } else $('durTxt').textContent='';
  $('ammoTxt').textContent=w.melee?'':(P.mags[P.weapon]||0)+' / '+invCount(w.ammo);
  const rt=G.waveState==='rest'?T('下一波 ','Next wave ')+Math.ceil(G.restT)+'s':T('剩余 ','Left ')+Math.max(0,G.spawnQ-G.spawned+aliveZ());
  $('waveTxt').textContent=T('第 '+Math.max(1,G.wave)+' 波','Wave '+Math.max(1,G.wave))+' · '+rt;
  const night=nightFactor()>0.5;
  $('dayIco').innerHTML=night?icon('moon'):icon('sun');
  $('dayLbl').textContent=(G.bloodMoon&&night?T('血月 · 第 ','BLOOD MOON · Day '):T('第 ','Day '))+G.dayCount+T(' 天','');
  $('dayLbl').style.color=(G.bloodMoon&&night)?'#C05848':'';
  // boss bar
  const bw=$('bossWrap');

/* ================= day/night & blood moon ================= */
const skyDay=new THREE.Color(0xBFC7CE), skyNight=new THREE.Color(0x17202B);
const bloodCol=new THREE.Color(0x4A1F1C);
const sunDay=new THREE.Color(0xfff2dd), sunNight=new THREE.Color(0x8FA3B8);
const fogDay=new THREE.Color(0xBFC7CE), fogNight=new THREE.Color(0x121B26);
function nightFactor(){ const h=Math.sin(G.cycleT*Math.PI*2); return h>0?0:clamp(-h*1.6,0,1); }
function onNightStart(){
  if(G.dayCount%3===0){
    G.bloodMoon=true;
    showBanner(T('血月升起！尸潮汹涌！','BLOOD MOON! The horde stirs!'),'#C05848',2.4);
    AU.waveHorn();
    showMsg(T('血月之夜：尸潮更密、速度更快！','Blood moon: denser, faster horde!'));
  } else {
    showMsg(T('夜幕降临……它们更活跃了。','Night falls... they grow restless.'));
  }
}
function onDayStart(){
  G.bloodMoon=false;
  spawnSupply();
}
function updateDayNight(dt){
  G.cycleT+=dt/DAY_LEN;
  if(G.cycleT>=1){ G.cycleT-=1; G.dayCount++; }
  const night=nightFactor();
  if(!G.wasNight&&night>0.5){ G.wasNight=true; onNightStart(); }
  if(G.wasNight&&night<=0.4){ G.wasNight=false; onDayStart(); }
  const sunH=Math.sin(G.cycleT*Math.PI*2);
  const sunA=G.cycleT*Math.PI*2;
  sun.position.set(Math.cos(sunA)*60,Math.max(4,sunH*70),Math.sin(sunA)*30);
  sun.intensity=lerp(1.15,0.08,night);
  hemi.intensity=lerp(0.75,0.25,night);
  amb.intensity=lerp(0.12,0.05,night);
  const skyCur=skyDay.clone().lerp(skyNight,night);
  if(G.bloodMoon) skyCur.lerp(bloodCol,night*0.85);
  scene.background.copy(skyCur);
  scene.fog.color.copy(fogDay.clone().lerp(fogNight,night));
  if(G.bloodMoon) scene.fog.color.lerp(bloodCol,night*0.6);
  scene.fog.near=lerp(45,26,night);
  scene.fog.far=lerp(120,80,night);
  sun.color.copy(sunDay.clone().lerp(sunNight,night));
  for(const l of lamps){ l.li.intensity=night*1.5; l.head.material=mat(night>0.5?0xE8C98A:0xD6C29A); }
}

/* ================= supply drop ================= */
function spawnSupply(){
  if(G.supply){ scene.remove(G.supply.mesh); G.supply=null; }
  let x=0,z=0,ok=false;
  for(let t=0;t<10&&!ok;t++){
    x=R(-HALF+8,HALF-8); z=R(-HALF+8,HALF-8);
    if(Math.hypot(x,z)<12) continue;
    if(!blockedAt(x,z,1.6)) ok=true;
  }
  if(!ok) return;
  const g=new THREE.Group();
  bx(0.9,0.9,0.9,0xB18A45,0,0.45,0,g);
  bx(0.95,0.2,0.95,0x242321,0,0.5,0,g,false).castShadow=false;
  const beam=new THREE.Mesh(CYL,bmat(0xB18A45,0.28));
  beam.scale.set(0.6,26,0.6); beam.position.y=13; g.add(beam);
  g.position.set(x,0,z);
  g.traverse(o=>{if(o.isMesh&&o.material!==beam.material)o.castShadow=true;});
  scene.add(g);
  G.supply={mesh:g,x,z,beam};
  showMsg(T('补给空投已落地！查看小地图金点。','Supply drop landed! Check the gold dot.'));
  AU.supply();
}
function updateSupply(dt){
  const s=G.supply; if(!s) return;
  s.mesh.rotation.y+=dt*0.8;
  const d=Math.hypot(P.x-s.x,P.z-s.z);
  if(d<1.8){
    scene.remove(s.mesh); G.supply=null;
    AU.supply(); P.crouchT=0.45;
    addInv('medkit',1); addInv('bandage',2);
    addInv(pick(['ammo9','shell','ammo762']),RI(10,18));
    addInv(pick(['machete','sledge','smg','shotgun','rifle']),1);
    showMsg(T('获得空投物资：医疗包、弹药与武器！','Supply loot: medkit, ammo & a weapon!'));
  }
}

// joystick
(function(){
  const joy=$('joy'), knob=$('joyKnob');
  let jid=null;
  function setKnob(dx,dy){ knob.style.left=(38+dx*30)+'px'; knob.style.top=(38+dy*30)+'px'; }
  joy.addEventListener('touchstart',e=>{
    jid=e.changedTouches[0].identifier; e.preventDefault();
  },{passive:false});
  addEventListener('touchmove',e=>{
    if(jid===null) return;
    for(const t of e.changedTouches){
      if(t.identifier===jid){
        const r=joy.getBoundingClientRect();
        let dx=(t.clientX-(r.left+r.width/2))/(r.width/2);
        let dy=(t.clientY-(r.top+r.height/2))/(r.height/2);
        const l=Math.hypot(dx,dy); if(l>1){dx/=l;dy/=l;}
        touchDx=dx; touchDy=dy; touchActive=true;
        setKnob(dx,dy);
      }
    }
  },{passive:true});
  addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===jid){ jid=null; touchActive=false; touchDx=0; touchDy=0; setKnob(0,0); }
    }
  });
})();

function attackOnce(){
  if(G.state!=='play'||G.paused) return;
  if(!$('invP').classList.contains('hidden')||!$('craftP').classList.contains('hidden')) return;
  const w=WEAPONS[P.weapon];
  if(!w) return;
  if(P.weapon==='barricade'){ buildBarricade('barricade'); return; }
  if(P.weapon==='rbarricade'){ buildRBarricade(); return; }
  if(P.weapon==='spikes'){ placeSpikes(); return; }
  shoot();
}
function equipHot(i){
  const s=P.hot[i]; if(!s) { P.hsel=i; refreshHud(); return; }
  // 切换动画：短暂的下垂
  if(P.hsel!==i){ P.equipT=0.25; }
  P.hsel=i;
  const it=ITEMS[s.id];
  if(it.weapon){
    if(P.weapon!==s.id){ P.lastWpn=P.weapon; P.atkCd=0; P.reloadT=0; P.swingT=0; }
    P.weapon=s.id;
    P.meleeHitT=0; P.swingT=0;
    setWeaponMesh(); AU.ui();
  } else if(it.use==='molotov'){ P.weapon='molotov'; P.atkCd=0; P.reloadT=0; setWeaponMesh(); AU.ui(); }
  else if(it.use==='build'){ P.weapon='barricade'; P.atkCd=0; P.reloadT=0; setWeaponMesh(); AU.ui(); }
  else if(it.use==='build2'){ P.weapon='rbarricade'; P.atkCd=0; P.reloadT=0; setWeaponMesh(); AU.ui(); }
  else if(it.use==='spikes'){ P.weapon='spikes'; P.atkCd=0; P.reloadT=0; setWeaponMesh(); AU.ui(); }
  else if(it.use==='food'||it.use==='thirst'||it.use==='heal'){ useHotSlot(i); }
  refreshHud();
}
function quickSwap(){
  if(!P.lastWpn) { showMsg(T('没有可切换的武器。','No weapon to swap.')); return; }
  const idx=hotIndex(P.lastWpn);
  if(idx<0) { showMsg(T('没有可切换的武器。','No weapon to swap.')); return; }
  equipHot(idx); AU.ui();
}
function useHotSlot(i){
  const s=P.hot[i]; if(!s) return;
  const it=ITEMS[s.id];
  if(it.use==='food'){ P.hunger=clamp(P.hunger+it.v,0,100); if(it.hp) P.hp=clamp(P.hp+it.hp,0,100); AU.eat(); }
  else if(it.use==='thirst'){ P.thirst=clamp(P.thirst+it.v,0,100); AU.eat(); }
  else if(it.use==='heal'){ P.hp=clamp(P.hp+it.v,0,100); P.inf=clamp(P.inf-it.inf,0,100); AU.eat(); }
  else return;
  removeFromHot(i,1); refreshHud();
}
function useHotFood(){ useHotSlot(P.hsel); }
function quickBuild(){
  if(invCount('barricade')>0){ addInvHot('barricade',1); }
  else showMsg(T('背包里没有木栅栏。','No barricade in inventory.'));
}
function addInvHot(id,q){
  // 只放入hot[0-2]，保留hot[3]给fists
  for(let h=0;h<3;h++){ if(!P.hot[h]){ removeItem(id,q); P.hot[h]={id,q}; equipHot(h); return; } }

}

/* ================= camera & aim ================= */
const camTarget=new V3(0,0,0), camPos=new V3(0,40,0);
let camAngle=0.785; // 相机角度（弧度），默认45度
let camDist=18; // 相机距离
let camHeight=26; // 相机高度
function updateCamera(dt){
  camTarget.lerp(new V3(P.x,0,P.z),1-Math.pow(0.001,dt));
  // 使用可旋转的相机偏移
  const off=new V3(Math.sin(camAngle)*camDist, camHeight, Math.cos(camAngle)*camDist);
  camPos.copy(camTarget).add(off);
  if(G.shake>0){ G.shake-=dt*2; camPos.x+=R(-1,1)*G.shake; camPos.z+=R(-1,1)*G.shake; camPos.y+=R(-1,1)*G.shake*0.5; }
  camera.position.copy(camPos);
  camera.lookAt(camTarget.x,0,camTarget.z);
  sun.target.position.set(P.x,0,P.z);
  sun.position.set(P.x+Math.cos(G.cycleT*Math.PI*2)*60,Math.max(4,Math.sin(G.cycleT*Math.PI*2)*70),P.z+Math.sin(G.cycleT*Math.PI*2)*30);
}
const ray=new THREE.Raycaster(), planeY=new THREE.Plane(new V3(0,1,0),-1.0);
const ndc=new THREE.Vector2(), hitP=new V3();
function updateAim(){
  const cw=renderer.domElement.clientWidth||1280, ch=renderer.domElement.clientHeight||720;
  ndc.set(mouseX/cw*2-1,-(mouseY/ch)*2+1);
  ray.setFromCamera(ndc,camera);
  ray.ray.intersectPlane(planeY,hitP);
  const dx=hitP.x-P.x, dz=hitP.z-P.z, d=Math.hypot(dx,dz)||1;
  P.aimX=dx/d; P.aimZ=dz/d;
  if(!touchMode) P.dir=Math.atan2(dx,dz);
}
