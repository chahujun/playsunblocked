.crow .btn.dis{background:var(--iron);cursor:default;opacity:.6}

#subtitle{font-size:15px;color:var(--red);letter-spacing:3px;margin-bottom:16px}
.mrow{margin:10px 0}
#diffRow .btn{margin:0 5px;padding:5px 14px;font-size:14px}

 walker:  {hp:42, spd:1.7,dmg:9, scale:1.0,skin:0x7A8268,shirt:0x5E6353,pants:0x3E3E3A,n:['行尸','Walker']},

function makeZombieMesh(t){
  const c=ZT[t], s=c.scale, g=new THREE.Group();
  const legH=c.crawl?0.28:0.72;
  const torsoY=c.crawl?0.42:legH+0.36;
  const torso=bx(0.62*s,(c.crawl?0.5:0.72)*s,0.36*s,c.shirt,0,torsoY,c.crawl?0.1:0,g);
  if(c.crawl) torso.rotation.x=0.5;
  const head=bx(0.4*s,0.4*s,0.38*s,c.skin,0,c.crawl?0.62:legH+0.98*s,c.crawl?0.42:0,g);
  // eyes
  const e1=bx(0.07,0.05,0.03,0xB13A32,-0.09*s,(c.crawl?0.66:legH+1.02*s),(c.crawl?0.62:0.2),g,false);
  const e2=bx(0.07,0.05,0.03,0xB13A32,0.09*s,(c.crawl?0.66:legH+1.02*s),(c.crawl?0.62:0.2),g,false);
  e1.castShadow=false; e2.castShadow=false;
  const lArm=new THREE.Group(); lArm.position.set(-0.4*s,torsoY+0.25*s,c.crawl?0.15:0); g.add(lArm);
  bx(0.16*s,0.6*s,0.16*s,c.skin,0,-0.26*s,0,lArm);
  const rArm=new THREE.Group(); rArm.position.set(0.4*s,torsoY+0.25*s,c.crawl?0.15:0); g.add(rArm);
  bx(0.16*s,0.6*s,0.16*s,c.skin,0,-0.26*s,0,rArm);
  lArm.rotation.x=c.crawl?-0.4:-1.25; rArm.rotation.x=c.crawl?-0.5:-1.25;
  const lLeg=new THREE.Group(); lLeg.position.set(-0.16*s,c.crawl?0.3:legH,c.crawl?-0.15:0); g.add(lLeg);
  bx(0.2*s,legH*s,0.22*s,c.pants,0,-legH*s/2,0,lLeg);
  const rLeg=new THREE.Group(); rLeg.position.set(0.16*s,c.crawl?0.3:legH,c.crawl?-0.15:0); g.add(rLeg);
  bx(0.2*s,legH*s,0.22*s,c.pants,0,-legH*s/2,0,rLeg);
  if(c.armed){ const wp=bx(0.07,0.7,0.07,0x5B5C57,0,-0.5,-0.25,rArm); wp.rotation.x=0.4; }
  if(t==='tank'){ bx(0.7*s,0.2*s,0.4*s,c.skin,0,torsoY+0.3,0,g); }
  g.traverse(o=>{if(o.isMesh)o.castShadow=true;});

function spawnZombie(type,x,z){
  if(zombies.length>=MAX_Z) return null;
  const c=ZT[type], df=DIFF[G.diff];
  const mesh=makeZombieMesh(type);
  mesh.position.set(x,0,z);
  scene.add(mesh);
  const zb={ id:zid++, type, c, mesh,
    x, z, hp:c.hp*df.hp, maxhp:c.hp*df.hp,
    spd:c.spd*df.spd, dmg:c.dmg*df.dmg,
    state:'idle', dir:R(0,Math.PI*2), idleT:R(1,3), atkCd:0,
    flash:0, dead:0, deadT:0, ph:R(0,6), groanT:R(2,9), alertT:0,
    kbx:0, kbz:0, seen:false };
  zombies.push(zb);
  return zb;
}

function removeZombie(zb,idx){
  scene.remove(zb.mesh);
  zombies.splice(idx,1);
}

function killZombie(zb){
  if(zb.dead) return;
  zb.dead=1; zb.deadT=0;
  G.kills++;
  bloodBurst(zb.x,1.0,zb.z,10);
  if(zb.c.explode){
    AU.explode();
    bloodBurst(zb.x,1.2,zb.z,26,0x7A8A55);
    ringFlash(zb.x,zb.z,4.2);
    const dp=Math.hypot(P.x-zb.x,P.z-zb.z);
    if(dp<4.2){ damagePlayer(34*(1-dp/5.5),0); G.shake=Math.max(G.shake,0.5); }
    for(const o of zombies){ if(o!==zb&&!o.dead){
      const d=Math.hypot(o.x-zb.x,o.z-zb.z);
      if(d<4.2) hitZombie(o,55,zb.x,zb.z,0.5);
    }}
    for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
      if(Math.hypot(b.x-zb.x,b.z-zb.z)<4.2) damageBarricade(b,80,i); }
  }
  // drops
  const roll=Math.random();
  if(roll<0.30) dropLoot(zb.x,zb.z,pick(['can','water','bandage','cloth','wood']),1);
  else if(roll<0.45) dropLoot(zb.x,zb.z,pick(['ammo9','shell','ammo762']),RI(4,10));
  else if(zb.type==='survivor'&&Math.random()<0.5) dropLoot(zb.x,zb.z,pick(['crowbar','axe','pistol']),1);
  else if(zb.type==='tank') dropLoot(zb.x,zb.z,pick(['medkit','rifle','ammo762']),zb.type==='tank'?RI(2,6):1);
}

function hitZombie(zb,dmg,fx,fz,kb){
  if(zb.dead) return;
  zb.hp-=dmg; zb.flash=0.12;
  AU.hitF();
  bloodBurst(zb.x,1.0,zb.z,4);
  if(kb){ const d=Math.hypot(zb.x-fx,zb.z-fz)||1;
    const k=kb*(zb.type==='tank'?0.25:1);
    zb.kbx+=(zb.x-fx)/d*k; zb.kbz+=(zb.z-fz)/d*k; }
  if(zb.hp<=0) killZombie(zb);
}

function zombieAI(zb,dt,idx){
  const night=nightFactor();
  if(zb.dead){
    zb.deadT+=dt;
    zb.mesh.rotation.x=lerp(zb.mesh.rotation.x,-Math.PI/2,dt*8);
    zb.mesh.position.y=lerp(zb.mesh.position.y,0.15,dt*8);
    if(zb.deadT>1.4){ zb.mesh.position.y-=dt*0.6; }
    if(zb.deadT>2.2) removeZombie(zb,idx);
    return;
  }
  if(zb.flash>0){ zb.flash-=dt;
    zb.mesh.traverse(o=>{ if(o.isMesh){ if(!o.userData.om) o.userData.om=o.material;
      o.material=zb.flash>0?mat(0xC04038):o.userData.om; }});
  }
  // knockback decay
  zb.x+=zb.kbx*dt*8; zb.z+=zb.kbz*dt*8;
  zb.kbx*=Math.pow(0.001,dt); zb.kbz*=Math.pow(0.001,dt);

  const dx=P.x-zb.x, dz=P.z-zb.z;
  const dist=Math.hypot(dx,dz);
  const aggro=(zb.c.scream?16:12)*(night?1.5:1);
  let mvx=0,mvz=0,spd=zb.spd*(night?1.28:1);

  if(zb.state==='idle'){
    zb.idleT-=dt;
    if(zb.idleT<=0){ zb.dir=R(0,Math.PI*2); zb.idleT=R(1.5,4); }
    mvx=Math.sin(zb.dir)*0.4; mvz=Math.cos(zb.dir)*0.4;
    if(dist<aggro){ zb.state='chase';
      if(zb.c.scream&&zb.alertT<=0){ zb.alertT=6; AU.groan(2);
        for(const o of zombies){ if(!o.dead&&Math.hypot(o.x-zb.x,o.z-zb.z)<24) o.state='chase'; } }
    }
  } else {
    if(dist>aggro*2.6) zb.state='idle';
    const d=dist||1; mvx=dx/d; mvz=dz/d;
    zb.dir=Math.atan2(dx,dz);
    // attack
    const reach=(zb.c.crawl?1.1:1.35)*zb.c.scale;
    zb.atkCd-=dt;
    if(dist<reach&&zb.atkCd<=0){
      zb.atkCd=zb.type==='tank'?1.6:1.0;
      damagePlayer(zb.dmg, zb.type==='crawler'?0:RI(5,10));
      if(zb.c.grab){ P.grabT=1.4; showMsg(T('被爬行尸抓住了！','Grabbed by a crawler!')); }
      const pa=zb.mesh.userData.parts; pa.lArm.rotation.x=-2.2; pa.rArm.rotation.x=-2.2;
    }
  }
  if(zb.alertT>0) zb.alertT-=dt;
  if(P.grabT>0&&zb.c.grab) spd*=1.1;
  // move then resolve collision
  zb.x+=mvx*spd*dt; zb.z+=mvz*spd*dt;
  resolveCollision(zb,0.42*zb.c.scale);
  if(zb.state==='chase'){
    // attack barricade if one is in reach toward player
    for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
      if(Math.abs(zb.x-b.x)<b.hw+0.8&&Math.abs(zb.z-b.z)<b.hd+0.8){
        if(zb.atkCd<=0){ zb.atkCd=1.1; damageBarricade(b,zb.dmg*1.4,i); AU.build(); }
        break; }
    }
  }
  // separation
  for(const o of zombies){ if(o===zb||o.dead) continue;
    const sx=zb.x-o.x, sz=zb.z-o.z, sd=Math.hypot(sx,sz);
    if(sd<0.8&&sd>0.001){ zb.x+=sx/sd*dt*1.2; zb.z+=sz/sd*dt*1.2; } }

  zb.mesh.position.set(zb.x,0,zb.z);
  zb.mesh.rotation.y=zb.dir;
  // walk anim
  zb.ph+=dt*(2+spd*2.2);
  const pa=zb.mesh.userData.parts, sw=Math.sin(zb.ph)*0.5;
  if(!zb.c.crawl){ pa.lLeg.rotation.x=sw; pa.rLeg.rotation.x=-sw; }
  if(zb.atkCd<0.6){ pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,zb.c.crawl?-0.4:-1.25,dt*6);
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,zb.c.crawl?-0.5:-1.25,dt*6); }
  // groans
  zb.groanT-=dt;
  if(zb.groanT<=0){ zb.groanT=R(4,11); if(dist<26) AU.groan(dist); }
}

/* ================= waves ================= */
function waveTypes(n){
  const t=['walker','walker','walker'];
  if(n>=2) t.push('runner','runner');
  if(n>=3) t.push('crawler');
  if(n>=4) t.push('screamer');
  if(n>=5) t.push('bloater','bloater');
  if(n>=6) t.push('survivor','survivor');
  if(n>=7) t.push('tank');
  if(n>=9) t.push('tank','runner','screamer');
  return t;
}
function startWave(n){
  G.wave=n; G.waveState='wave'; G.spawned=0;
  G.spawnQ=Math.round((4+n*2.2)*DIFF[G.diff].count);
  G.spawnTick=0.5;
  AU.waveHorn();
  showMsg(T('第 '+n+' 波尸潮来袭！','Wave '+n+' incoming!'));
}
function updateWaves(dt){
  if(G.waveState==='wave'){
    G.spawnTick-=dt;
    if(G.spawnTick<=0&&G.spawned<G.spawnQ&&aliveZ()<MAX_Z){
      G.spawnTick=R(0.7,1.4);
      const batch=Math.min(RI(1,2),G.spawnQ-G.spawned);
      for(let i=0;i<batch;i++){
        const a=R(0,Math.PI*2), r=R(34,42);
        const x=clamp(Math.cos(a)*r,-HALF+2,HALF-2), z=clamp(Math.sin(a)*r,-HALF+2,HALF-2);
        if(spawnZombie(pick(waveTypes(G.wave)),x,z)) G.spawned++;
      }
    }
    if(G.spawned>=G.spawnQ&&aliveZ()===0){
      G.waveState='rest'; G.restT=REST_T;
      showMsg(T('尸潮已清除。休整 30 秒。','Wave cleared. 30s rest.'));
      saveGame();
    }
  } else {
    G.restT-=dt;
    if(G.restT<=0) startWave(G.wave+1);
  }
}
function aliveZ(){ let n=0; for(const z of zombies) if(!z.dead) n++; return n; }
/* ================= particles / effects ================= */
const particles=[];
function bloodBurst(x,y,z,n,col){
  const c=col||0xA4382E;
  for(let i=0;i<n;i++){
    const s=R(0.05,0.12), m=new THREE.Mesh(BOX,mat(c));
    m.scale.set(s,s,s); m.position.set(x,y,z); scene.add(m);
    const vx=(Math.random()-0.5)*R(2,6), vy=R(1,5), vz=(Math.random()-0.5)*R(2,6);
    particles.push({m,vx,vy,vz,life:R(0.4,0.9),gr:12});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt;
    p.m.position.x+=p.vx*dt; p.m.position.y+=p.vy*dt; p.m.position.z+=p.vz*dt;
    p.vy-=p.gr*dt;
    if(p.m.position.y<0.03){ p.m.position.y=0.03; p.vy*=-0.3; p.vx*=0.7; p.vz*=0.7; }
    if(p.life<=0){ scene.remove(p.m); particles.splice(i,1); }
  }
}
const flashes=[];
function ringFlash(x,z,r){
  const geo=new THREE.RingGeometry(r-0.2,r,30);
  const m=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0xC04038,transparent:true,opacity:0.6,side:THREE.DoubleSide}));
  m.rotation.x=-Math.PI/2; m.position.set(x,0.15,z); scene.add(m);
  flashes.push({m,life:0.3});
}
function updateFlashes(dt){
  for(let i=flashes.length-1;i>=0;i--){
    const f=flashes[i]; f.life-=dt;
    f.m.scale.setScalar(1+f.life*3); f.m.material.opacity=f.life*1.8;
    if(f.life<=0){ scene.remove(f.m); flashes.splice(i,1); }
  }
}

/* ================= collision / movement ================= */
function resolveCollision(ent,rad){
  const mapLimit=HALF-1.0;
  ent.x=clamp(ent.x,-mapLimit,mapLimit); ent.z=clamp(ent.z,-mapLimit,mapLimit);
  for(const o of obstacles){ const dx=Math.abs(ent.x-o.x)-o.hw, dz=Math.abs(ent.z-o.z)-o.hd;
    if(dx<rad&&dz<rad){ if(dx<dz){ ent.x=ent.x>o.x?o.x+o.hw+rad:o.x-o.hw-rad; }
      else { ent.z=ent.z>o.z?o.z+o.hd+rad:o.z-o.hd-rad; } } }
  for(const o of circles){ const dx=ent.x-o.x, dz=ent.z-o.z, d=Math.hypot(dx,dz);
    if(d<rad+o.r&&d>0.001){ const p=(rad+o.r)/d; ent.x=o.x+dx*p; ent.z=o.z+dz*p; } }
  for(const b of barricades){ const dx=Math.abs(ent.x-b.x)-b.hw, dz=Math.abs(ent.z-b.z)-b.hd;
    if(dx<rad&&dz<rad){ if(dx<dz){ ent.x=ent.x>b.x?b.x+b.hw+rad:b.x-b.hw-rad; }
      else { ent.z=ent.z>b.z?b.z+b.hd+rad:b.z-b.hd-rad; } } }
}

/* ================= player update ================= */
function updatePlayer(dt){
  if(P.grabT>0){ P.grabT-=dt; }
  const df=DIFF[G.diff];
  const drain=df.drain;
  P.hunger-=0.018*dt*drain; P.thirst-=0.024*dt*drain;
  if(P.hunger<15||P.thirst<15) P.hp-=0.25*dt;
  if(P.inf>=100) P.hp-=0.6*dt;
  P.hp=clamp(P.hp,0,100); P.hunger=clamp(P.hunger,0,100); P.thirst=clamp(P.thirst,0,100);
  P.stam+=0.9*dt; P.stam=clamp(P.stam,0,100);
  P.inf=clamp(P.inf,0,100);

  if(P.hp<=0){ dieGame(); return; }

  let ix=0, iz=0;
  if(keys.a||keys.ArrowLeft) ix-=1; if(keys.d||keys.ArrowRight) ix+=1;
  if(keys.w||keys.ArrowUp) iz-=1; if(keys.s||keys.ArrowDown) iz+=1;
  if(touchActive){ ix=touchDx; iz=touchDy; }
  const len=Math.hypot(ix,iz);
  if(len>0.2){
    const spd=P.spd*(P.sprint&&P.stam>3?1.55:1);
    ix/=len; iz/=len;
    if(P.sprint&&P.stam>3) P.stam-=18*dt;
    if(P.grabT>0){ ix*=0.55; iz*=0.55; }
    P.x+=ix*spd*dt; P.z+=iz*spd*dt;
    P.moving=true;
    P.dir=Math.atan2(ix,iz);
    P.stepT-=dt;
    if(P.stepT<=0){ P.stepT=P.sprint?0.26:0.42; AU.step(); }
  } else { P.moving=false; }
  resolveCollision(P,0.35);
  P.mesh.position.set(P.x,0,P.z);
  P.mesh.rotation.y=P.dir;

  // anim
  P.atkCd=Math.max(0,P.atkCd-dt);
  P.reloadT=Math.max(0,P.reloadT-dt);
  P.swingT=Math.max(0,P.swingT-dt);
  P.hurtT=Math.max(0,P.hurtT-dt);
  const ph=G.time*6;
  const pa=P.parts;
  if(P.moving){ pa.lLeg.rotation.x=Math.sin(ph)*0.7; pa.rLeg.rotation.x=-Math.sin(ph)*0.7; }
  else { pa.lLeg.rotation.x=lerp(pa.lLeg.rotation.x,0,dt*8); pa.rLeg.rotation.x=lerp(pa.rLeg.rotation.x,0,dt*8); }
  if(P.swingT>0){ const s=P.swingT;
    pa.rArm.rotation.x=-2.0+s*2.0; pa.lArm.rotation.x=s*0.6;
  } else {
    const aimX=Math.sin(P.dir)*0.35, aimZ=Math.cos(P.dir)*0.35;
    pa.rArm.rotation.x=lerp(pa.rArm.rotation.x,-1.25,dt*8);
    pa.lArm.rotation.x=lerp(pa.lArm.rotation.x,-1.25,dt*8);
  }

  // loot pick
  for(let i=lootEnts.length-1;i>=0;i--){ const lo=lootEnts[i];
    if(Math.hypot(P.x-lo.x,P.z-lo.z)<1.4){
      if(addInv(lo.id,lo.qty)){ scene.remove(lo.mesh); lootEnts.splice(i,1); AU.pickup(); showMsg(itemName(lo.id)+' x'+lo.qty); }
    } }
  // safe house regen
  if(Math.hypot(P.x,P.z)<7){ P.hp=Math.min(100,P.hp+0.8*dt); P.inf=Math.max(0,P.inf-0.35*dt); }
}

function damagePlayer(dmg,inf){
  if(dmg<=0&&inf<=0) return;
  P.hp-=dmg; P.hurtT=0.2; P.inf+=inf;
  $('hurtFx').style.opacity='1';
  setTimeout(()=>$('hurtFx').style.opacity='0',180);
  G.shake=Math.max(G.shake,0.18);
  AU.hurt();
}

/* ================= shooting / combat ================= */
const bullets=[];
const BMAX=36; // pool limit for bullet meshes
let bPool=[];
function shoot(){
  const wk=P.weapon; if(!WEAPONS[wk]) return;
  const w=WEAPONS[wk];
  if(P.atkCd>0) return;
  if(w.melee){ meleeAtk(wk,w); return; }
  if(wk==='molotov'){ throwMolotov(); return; }
  if(P.reloadT>0) return;
  if(P.mags[wk]<=0){ reload(); return; }
  P.mags[wk]--;
  P.atkCd=w.rate;
  AU.shoot(wk);
  const pellets=w.pellets||1;
  for(let p=0;p<pellets;p++){
    const spread=w.spread*(P.moving?2.2:1);
    const sx=(Math.random()-0.5)*spread, sz=(Math.random()-0.5)*spread;
    const dir=new V3(P.aimX,0,P.aimZ).normalize().add(new V3(sx,0,sz)).normalize();
    const range=w.range;
    fireBullet(P.x,1.4,P.z,dir.x,dir.z,range,w.dmg);
  }
  // recoil
  P.kbx=-P.aimX*0.15; P.kbz=-P.aimZ*0.15;
  if(P.mags[wk]<=0) reload();
}
function meleeAtk(wk,w){
  P.atkCd=w.rate;
  P.swingT=0.4;
  AU.swing();
  // arc hit
  for(const z of zombies){
    if(z.dead) continue;
    const dx=z.x-P.x, dz=z.z-P.z;
    const d=Math.hypot(dx,dz);
    if(d<w.range){
      const ang=Math.acos(clamp((dx*P.aimX+dz*P.aimZ)/(d||1),-1,1));
      if(ang<w.arc/2) hitZombie(z,w.dmg,P.x,P.z,0.6);
    }
  }
  // break barricade near melee
  for(let i=barricades.length-1;i>=0;i--){ const b=barricades[i];
    const d=Math.hypot(b.x-P.x,b.z-P.z);
    if(d<w.range) damageBarricade(b,w.dmg*0.6,i); }
}
function fireBullet(x,y,z,vx,vz,range,dmg){
  let m=bPool.pop();
  if(!m){ m=new THREE.Mesh(BOX,mat(0xD6C29A)); m.scale.set(0.06,0.06,0.18); scene.add(m); }
  m.visible=true; m.position.set(x,y,z);
  m.rotation.y=Math.atan2(vx,vz);
  bullets.push({m,x,y,z,vx,vz,rng:range,dmg,dist:0});
}
function updateBullets(dt){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; const spd=28;
    const dx=b.vx*spd*dt, dz=b.vz*spd*dt; b.dist+=Math.hypot(dx,dz);
    b.x+=dx; b.z+=dz;
    b.m.position.set(b.x,b.y,b.z);
    // out of range -> remove
    if(b.dist>b.rng){ killBullet(i); continue; }
    // hit zombies
    let hit=false;
    for(const z of zombies){ if(z.dead) continue;
      if(Math.abs(b.x-z.x)<0.5&&Math.abs(b.z-z.z)<0.5){
        hitZombie(z,b.dmg,b.x,b.z,0.25); hit=true; break;
      }
    }
    // hit barricade
    if(!hit){ for(let bi=barricades.length-1;bi>=0;bi--){
      const bb=barricades[bi]; if(Math.abs(b.x-bb.x)<bb.hw&&Math.abs(b.z-bb.z)<bb.hd){
        damageBarricade(bb,b.dmg*0.6,bi); hit=true; break; } } }
    if(hit) killBullet(i);
  }
}
function killBullet(i){
  const b=bullets[i]; b.m.visible=false; bPool.push(b.m); bullets.splice(i,1);
}
function reload(){
  const w=WEAPONS[P.weapon]; if(!w||w.melee||P.reloadT>0) return;
  const invQty=invCount(w.ammo);
  const need=w.mag-P.mags[P.weapon];
  if(need<=0||invQty<=0) return;
  const take=Math.min(need,invQty);
  removeItem(w.ammo,take); P.mags[P.weapon]+=take;
  P.reloadT=w.reload; P.reloadMax=w.reload;
  AU.reloadS();
}

function throwMolotov(){
  const ix=hotIndex('molotov'); if(ix<0) return;
  removeFromHot(ix,1);
  AU.shoot('pistol');
  const dir=new V3(P.aimX,0,P.aimZ).normalize();
  for(let i=0;i<16;i++){
    const a=R(0,Math.PI*2), r=R(0,3.5);
    fireBullet(P.x,1.5,P.z,Math.cos(a)*r*0.3,Math.sin(a)*r*0.3,6,15);
  }
  ringFlash(P.x+dir.x*5,P.z+dir.z*5,3.5);
  for(const z of zombies){ if(z.dead) continue;
    if(Math.hypot(z.x-(P.x+dir.x*5),z.z-(P.z+dir.z*5))<3.5) hitZombie(z,35,z.x,z.z,0.3); }
}

/* ================= building ================= */
function buildBarricade(id){

  for(const o of obstacles){ if(Math.abs(bx0-o.x)<o.hw+w/2+0.1&&Math.abs(bz0-o.z)<o.hd+d/2+0.1) return; }

  const m=bx(w,1.5,d,0x8A6A42,bx0,0.75,bz0); m.castShadow=true;

}

function buildRBarricade(){

  const m=bx(w,2.0,d,0x6B5B40,bx0,1.0,bz0); m.castShadow=true;

function damageBarricade(b,dmg,idx){

/* ================= loot / inventory ================= */
function dropLoot(x,z,id,qty){
  const m=new THREE.Mesh(BOX,mat(0xE5DDC8)); m.scale.set(0.32,0.2,0.32);
  m.position.set(x,0.14,z); scene.add(m);
  const name=itemName(id);
  const lo={m,x,z,id,qty,bob:R(0,10)};
  lootEnts.push(lo);
}
function itemName(id){ const it=ITEMS[id]; return it?T(it.n[0],it.n[1]):id; }
function invCount(id){
  let n=0; for(const s of P.hot) if(s&&s.id===id) n+=s.q;
  for(const s of P.inv) if(s&&s.id===id) n+=s.q;
  return n;
}
function addInv(id,qty){
  const it=ITEMS[id]; if(!it) return false;
  const stack=it.stack||10, start=qty;
  // hotbar first
  for(let i=0;i<4;i++) if(P.hot[i]&&P.hot[i].id===id&&P.hot[i].q<stack){
    const a=Math.min(stack-P.hot[i].q,qty); P.hot[i].q+=a; qty-=a; if(qty<=0) return true; }
  for(let i=0;i<4;i++) if(!P.hot[i]){ P.hot[i]={id,q:Math.min(stack,qty)}; qty-=P.hot[i].q; if(qty<=0) return true; }
  for(let i=0;i<P.inv.length;i++) if(P.inv[i]&&P.inv[i].id===id&&P.inv[i].q<stack){
    const a=Math.min(stack-P.inv[i].q,qty); P.inv[i].q+=a; qty-=a; if(qty<=0) return true; }
  for(let i=0;i<P.inv.length;i++) if(!P.inv[i]){ P.inv[i]={id,q:Math.min(stack,qty)}; qty-=P.inv[i].q; if(qty<=0) return true; }
  return qty<start; // true if anything was added
}
function removeItem(id,qty){
  for(let i=0;i<P.hot.length;i++) if(P.hot[i]&&P.hot[i].id===id){ const a=Math.min(P.hot[i].q,qty); P.hot[i].q-=a; qty-=a; if(P.hot[i].q<=0) P.hot[i]=null; if(qty<=0) return; }
  for(let i=0;i<P.inv.length;i++) if(P.inv[i]&&P.inv[i].id===id){ const a=Math.min(P.inv[i].q,qty); P.inv[i].q-=a; qty-=a; if(P.inv[i].q<=0) P.inv[i]=null; if(qty<=0) return; }
}
function hotIndex(id){ for(let i=0;i<4;i++) if(P.hot[i]&&P.hot[i].id===id) return i; return -1; }
function removeFromHot(idx,qty){
  if(!P.hot[idx]) return;
  P.hot[idx].q-=qty; if(P.hot[idx].q<=0) P.hot[idx]=null;
}
function equipHot(i){
  P.hsel=i;
  if(P.hot[i]){ const id=P.hot[i].id;
    if(ITEMS[id]&&ITEMS[id].weapon) P.weapon=id;
    else if(WEAPONS[id]) P.weapon=id;
  }
  setWeaponMesh();
  refreshHud();
}
function useItem(i){
  const s=P.hot[i]; if(!s) return; const it=ITEMS[s.id]; if(!it) return;
  if(it.use==='food'){ P.hunger=Math.min(100,P.hunger+it.v); removeFromHot(i,1); AU.eat(); showMsg(T('吃了','Ate')+' '+it.n[0]); }
  else if(it.use==='thirst'){ P.thirst=Math.min(100,P.thirst+it.v); removeFromHot(i,1); AU.eat(); showMsg(T('喝了','Drank')+' '+it.n[0]); }
  else if(it.use==='heal'){ P.hp=Math.min(100,P.hp+it.v); P.inf=Math.max(0,P.inf-(it.inf||0)); removeFromHot(i,1); AU.eat(); showMsg(T('使用了','Used')+' '+it.n[0]); }
  else if(it.use==='build'){ buildBarricade(s.id); }
  else if(it.use==='build2'){ buildRBarricade(); }
  else if(it.use==='molotov'){ throwMolotov(); }
  else if(it.weapon){ equipHot(i); return; }
  refreshHud();
}
function useInv(i){
  const s=P.inv[i]; if(!s) return; const it=ITEMS[s.id]; if(!it) return;
  if(it.use==='food'){ P.hunger=Math.min(100,P.hunger+it.v); P.inv[i].q--; if(P.inv[i].q<=0) P.inv[i]=null; AU.eat(); }
  else if(it.use==='thirst'){ P.thirst=Math.min(100,P.thirst+it.v); P.inv[i].q--; if(P.inv[i].q<=0) P.inv[i]=null; AU.eat(); }
  else if(it.use==='heal'){ P.hp=Math.min(100,P.hp+it.v); P.inf=Math.max(0,P.inf-(it.inf||0)); P.inv[i].q--; if(P.inv[i].q<=0) P.inv[i]=null; AU.eat(); }
  else if(it.weapon){ if(!P.hot.some(h=>h&&h.id===s.id)){ for(let j=0;j<4;j++) if(!P.hot[j]){ P.hot[j]={id:s.id,q:1}; P.inv[i].q--; if(P.inv[i].q<=0) P.inv[i]=null; break; } }
  } else if(it.use==='build'||it.use==='build2'){ /* move to hotbar first */ for(let j=0;j<4;j++) if(!P.hot[j]){ P.hot[j]={id:s.id,q:1}; P.inv[i].q--; if(P.inv[i].q<=0) P.inv[i]=null; break; } }
  openInv();
  refreshHud();
}

const keys={};
let mouseDown=false, mouseX=640, mouseY=300;
let touchMode=('ontouchstart' in window);
let touchActive=false, touchDx=0, touchDy=0, atkHeld=false;

window.addEventListener('keydown',e=>{

const cvs=renderer.domElement;
function mapMouse(e){
  const r=cvs.getBoundingClientRect();
  mouseX=(e.clientX-r.left)/r.width*1280;
  mouseY=(e.clientY-r.top)/r.height*720;
}
cvs.addEventListener('mousemove',mapMouse);
cvs.addEventListener('mousedown',e=>{
  AU.init();
  if(e.button!==0) return;
  mapMouse(e);
  if(G.state!=='play') return;
  if(!$('invP').classList.contains('hidden')||!$('craftP').classList.contains('hidden')) return;
  updateAim(); mouseDown=true; shoot();
});
window.addEventListener('mouseup',()=>{ mouseDown=false; });
cvs.addEventListener('contextmenu',e=>e.preventDefault());

const ray=new THREE.Raycaster();
const planeY=new THREE.Plane(new V3(0,1,0),-1.0);
const ndc=new THREE.Vector2();
function updateAim(){
  if(touchMode) return;
  ndc.set((mouseX/1280)*2-1,-(mouseY/720)*2+1);
  ray.setFromCamera(ndc,camera);
  const pt=new V3();
  if(ray.ray.intersectPlane(planeY,pt)){
    const dx=pt.x-P.x, dz=pt.z-P.z, d=Math.hypot(dx,dz);
    if(d>0.3){ P.aimX=dx/d; P.aimZ=dz/d; P.dir=Math.atan2(P.aimX,P.aimZ); }
  }
}
function touchAim(){
  let best=null, bd=15;
  for(const z of zombies){ if(z.dead) continue;
    const d=Math.hypot(z.x-P.x,z.z-P.z); if(d<bd){bd=d;best=z;} }
  if(best){ const dx=best.x-P.x, dz=best.z-P.z, d=Math.hypot(dx,dz)||1;
    P.aimX=dx/d; P.aimZ=dz/d; P.dir=Math.atan2(P.aimX,P.aimZ); }
  else if(touchActive){ const d=Math.hypot(touchDx,touchDy);
    if(d>0.2){ P.aimX=touchDx/d; P.aimZ=touchDy/d; P.dir=Math.atan2(P.aimX,P.aimZ); } }
}

/* touch joystick */
(function(){
  const joy=$('joy'), knob=$('joyKnob'), atk=$('atkBtn');
  if(touchMode) $('touchUI').classList.remove('hidden');
  let jid=null;
  function setKnob(dx,dy){ knob.style.left=(38+dx*38)+'px'; knob.style.top=(38+dy*38)+'px'; }
  joy.addEventListener('touchstart',e=>{ e.preventDefault(); AU.init();
    jid=e.changedTouches[0].identifier; },{passive:false});
  window.addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){ if(t.identifier===jid){
      const r=joy.getBoundingClientRect();
      let dx=(t.clientX-(r.left+r.width/2))/(r.width/2);
      let dy=(t.clientY-(r.top+r.height/2))/(r.height/2);
      const d=Math.hypot(dx,dy); if(d>1){dx/=d;dy/=d;}
      touchDx=dx; touchDy=dy; touchActive=true; setKnob(dx,dy);
    } } },{passive:false});
  window.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){ if(t.identifier===jid){
      jid=null; touchActive=false; touchDx=0; touchDy=0; setKnob(0,0); } } });
  atk.addEventListener('touchstart',e=>{ e.preventDefault(); AU.init();
    atkHeld=true; if(G.state==='play'){ touchAim(); shoot(); } },{passive:false});
  atk.addEventListener('touchend',()=>{ atkHeld=false; });
})();

const CAM_OFF=new V3(10.5,16.5,10.5);
function updateCamera(dt){
  if(G.state==='menu'){
    const a=G.time*0.12;
    camera.position.set(Math.cos(a)*26,20,Math.sin(a)*26);
    camera.lookAt(0,1,0);
    return;
  }
  camera.position.x=lerp(camera.position.x,P.x+CAM_OFF.x,dt*5);
  camera.position.y=lerp(camera.position.y,CAM_OFF.y,dt*5);
  camera.position.z=lerp(camera.position.z,P.z+CAM_OFF.z,dt*5);
  let sx=0,sz=0;
  if(G.shake>0){ G.shake-=dt; sx=R(-1,1)*G.shake*0.5; sz=R(-1,1)*G.shake*0.5; }
  camera.lookAt(P.x+sx,0.9,P.z+sz);
}

/* ================= minimap ================= */
const mmc=$('mm').getContext('2d');
function drawMinimap(){
  const S=140, sc=S/MAP, c=S/2;
  mmc.fillStyle='#242321'; mmc.fillRect(0,0,S,S);
  // roads
  mmc.fillStyle='#3B3B38';
  mmc.fillRect(c-20*sc-2.75*sc,0,5.5*sc,S); mmc.fillRect(c+20*sc-2.75*sc,0,5.5*sc,S);
  mmc.fillRect(0,c-20*sc-2.75*sc,S,5.5*sc); mmc.fillRect(0,c+20*sc-2.75*sc,S,5.5*sc);
  // buildings
  mmc.fillStyle='#5B5C57';
  for(const o of obstacles){ if(o.hw<2||o.hd<2) continue;
    mmc.fillRect(c+(o.x-o.hw)*sc,c+(o.z-o.hd)*sc,o.hw*2*sc,o.hd*2*sc); }
  // trees
  mmc.fillStyle='#30483A';
  for(const t of circles){ mmc.beginPath(); mmc.arc(c+t.x*sc,c+t.z*sc,2,0,7); mmc.fill(); }
  // safehouse
  mmc.strokeStyle='#B18A45'; mmc.lineWidth=1.5;
  mmc.beginPath(); mmc.arc(c,c,7.7*sc,0,7); mmc.stroke();
  // barricades
  mmc.fillStyle='#B18A45';
  for(const b of barricades) mmc.fillRect(c+b.x*sc-2,c+b.z*sc-2,4,4);
  // loot
  mmc.fillStyle='#7A9A6A';
  for(const l of lootEnts) mmc.fillRect(c+l.x*sc-1.5,c+l.z*sc-1.5,3,3);
  // zombies
  for(const z of zombies){ if(z.dead) continue;
    mmc.fillStyle=z.type==='tank'?'#A42820':'#743C38';
    mmc.beginPath(); mmc.arc(c+z.x*sc,c+z.z*sc,z.type==='tank'?3:2,0,7); mmc.fill(); }
  // player
  mmc.save(); mmc.translate(c+P.x*sc,c+P.z*sc); mmc.rotate(P.dir);
  mmc.fillStyle='#E5DDC8';
  mmc.beginPath(); mmc.moveTo(0,-5); mmc.lineTo(3.4,3.6); mmc.lineTo(-3.4,3.6); mmc.closePath(); mmc.fill();
  mmc.restore();
}

function quickBuild(){
  // move a barricade item from inventory to hotbar if needed
  if(hotIndex('barricade')<0&&invCount('barricade')>0){
    for(let i=0;i<P.inv.length;i++) if(P.inv[i]&&P.inv[i].id==='barricade'){
      for(let j=0;j<4;j++) if(!P.hot[j]){ P.hot[j]={id:'barricade',q:1};
        P.inv[i].q--; if(P.inv[i].q<=0) P.inv[i]=null; break; }
      break; }
  }
  if(hotIndex('barricade')>=0){ buildBarricade('barricade'); }
  else if(invCount('wood')>=3){
    if(placeBarricadeMesh(80,0x8A6A42,1.5)){
      removeItem('wood',3);
      AU.build(); showMsg(T('快速放置了木栅栏。','Quick barricade placed.'));
    }
  } else showMsg(T('需要栅栏或 3 个木材。','Need a barricade or 3 wood.'));
  refreshHud();
}
function placeBarricadeMesh(hp,col,h){
  const w=2.2, d=0.42, dist=2.0;
  const bx0=P.x+P.aimX*dist, bz0=P.z+P.aimZ*dist;
  for(const o of obstacles){ if(Math.abs(bx0-o.x)<o.hw+w/2+0.1&&Math.abs(bz0-o.z)<o.hd+d/2+0.1) return false; }
  const m=bx(w,h,d,col,bx0,h/2,bz0); m.castShadow=true;
  barricades.push({m,x:bx0,z:bz0,hw:w/2,hd:d/2,hp:hp,max:hp});
  return true;
}

/* ================= day / night ================= */
const skyDay=new THREE.Color(0xBFC7CE), skyNight=new THREE.Color(0x17202B);
const skyCur=new THREE.Color();
function nightFactor(){
  const sunH=Math.sin(G.cycleT*Math.PI*2);
  return clamp(-sunH*1.6+0.3,0,1);
}
function updateDayNight(dt){
  G.cycleT+=dt/DAY_LEN;
  if(G.cycleT>=1){ G.cycleT-=1; G.dayCount++; }
  const sunH=Math.sin(G.cycleT*Math.PI*2);
  const day=clamp(sunH*1.5+0.25,0,1);
  sun.intensity=lerp(0.03,1.15,day);
  hemi.intensity=lerp(0.16,0.75,day);
  amb.intensity=lerp(0.04,0.12,day);
  skyCur.copy(skyNight).lerp(skyDay,day);
  scene.background=skyCur; scene.fog.color=skyCur;
  const a=G.cycleT*Math.PI*2;
  sun.position.set(P.x+Math.cos(a)*60,Math.max(6,Math.sin(a)*70),P.z+25);
  sun.target.position.set(P.x,0,P.z);
  for(const l of lamps){ l.li.intensity=(1-day)>0.55?1.5:0; }
}

/* ================= loot spawn ================= */
const LOOT_TABLE=[
 ['can',14],['water',14],['bandage',9],['cloth',10],['wood',12],['nails',8],
 ['bottle',6],['fuel',5],['ammo9',9],['shell',5],['ammo762',4],['medkit',4],
 ['barricade',3],['molotov',2],['bat',2],['crowbar',1.6],['pistol',1.2],['axe',1],['shotgun',0.6],['rifle',0.4]
];
function rollLoot(){
  let tot=0; for(const e of LOOT_TABLE) tot+=e[1];
  let r=Math.random()*tot;
  for(const e of LOOT_TABLE){ r-=e[1]; if(r<=0) return e[0]; }
  return 'can';
}
let lootTimer=2;
function updateLootSpawn(dt){
  lootTimer-=dt;
  if(lootTimer>0) return;
  lootTimer=32;
  if(lootEnts.length>=14||lootSpots.length===0) return;
  const sp=pick(lootSpots);
  if(Math.hypot(sp.x-P.x,sp.z-P.z)<6) return;
  const id=rollLoot();
  const qty=ITEMS[id]&&ITEMS[id].ammo?RI(4,10):(ITEMS[id]&&(ITEMS[id].stack>3)?RI(1,2):1);
  dropLoot(sp.x+R(-1,1),sp.z+R(-1,1),id,qty);
}
function updateLootEnts(dt){
  for(const l of lootEnts){ l.bob+=dt*2.5;
    l.m.position.y=0.14+Math.sin(l.bob)*0.05; l.m.rotation.y+=dt*1.5; }
}

/* ================= game flow ================= */
function resetWorld(){
  for(let i=zombies.length-1;i>=0;i--) removeZombie(zombies[i],i);
  for(const l of lootEnts) scene.remove(l.m); lootEnts.length=0;
  for(const b of barricades) scene.remove(b.m); barricades.length=0;
  for(const p of particles) scene.remove(p.m); particles.length=0;
  for(const f of flashes) scene.remove(f.m); flashes.length=0;
  for(const bl of bullets){ bl.m.visible=false; bPool.push(bl.m); } bullets.length=0;
}
function newGame(diff,from){
  AU.init();
  resetWorld();
  G.state='play'; G.diff=diff||'normal'; G.kills=0; G.time=0; G.dayCount=1;
  G.cycleT=0.28; G.wave=0; G.waveState='rest'; G.restT=8; G.spawnQ=0; G.spawned=0;
  P.x=0; P.z=6; P.hp=100; P.hunger=100; P.thirst=100; P.stam=100; P.inf=0;
  P.weapon='fists'; P.mags={pistol:0,shotgun:0,rifle:0};
  P.inv=new Array(8).fill(null); P.hot=[{id:'fists',q:1},null,null,null]; P.hsel=0;
  P.grabT=0; P.atkCd=0; P.reloadT=0;
  if(from){
    G.diff=from.diff; G.wave=from.wave; G.kills=from.kills; G.time=from.time;
    G.cycleT=from.cycleT; G.dayCount=from.dayCount; G.waveState='rest'; G.restT=REST_T;
    Object.assign(P,{x:from.P.x,z:from.P.z,hp:from.P.hp,hunger:from.P.hunger,thirst:from.P.thirst,
      stam:from.P.stam,inf:from.P.inf,weapon:from.P.weapon,hsel:from.P.hsel||0});
    P.mags=from.P.mags; P.inv=from.P.inv; P.hot=from.P.hot;
  }
  setWeaponMesh();
  camera.position.set(P.x+CAM_OFF.x,CAM_OFF.y,P.z+CAM_OFF.z);
  $('menu').classList.add('hidden'); $('dead').classList.add('hidden');
  elHud.classList.remove('hidden'); closePanels();
  // starter supplies + initial loot
  addInv('can',1); addInv('water',1); addInv('bandage',1);
  for(let i=0;i<10;i++){ const sp=pick(lootSpots);
    dropLoot(sp.x+R(-1,1),sp.z+R(-1,1),rollLoot(),RI(1,2)); }
  // a few ambient walkers far away
  for(let i=0;i<5;i++){ const a=R(0,Math.PI*2);
    spawnZombie('walker',Math.cos(a)*R(28,36),Math.sin(a)*R(28,36)); }
  refreshHud();
  showMsg(T('在腐木镇活下去。搜刮、建造、抵御尸潮。','Survive Rotwood. Loot, build, hold the line.'));
}
function dieGame(){
  if(G.state!=='play') return;
  G.state='dead';
  AU.die();
  saveBest(); clearSave();
  bloodBurst(P.x,1,P.z,18);
  setTimeout(()=>{
    $('deadTitle').textContent=T('你死了','YOU DIED');
    $('dWave').textContent=T('存活波次：','Waves survived: ')+G.wave;
    $('dKill').textContent=T('击杀僵尸：','Zombies killed: ')+G.kills;
    const t=Math.floor(G.time);
    $('dTime').textContent=T('存活时间：','Time survived: ')+Math.floor(t/60)+'m '+(t%60)+'s';
    $('btnRetry').textContent=T('再来一次','Try Again');
    $('dead').classList.remove('hidden');
  },900);
}

/* ================= menu wiring ================= */
function setupMenu(){
  $('subtitle').textContent=T('腐 木 镇 · 低模僵尸生存','A Low-Poly Zombie Survival');
  $('btnNew').textContent=T('新的开始','New Game');
  $('btnCont').textContent=T('继续游戏','Continue');
  const dr=$('diffRow'); dr.innerHTML='';
  Object.keys(DIFF).forEach(k=>{
    const b=document.createElement('span');
    b.className='btn'+(k===G.diff?' sel':'')+(k==='hard'?' red':'');
    b.textContent=T(DIFF[k].label[0],DIFF[k].label[1]);
    b.addEventListener('click',()=>{ G.diff=k; AU.init(); AU.ui(); setupMenu(); });
    dr.appendChild(b);
  });
  const best=getBest();
  $('bestTxt').textContent=best?T('最佳战绩：第 '+best.wave+' 波 · '+best.kills+' 击杀','Best: Wave '+best.wave+' · '+best.kills+' kills'):'';
  $('tut').innerHTML=T(
   'WASD/方向键 移动 · 鼠标瞄准 · 左键攻击 · Shift 冲刺<br>'+
   '1-4 快捷栏 · 点击物品使用 · R 装填 · I 背包 · C 合成 · B 快速建造<br>'+
   '饥饿/口渴会持续下降，归零后掉血；被咬会感染，感染 100% 持续掉血。<br>'+
   '安全屋（金圈内）可缓慢回血并降低感染。白天搜刮，夜晚守城。',
   'WASD move · mouse aim · LMB attack · Shift sprint<br>'+
   '1-4 hotbar · click items to use · R reload · I inventory · C craft · B quick-build<br>'+
   'Hunger/thirst drain; zombie bites infect. At 100% infection HP drains.<br>'+
   'The safehouse (gold ring) slowly heals. Loot by day, hold the line by night.');
  if(loadGame()) $('btnCont').classList.remove('hidden'); else $('btnCont').classList.add('hidden');
}
$('btnNew').addEventListener('click',()=>{ AU.init(); AU.ui(); clearSave(); newGame(G.diff); });
$('btnCont').addEventListener('click',()=>{ AU.init(); AU.ui(); const s=loadGame(); newGame(s?s.diff:G.diff,s); });
$('btnRetry').addEventListener('click',()=>{ AU.init(); AU.ui();
  $('dead').classList.add('hidden'); $('menu').classList.remove('hidden'); elHud.classList.add('hidden');
  G.state='menu'; setupMenu(); });
$('invClose').addEventListener('click',closePanels);
$('craftClose').addEventListener('click',closePanels);
$('btnInv').innerHTML=icon('bag',24); $('btnCraft').innerHTML=icon('hammer',24);
$('atkBtn').innerHTML=icon('crosshair',34);
$('btnInv').addEventListener('click',()=>{ AU.init(); toggleInv(); });
$('btnCraft').addEventListener('click',()=>{ AU.init(); toggleCraft(); });

/* ================= main loop ================= */
const clock=new THREE.Clock();
let hudTick=0, saveTick=0;
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),0.05);
  G.time+=dt*(G.state==='play'?1:0.4);
  updateDayNight(G.state==='play'?dt:dt*0.2);
  if(G.state==='play'){
    updateAim();
    if(touchMode&&atkHeld){ touchAim(); const w=WEAPONS[P.weapon];
      if(w&&(w.auto||w.melee)) shoot(); }
    else if(mouseDown){ const w=WEAPONS[P.weapon]; if(w&&w.auto) shoot(); }
    updatePlayer(dt);
    if(G.state==='play'){
      P.mesh.rotation.y=P.dir;
      for(let i=zombies.length-1;i>=0;i--) zombieAI(zombies[i],dt,i);
      updateBullets(dt);
      updateParticles(dt);
      updateFlashes(dt);
      updateWaves(dt);
      updateLootSpawn(dt);
      updateLootEnts(dt);
      hudTick-=dt;
      if(hudTick<=0){ hudTick=0.12; refreshHud(); updateWaveHud(); drawMinimap(); }
      updateReloadHud();
      saveTick+=dt;
      if(saveTick>25){ saveTick=0; saveGame(); }
    }
  } else if(G.state==='dead'){
    updateParticles(dt); updateFlashes(dt); updateBullets(dt);
  } else {
    // menu backdrop: gentle idle world
    updateLootEnts(dt);
  }
  updateMsgs(dt);
  updateCamera(dt);
  renderer.render(scene,camera);
}

/* ================= init ================= */
buildWorld();
buildPlayer();
setWeaponMesh();
P.mesh.position.set(P.x,0,P.z);
setupMenu();
loop();
</script>
