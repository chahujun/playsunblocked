<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Crownfall: The Broken Realm</title>
<style>
/* ===== CSS VARIABLES — Western Indie RPG Palette ===== */
:root{
  --navy:#17202B;--charcoal:#242321;--parchment:#D6C29A;--old-paper:#B9A47A;
  --forest:#30483A;--iron:#5B5C57;--darkred:#743C38;--gold:#B18A45;--gray-white:#E5DDC8;
  --bg:var(--navy);--panel:var(--charcoal);--panel2:#2A2926;
  --border:var(--iron);--text:var(--gray-white);--text-dim:var(--old-paper);
  --green:var(--forest);--red:var(--darkred);--orange:#8A6A3A;--white:var(--gray-white);
  --blue:#4A6A7A;--purple:#6A4A6A;
  --wood:#3D3530;--parchment-d:var(--old-paper);
  --rare-blue:#4A6A7A;--epic-purple:#6A4A6A;--legend-orange:#9A7430;
  --font-display:'Georgia','Times New Roman',serif;
  --font-body:'Georgia',serif;
  --font-mono:'Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body);user-select:none}
canvas{display:block;image-rendering:auto}
button{font-family:var(--font-display);cursor:pointer;border:none;outline:none}
.hidden{display:none!important}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--panel)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ===== SCREEN BASE ===== */
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s}

/* ===== TITLE SCREEN ===== */
#title-screen{
  background:var(--navy);
  overflow:hidden;
}
#title-screen::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(214,194,154,.012) 2px,rgba(214,194,154,.012) 4px);
  pointer-events:none;
}
.title-ash{display:none}
.title-content{position:relative;z-index:2;text-align:center}
.title-logo{font-size:clamp(32px,6vw,64px);font-weight:bold;color:var(--gold);letter-spacing:4px;text-shadow:0 2px 4px rgba(0,0,0,.6);margin-bottom:8px;font-family:var(--font-display)}
.title-sub{font-size:clamp(12px,2vw,18px);color:var(--text-dim);font-style:italic;margin-bottom:48px;letter-spacing:2px}
.title-btn{
  display:block;width:280px;padding:12px 24px;margin:8px auto;
  background:var(--panel);
  border:1.5px solid var(--border);border-radius:3px;
  color:var(--text);font-size:16px;letter-spacing:2px;
  transition:all .15s;text-transform:uppercase;
}
.title-btn:hover{background:var(--panel2);border-color:var(--gold);color:var(--gold)}
.title-btn:active{transform:scale(.98)}
.title-crown{position:absolute;top:15%;left:50%;transform:translateX(-50%);width:120px;height:80px;opacity:.08;pointer-events:none}

/* ===== CHARACTER SELECT ===== */
#char-select{background:var(--navy);padding:20px;overflow-y:auto;justify-content:flex-start}
.cs-header{text-align:center;margin:20px 0}
.cs-title{font-size:28px;color:var(--gold);letter-spacing:3px;margin-bottom:4px}
.cs-hint{color:var(--text-dim);font-size:14px}
.cs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:960px;width:100%;margin:0 auto}
.cs-card{
  background:var(--panel);
  border:1.5px solid var(--border);border-radius:4px;padding:16px;
  cursor:pointer;transition:all .15s;position:relative;overflow:hidden;
}
.cs-card:hover{border-color:var(--old-paper);transform:translateY(-2px)}
.cs-card.selected{border-color:var(--forest);border-width:2px}
.cs-card.selected::after{content:'';position:absolute;top:8px;right:8px;width:16px;height:16px;border:solid var(--forest);border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-4px}
.cs-portrait{width:80px;height:80px;margin:0 auto 8px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--panel2)}
.cs-name{font-size:18px;color:var(--gold);text-align:center;margin-bottom:2px}
.cs-role{font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:8px}
.cs-desc{font-size:12px;color:var(--text);text-align:center;margin-bottom:8px;line-height:1.4;min-height:34px}
.cs-stats{display:flex;justify-content:space-around;font-size:11px;color:var(--text-dim);margin-bottom:8px}
.cs-stat{display:flex;flex-direction:column;align-items:center}
.cs-stat span:first-child{color:var(--gold);font-size:14px;font-weight:bold}
.cs-skills{font-size:11px;color:var(--text-dim);line-height:1.5}
.cs-skills b{color:var(--text)}
.cs-diff{position:absolute;top:8px;left:8px;font-size:10px;padding:2px 6px;border-radius:2px;background:var(--panel2);color:var(--gold)}
.cs-confirm{margin:20px auto;display:block;padding:12px 48px;font-size:18px;background:var(--forest);color:var(--gray-white);border-radius:3px;letter-spacing:2px;border:1.5px solid var(--iron)}
.cs-confirm:disabled{opacity:.4;cursor:not-allowed}
.cs-count{text-align:center;color:var(--gold);font-size:14px;margin:8px 0}

/* ===== MAP SCREEN ===== */
#map-screen{background:var(--navy);padding:8px;flex-direction:column;justify-content:flex-start;align-items:stretch}
.map-topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:var(--panel);border-bottom:2px solid var(--border);flex-shrink:0}
.map-area-name{font-size:16px;color:var(--gold);letter-spacing:2px}
.map-objective{font-size:12px;color:var(--text-dim)}
.map-resources{display:flex;gap:16px;font-size:14px}
.map-res{display:flex;align-items:center;gap:4px;color:var(--gold)}
.map-body{flex:1;display:flex;overflow:hidden}
.map-canvas-wrap{flex:1;position:relative;overflow:auto;display:flex;align-items:center;justify-content:center}
#map-canvas{cursor:pointer}
.map-sidebar{width:200px;background:var(--panel);border-left:2px solid var(--border);padding:8px;overflow-y:auto;flex-shrink:0}
.map-hero{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:6px;margin-bottom:6px}
.map-hero-name{font-size:12px;color:var(--gold);display:flex;justify-content:space-between}
.map-hp-bar{height:6px;background:var(--bg);border-radius:3px;margin-top:4px;overflow:hidden}
.map-hp-fill{height:100%;background:var(--green);transition:width .3s}
.map-hero-stats{font-size:10px;color:var(--text-dim);display:flex;justify-content:space-between;margin-top:3px}
.map-node-info{position:absolute;bottom:8px;left:8px;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:8px 12px;font-size:12px;color:var(--text);max-width:240px;z-index:5;pointer-events:none}

/* ===== BATTLE SCREEN ===== */
#battle-screen{background:var(--navy);flex-direction:column;justify-content:flex-start;align-items:stretch;padding:4px}
.bt-topbar{display:flex;justify-content:space-between;align-items:center;padding:4px 12px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;font-size:12px}
.bt-turn-order{display:flex;gap:4px;align-items:center}
.bt-turn-icon{width:28px;height:28px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--panel2)}
.bt-turn-icon.active{border-color:var(--gold);border-width:2px}
.bt-phase{color:var(--orange);font-weight:bold;letter-spacing:1px}
.bt-body{flex:1;display:flex;overflow:hidden}
.bt-canvas-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center}
#battle-canvas{cursor:pointer}
.bt-sidebar{width:220px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.bt-log{flex:1;overflow-y:auto;padding:6px;font-size:11px;line-height:1.5}
.bt-log-entry{margin-bottom:3px;padding:2px 4px;border-radius:2px}
.bt-log-entry.hit{color:var(--red)}
.bt-log-entry.heal{color:var(--green)}
.bt-log-entry.info{color:var(--text-dim)}
.bt-log-entry.crit{color:var(--gold);font-weight:bold}
.bt-actions{background:var(--panel2);border-top:1px solid var(--border);padding:6px;display:flex;flex-direction:column;gap:4px}
.bt-action-btn{padding:8px;font-size:13px;background:var(--panel);border:1px solid var(--border);border-radius:3px;color:var(--text);letter-spacing:1px;transition:all .15s}
.bt-action-btn:hover{border-color:var(--gold);color:var(--gold)}
.bt-action-btn:disabled{opacity:.3;cursor:not-allowed}
.bt-action-btn.active{background:var(--border);color:var(--gold)}
.bt-action-btn.end{background:var(--darkred);color:var(--white)}
.bt-ap{display:flex;gap:4px;justify-content:center;margin-bottom:4px}
.bt-ap-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--panel)}
.bt-ap-dot.filled{background:var(--gold);border-color:var(--gold)}
.bt-hero-info{display:flex;justify-content:space-around;padding:4px 12px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0}
.bt-hero-card{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:3px;cursor:pointer;transition:all .15s}
.bt-hero-card.active{background:var(--panel2);border:1px solid var(--gold)}
.bt-hero-card.dead{opacity:.3}
.bt-hero-portrait{width:32px;height:32px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--panel2)}
.bt-hero-hp{font-size:11px;line-height:1.2}
.bt-hero-hp-bar{width:50px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.bt-hero-hp-fill{height:100%;background:var(--green);transition:width .3s}

/* ===== DICE OVERLAY ===== */
#dice-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:50;pointer-events:none}
.dice-box{text-align:center}
.dice-label{font-size:16px;color:var(--gold);margin-bottom:12px;letter-spacing:1px}
.dice-face{width:80px;height:80px;margin:0 auto 12px;background:var(--parchment);border:2px solid var(--wood);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:bold;color:var(--charcoal);box-shadow:0 2px 8px rgba(0,0,0,.4)}
.dice-face.rolling{animation:diceRoll .6s ease-out}
@keyframes diceRoll{0%{transform:rotate(0) scale(.5)}50%{transform:rotate(360deg) scale(1.2)}100%{transform:rotate(720deg) scale(1)}}
.dice-result{font-size:24px;font-weight:bold;letter-spacing:2px;margin-top:8px}
.dice-result.crit{color:var(--gold);font-weight:bold}
.dice-result.success{color:var(--green)}
.dice-result.partial{color:var(--blue)}
.dice-result.fail{color:var(--red)}
.dice-result.critfail{color:var(--purple)}
.dice-reroll-btn{margin-top:12px;padding:8px 24px;background:var(--orange);color:var(--white);border:1.5px solid var(--iron);border-radius:3px;font-size:14px;letter-spacing:1px;pointer-events:auto;display:flex;align-items:center;gap:6px}

/* ===== MODAL ===== */
.modal-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:40}
.modal-box{
  background:var(--parchment);
  border:2px solid var(--wood);border-radius:4px;padding:24px;max-width:480px;width:90%;
  box-shadow:0 4px 16px rgba(0,0,0,.5);color:var(--charcoal);position:relative;
}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(36,35,33,.02) 3px,rgba(36,35,33,.02) 6px);pointer-events:none;border-radius:3px}
.modal-title{font-size:22px;color:var(--darkred);text-align:center;margin-bottom:12px;font-family:var(--font-display);letter-spacing:1px}
.modal-desc{font-size:14px;line-height:1.6;color:var(--charcoal);margin-bottom:16px;text-align:center}
.modal-btn{display:block;width:100%;padding:10px;margin:6px 0;background:var(--panel);color:var(--text);border:2px solid var(--border);border-radius:4px;font-size:14px;letter-spacing:1px;transition:all .15s}
.modal-btn:hover{border-color:var(--gold);color:var(--gold)}
.modal-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.modal-actions .modal-btn{flex:1;min-width:120px}
.modal-btn.danger{border-color:var(--darkred)}
.modal-btn.danger:hover{background:var(--darkred);color:var(--white)}

/* ===== EVENT CARD ===== */
.event-card{max-width:440px}
.event-illust{width:100%;height:120px;background:var(--panel);border:1.5px solid var(--wood);border-radius:3px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;color:var(--gold)}

/* ===== SHOP ===== */
.shop-card{max-width:520px;max-height:80vh;overflow-y:auto}
.shop-items{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.shop-item{background:rgba(0,0,0,.08);border:1px solid var(--wood);border-radius:4px;padding:8px;cursor:pointer;transition:all .15s}
.shop-item:hover{background:rgba(0,0,0,.15)}
.shop-item-name{font-size:13px;font-weight:bold;color:var(--darkred)}
.shop-item-desc{font-size:11px;color:var(--charcoal);margin:2px 0}
.shop-item-price{font-size:12px;color:var(--gold);font-weight:bold}
.shop-item.sold{opacity:.4;pointer-events:none}

/* ===== REWARD SCREEN ===== */
#reward-screen{background:rgba(0,0,0,.85);z-index:30}
.reward-box{background:var(--panel);border:1.5px solid var(--gold);border-radius:4px;padding:24px;max-width:500px;width:90%;text-align:center}
.reward-title{font-size:24px;color:var(--gold);margin-bottom:16px;letter-spacing:2px}
.reward-items{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.reward-item{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:12px;color:var(--text)}
.reward-item.gold-item{border-color:var(--gold)}
.reward-btn{padding:10px 32px;background:var(--forest);color:var(--gray-white);border-radius:3px;font-size:16px;letter-spacing:2px;border:1.5px solid var(--iron)}

/* ===== GAME OVER / VICTORY ===== */
#gameover-screen,#victory-screen{background:rgba(0,0,0,.9);z-index:60;text-align:center}
.go-title{font-size:36px;color:var(--darkred);letter-spacing:4px;margin-bottom:12px}
.vic-title{font-size:36px;color:var(--gold);letter-spacing:4px;margin-bottom:12px}
.go-sub{font-size:16px;color:var(--text-dim);margin-bottom:24px;font-style:italic}

/* ===== TUTORIAL ===== */
.tutorial-tip{position:absolute;background:var(--panel);border:1.5px solid var(--gold);border-radius:4px;padding:8px 14px;font-size:13px;color:var(--gold);z-index:45;max-width:280px}

/* ===== STATUS EFFECTS ===== */
.status-icon{display:inline-block;width:16px;height:16px;border-radius:3px;font-size:10px;text-align:center;line-height:16px;color:var(--white);font-weight:bold;margin:0 1px}

/* ===== SETTINGS ===== */
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.settings-label{font-size:14px;color:var(--charcoal)}
.settings-btn{padding:4px 12px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:3px;font-size:12px}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .cs-grid{grid-template-columns:repeat(2,1fr)}
  .map-sidebar{width:140px}
  .bt-sidebar{width:160px}
}
@media(max-width:640px){
  .cs-grid{grid-template-columns:1fr}
  .map-sidebar{display:none}
  .bt-sidebar{width:120px}
  .bt-log{font-size:10px}
  .title-logo{font-size:28px}
}
</style>
</head>
<body>

<!-- ===== TITLE SCREEN ===== -->
<div id="title-screen" class="screen">
  <div class="title-content">
    <div class="title-logo">CROWNFALL</div>
    <div class="title-logo" style="font-size:clamp(18px,3vw,28px);color:var(--text-dim);letter-spacing:6px">THE BROKEN REALM</div>
    <div class="title-sub" id="title-sub">Every road demands a sacrifice.</div>
    <button class="title-btn" id="btn-start" onclick="startNewGame()">Start New Journey</button>
    <button class="title-btn" id="btn-continue" onclick="continueGame()">Continue Journey</button>
    <button class="title-btn" id="btn-howto" onclick="showHowToPlay()">How to Play</button>
    <button class="title-btn" id="btn-settings" onclick="showSettings()">Settings</button>
  </div>
</div>

<!-- ===== CHARACTER SELECT ===== -->
<div id="char-select" class="screen hidden">
  <div class="cs-header">
    <div class="cs-title" id="cs-title">CHOOSE YOUR PARTY</div>
    <div class="cs-hint" id="cs-hint">Select 3 heroes for your journey</div>
    <div class="cs-count" id="cs-count">0 / 3 selected</div>
  </div>
  <div class="cs-grid" id="cs-grid"></div>
  <button class="cs-confirm" id="cs-confirm" disabled onclick="confirmParty()">BEGIN JOURNEY</button>
</div>

<!-- ===== MAP SCREEN ===== -->
<div id="map-screen" class="screen hidden">
  <div class="map-topbar">
    <div>
      <div class="map-area-name" id="map-area">Blackpine Forest</div>
      <div class="map-objective" id="map-objective">Reach the Fallen Crown</div>
    </div>
    <div class="map-resources">
      <div class="map-res" id="map-res-gold"></div>
      <div class="map-res" id="map-res-potions"></div>
      <div class="map-res" id="map-res-luck"></div>
    </div>
  </div>
  <div class="map-body">
    <div class="map-canvas-wrap">
      <canvas id="map-canvas" width="600" height="500"></canvas>
      <div class="map-node-info hidden" id="map-node-info"></div>
    </div>
    <div class="map-sidebar" id="map-sidebar"></div>
  </div>
</div>

<!-- ===== BATTLE SCREEN ===== -->
<div id="battle-screen" class="screen hidden">
  <div class="bt-topbar">
    <div class="bt-turn-order" id="bt-turn-order"></div>
    <div class="bt-phase" id="bt-phase">Player Turn</div>
  </div>
  <div class="bt-body">
    <div class="bt-canvas-wrap">
      <canvas id="battle-canvas" width="640" height="440"></canvas>
    </div>
    <div class="bt-sidebar">
      <div class="bt-log" id="bt-log"></div>
      <div class="bt-actions" id="bt-actions">
        <div class="bt-ap" id="bt-ap"></div>
        <button class="bt-action-btn" data-action="move" onclick="btAction('move')">MOVE</button>
        <button class="bt-action-btn" data-action="attack" onclick="btAction('attack')">ATTACK</button>
        <button class="bt-action-btn" data-action="skill" onclick="btAction('skill')">SKILL</button>
        <button class="bt-action-btn" data-action="defend" onclick="btAction('defend')">DEFEND</button>
        <button class="bt-action-btn" data-action="item" onclick="btAction('item')">USE ITEM</button>
        <button class="bt-action-btn end" data-action="end" onclick="btAction('end')">END TURN</button>
      </div>
    </div>
  </div>
  <div class="bt-hero-info" id="bt-hero-info"></div>
</div>

<!-- ===== DICE OVERLAY ===== -->
<div id="dice-overlay" class="hidden">
  <div class="dice-box">
    <div class="dice-label" id="dice-label">Rolling...</div>
    <div class="dice-face" id="dice-face">?</div>
    <div class="dice-result" id="dice-result"></div>
    <button class="dice-reroll-btn hidden" id="dice-reroll" onclick="rerollDice()"></button>
  </div>
</div>

<!-- ===== MODAL CONTAINER ===== -->
<div id="modal-container"></div>

<!-- ===== REWARD SCREEN ===== -->
<div id="reward-screen" class="screen hidden">
  <div class="reward-box">
    <div class="reward-title" id="reward-title">VICTORY</div>
    <div class="reward-items" id="reward-items"></div>
    <button class="reward-btn" onclick="closeReward()">CONTINUE</button>
  </div>
</div>

<!-- ===== GAME OVER ===== -->
<div id="gameover-screen" class="screen hidden">
  <div class="go-title" id="go-title">FALLEN</div>
  <div class="go-sub" id="go-sub"></div>
  <button class="title-btn" onclick="returnToTitle()">RETURN TO TITLE</button>
</div>

<!-- ===== VICTORY ===== -->
<div id="victory-screen" class="screen hidden">
  <div class="vic-title" id="vic-title">THE REALM REMEMBERS</div>
  <div class="go-sub" id="vic-sub"></div>
  <button class="title-btn" onclick="returnToTitle()">RETURN TO TITLE</button>
</div>

<!-- ===== TUTORIAL TIP ===== -->
<div id="tutorial-tip" class="tutorial-tip hidden"></div>

<script>
'use strict';

/* ========================================================================
   I18N — Bilingual EN/CN translations
   ======================================================================== */
const I18N = {
  en: {
    startNew: 'Start New Journey', continueJ: 'Continue Journey', howToPlay: 'How to Play', settings: 'Settings',
    chooseParty: 'CHOOSE YOUR PARTY', selectHint: 'Select 3 heroes for your journey',
    beginJourney: 'BEGIN JOURNEY', selected: 'selected',
    reachCrown: 'Reach the Fallen Crown', playerTurn: 'Player Turn', enemyTurn: 'Enemy Turn',

function t(k){

  const parts=k.split('.');

  return k;
}

/* ----- Music: Note frequency helper ----- */
const _SEMI={C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11};
function noteFreq(note){
  const m=note.match(/^([A-G][#b]?)(-?\d)$/); if(!m) return 0;
  const semis=_SEMI[m[1]]+(parseInt(m[2])-4)*12;
  return 440*Math.pow(2,(semis-9)/12);
}

/* ----- Music Scheduler ----- */
function playMusic(track){
  if(!actx) return;
  stopMusic();
  const comp=MUSIC_TRACKS[track];
  if(!comp) return;
  const beatDur=60/comp.tempo;
  const startT=actx.currentTime+0.1;
  const voiceStates=comp.voices.map(v=>({voice:v,idx:0,nextT:startT}));
  const lookahead=0.3;
  musicScheduler=setInterval(()=>{
    if(!actx){clearInterval(musicScheduler);return;}
    const now=actx.currentTime;
    voiceStates.forEach(vs=>{
      while(vs.nextT<now+lookahead){
        const item=vs.voice.notes[vs.idx];
        if(item){
          const freq=noteFreq(item[0]);
          const beats=item[1]||1;
          const dur=beats*beatDur;
          if(freq>0) _schedNote(freq,vs.nextT,dur,vs.voice.wave,vs.voice.gain);
          vs.nextT+=dur;
        }
        vs.idx=(vs.idx+1)%vs.voice.notes.length;
        if(vs.idx===0) vs.nextT=Math.max(vs.nextT,now+0.05);
      }
    });
  },50);
}

function _schedNote(freq,t,dur,wave,gain){
  const osc=actx.createOscillator(), g=actx.createGain();
  osc.connect(g); g.connect(musicBusG);
  osc.type=wave; osc.frequency.value=freq;
  const vol=gain;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.02);
  g.gain.setValueAtTime(vol,t+dur*0.65);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.95);
  osc.start(t); osc.stop(t+dur);
  musicNodes.push(osc,g);
  if(musicNodes.length>120){musicNodes.splice(0,60).forEach(n=>{try{if(n.stop)n.stop();n.disconnect();}catch(e){}});}
}

function stopMusic(){
  if(musicScheduler){clearInterval(musicScheduler);musicScheduler=null;}
  musicNodes.forEach(n=>{try{if(n.stop)n.stop();n.disconnect();}catch(e){}});
  musicNodes=[];
}

function setVolume(v){
  G.settings.volume=v;
  if(masterG) masterG.gain.value=G.settings.muted?0:v;
}

function iconSVG(id,size=20,color='currentColor'){
  const paths=ICON_PATHS[id]||ICON_PATHS.question;
  const tags=paths.map(d=>`<path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle">${tags}</svg>`;
}
function drawIcon(ctx,id,cx,cy,size,color){
  const paths=ICON_PATHS[id]||ICON_PATHS.question;
  const scale=size/24;
  ctx.save();
  ctx.translate(cx-12*scale,cy-12*scale);
  ctx.scale(scale,scale);
  ctx.strokeStyle=color||'#E5DDC8';
  ctx.lineWidth=1.5/scale;
  ctx.lineCap='round'; ctx.lineJoin='round';
  paths.forEach(d=>{ try{ctx.stroke(new Path2D(d));}catch(e){} });
  ctx.restore();
}

/* ========================================================================

   ======================================================================== */
function saveGame(){
  try{
    const data={party:G.party,gold:G.gold,potions:G.potions,luck:G.luck,map:G.map,nodeHistory:G.nodeHistory,settings:G.settings};
    localStorage.setItem(G.saveSlot,JSON.stringify(data));
    return true;
  }catch(e){ return false; }
}
function loadGame(){
  try{
    const raw=localStorage.getItem(G.saveSlot); if(!raw) return false;
    const data=JSON.parse(raw);
    G.party=data.party||[]; G.gold=data.gold||0; G.potions=data.potions||0;
    G.luck=data.luck||0; G.map=data.map||null; G.nodeHistory=data.nodeHistory||[];
    if(data.settings) Object.assign(G.settings,data.settings);
    return true;
  }catch(e){ return false; }
}
function hasSave(){ try{return !!localStorage.getItem(G.saveSlot);}catch(e){return false;} }

   ======================================================================== */
function createHero(classId){
  const cls=CLASSES[classId]; if(!cls) return null;
  return {
    id:Date.now()+Math.random(),
    classId, icon:cls.icon, color:cls.color,
    name:L(cls.name),
    level:1, exp:0, expNext:20,
    maxHp:cls.base.hp, hp:cls.base.hp,
    armor:cls.base.armor, atk:cls.base.atk, spd:cls.base.spd, range:cls.base.range,
    equipment:{weapon:null,armor:null,accessory:null},
    skills:cls.skills.map(s=>({...s,unlocked:true})),
    passive:cls.passive,
    statusEffects:[],
    defending:false, shield:0,
    x:0, y:0, ap:2, maxAp:2,
    alive:true,
    luckBoost:0, critBoost:0,
  };
}
function getHeroStats(hero){
  let atk=hero.atk, armor=hero.armor, spd=hero.spd, hp=hero.maxHp, luck=0, crit=0;
  Object.values(hero.equipment).forEach(eid=>{
    if(!eid) return;
    const e=getEquip(eid);
    if(!e) return;
    if(e.atk) atk+=e.atk; if(e.armor) armor+=e.armor; if(e.spd) spd+=e.spd;
    if(e.hp) hp+=e.hp; if(e.luck) luck+=e.luck; if(e.crit) crit+=e.crit;
  });
  atk+=G.tempBuffs.atk; armor+=G.tempBuffs.armor;
  return {atk,armor,spd,hp,luck,crit};
}

/* ========================================================================
   WORLD MAP — Generation & Rendering
   ======================================================================== */
function generateMap(){
  const areas=[];
  const nodeY=[100,180,260,340,420];
  for(let a=0;a<6;a++){
    const area={id:a+1,name:'area'+(a+1),nodes:[]};
    const numNodes=a===5?3:5;
    for(let n=0;n<numNodes;n++){
      const isBoss=a===5&&n===2;
      const isFirst=a===0&&n===0;
      let type;
      if(isBoss) type='boss';
      else if(isFirst) type='battle';
      else if(a===5) type='elite';
      else{
        const pool=['battle','battle','event','event','merchant','shrine','camp','elite','treasure'];
        if(n===numNodes-1&&a<4) pool.push('elite');
        type=pool[Math.floor(Math.random()*pool.length)];
      }
      const x=100+a*90, y=nodeY[n]||(100+n*80);
      area.nodes.push({id:`${a}-${n}`,area:a,type,x,y,visited:isFirst,available:isFirst,next:[]});
    }
    // Connect nodes
    for(let n=0;n<numNodes;n++){
      if(n<numNodes-1){
        area.nodes[n].next.push(area.nodes[n+1].id);
        if(n>0&&Math.random()<.3&&n+2<numNodes) area.nodes[n].next.push(area.nodes[n+2].id);
      }
    }
    areas.push(area);
  }
  // Connect areas - last node of each area connects to first node of next
  for(let a=0;a<5;a++){
    const last=areas[a].nodes[areas[a].nodes.length-1];
    const first=areas[a+1].nodes[0];
    last.next.push(first.id);
    first.available=false;
  }
  // Set available nodes
  areas[0].nodes[0].available=true;
  areas[0].nodes[0].visited=false;
  G.map={areas,currentArea:0,currentNode:'0-0',progress:0};
}

  // Sidebar heroes

  G.party.forEach(h=>{
    const pct=Math.max(0,h.hp/h.maxHp*100);
    const d=document.createElement('div'); d.className='map-hero';
    d.innerHTML=`<div class="map-hero-name">${iconSVG(h.icon,14,h.color)} ${h.name} <span style="color:var(--text-dim)">${t('level')}${h.level}</span></div>
      <div class="map-hp-bar"><div class="map-hp-fill" style="width:${pct}%;background:${pct>50?'var(--green)':pct>25?'var(--orange)':'var(--red)'}"></div></div>
      <div class="map-hero-stats"><span>${t('hp')}: ${h.hp}/${h.maxHp}</span><span>${t('atk')}: ${getHeroStats(h).atk}</span></div>`;
    sb.appendChild(d);
  });
  drawMap();
}

const mapCanvas=document.getElementById('map-canvas');
const mapCtx=mapCanvas?mapCanvas.getContext('2d'):null;

function drawMap(){
  if(!mapCtx) return;
  const ctx=mapCtx; const w=mapCanvas.width, h=mapCanvas.height;
  // Parchment background
  ctx.fillStyle='#D6C29A'; ctx.fillRect(0,0,w,h);
  // Pre-generated texture (stable, no flickering)
  if(!G._mapTexture){
    G._mapTexture=[];
    for(let i=0;i<200;i++){
      G._mapTexture.push({x:Math.random()*w,y:Math.random()*h,a:Math.random()*.05});
    }
  }
  G._mapTexture.forEach(p=>{
    ctx.fillStyle=`rgba(36,35,33,${p.a})`;
    ctx.fillRect(p.x,p.y,2,2);
  });
  // Area separators
  for(let a=0;a<6;a++){
    const x=100+a*90;
    ctx.strokeStyle='rgba(91,92,87,.12)'; ctx.lineWidth=1;
    ctx.setLineDash([3,6]);
    ctx.beginPath(); ctx.moveTo(x-45,20); ctx.lineTo(x-45,h-20); ctx.stroke();
    ctx.setLineDash([]);
  }
  // Draw paths and nodes
  const area=G.map.areas[G.map.currentArea];
  // Also show next area preview
  const nextArea=G.map.areas[G.map.currentArea+1];
  const allNodes=[...area.nodes];
  if(nextArea) allNodes.push(...nextArea.nodes);

  // Draw connections
  allNodes.forEach(node=>{
    node.next.forEach(nid=>{
      const target=allNodes.find(n=>n.id===nid||n.id===String(nid));
      if(!target) return;
      ctx.strokeStyle=node.visited?'rgba(91,92,87,.25)':'rgba(36,35,33,.3)';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(node.x,node.y); ctx.lineTo(target.x,target.y); ctx.stroke();
    });
  });

  // Draw nodes
  allNodes.forEach(node=>{
    const isCurrent=node.id===G.map.currentNode;
    const isAvailable=isNodeAvailable(node);
    const r=isCurrent?18:14;
    // Node circle
    ctx.beginPath(); ctx.arc(node.x,node.y,r,0,Math.PI*2);
    let fill='#3D3530';
    if(node.visited) fill='#5B5C57';
    if(isAvailable) fill='#B18A45';
    if(isCurrent) fill='#8A6A3A';
    if(node.type==='boss') fill='#743C38';
    ctx.fillStyle=fill;
    ctx.fill();
    ctx.strokeStyle=isCurrent?'#E5DDC8':isAvailable?'#B18A45':'#3D3530';
    ctx.lineWidth=isCurrent?2.5:1.5;
    ctx.stroke();
    // Icon
    const nodeIcons={battle:'swords',event:'scroll',merchant:'coin',shrine:'star',camp:'tent',elite:'skull',treasure:'chest',boss:'crown'};
    const iconColor=(isAvailable||isCurrent)?'#242321':'#E5DDC8';
    drawIcon(ctx,nodeIcons[node.type]||'question',node.x,node.y,r*1.2,iconColor);
    // Available indicator
    if(isAvailable&&!isCurrent){
      ctx.beginPath(); ctx.arc(node.x,node.y,r+3,0,Math.PI*2);
      ctx.strokeStyle='#B18A45'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
    }
  });

  // Legend
  ctx.font='10px Georgia'; ctx.textAlign='left'; ctx.fillStyle='#5B5C57';
  const legendY=h-15;
  drawIcon(ctx,'star',18,legendY,10,'#B18A45');
  ctx.fillText(`${t('area1')} \u2192 ${t('area6')}`,28,legendY);
}

function isNodeAvailable(node){
  if(node.id===G.map.currentNode) return false;
  // Check if any visited node connects to this one
  const area=G.map.areas[G.map.currentArea];
  const nextArea=G.map.areas[G.map.currentArea+1];
  const allNodes=nextArea?[...area.nodes,...nextArea.nodes]:area.nodes;
  for(const n of allNodes){
    if(n.visited||n.id===G.map.currentNode){
      if(n.next.includes(node.id)||n.next.includes(String(node.id))) return true;
    }
  }
  return false;
}

mapCanvas.addEventListener('click',e=>{
  const rect=mapCanvas.getBoundingClientRect();
  const sx=mapCanvas.width/rect.width, sy=mapCanvas.height/rect.height;
  const x=(e.clientX-rect.left)*sx, y=(e.clientY-rect.top)*sy;
  const area=G.map.areas[G.map.currentArea];
  const nextArea=G.map.areas[G.map.currentArea+1];
  const allNodes=nextArea?[...area.nodes,...nextArea.nodes]:area.nodes;
  let clickedNode=false;
  for(const node of allNodes){
    const dx=x-node.x, dy=y-node.y;
    if(Math.sqrt(dx*dx+dy*dy)<22){
      clickedNode=true;
      if(isNodeAvailable(node)){
        document.getElementById('map-node-info').classList.add('hidden');
        selectNode(node);
      } else if(node.visited||node.id===G.map.currentNode){
        // Show info
        const info=document.getElementById('map-node-info');
        info.innerHTML=`${t('nodes.'+node.type)}${node.visited?' '+iconSVG('check',12,'var(--forest)'):''}`;
        info.classList.remove('hidden');
      }
      return;
    }
  }
  // Clicking empty area: hide node info
  if(!clickedNode){
    document.getElementById('map-node-info').classList.add('hidden');
  }
});

function selectNode(node){
  playSound('node');
  const typeName=t('nodes.'+node.type);
  showModal(typeName,`<div style="text-align:center;color:var(--charcoal)">${t('choosePath')}<br><br><b style="font-size:18px;color:var(--darkred)">${typeName}</b></div>`,[
    {text:t('confirm'),action:()=>{closeModal();travelToNode(node);}},
    {text:t('cancel'),action:closeModal,secondary:true}
  ]);
}

function travelToNode(node){
  // Hide node info
  document.getElementById('map-node-info').classList.add('hidden');
  // Mark old node as visited
  const area=G.map.areas[G.map.currentArea];
  const oldNode=area.nodes.find(n=>n.id===G.map.currentNode);
  if(oldNode) oldNode.visited=true;

  // Check if we're moving to next area
  if(node.area!==G.map.currentArea){
    G.map.currentArea=node.area;
  }
  G.map.currentNode=node.id;
  node.visited=true;
  G.nodeHistory.push(node.id);

  // Trigger node event
  switch(node.type){
    case 'battle': startBattle(false); break;
    case 'event': triggerEvent(); break;
    case 'merchant': openShop(); break;
    case 'shrine': openShrine(); break;
    case 'camp': openCamp(); break;
    case 'elite': startBattle(true); break;
    case 'treasure': openTreasure(); break;
    case 'boss': startBossBattle(); break;
  }
  saveGame();
}

function showTip(text,duration){
  const tip=document.getElementById('tutorial-tip');
  tip.textContent=text;
  tip.classList.remove('hidden');
  // Position at top center
  tip.style.top='60px'; tip.style.left='50%'; tip.style.transform='translateX(-50%)';

    tip.onclick=()=>{ nextTutorialStep(); };

  if(duration){
    clearTimeout(showTip._timer);
    showTip._timer=setTimeout(hideTip,duration);

}
function hideTip(){ document.getElementById('tutorial-tip').classList.add('hidden'); }
function nextTutorialStep(){
  G.tutorial.step++;
  const tips=[t('tutorial1'),t('tutorial2'),t('tutorial3'),t('tutorial4'),t('tutorial5'),t('tutorial6'),t('tutorial7'),t('tutorial8')];

    showTip(tips[G.tutorial.step]);
  } else {

  }

/* ========================================================================
   BATTLE SYSTEM — Grid Tactical Combat
   ======================================================================== */
const GRID_W=8, GRID_H=6, CELL=64;

function startBattle(isElite){
  G.isBossBattle=false;
  // Pick enemies based on area progress
  const area=G.map.currentArea;
  const enemyPool=['bogGoblin','thornHound','ashCultist','hollowKnight','mireWitch'];
  const availableEnemies=enemyPool.slice(0,Math.min(3+Math.floor(area/2),5));
  let count=isElite?1:2+Math.floor(Math.random()*2);
  if(area>=3) count=Math.min(count+1,4);
  const enemies=[];
  for(let i=0;i<count;i++){
    let eId;
    if(isElite){ eId='crownlessGiant'; }
    else { eId=availableEnemies[Math.floor(Math.random()*availableEnemies.length)]; }
    const e=ENEMIES[eId];
    enemies.push(createEnemy(eId,e,isElite));
  }
  initBattle(enemies,isElite);
}

function createEnemy(id,data,isElite){
  const hpMult=isElite&&id!=='crownlessGiant'?1.5:1;
  return {
    id:Date.now()+Math.random(), enemyId:id,
    name:L(data.name), icon:data.icon, color:data.color,
    maxHp:Math.round(data.hp*hpMult), hp:Math.round(data.hp*hpMult),
    armor:data.armor, atk:data.atk, spd:data.spd, range:data.range,
    xp:data.xp, gold:data.gold, ai:data.ai,
    effect:data.effect, effectDur:data.effectDur,
    blockChance:data.blockChance||0, aoe:data.aoe||false,
    statusEffects:[], defending:false, shield:0,
    x:0, y:0, alive:true, isEnemy:true,
    desc:data.desc?L(data.desc):'',
  };
}

function initBattle(enemies,isElite){
  G.battle={
    grid:Array(GRID_H).fill(null).map(()=>Array(GRID_W).fill(null)),
    heroes:[], enemies:[], summons:[],
    turnOrder:[], turnIdx:0, round:1,
    selectedHero:null, actionMode:null, // 'move','attack','skill','skillTarget'
    selectedSkill:null, validTargets:[],
    dangerZones:[], // {x,y,dmg,duration}
    isElite,isBoss:false,
    log:[],
  };
  // Place heroes on left side
  G.party.forEach((h,i)=>{
    if(!h.alive) return;
    h.x=0; h.y=1+i; h.ap=2; h.defending=false; h.statusEffects=[];
    h.shield=0;
    G.battle.heroes.push(h);
    G.battle.grid[h.y][h.x]=h;
  });
  // Place enemies on right side
  enemies.forEach((e,i)=>{
    e.x=GRID_W-1; e.y=1+i*(Math.floor(4/enemies.length));
    e.y=Math.max(0,Math.min(GRID_H-1,e.y));
    G.battle.enemies.push(e);
    G.battle.grid[e.y][e.x]=e;
  });
  // Compute turn order by speed
  computeTurnOrder();
  showScreen('battle-screen');
  playMusic(isElite?'boss':'battle');
  renderBattle();
  addLog('info','Battle Start!');
  if(G.tutorial.active&&G.tutorial.step===1) showTip(t('tutorial2'));
  // Start first turn
  startTurn();
}

function computeTurnOrder(){
  const all=[...G.battle.heroes.filter(h=>h.alive), ...G.battle.enemies.filter(e=>e.alive), ...G.battle.summons.filter(s=>s.alive)];
  all.sort((a,b)=>(b.spd||0)-(a.spd||0));
  G.battle.turnOrder=all;
  G.battle.turnIdx=0;
}

function getCurrentUnit(){
  if(G.battle.turnIdx>=G.battle.turnOrder.length) return null;
  return G.battle.turnOrder[G.battle.turnIdx];
}

function startTurn(){
  const unit=getCurrentUnit();
  if(!unit){ endRound(); return; }
  if(!unit.alive){ G.battle.turnIdx++; startTurn(); return; }
  // Process status effects at start of turn
  processStatusEffects(unit);
  if(!unit.alive){ G.battle.turnIdx++; setTimeout(startTurn,500); return; }
  if(unit.isEnemy||unit.isSummon){
    document.getElementById('bt-phase').textContent=t('enemyTurn');
    setTimeout(()=>enemyAI(unit),800);
  } else {
    unit.ap=unit.maxAp||2;
    document.getElementById('bt-phase').textContent=t('playerTurn');
    G.battle.selectedHero=unit;
    G.battle.actionMode=null;
    if(G.tutorial.active&&G.tutorial.step===1){ showTip(t('tutorial2')); }
    renderBattle();
  }
}

function endTurn(){
  playSound('click');
  G.battle.turnIdx++;
  const next=getCurrentUnit();
  if(!next||G.battle.turnIdx>=G.battle.turnOrder.length){
    endRound(); return;
  }
  startTurn();
}

function endRound(){
  G.battle.round++;
  // Process danger zones
  G.battle.dangerZones=G.battle.dangerZones.filter(dz=>{
    // Damage anyone standing on it
    const unit=G.battle.grid[dz.y][dz.x];
    if(unit&&unit.alive){
      dealDamage(unit,dz.dmg,null,'fire');
    }
    dz.duration--;
    return dz.duration>0;
  });
  // Check deaths
  checkDeaths();
  if(checkBattleEnd()) return;
  computeTurnOrder();
  G.battle.turnIdx=0;
  startTurn();
}

/* ===== HERO Actions ===== */
function btAction(action){
  playSound('click');
  const hero=G.battle.selectedHero;
  if(!hero||hero.isEnemy) return;
  if(action==='end'){ endTurn(); return; }
  if(action==='defend'){
    if(hero.ap<1) return;
    hero.ap--; hero.defending=true;
    addLog('info',`${hero.name} ${t('defended')}`);
    renderBattle();
    if(hero.ap<=0) endTurn();
    return;
  }
  if(action==='item'){
    if(hero.ap<1) return;
    if(G.potions<=0){ addLog('info',t('noPotions')); return; }
    hero.ap--; G.potions--;
    healUnit(hero,15);
    addLog('heal',`${hero.name} ${t('usedPotion')}`);
    playSound('heal');
    renderBattle();
    if(hero.ap<=0) endTurn();
    return;
  }
  // Toggle off if clicking the same action mode
  if(G.battle.actionMode===action){
    G.battle.actionMode=null;
    G.battle.validTargets=[];
    G.battle.selectedSkill=null;
    renderBattle();
    return;
  }
  G.battle.actionMode=action;
  G.battle.selectedSkill=null;
  if(action==='move'){
    G.battle.validTargets=getMoveTiles(hero);
    if(G.battle.validTargets.length===0){ addLog('info',t('noMoveTiles')); }
  } else if(action==='attack'){
    G.battle.validTargets=getAttackTargets(hero);
    if(G.battle.validTargets.length===0){
      addLog('info',t('noTargetsInRange'));
      showTip(t('noTargetsInRange'),3000);
      G.battle.actionMode=null;
    }
  } else if(action==='skill'){
    // Show skill selection
    showSkillMenu(hero);
    return;
  }
  renderBattle();
  if(G.tutorial.active&&G.tutorial.step===2&&action==='move') showTip(t('tutorial3'));
  if(G.tutorial.active&&G.tutorial.step===3&&action==='attack') showTip(t('tutorial4'));
}

function showSkillMenu(hero){
  const skills=hero.skills.filter(s=>s.unlocked);
  let html='<div style="color:var(--charcoal)">';
  skills.forEach((s,i)=>{
    const apCost=s.ap||1;
    const disabled=hero.ap<apCost?'opacity:.4;pointer-events:none':'';
    html+=`<button class="modal-btn" style="text-align:left" onclick="selectSkill(${i})" ${hero.ap<apCost?'disabled':''}>
      <b style="color:var(--darkred)">${L(s.name)}</b> (${apCost} AP)<br>
      <span style="font-size:12px">${L(s.desc)}</span>
    </button>`;
  });
  html+=`<button class="modal-btn" style="text-align:center" onclick="closeModal();G.battle.actionMode=null;renderBattle()">${t('cancel')}</button>`;
  html+='</div>';
  showModal(t('skill'),html,[]);
}

function selectSkill(idx){
  closeModal();
  const hero=G.battle.selectedHero;
  const skill=hero.skills.filter(s=>s.unlocked)[idx];
  if(!skill||hero.ap<(skill.ap||1)) return;
  G.battle.actionMode='skill';
  G.battle.selectedSkill=skill;
  if(skill.type==='buff'||skill.type==='cleanse'||skill.type==='heal'){
    // Self or ally target
    G.battle.validTargets=getAllyTargets(hero,skill.range);
  } else if(skill.type==='summon'){
    // Execute immediately
    executeSkill(hero,skill,hero);
    return;
  } else if(skill.type==='taunt'){
    // AoE enemy debuff
    G.battle.validTargets=getEnemiesInRange(hero,skill.range);
  } else {
    G.battle.validTargets=getAttackTargets(hero,skill.range||hero.range);
  }
  if(G.battle.validTargets.length===0&&skill.type!=='summon'){
    addLog('info',t('noTargetsInRange'));
    showTip(t('noTargetsInRange'),3000);
    G.battle.actionMode=null;
    G.battle.selectedSkill=null;
  }
  renderBattle();
}

function getMoveTiles(hero){
  const tiles=[];
  const spd=getHeroStats(hero).spd;
  for(let dy=-spd;dy<=spd;dy++){
    for(let dx=-spd;dx<=spd;dx++){
      if(dx===0&&dy===0) continue;
      if(Math.abs(dx)+Math.abs(dy)>spd) continue;
      const nx=hero.x+dx, ny=hero.y+dy;
      if(nx<0||nx>=GRID_W||ny<0||ny>=GRID_H) continue;
      if(G.battle.grid[ny][nx]) continue;
      tiles.push({x:nx,y:ny});
    }
  }
  return tiles;
}

function getAttackTargets(hero,range){
  const r=range||hero.range;
  const targets=[];
  const enemies=[...G.battle.enemies,...G.battle.summons.filter(s=>s.alive&&!s.isHeroSummon)];
  enemies.forEach(e=>{
    if(!e.alive) return;
    const dist=Math.abs(e.x-hero.x)+Math.abs(e.y-hero.y);
    if(dist<=r) targets.push({x:e.x,y:e.y,unit:e});
  });
  return targets;
}

function getEnemiesInRange(hero,range){
  const targets=[];
  const enemies=[...G.battle.enemies,...G.battle.summons.filter(s=>s.alive&&!s.isHeroSummon)];
  enemies.forEach(e=>{
    if(!e.alive) return;
    const dist=Math.abs(e.x-hero.x)+Math.abs(e.y-hero.y);
    if(dist<=range) targets.push({x:e.x,y:e.y,unit:e});
  });
  return targets;
}

function getAllyTargets(hero,range){
  const r=range||3;
  const targets=[{x:hero.x,y:hero.y,unit:hero}];
  G.battle.heroes.forEach(h=>{
    if(!h.alive||h===hero) return;
    const dist=Math.abs(h.x-hero.x)+Math.abs(h.y-hero.y);
    if(dist<=r) targets.push({x:h.x,y:h.y,unit:h});
  });
  return targets;
}

/* ===== Battle Canvas Click ===== */
const btCanvas=document.getElementById('battle-canvas');
const btCtx=btCanvas?btCanvas.getContext('2d'):null;

btCanvas.addEventListener('click',e=>{
  if(!G.battle) return;
  const rect=btCanvas.getBoundingClientRect();
  const sx=btCanvas.width/rect.width, sy=btCanvas.height/rect.height;
  const x=(e.clientX-rect.left)*sx, y=(e.clientY-rect.top)*sy;
  const gx=Math.floor(x/CELL), gy=Math.floor(y/CELL);
  if(gx<0||gx>=GRID_W||gy<0||gy>=GRID_H) return;
  handleBattleClick(gx,gy);
});

function handleBattleClick(gx,gy){
  const hero=G.battle.selectedHero;
  if(!hero||hero.isEnemy) return;
  const mode=G.battle.actionMode;
  if(!mode) {
    // Click on a hero to select
    const unit=G.battle.grid[gy][gx];
    if(unit&&!unit.isEnemy&&unit.alive&&unit===getCurrentUnit()){
      // Already selected
    }
    return;
  }
  let acted=false;
  if(mode==='move'){
    const tile=G.battle.validTargets.find(t=>t.x===gx&&t.y===gy);
    if(tile){
      G.battle.actionMode=null;
      G.battle.validTargets=[];
      moveUnit(hero,gx,gy);
      hero.ap--;
      renderBattle();
      if(hero.ap<=0) endTurn();
      acted=true;
    }
  } else if(mode==='attack'){
    const target=G.battle.validTargets.find(t=>t.x===gx&&t.y===gy);
    if(target){
      G.battle.actionMode=null;
      G.battle.validTargets=[];
      hero.ap--;
      performAttack(hero,target.unit);
      acted=true;
    }
  } else if(mode==='skill'){
    const target=G.battle.validTargets.find(t=>t.x===gx&&t.y===gy);
    if(target){
      const skill=G.battle.selectedSkill;
      G.battle.actionMode=null;
      G.battle.validTargets=[];
      G.battle.selectedSkill=null;
      hero.ap-=skill.ap||1;
      executeSkill(hero,skill,target.unit);
      acted=true;
    }
  }
  // Clicking an invalid tile cancels the action mode
  if(!acted){
    G.battle.actionMode=null;
    G.battle.validTargets=[];
    G.battle.selectedSkill=null;
    renderBattle();
  }
}

function moveUnit(unit,gx,gy){
  G.battle.grid[unit.y][unit.x]=null;
  unit.x=gx; unit.y=gy;
  G.battle.grid[gy][gx]=unit;
  playSound('click');
}

/* ===== Attack Execution ===== */
function performAttack(attacker,target){
  const isRanged=attacker.range>1||attacker.classId==='outrider';
  const stats=attacker.isEnemy?{atk:attacker.atk,armor:attacker.armor,crit:0}:getHeroStats(attacker);
  let damage=stats.atk+(attacker.atkBonus||0);
  // Passive bonuses
  if(attacker.classId==='outrider'){
    const dist=Math.abs(target.x-attacker.x)+Math.abs(target.y-attacker.y);
    if(dist>=3) damage+=2;
  }
  if(attacker.classId==='wildcaller'){
    const slowed=target.statusEffects.some(e=>e.type==='slow'||e.type==='stun');
    if(slowed) damage+=3;
  }
  // Hollow Knight block
  if(target.blockChance&&target.blockChance>0&&!attacker.isEnemy){
    if(target._blocked===undefined) target._blocked=false;
    if(!target._blocked){
      target._blocked=true;
      addLog('info',`${target.name} blocks the attack!`);
      playSound('hit');
      renderBattle();
      return;
    }
  }
  if(isRanged){
    // Dice roll for ranged
    rollDice(stats.crit,4,`Attack: ${attacker.name} → ${target.name}`,(result)=>{
      let dmg=damage;
      if(result==='crit') dmg=Math.round(dmg*2);
      else if(result==='partial') dmg=Math.round(dmg*0.5);
      else if(result==='fail'||result==='critfail') dmg=0;
      dealDamage(target,dmg,attacker,'physical');
      if(result==='crit') addLog('crit',`CRIT! ${attacker.name} → ${target.name} for ${dmg}!`);
      else if(dmg>0) addLog('hit',`${attacker.name} → ${target.name} for ${dmg}`);
      else addLog('info',`${attacker.name} missed!`);
      checkDeaths();
      if(checkBattleEnd()) return;
      renderBattle();
      if(attacker.ap<=0&&!attacker.isEnemy) endTurn();
    });
  } else {
    // Melee - no dice, direct hit
    playSound('hit');
    dealDamage(target,damage,attacker,'physical');
    addLog('hit',`${attacker.name} → ${target.name} for ${damage}`);
    checkDeaths();
    if(checkBattleEnd()) return;
    renderBattle();
    if(attacker.ap<=0&&!attacker.isEnemy) endTurn();
  }
}

function dealDamage(target,dmg,attacker,type){
  if(dmg<=0) return;
  let actualDmg=dmg;
  // Armor reduction (physical only)
  if(type==='physical'){
    let armor=target.armor||0;
    if(target.isEnemy){
      // Use raw armor for enemies
    } else {
      armor=getHeroStats(target).armor;
    }
    // Hollow Knight is weak to magic, not physical
    actualDmg=Math.max(1,actualDmg-armor);
  }
  // Shield absorption
  if(target.shield>0){
    const absorbed=Math.min(target.shield,actualDmg);
    target.shield-=absorbed; actualDmg-=absorbed;
  }
  // Defending reduces damage
  if(target.defending) actualDmg=Math.round(actualDmg*0.5);
  // Vanguard passive
  if(target.classId==='vanguard') actualDmg=Math.max(0,actualDmg-2);
  // Protect status
  if(target.statusEffects.some(e=>e.type==='protect')) actualDmg=Math.round(actualDmg*0.5);
  target.hp-=actualDmg;
  if(target.hp<0) target.hp=0;
  // Apply attacker effects
  if(attacker){
    if(attacker.effect||attacker.classId){
      // Check for status application
    }
  }
  // Floating damage number
  showDamageNumber(target.x,target.y,actualDmg,type);
}

function healUnit(target,amount){
  target.hp=Math.min(target.maxHp,target.hp+amount);
  showDamageNumber(target.x,target.y,-amount,'heal');
}

function showDamageNumber(gx,gy,amount,type){
  G.battle._floaters=G.battle._floaters||[];
  G.battle._floaters.push({x:gx*CELL+CELL/2,y:gy*CELL+CELL/2,amount,type,life:60});
}

/* ===== Skill Execution ===== */
function executeSkill(hero,skill,target){
  playSound(skill.type==='magic'||skill.type==='heal'?'magic':'hit');
  const stats=getHeroStats(hero);
  if(skill.type==='melee'){
    let dmg=skill.power+Math.floor(stats.atk*0.5);
    dealDamage(target,dmg,hero,'physical');
    if(skill.effect) applyStatus(target,skill.effect,skill.effectDur);
    addLog('hit',`${hero.name} uses ${L(skill.name)}! ${dmg} damage`);
  } else if(skill.type==='ranged'){
    if(skill.diceTarget){
      rollDice(stats.crit,skill.diceTarget,`${L(skill.name)}: ${hero.name}`,(result)=>{
        let dmg=skill.power;
        if(result==='crit') dmg=Math.round(dmg*2);
        else if(result==='partial') dmg=Math.round(dmg*0.5);
        else if(result==='fail'||result==='critfail') dmg=0;
        dealDamage(target,dmg,hero,'physical');
        if(result==='crit') addLog('crit',`CRIT! ${L(skill.name)} → ${target.name} for ${dmg}!`);
        else addLog('hit',`${L(skill.name)} → ${target.name} for ${dmg}`);
        checkDeaths(); if(checkBattleEnd()) return; renderBattle();
        if(hero.ap<=0) endTurn();
      });
    } else {
      dealDamage(target,skill.power,hero,'physical');
      addLog('hit',`${L(skill.name)} → ${target.name} for ${skill.power}`);
      checkDeaths(); if(checkBattleEnd()) return; renderBattle();
      if(hero.ap<=0) endTurn();
    }
  } else if(skill.type==='magic'){
    let dmg=skill.power;
    if(skill.aoe){
      // Hit target and adjacent
      const allEnemies=[...G.battle.enemies,...G.battle.summons.filter(s=>s.alive&&!s.isHeroSummon)];
      allEnemies.forEach(e=>{
        if(!e.alive) return;
        const dist=Math.abs(e.x-target.x)+Math.abs(e.y-target.y);
        if(dist<=skill.aoe){
          dealDamage(e,dmg,hero,'magic');
        }
      });
      addLog('hit',`${L(skill.name)} hits multiple enemies!`);
    } else {
      dealDamage(target,dmg,hero,'magic');
      addLog('hit',`${L(skill.name)} → ${target.name} for ${dmg}`);
    }
    if(skill.effect){
      if(skill.effect==='fireZone'){
        // Create danger zone at target location
        G.battle.dangerZones.push({x:target.x,y:target.y,dmg:4,duration:3});
      } else {
        applyStatus(target,skill.effect,skill.effectDur);
      }
    }
    if(skill.selfDamage){
      hero.hp-=skill.selfDamage;
      addLog('info',`${hero.name} loses ${skill.selfDamage} HP from ${L(skill.name)}`);
    }
    checkDeaths(); if(checkBattleEnd()) return; renderBattle();
    if(hero.ap<=0) endTurn();
  } else if(skill.type==='heal'){
    healUnit(target,skill.heal);
    addLog('heal',`${hero.name} heals ${target.name} for ${skill.heal}`);
    renderBattle();
    if(hero.ap<=0) endTurn();
  } else if(skill.type==='buff'){
    if(skill.effect==='shield'){
      target.shield+=skill.shieldAmount||10;
      addLog('heal',`${target.name} gains ${skill.shieldAmount} shield`);
    } else if(skill.effect==='protect'){
      applyStatus(target,'protect',skill.effectDur);
    } else if(skill.effect==='haste'){
      applyStatus(target,'haste',skill.effectDur);
      target.atkBonus=(target.atkBonus||0)+3;
    }
    renderBattle();
    if(hero.ap<=0) endTurn();
  } else if(skill.type==='cleanse'){
    healUnit(target,skill.heal||6);
    target.statusEffects=target.statusEffects.filter(e=>e.type!=='burn'&&e.type!=='bleed'&&e.type!=='poison'&&e.type!=='stun'&&e.type!=='slow'&&e.type!=='weaken');
    addLog('heal',`${hero.name} purifies ${target.name}`);
    renderBattle();
    if(hero.ap<=0) endTurn();
  } else if(skill.type==='taunt'){
    // Apply taunt to all enemies in range
    const enemies=getEnemiesInRange(hero,skill.range);
    enemies.forEach(t=>applyStatus(t.unit,'taunted',skill.effectDur));
    addLog('info',`${hero.name} taunts enemies!`);
    renderBattle();
    if(hero.ap<=0) endTurn();
  } else if(skill.type==='summon'){
    // Create summon
    const summon={
      id:Date.now()+Math.random(), name:skill.summonHp>14?'Wolf':'Skeleton',
      icon:skill.summonHp>14?'wolf':'bone', color:'#5B5C57',
      maxHp:skill.summonHp, hp:skill.summonHp, armor:0, atk:skill.summonAtk, spd:skill.summonSpd, range:1,
      isSummon:true, isHeroSummon:true, alive:true,
      x:hero.x+1, y:hero.y, statusEffects:[], defending:false, shield:0,
      summonTurns:3,
    };
    // Find empty adjacent tile
    for(let dy=-1;dy<=1;dy++){
      for(let dx=-1;dx<=1;dx++){
        if(dx===0&&dy===0) continue;
        const nx=hero.x+dx, ny=hero.y+dy;
        if(nx>=0&&nx<GRID_W&&ny>=0&&ny<GRID_H&&!G.battle.grid[ny][nx]){
          summon.x=nx; summon.y=ny; break;
        }
      }
    }
    G.battle.summons.push(summon);
    if(G.battle.grid[summon.y]&&G.battle.grid[summon.y][summon.x]===null){
      G.battle.grid[summon.y][summon.x]=summon;
    }
    addLog('info',`${hero.name} summons ${summon.name}!`);
    computeTurnOrder();
    renderBattle();
    if(hero.ap<=0) endTurn();
  }
}

/* ===== Status Effects ===== */
function applyStatus(target,type,duration){
  if(!target.statusEffects) target.statusEffects=[];
  // Remove existing same type
  target.statusEffects=target.statusEffects.filter(e=>e.type!==type);
  target.statusEffects.push({type,duration});
  if(type==='weaken') target.atkBonus=(target.atkBonus||0)-3;
  if(type==='slow') target.spdBonus=(target.spdBonus||0)-2;
}

function processStatusEffects(unit){
  if(!unit.statusEffects) return;
  unit.statusEffects=unit.statusEffects.filter(e=>{
    e.duration--;
    if(e.duration<=0){
      // Remove effect
      if(e.type==='weaken') unit.atkBonus=(unit.atkBonus||0)+3;
      if(e.type==='slow') unit.spdBonus=(unit.spdBonus||0)+2;
      return false;
    }
    return true;
  });
  // Apply DoT effects
  const dots=unit.statusEffects.filter(e=>e.type==='burn'||e.type==='bleed'||e.type==='poison');
  dots.forEach(dot=>{
    let dmg=dot.type==='burn'?3:dot.type==='bleed'?2:2;
    if(unit.classId==='emberwitch') dmg+=1; // Passive bonus (if applicable)
    unit.hp-=dmg;
    addLog('hit',`${unit.name} takes ${dmg} ${dot.type} damage`);
    showDamageNumber(unit.x,unit.y,dmg,dot.type);
  });
  if(unit.hp<=0){
    unit.hp=0; unit.alive=false;
    addLog('info',`${unit.name} ${t('heroFallen')}`);
  }
}

/* ===== Enemy AI ===== */
function enemyAI(enemy){
  if(!enemy.alive){ G.battle.turnIdx++; startTurn(); return; }
  enemy.ap=2;
  const heroes=G.battle.heroes.filter(h=>h.alive);
  if(heroes.length===0){ endTurn(); return; }
  // Find target
  let target=null;
  // Check taunt
  const taunted=enemy.statusEffects&&enemy.statusEffects.some(e=>e.type==='taunted');
  if(taunted){
    target=G.battle.heroes.find(h=>h.alive&&h.classId==='vanguard');
  }
  if(!target){
    if(enemy.ai==='aggressive'||enemy.ai==='flank'){
      // Attack weakest hero in range, or closest
      target=findClosestHero(enemy);
    } else if(enemy.ai==='caster'||enemy.ai==='healer'){
      if(enemy.ai==='healer'){
        // Heal weakest ally
        const allies=[...G.battle.enemies,...G.battle.summons.filter(s=>s.alive&&!s.isHeroSummon)];
        const wounded=allies.filter(e=>e.alive&&e.hp<e.maxHp*0.6);
        if(wounded.length>0){
          const ally=wounded.sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp)[0];
          healUnit(ally,8);
          addLog('heal',`${enemy.name} heals ${ally.name}`);
          playSound('heal');
          enemy.ap--;
          renderBattle();
          setTimeout(()=>{ if(enemy.ap>0) enemyAct2(enemy,target); else {G.battle.turnIdx++;startTurn();} },600);
          return;
        }
      }
      target=findClosestHero(enemy);
    } else if(enemy.ai==='tank'||enemy.ai==='elite'){
      target=findClosestHero(enemy);
    } else {
      target=findClosestHero(enemy);
    }
  }
  enemyAct2(enemy,target);
}

function enemyAct2(enemy,target){
  if(!target||!target.alive){
    // Move toward nearest hero
    const hero=findClosestHero(enemy);
    if(hero) moveToward(enemy,hero);
    enemy.ap--;
    renderBattle();
    setTimeout(()=>{ if(enemy.ap>0&&enemy.alive) enemyAct2(enemy,findClosestHero(enemy)); else {G.battle.turnIdx++;startTurn();} },500);
    return;
  }
  const dist=Math.abs(target.x-enemy.x)+Math.abs(target.y-enemy.y);
  if(dist<=enemy.range){
    // Attack
    let dmg=enemy.atk;
    if(enemy.aoe){
      // Hit target and adjacent heroes
      G.battle.heroes.forEach(h=>{
        if(!h.alive) return;
        const d=Math.abs(h.x-target.x)+Math.abs(h.y-target.y);
        if(d<=1) dealDamage(h,dmg,enemy,'physical');
      });
      addLog('hit',`${enemy.name} AoE attack!`);
    } else {
      if(enemy.effect) applyStatus(target,enemy.effect,enemy.effectDur);
      dealDamage(target,dmg,enemy,'physical');
      addLog('hit',`${enemy.name} → ${target.name} for ${dmg}`);
    }
    playSound('hit');
    enemy.ap--;
    checkDeaths();
    if(checkBattleEnd()) return;
    renderBattle();
    setTimeout(()=>{ if(enemy.ap>0&&enemy.alive) enemyAct2(enemy,findClosestHero(enemy)); else {G.battle.turnIdx++;startTurn();} },600);
  } else {
    // Move toward target
    moveToward(enemy,target);
    enemy.ap--;
    renderBattle();
    setTimeout(()=>{ if(enemy.ap>0&&enemy.alive) enemyAct2(enemy,target); else {G.battle.turnIdx++;startTurn();} },500);
  }
}

function findClosestHero(enemy){
  const heroes=G.battle.heroes.filter(h=>h.alive);
  if(heroes.length===0) return null;
  let closest=heroes[0], minDist=Infinity;
  heroes.forEach(h=>{
    const d=Math.abs(h.x-enemy.x)+Math.abs(h.y-enemy.y);
    if(d<minDist){ minDist=d; closest=h; }
  });
  return closest;
}

function moveToward(enemy,hero){
  const spd=(enemy.spd||2)+(enemy.spdBonus||0);
  for(let step=0;step<spd;step++){
    const dx=hero.x-enemy.x, dy=hero.y-enemy.y;
    let mx=0,my=0;
    if(Math.abs(dx)>Math.abs(dy)){
      mx=dx>0?1:-1;
    } else if(dy!==0){
      my=dy>0?1:-1;
    }
    const nx=enemy.x+mx, ny=enemy.y+my;
    if(nx>=0&&nx<GRID_W&&ny>=0&&ny<GRID_H&&!G.battle.grid[ny][nx]){
      G.battle.grid[enemy.y][enemy.x]=null;
      enemy.x=nx; enemy.y=ny;
      G.battle.grid[ny][nx]=enemy;
    } else {
      break;
    }
  }
}

/* ===== Death & End Check ===== */
function checkDeaths(){
  G.battle.heroes.forEach(h=>{
    if(h.hp<=0&&h.alive){
      h.alive=false; h.hp=0;
      G.battle.grid[h.y][h.x]=null;
      addLog('info',`${h.name} ${t('heroFallen')}`);
      playSound('death');
    }
  });
  // Check boss phase transition BEFORE marking dead
  if(G.battle.isBoss){
    const boss=G.battle.enemies.find(e=>e.isBoss);
    if(boss&&boss.alive&&boss.hp<=0){
      const nextPhase=G.bossPhase+1;
      if(nextPhase<BOSS.phases.length){
        // Phase transition instead of death
        const phase=BOSS.phases[nextPhase];
        G.bossPhase=nextPhase;
        boss.maxHp=phase.hp; boss.hp=phase.hp;
        boss.armor=phase.armor; boss.atk=phase.atk; boss.spd=phase.spd; boss.range=phase.range;
        boss.skills=phase.skills; boss.phase=nextPhase;
        if(nextPhase===1){
          addLog('info',t('bossPhase2'));
          showModal('BOSS',`<div style="text-align:center;color:var(--charcoal)"><b>${t('bossPhase2')}</b></div>`,[{text:t('continue'),action:closeModal}]);
        } else if(nextPhase===2){
          for(let i=0;i<3;i++){
            const zx=2+Math.floor(Math.random()*4), zy=Math.floor(Math.random()*GRID_H);
            G.battle.dangerZones.push({x:zx,y:zy,dmg:5,duration:99});
          }
          addLog('info',t('bossPhase3'));
          showModal('BOSS',`<div style="text-align:center;color:var(--charcoal)"><b>${t('bossPhase3')}</b></div>`,[{text:t('continue'),action:closeModal}]);
        }
        computeTurnOrder();
        return;
      }
    }
  }
  G.battle.enemies.forEach(e=>{
    if(e.hp<=0&&e.alive){
      e.alive=false; e.hp=0;
      G.battle.grid[e.y][e.x]=null;
      addLog('info',`${e.name} ${t('enemyDefeated')}`);
      playSound('death');
    }
  });
  G.battle.summons.forEach(s=>{
    if(s.hp<=0&&s.alive){
      s.alive=false; s.hp=0;
      if(G.battle.grid[s.y]) G.battle.grid[s.y][s.x]=null;
    }
  });
  // Remove dead from turn order
  G.battle.turnOrder=G.battle.turnOrder.filter(u=>u.alive);
}

function checkBattleEnd(){
  const aliveHeroes=G.battle.heroes.filter(h=>h.alive);
  const aliveEnemies=G.battle.enemies.filter(e=>e.alive);
  if(aliveHeroes.length===0){
    // Game Over
    setTimeout(()=>showGameOver(),800);
    return true;
  }
  if(aliveEnemies.length===0){
    // Victory
    setTimeout(()=>battleVictory(),800);
    return true;
  }
  return false;
}

function battleVictory(){
  stopMusic();
  playSound('levelup');
  const isBoss=G.battle.isBoss;
  if(isBoss){
    showVictory();
    return;
  }
  // Calculate rewards
  const enemies=G.battle.enemies;
  let gold=0, xp=0;
  enemies.forEach(e=>{ gold+=e.gold||5; xp+=e.xp||8; });
  if(G.battle.isElite){ gold=Math.round(gold*1.5); xp=Math.round(xp*1.5); }
  G.gold+=gold;
  // Distribute XP
  G.party.forEach(h=>{
    if(h.alive){
      h.exp+=xp;
      while(h.exp>=h.expNext){
        h.exp-=h.expNext;
        h.level++;
        h.expNext=Math.round(h.expNext*1.5);
        h.maxHp+=4; h.hp+=4; h.atk+=1;
        if(h.level%3===0) h.armor+=1;
        addLog('info',`${h.name} ${t('levelUp')} Lv.${h.level}`);
        playSound('levelup');
      }
    }
  });
  // Random item drop
  const itemChance=G.battle.isElite?.9:.5;
  const rewards=[{type:'gold',amount:gold},{type:'exp',amount:xp}];
  if(Math.random()<itemChance){
    const item=randomEquip(G.battle.isElite?'epic':'rare');
    rewards.push({type:'item',item});
    G.party[0].equipment; // just access to add later
  }
  if(Math.random()<.3){ G.potions++; rewards.push({type:'potion'}); }
  // Clear temp buffs
  G.tempBuffs={atk:0,armor:0};
  // Show reward screen
  showRewardScreen(rewards);
  if(G.tutorial.active&&G.tutorial.step===6) showTip(t('tutorial7'));
}

function showRewardScreen(rewards){
  const items=document.getElementById('reward-items');
  items.innerHTML='';
  rewards.forEach(r=>{
    const d=document.createElement('div'); d.className='reward-item';
    if(r.type==='gold'){ d.classList.add('gold-item'); d.innerHTML=`${iconSVG('coin',28,'#B18A45')}<br><b>${r.amount}</b><br>${t('rewardGold')}`; }
    else if(r.type==='exp'){ d.innerHTML=`${iconSVG('star',28,'#B18A45')}<br><b>${r.amount}</b><br>${t('rewardExp')}`; }
    else if(r.type==='item'){
      const e=r.item; const rc=RARITY[e.rarity].c;
      d.style.borderColor=rc;
      d.innerHTML=`<span style="color:${rc}">${t(e.rarity)}</span><br><b>${L(e.name)}</b><br>${L(e.desc)}`;
      // Auto-assign to hero with empty slot
      const hero=G.party.find(h=>!h.equipment[e.slot]);
      if(hero){ hero.equipment[e.slot]=e.id; d.innerHTML+=`<br><span style="font-size:10px;color:var(--green)">→ ${hero.name}</span>`; }
    }
    else if(r.type==='potion'){ d.innerHTML=`${iconSVG('flask',28,'#B18A45')}<br>+1<br>${t('rewardPotion')}`; }
    items.appendChild(d);
  });
  document.getElementById('reward-title').textContent=t('victory');
  document.querySelector('#reward-screen .reward-btn').textContent=t('continue');
  showScreen('reward-screen');
}

function closeReward(){
  playSound('click');
  saveGame();
  renderMapScreen();
  showScreen('map-screen');
  playMusic('map');
  if(G.tutorial.active&&G.tutorial.step>=6){ nextTutorialStep(); }
}

/* ===== Battle Rendering ===== */
function renderBattle(){
  if(!btCtx||!G.battle) return;
  const ctx=btCtx; const w=btCanvas.width, h=btCanvas.height;
  // Background
  ctx.fillStyle='#17202B'; ctx.fillRect(0,0,w,h);
  // Grid
  for(let y=0;y<GRID_H;y++){
    for(let x=0;x<GRID_W;x++){
      const px=x*CELL, py=y*CELL;
      ctx.fillStyle=(x+y)%2===0?'#1C2530':'#232B36';
      ctx.fillRect(px,py,CELL,CELL);
      ctx.strokeStyle='rgba(91,92,87,.12)'; ctx.lineWidth=1;
      ctx.strokeRect(px,py,CELL,CELL);
    }
  }
  // Danger zones
  G.battle.dangerZones.forEach(dz=>{
    ctx.fillStyle='rgba(116,60,56,.18)';
    ctx.fillRect(dz.x*CELL,dz.y*CELL,CELL,CELL);
    drawIcon(ctx,'fire',dz.x*CELL+CELL/2,dz.y*CELL+CELL/2,24,'#743C38');
  });
  // Valid targets highlight
  if(G.battle.actionMode){
    G.battle.validTargets.forEach(t=>{
      ctx.fillStyle=G.battle.actionMode==='move'?'rgba(74,124,58,.3)':'rgba(196,68,0,.3)';
      ctx.fillRect(t.x*CELL,t.y*CELL,CELL,CELL);
      ctx.strokeStyle=G.battle.actionMode==='move'?'#30483A':'#743C38'; ctx.lineWidth=2;
      ctx.strokeRect(t.x*CELL+2,t.y*CELL+2,CELL-4,CELL-4);
    });
  }
  // Draw all units
  const allUnits=[...G.battle.heroes,...G.battle.enemies,...G.battle.summons];
  allUnits.forEach(u=>{
    if(!u.alive) return;
    drawUnit(ctx,u);
  });
  // Floating damage numbers
  if(G.battle._floaters){
    G.battle._floaters=G.battle._floaters.filter(f=>{
      f.life--;
      if(f.life<=0) return false;
      const alpha=f.life/60;
      const yOffset=(60-f.life)*0.5;
      ctx.font='bold 18px Georgia'; ctx.textAlign='center';
      const colors={physical:'#743C38',magic:'#6A4A6A',heal:'#30483A',burn:'#8A6A3A',bleed:'#743C38',poison:'#4A6A3A'};
      ctx.fillStyle=`rgba(${f.amount<0?'48,72,58':'116,60,56'},${alpha})`;
      const txt=f.amount<0?`+${-f.amount}`:`${f.amount}`;
      ctx.fillText(txt,f.x,f.y-yOffset);
      return true;
    });
  }
  // Update UI elements
  renderBattleUI();
  // Continue animation
  if(G.battle._floaters&&G.battle._floaters.length>0){
    requestAnimationFrame(renderBattle);
  }
}

function drawUnit(ctx,u){
  const px=u.x*CELL+CELL/2, py=u.y*CELL+CELL/2;
  const r=20;
  // Body circle
  ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
  ctx.fillStyle=u.color||'#5B5C57'; ctx.fill();
  ctx.strokeStyle=u===getCurrentUnit()?'#B18A45':u.isEnemy?'#743C38':'#30483A';
  ctx.lineWidth=u===getCurrentUnit()?2.5:1.5; ctx.stroke();
  // Icon
  drawIcon(ctx,u.icon||'question',px,py,28,'#E5DDC8');
  // HP bar
  const barW=36, barH=4;
  const barX=px-barW/2, barY=py-r-8;
  ctx.fillStyle='#000'; ctx.fillRect(barX-1,barY-1,barW+2,barH+2);
  ctx.fillStyle='#3D2018'; ctx.fillRect(barX,barY,barW,barH);
  const hpPct=u.hp/u.maxHp;
  ctx.fillStyle=hpPct>0.5?'#30483A':'#743C38'; ctx.fillRect(barX,barY,barW*hpPct,barH);
  // Shield indicator
  if(u.shield>0){
    ctx.fillStyle='#4A6A7A'; ctx.fillRect(barX,barY-3,barW*Math.min(1,u.shield/u.maxHp),2);
  }
  // HP text
  ctx.font='9px monospace'; ctx.fillStyle='#E5DDC8';
  ctx.fillText(`${u.hp}/${u.maxHp}`,px,barY-6);
  // Status effects
  if(u.statusEffects&&u.statusEffects.length>0){
    const sIcons={burn:'flame',bleed:'drop',poison:'poison',stun:'stun',slow:'slow',weaken:'weaken',taunted:'taunt',protect:'shield',haste:'haste'};
    u.statusEffects.forEach((e,i)=>{
      const sx=px-r+i*14+6, sy=py+r+8;
      drawIcon(ctx,sIcons[e.type]||'question',sx,sy,12,'#E5DDC8');
    });
  }
  // AP dots for current hero
  if(u===G.battle.selectedHero&&!u.isEnemy){
    for(let i=0;i<u.maxAp;i++){
      ctx.beginPath(); ctx.arc(px-r+i*8,py-r-14,3,0,Math.PI*2);
      ctx.fillStyle=i<u.ap?'#B18A45':'#3D3530'; ctx.fill();
    }
  }
}

function renderBattleUI(){
  // Turn order
  const to=document.getElementById('bt-turn-order');
  to.innerHTML='';
  G.battle.turnOrder.forEach((u,i)=>{
    const d=document.createElement('div'); d.className='bt-turn-icon'+(i===G.battle.turnIdx?' active':'');
    d.style.background=u.color||'#5B5C57';
    d.innerHTML=iconSVG(u.icon||'question',16,'#E5DDC8');
    to.appendChild(d);
  });
  // AP dots
  const ap=document.getElementById('bt-ap');
  ap.innerHTML='';
  const hero=G.battle.selectedHero;
  if(hero&&!hero.isEnemy){
    for(let i=0;i<hero.maxAp;i++){
      const d=document.createElement('div'); d.className='bt-ap-dot'+(i<hero.ap?' filled':'');
      ap.appendChild(d);
    }
  }
  // Action buttons
  document.querySelectorAll('.bt-action-btn').forEach(btn=>{
    const act=btn.dataset.action;
    if(hero&&!hero.isEnemy){
      if(act==='move') btn.disabled=hero.ap<1;
      else if(act==='attack') btn.disabled=hero.ap<1;
      else if(act==='skill') btn.disabled=hero.ap<1;
      else if(act==='defend') btn.disabled=hero.ap<1;
      else if(act==='item') btn.disabled=hero.ap<1||G.potions<=0;
      else if(act==='end') btn.disabled=false;
      // Highlight active action mode
      if(G.battle.actionMode===act) btn.classList.add('active');
      else btn.classList.remove('active');
    } else {
      btn.disabled=true;
      btn.classList.remove('active');
    }
  });
  // Hero info bar
  const hi=document.getElementById('bt-hero-info');
  hi.innerHTML='';
  G.battle.heroes.forEach(h=>{
    const d=document.createElement('div'); d.className='bt-hero-card'+(h===hero?' active':'')+(!h.alive?' dead':'');
    d.innerHTML=`<div class="bt-hero-portrait" style="border-color:${h.color}">${iconSVG(h.icon,16,h.color)}</div>
      <div class="bt-hero-hp">${h.name}<br><div class="bt-hero-hp-bar"><div class="bt-hero-hp-fill" style="width:${h.hp/h.maxHp*100}%;background:${h.hp/h.maxHp>0.5?'var(--green)':h.hp/h.maxHp>0.25?'var(--orange)':'var(--red)'}"></div></div></div>`;
    d.onclick=()=>{
      if(h.alive&&h===getCurrentUnit()){ G.battle.selectedHero=h; G.battle.actionMode=null; renderBattle(); }
    };
    hi.appendChild(d);
  });
  // Battle log
  const log=document.getElementById('bt-log');
  log.innerHTML=G.battle.log.slice(-20).map(e=>`<div class="bt-log-entry ${e.type}">${e.msg}</div>`).join('');
  log.scrollTop=log.scrollHeight;
}

function addLog(type,msg){
  G.battle.log.push({type,msg});
  if(G.battle.log.length>50) G.battle.log.shift();
}

/* ========================================================================
   DICE SYSTEM
   ======================================================================== */
let diceCallback=null, diceModifier=0, diceTarget=4, diceAction='', diceRollResult=0, diceHasRerolled=false;

function rollDice(modifier,target,action,callback){
  diceCallback=callback; diceModifier=modifier; diceTarget=target; diceAction=action;
  diceHasRerolled=false;
  const overlay=document.getElementById('dice-overlay');
  overlay.classList.remove('hidden');
  document.getElementById('dice-reroll').classList.add('hidden');
  document.getElementById('dice-result').textContent='';
  document.getElementById('dice-label').textContent=action;
  const face=document.getElementById('dice-face');
  face.classList.add('rolling'); face.textContent='?';
  playSound('dice');
  setTimeout(()=>{
    face.classList.remove('rolling');
    diceRollResult=Math.floor(Math.random()*6)+1;
    face.textContent=diceRollResult;
    playSound('click');
    const result=evaluateDice(diceRollResult,diceModifier,diceTarget);
    showDiceResult(result);
  },G.settings.reduceAnim?300:700);
}

function evaluateDice(roll,mod,target){
  if(roll===6) return 'crit';
  if(roll===1) return 'critfail';
  const total=roll+mod;
  if(total>=target+2) return 'crit';
  if(total>=target) return 'success';
  if(total===target-1) return 'partial';
  return 'fail';
}

function showDiceResult(result){
  const el=document.getElementById('dice-result');
  const labels={crit:t('critSuccess'),success:t('success'),partial:t('partialSuccess'),fail:t('failure'),critfail:t('critFailure')};
  const colors={crit:'crit',success:'success',partial:'partial',fail:'fail',critfail:'critfail'};
  el.className='dice-result '+colors[result];
  el.textContent=labels[result];
  playSound(result==='crit'?'crit':result==='critfail'?'death':'click');
  // Show reroll button if failed and has luck
  if((result==='fail'||result==='critfail'||result==='partial')&&G.luck>0&&!diceHasRerolled){
    const rb=document.getElementById('dice-reroll');
    rb.innerHTML=iconSVG('clover',16,'var(--gray-white)')+' '+t('useLuck');
    rb.classList.remove('hidden');
  } else {
    setTimeout(()=>finishDice(result),G.settings.reduceAnim?500:1200);
  }
}

function rerollDice(){
  if(G.luck<=0||diceHasRerolled) return;
  G.luck--; diceHasRerolled=true;
  document.getElementById('dice-reroll').classList.add('hidden');
  playSound('dice');
  const face=document.getElementById('dice-face');
  face.classList.add('rolling');
  setTimeout(()=>{
    face.classList.remove('rolling');
    diceRollResult=Math.floor(Math.random()*6)+1;
    face.textContent=diceRollResult;
    const result=evaluateDice(diceRollResult,diceModifier,diceTarget);
    showDiceResult(result);
  },G.settings.reduceAnim?300:600);
}

function finishDice(result){
  document.getElementById('dice-overlay').classList.add('hidden');
  if(diceCallback){ const cb=diceCallback; diceCallback=null; cb(result); }
}

/* ========================================================================
   RANDOM EVENTS
   ======================================================================== */
function triggerEvent(){
  const evt=EVENTS_POOL[Math.floor(Math.random()*EVENTS_POOL.length)];
  const choicesHtml=evt.choices.map((c,i)=>{
    return `<button class="modal-btn" onclick="resolveEventChoice(${i})" style="text-align:center">${L(c.text)}</button>`;
  }).join('');
  showModal(L(evt.title),
    `<div class="event-illust">${iconSVG(evt.icon,48,'var(--gold)')}</div><div style="text-align:center;color:var(--charcoal);font-style:italic;margin-bottom:12px">${L(evt.desc)}</div>${choicesHtml}`,
    [{text:t('leave'),action:()=>{closeModal();returnToMap();},secondary:true}]
  );
  // Store current event
  G._currentEvent=evt;
}

function resolveEventChoice(idx){
  const evt=G._currentEvent; if(!evt) return;
  const choice=evt.choices[idx]; if(!choice) return;
  closeModal();
  // Pick outcome based on chance
  const r=Math.random();
  let acc=0, outcome;
  for(const o of choice.outcomes){
    acc+=o.chance;
    if(r<acc){ outcome=o; break; }
  }
  if(!outcome) outcome=choice.outcomes[0];
  // Apply outcome
  let resultText='';
  switch(outcome.type){
    case 'battle':
      resultText={en:'Ambush! Battle begins!',cn:'伏击！战斗开始！'}[lang];
      showModal(L(evt.title),`<div style="text-align:center;color:var(--charcoal)">${resultText}</div>`,
        [{text:t('continue'),action:()=>{closeModal();startBattle(false);}}]);
      return;
    case 'gold':
      G.gold+=outcome.amount||10;
      resultText=`+${outcome.amount||10} ${t('gold')}`;
      break;
    case 'item':
      const item=randomEquip('rare');
      const hero=G.party.find(h=>!h.equipment[item.slot]);
      if(hero){ hero.equipment[item.slot]=item.id; resultText=`${L(item.name)} → ${hero.name}`; }
      else { G.gold+=10; resultText=`${L(item.name)} (sold for 10 gold)`; }
      break;
    case 'damage':
    case 'curse':
      const victim=G.party[Math.floor(Math.random()*G.party.length)];
      victim.hp=Math.max(1,victim.hp+(outcome.hp||-3));
      resultText={en:`${victim.name} loses ${-(outcome.hp||-3)} HP`,cn:`${victim.name} 损失 ${-(outcome.hp||-3)} 生命`}[lang];
      break;
    case 'luck':
      G.luck+=outcome.amount||1;
      resultText=`+${outcome.amount||1} ${t('luck')}`;
      break;
    case 'blessing':
      G.tempBuffs.atk+=2;
      resultText={en:'Blessing! +2 Atk next battle.',cn:'祝福！下一场战斗+2攻击力。'}[lang];
      break;
    case 'safe':
      resultText={en:'You move on safely.',cn:'你安全地离开了。'}[lang];
      break;
    case 'relic':
      const relic=randomEquip('epic');
      const h2=G.party.find(h=>!h.equipment[relic.slot]);
      if(h2){ h2.equipment[relic.slot]=relic.id; resultText=`${L(relic.name)} → ${h2.name}`; }
      else { G.gold+=20; resultText=`${L(relic.name)} (sold for 20 gold)`; }
      break;
  }
  showModal(L(evt.title),`<div style="text-align:center;color:var(--charcoal)">${resultText}</div>`,
    [{text:t('continue'),action:()=>{closeModal();returnToMap();}}]
  );
}

function buyShopItem(idx){
  const item=SHOP_POOL[idx];
  if(G.gold<item.price){ playSound('hit'); return; }
  G.gold-=item.price;
  playSound('chest');
  switch(item.type){
    case 'potion': G.potions++; break;
    case 'buff': G.tempBuffs[item.id==='buff_atk'?'atk':'armor']+=item.id==='buff_atk'?3:2; break;
    case 'equip':
      const eq=randomEquip('rare');
      const hero=G.party.find(h=>!h.equipment[eq.slot]);
      if(hero) hero.equipment[eq.slot]=eq.id;
      break;
    case 'luck': G.luck++; break;
    case 'item': G.potions++; break; // smoke bomb as extra potion for simplicity
  }
  closeModal(); openShop(); // refresh
}

function useShrine(idx){
  const opt=SHRINE_OPTIONS[idx];
  closeModal();
  let msg='';
  if(opt.cost==='5hp'){
    const hero=G.party.find(h=>h.hp>5);
    if(!hero){ showModal(t('shrine'),'<div style="text-align:center;color:var(--charcoal)">No hero can afford the cost.</div>',[{text:t('close'),action:()=>{closeModal();returnToMap();}}]); return; }
    hero.hp-=5;
  } else if(opt.cost==='10hp'){
    const hero=G.party.find(h=>h.hp>10);
    if(!hero){ showModal(t('shrine'),'<div style="text-align:center;color:var(--charcoal)">No hero can afford the cost.</div>',[{text:t('close'),action:()=>{closeModal();returnToMap();}}]); return; }
    hero.hp-=10;
  }
  switch(opt.id){
    case 'heal_all': G.party.forEach(h=>{h.hp=h.maxHp;}); msg={en:'All heroes fully healed!',cn:'所有英雄完全恢复！'}[lang]; playSound('heal'); break;
    case 'blessing': G.tempBuffs.atk+=2; msg={en:'+2 Attack for next battle!',cn:'下一场战斗+2攻击力！'}[lang]; break;
    case 'respec': G.gold+=15; msg=`+15 ${t('gold')}`; break;
    case 'luck': G.luck+=2; msg=`+2 ${t('luck')}`; break;
  }
  showModal(t('shrine'),`<div style="text-align:center;color:var(--charcoal)">${msg}</div>`,[{text:t('continue'),action:()=>{closeModal();returnToMap();}}]);
}

function startBossBattle(){

  const boss={
    id:Date.now()+Math.random(), enemyId:'boss',

    maxHp:phase.hp, hp:phase.hp, armor:phase.armor, atk:phase.atk, spd:phase.spd, range:phase.range,
    xp:100, gold:50, ai:'elite', aoe:false,
    statusEffects:[], defending:false, shield:0,
    x:GRID_W-1, y:2, alive:true, isEnemy:true, isBoss:true,
    blockChance:0, phase:0, skills:phase.skills,
  };
  // Add 2 hollow knight minions
