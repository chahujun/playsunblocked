}

function checkBossPhaseTransition(){
  const boss=G.battle.enemies.find(e=>e.isBoss);
  if(!boss||!boss.alive) return;
  const hpPct=boss.hp/boss.maxHp;
  const nextPhase=G.bossPhase+1;
  if(nextPhase<BOSS.phases.length&&hpPct<=0.33*(3-nextPhase)){
    // Phase transition
    G.bossPhase=nextPhase;
    const phase=BOSS.phases[nextPhase];
    boss.maxHp=phase.hp; boss.hp=phase.hp;
    boss.armor=phase.armor; boss.atk=phase.atk; boss.spd=phase.spd; boss.range=phase.range;
    boss.skills=phase.skills;
    boss.phase=nextPhase;
    if(nextPhase===1){
      addLog('info',t('bossPhase2'));
      showModal('BOSS',`<div style="text-align:center;color:var(--charcoal)"><b>${t('bossPhase2')}</b></div>`,
        [{text:t('continue'),action:closeModal}]);
    } else if(nextPhase===2){
      // Create danger zones
      for(let i=0;i<3;i++){
        const zx=2+Math.floor(Math.random()*4), zy=Math.floor(Math.random()*GRID_H);
        G.battle.dangerZones.push({x:zx,y:zy,dmg:5,duration:99});
      }
      addLog('info',t('bossPhase3'));
      showModal('BOSS',`<div style="text-align:center;color:var(--charcoal)"><b>${t('bossPhase3')}</b></div>`,
        [{text:t('continue'),action:closeModal}]);
    }
    computeTurnOrder();
    renderBattle();
  }
}

/* ========================================================================
   RETURN TO MAP & GAME OVER & VICTORY
   ======================================================================== */
function returnToMap(){
  document.getElementById('map-node-info').classList.add('hidden');
  saveGame();
  renderMapScreen();
  showScreen('map-screen');
  playMusic('map');
  if(G.tutorial.active&&G.tutorial.step>=7){ showTip(t('tutorial8')); }
}

function showGameOver(){
  stopMusic();
  document.getElementById('go-title').textContent=t('fallen');
  document.getElementById('go-sub').textContent=t('fallenSub');
  showScreen('gameover-screen');
}

function showVictory(){
  stopMusic();
  playMusic('victory');
  document.getElementById('vic-title').textContent=t('realmRemembers');
  document.getElementById('vic-sub').textContent=t('realmSub');
  showScreen('victory-screen');
  localStorage.removeItem(G.saveSlot);
}

function returnToTitle(){
  stopMusic();
  G.battle=null; G.map=null; G.party=[]; G.selectedClasses=[];
  G.gold=30; G.potions=2; G.luck=2; G.tempBuffs={atk:0,armor:0};
  G.tutorial={active:false,step:0};
  showScreen('title-screen');
  // Re-check save state for continue button
  if(!hasSave()){
    const btns=document.querySelectorAll('.title-btn');
    if(btns[1]){ btns[1].style.opacity='.4'; btns[1].style.pointerEvents='none'; }
  } else {
    const btns=document.querySelectorAll('.title-btn');
    if(btns[1]){ btns[1].style.opacity='1'; btns[1].style.pointerEvents='auto'; }
  }
}

/* ========================================================================
   KEYBOARD CONTROLS
   ======================================================================== */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(G.screen==='battle'&&G.battle){
      // Pause menu
      showModal({en:'Paused',cn:'暂停'}[lang],'',
        [{text:t('settings'),action:()=>{closeModal();showSettings();}},
         {text:t('returnTitle'),action:()=>{closeModal();stopMusic();showScreen('title-screen');},secondary:true}]);
    } else if(document.getElementById('modal-container').innerHTML){
      closeModal();
    }
  }
  if(G.screen==='battle'&&G.battle){
    if(e.key>='1'&&e.key<='4'){
      const idx=parseInt(e.key)-1;
      const hero=G.battle.selectedHero;
      if(hero&&!hero.isEnemy&&hero.skills[idx]){
        if(hero.ap>=hero.skills[idx].ap){
          G.battle.actionMode='skill';
          G.battle.selectedSkill=hero.skills[idx];
          selectSkill(idx);
        }
      }
    }
    if(e.key==='Enter'||e.key===' '){
      if(G.battle.selectedHero&&!G.battle.selectedHero.isEnemy) endTurn();
    }
    if(e.key==='w'||e.key==='W'||e.key==='ArrowUp'){ /* map cursor up */ }
    if(e.key==='s'||e.key==='S'||e.key==='ArrowDown'){ /* map cursor down */ }
  }
  if(e.key==='m'||e.key==='M'){
    G.settings.muted=!G.settings.muted;
    if(masterG) masterG.gain.value=G.settings.muted?0:G.settings.volume;
  }
});

/* ========================================================================
   TITLE SCREEN ASH PARTICLES
   ======================================================================== */
function createAshParticles(){
  const ts=document.getElementById('title-screen');
  if(!ts) return;
  for(let i=0;i<15;i++){
    const p=document.createElement('div'); p.className='title-ash';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(4+Math.random()*4)+'s';
    p.style.animationDelay=Math.random()*4+'s';
    ts.appendChild(p);
  }
}

/* ========================================================================
   INITIALIZATION
   ======================================================================== */
function init(){
  createAshParticles();
  // Map animation loop
  function mapLoop(){
    if(G.screen==='map') drawMap();
    requestAnimationFrame(mapLoop);
  }
  mapLoop();
  // Disable continue button if no save
  if(!hasSave()){
    const btns=document.querySelectorAll('.title-btn');
    if(btns[1]){ btns[1].style.opacity='.4'; btns[1].style.pointerEvents='none'; }
  }
}
init();
</script>
